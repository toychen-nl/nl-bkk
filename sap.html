鑰對來存取執行個體。每台機器都需要唯一的 EC2 金鑰對。\n公司希望實作金鑰輪換政策，在收到請求時自動輪換所有 EC2 金鑰對，並將金鑰保存在安全加密的地方。公司可接受金鑰輪換期間少於 1 分鐘的停機時間。\n哪個解決方案能滿足這些需求？","options":{"A":"將所有金鑰儲存在 AWS Secrets Manager 中。定義 Secrets Manager 輪換排程，以叫用 AWS Lambda 函數來產生新的金鑰對。在 EC2 執行個體上替換公鑰。在 Secrets Manager 中更新私鑰。","B":"以字串形式將所有金鑰儲存在 AWS Systems Manager 的 Parameter Store 中。定義 Systems Manager 維護視窗，以叫用 AWS Lambda 函數來產生新的金鑰對。在 EC2 執行個體上替換公鑰。在 Parameter Store 中更新私鑰。","C":"將 EC2 金鑰對匯入 AWS Key Management Service (AWS KMS)。為這些金鑰對設定自動金鑰輪換。建立 Amazon EventBridge 排程規則，以叫用 AWS Lambda 函數在 AWS KMS 中啟動金鑰輪換。","D":"使用 AWS Systems Manager 的 Fleet Manager 將所有 EC2 執行個體加入。定義 Systems Manager 維護視窗，發出 Systems Manager Run Command 文件以產生新的金鑰對，並將公鑰輪換至 Fleet Manager 中的所有執行個體。"},"answer":"A"},{"num":211,"stem":"一家公司想要遷移至 AWS。公司在 VMware ESXi 環境中執行數千個 VM。公司沒有設定管理資料庫，對 VMware 組合的使用情況了解甚少。\n解決方案架構師必須為公司提供準確的資產清單，以便公司能夠規劃具成本效益的遷移。\n哪個解決方案能以最少的操作負擔滿足這些需求？","options":{"A":"使用 AWS Systems Manager Patch Manager 將 Migration Evaluator 部署至每個 VM。在 Amazon QuickSight 中檢視收集的資料。識別高使用率的伺服器。從遷移清單中移除高使用率的伺服器。將資料匯入 AWS Migration Hub。","B":"將 VMware 組合匯出為 .csv 檔案。檢查每台伺服器的磁碟使用率。移除高使用率的伺服器。將資料匯出至 AWS Application Migration Service。使用 AWS Server Migration Service (AWS SMS) 遷移剩餘伺服器。","C":"將 Migration Evaluator 無代理程式收集器部署至 ESXi Hypervisor。在 Migration Evaluator 中檢視收集的資料。識別閒置伺服器。從遷移清單中移除閒置伺服器。將資料匯入 AWS Migration Hub。","D":"將 AWS Application Migration Service Agent 部署至每個 VM。收集資料後，使用 Amazon Redshift 匯入並分析資料。使用 Amazon QuickSight 進行資料視覺化。"},"answer":"C"},{"num":212,"stem":"一家公司將微服務作為 AWS Lambda 函數執行。該微服務將資料寫入支援有限並行連線數的本地端 SQL 資料庫。當 Lambda 函數叫用次數過高時，資料庫會崩潰並導致應用程式停機。公司在公司 VPC 和本地端資料中心之間具有 AWS Direct Connect 連線。公司希望保護資料庫免於崩潰。\n哪個解決方案能滿足這些需求？","options":{"A":"將資料寫入 Amazon Simple Queue Service (Amazon SQS) 佇列。設定 Lambda 函數從佇列讀取並寫入現有資料庫。在 Lambda 函數上設定保留並行限制，使其低於資料庫支援的連線數。","B":"建立新的 Amazon Aurora Serverless DB 叢集。使用 AWS DataSync 將資料從現有資料庫遷移至 Aurora Serverless。重新設定 Lambda 函數以寫入 Aurora。","C":"建立 Amazon RDS Proxy DB 執行個體。將 RDS Proxy DB 執行個體附加至 Amazon RDS DB 執行個體。重新設定 Lambda 函數以寫入 RDS Proxy DB 執行個體。","D":"將資料寫入 Amazon Simple Notification Service (Amazon SNS) 主題。在主題收到新訊息時叫用 Lambda 函數寫入現有資料庫。為 Lambda 函數設定佈建並行，使其等於資料庫支援的連線數。"},"answer":"D"},{"num":213,"stem":"一家公司使用在單一 Amazon EC2 執行個體上執行的 Grafana 資料視覺化解決方案來監控公司的 AWS 工作負載健康狀況。公司投入了時間和精力建立儀表板，並希望保留這些儀表板。這些儀表板需要高可用性，且停機時間不得超過 10 分鐘。公司需要最小化持續維護工作。\n哪個解決方案能以最少的操作負擔滿足這些需求？","options":{"A":"遷移至 Amazon CloudWatch 儀表板。重新建立儀表板以符合現有的 Grafana 儀表板。盡可能使用自動儀表板。","B":"建立 Amazon Managed Grafana 工作區。設定新的 Amazon CloudWatch 資料來源。從現有的 Grafana 執行個體匯出儀表板。將儀表板匯入新工作區。","C":"建立預先安裝 Grafana 的 AMI。將現有儀表板儲存在 Amazon Elastic File System (Amazon EFS) 中。建立使用新 AMI 的 Auto Scaling 群組。將 Auto Scaling 群組的最小、所需和最大執行個體數設定為 1。建立跨至少兩個可用區域的 Application Load Balancer。","D":"設定 AWS Backup 每小時備份一次執行 Grafana 的 EC2 執行個體。需要時從其他可用區域中最近的快照還原 EC2 執行個體。"},"answer":"B"},{"num":214,"stem":"一家公司需要將其客戶交易資料庫從本地端遷移至 AWS。資料庫位於 Linux 伺服器上執行的 Oracle DB 執行個體中。根據新的安全要求，公司必須每年輪換資料庫密碼。\n哪個解決方案能以最少的操作負擔滿足這些需求？","options":{"A":"使用 AWS Schema Conversion Tool (AWS SCT) 將資料庫轉換為 Amazon DynamoDB。將密碼儲存在 AWS Systems Manager Parameter Store 中。建立 Amazon CloudWatch 警示，以叫用 AWS Lambda 函數進行每年密碼輪換。","B":"將資料庫遷移至 Amazon RDS for Oracle。將密碼儲存在 AWS Secrets Manager 中。開啟自動輪換功能。設定每年輪換排程。","C":"將資料庫遷移至 Amazon EC2 執行個體。使用 AWS Systems Manager Parameter Store 保管連線字串，並使用 AWS Lambda 函數按每年排程進行輪換。","D":"使用 AWS Schema Conversion Tool (AWS SCT) 將資料庫遷移至 Amazon Neptune。建立 Amazon CloudWatch 警示，以叫用 AWS Lambda 函數進行每年密碼輪換。"},"answer":"C"},{"num":215,"stem":"一位解決方案架構師正在為一家由多個團隊組成的公司設計 AWS 帳戶結構。所有團隊將在相同的 AWS 區域中工作。公司需要連接至本地端網路的 VPC。公司預計與本地端網路之間的總流量少於 50 Mbps。\n哪些步驟組合能以最具成本效益的方式滿足這些需求？(選擇兩個)","options":{"A":"建立可佈建 VPC 和所需子網路的 AWS CloudFormation 範本。將範本部署至每個 AWS 帳戶。","B":"建立可佈建 VPC 和所需子網路的 AWS CloudFormation 範本。將範本部署至共用服務帳戶。使用 AWS Resource Access Manager 共用子網路。","C":"使用 AWS Transit Gateway 搭配 AWS Site-to-Site VPN 連接至本地端網路。使用 AWS Resource Access Manager 共用 Transit Gateway。","D":"使用 AWS Site-to-Site VPN 連接至本地端網路。","E":"使用 AWS Direct Connect 連接至本地端網路。"},"answer":"AD"},{"num":216,"stem":"大型公司的解決方案架構師需要為 AWS Organizations 組織中所有 AWS 帳戶的網際網路出站流量設定網路安全。組織有超過 100 個 AWS 帳戶，這些帳戶透過集中式 AWS Transit Gateway 相互路由。每個帳戶都有網際網路閘道和 NAT 閘道用於出站流量。公司僅在單一 AWS 區域中部署資源。\n公司需要能夠對組織中所有 AWS 帳戶的所有網際網路出站流量新增集中管理的規則型過濾功能。出站流量的尖峰負載在每個可用區域中不會超過 25 Gbps。\n哪個解決方案能滿足這些需求？","options":{"A":"建立新的 VPC 用於網際網路出站流量。將現有 Transit Gateway 連接至新 VPC。設定新的 NAT 閘道。在區域中跨所有可用區域建立執行開源網際網路 Proxy 的 Amazon EC2 執行個體的 Auto Scaling 群組，用於規則型過濾。修改所有預設路由以指向 Proxy 的 Auto Scaling 群組。","B":"建立新的 VPC 用於網際網路出站流量。將現有 Transit Gateway 連接至新 VPC。設定新的 NAT 閘道。使用 AWS Network Firewall 防火牆進行規則型過濾。在每個可用區域建立 Network Firewall 端點。修改所有預設路由以指向 Network Firewall 端點。","C":"在每個 AWS 帳戶中建立 AWS Network Firewall 防火牆用於規則型過濾。修改所有預設路由以指向每個帳戶中的 Network Firewall 防火牆。","D":"在每個 AWS 帳戶中建立執行開源網際網路 Proxy 的網路優化 Amazon EC2 執行個體的 Auto Scaling 群組，用於規則型過濾。修改所有預設路由以指向 Proxy 的 Auto Scaling 群組。"},"answer":"D"},{"num":217,"stem":"一家公司使用負載平衡器將流量分配至單一可用區域中的 Amazon EC2 執行個體。公司對安全性感到擔憂，希望解決方案架構師重新設計解決方案，以滿足以下需求：\n- 必須對入站請求進行常見漏洞攻擊過濾。\n- 被拒絕的請求必須傳送至第三方稽核應用程式。\n- 所有資源應具有高可用性。\n哪個解決方案能滿足這些需求？","options":{"A":"使用應用程式 AMI 設定多可用區域 Auto Scaling 群組。建立 Application Load Balancer (ALB)，並選擇先前建立的 Auto Scaling 群組作為目標。使用 Amazon Inspector 監控 ALB 和 EC2 執行個體的流量。在 WAF 中建立 Web ACL。使用 Web ACL 和 ALB 建立 AWS WAF。使用 AWS Lambda 函數定期將 Amazon Inspector 報告推送至第三方稽核應用程式。","B":"設定 Application Load Balancer (ALB)，並將 EC2 執行個體新增為目標。在 WAF 中建立 Web ACL。使用 Web ACL 和 ALB 名稱建立 AWS WAF，並啟用 Amazon CloudWatch Logs 的日誌記錄。使用 AWS Lambda 函數定期將日誌推送至第三方稽核應用程式。","C":"設定 Application Load Balancer (ALB) 及目標群組，並將 EC2 執行個體新增為目標。建立目標為第三方稽核應用程式的 Amazon Kinesis Data Firehose。在 WAF 中建立 Web ACL。使用 Web ACL 和 ALB 建立 AWS WAF，然後選擇 Kinesis Data Firehose 作為目標來啟用日誌記錄。在 AWS Marketplace 中訂閱 AWS Managed Rules，並選擇 WAF 作為訂閱者。","D":"使用應用程式 AMI 設定多可用區域 Auto Scaling 群組。建立 Application Load Balancer (ALB)，並選擇先前建立的 Auto Scaling 群組作為目標。建立目標為第三方稽核應用程式的 Amazon Kinesis Data Firehose。在 WAF 中建立 Web ACL。使用 WebACL 和 ALB 建立 AWS WAF，然後選擇 Kinesis Data Firehose 作為目標來啟用日誌記錄。在 AWS Marketplace 中訂閱 AWS Managed Rules，並選擇 WAF 作為訂閱者。"},"answer":"B"},{"num":218,"stem":"一家公司在 AWS Cloud 中執行應用程式。該應用程式由在 Application Load Balancer 後方跨多個可用區域的 Amazon EC2 執行個體機群上執行的微服務組成。公司最近在 Amazon API Gateway 中新增了一個新的 REST API。在 EC2 執行個體上執行的部分舊版微服務需要呼叫此新 API。\n公司不希望 API 可從公共網際網路存取，也不希望專有資料透過公共網際網路傳輸。\n解決方案架構師應如何做才能滿足這些需求？","options":{"A":"在 VPC 和 API Gateway 之間建立 AWS Site-to-Site VPN 連線。使用 API Gateway 為每個微服務產生唯一的 API 金鑰。設定 API 方法以要求金鑰。","B":"為 API Gateway 建立介面 VPC 端點，並設定端點政策僅允許存取特定 API。在 API Gateway 中新增資源政策，僅允許從 VPC 端點存取。將 API Gateway 端點類型變更為私有。","C":"修改 API Gateway 以使用 IAM 驗證。更新指派給 EC2 執行個體的 IAM 角色的 IAM 政策，以允許存取 API Gateway。將 API Gateway 移至新 VPC。部署 Transit Gateway 並連接 VPC。","D":"在 AWS Global Accelerator 中建立加速器，並將加速器連接至 API Gateway。使用指向已建立的 Global Accelerator 端點 IP 位址的路由，更新所有 VPC 子網路的路由表。為每個服務新增 API 金鑰以用於驗證。"},"answer":"C"},{"num":219,"stem":"一家公司在 AWS 上建立了整個基礎設施。公司使用 Amazon EC2 執行個體託管其電子商務網站，並使用 Amazon S3 儲存靜態資料。公司有三位工程師透過一個 AWS 帳戶處理雲端管理和開發工作。偶爾，某位工程師會修改另一位工程師的 EC2 安全群組設定，導致環境中出現合規問題。\n解決方案架構師必須建立一個追蹤工程師所做變更的系統。當工程師對 EC2 執行個體的安全設定進行不合規的變更時，系統必須傳送警示。\n解決方案架構師滿足這些需求的最快方法是什麼？","options":{"A":"為公司設定 AWS Organizations。套用 SCP 以管控並追蹤對 AWS 帳戶所做的不合規安全群組變更。","B":"啟用 AWS CloudTrail 以擷取 EC2 安全群組的變更。啟用 Amazon CloudWatch 規則，以在偵測到不合規安全設定時提供警示。","C":"在 AWS 帳戶上啟用 SCP，以在對環境進行不合規安全群組變更時提供警示。","D":"在 EC2 安全群組上啟用 AWS Config，以追蹤任何不合規的變更。透過 Amazon Simple Notification Service (Amazon SNS) 主題將變更作為警示傳送。"},"answer":"B"},{"num":220,"stem":"一家公司擁有 IoT 感應器，可監控大城市各地的交通模式。公司希望讀取和收集感應器的資料並對資料執行彙總。\n解決方案架構師設計了一個解決方案，其中 IoT 裝置串流至 Amazon Kinesis Data Streams。多個應用程式從串流中讀取資料。但是，多個消費者正在遭受節流，並定期遇到 ReadProvisionedThroughputExceeded 錯誤。\n解決方案架構師應採取哪些動作來解決此問題？(選擇三個)","options":{"A":"重新分片串流以增加串流中的分片數量。","B":"使用 Kinesis Producer Library (KPL)。調整輪詢頻率。","C":"使用具有增強型扇出功能的消費者。","D":"重新分片串流以減少串流中的分片數量。","E":"在消費者邏輯中使用錯誤重試和指數退避機制。 F. 設定串流以使用動態分區。"},"answer":"ACE"},{"num":221,"stem":"一家公司使用 AWS Organizations 管理其 AWS 帳戶。公司需要列出所有 CPU 或記憶體使用率未充分利用的 Amazon EC2 執行個體清單。公司還需要關於如何縮小這些未充分利用執行個體規格的建議。\n哪個解決方案能以最少的工作量滿足這些需求？","options":{"A":"從 AWS Marketplace 在所有 EC2 執行個體上安裝 CPU 和記憶體監控工具。將調查結果儲存在 Amazon S3 中。實作 Python 腳本以識別未充分利用的執行個體。參考 EC2 執行個體定價資訊以獲取縮小規格的建議。","B":"使用 AWS Systems Manager 在所有 EC2 執行個體上安裝 Amazon CloudWatch 代理程式。從組織管理帳戶中的 AWS Cost Explorer 擷取資源優化建議。使用建議縮小組織中所有帳戶的未充分利用執行個體規格。","C":"使用 AWS Systems Manager 在所有 EC2 執行個體上安裝 Amazon CloudWatch 代理程式。從組織中每個帳戶的 AWS Cost Explorer 擷取資源優化建議。使用建議縮小組織中所有帳戶的未充分利用執行個體規格。","D":"使用 AWS Systems Manager 在所有 EC2 執行個體上安裝 Amazon CloudWatch 代理程式。建立 AWS Lambda 函數以擷取所有 EC2 執行個體的 CPU 和記憶體使用率。將調查結果以檔案形式儲存在 Amazon S3 中。使用 Amazon Athena 尋找未充分利用的執行個體。參考 EC2 執行個體定價資訊以獲取縮小規格的建議。"},"answer":"B"},{"num":222,"stem":"一家公司希望執行自訂網路分析軟體套件，以在流量離開和進入 VPC 時對流量進行檢查。公司使用 AWS CloudFormation 將解決方案部署在 Auto Scaling 群組的三個 Amazon EC2 執行個體上。所有網路路由均已建立，以將流量導向 EC2 執行個體。\n每當分析軟體停止運作時，Auto Scaling 群組會替換執行個體。但發生執行個體替換時，網路路由不會更新。\n哪些步驟組合能解決此問題？(選擇三個)","options":{"A":"根據 EC2 狀態檢查指標建立警示，使 Auto Scaling 群組能夠替換失敗的執行個體。","B":"更新 CloudFormation 範本，在 EC2 執行個體上安裝 Amazon CloudWatch 代理程式。設定 CloudWatch 代理程式以傳送應用程式的程序指標。","C":"更新 CloudFormation 範本，在 EC2 執行個體上安裝 AWS Systems Manager Agent。設定 Systems Manager Agent 以傳送應用程式的程序指標。","D":"在 Amazon CloudWatch 中為失敗情境建立自訂指標的警示。設定警示以將訊息發布至 Amazon Simple Notification Service (Amazon SNS) 主題。","E":"建立 AWS Lambda 函數，以回應 Amazon Simple Notification Service (Amazon SNS) 訊息，將執行個體移出服務。更新網路路由以指向替換執行個體。","F":"在 CloudFormation 範本中，撰寫條件以在啟動替換執行個體時更新網路路由。"},"answer":"ADF"},{"num":223,"stem":"一家公司正在開發新的隨選影片應用程式，該應用程式以微服務為基礎。應用程式在推出時將有 500 萬使用者，6 個月後將有 3,000 萬使用者。公司已在 AWS Fargate 上的 Amazon Elastic Container Service (Amazon ECS) 中部署應用程式。公司使用採用 HTTPS 協定的 ECS 服務開發應用程式。\n解決方案架構師需要使用藍/綠部署來實作應用程式更新。解決方案必須透過負載平衡器將流量分配至每個 ECS 服務。應用程式必須能夠根據 Amazon CloudWatch 警示自動調整任務數量。\n哪個解決方案能滿足這些需求？","options":{"A":"設定 ECS 服務使用藍/綠部署類型和 Network Load Balancer。請求增加每個服務的任務服務配額以滿足需求。","B":"設定 ECS 服務使用藍/綠部署類型和 Network Load Balancer。使用 Cluster Autoscaler 為每個 ECS 服務實作 Auto Scaling 群組。","C":"設定 ECS 服務使用藍/綠部署類型和 Application Load Balancer。使用 Cluster Autoscaler 為每個 ECS 服務實作 Auto Scaling 群組。","D":"設定 ECS 服務使用藍/綠部署類型和 Application Load Balancer。為每個 ECS 服務實作 Service Auto Scaling。"},"answer":"A"},{"num":224,"stem":"一家公司在 AWS Cloud 中執行容器化應用程式。該應用程式在一組 Amazon EC2 執行個體的 Amazon Elastic Container Service (Amazon ECS) 上執行。EC2 執行個體在 Auto Scaling 群組中執行。\n公司使用 Amazon Elastic Container Registry (Amazon ECR) 儲存其容器映像。上傳新映像版本時，新映像版本會收到唯一標籤。\n公司需要一個解決方案，對新映像版本進行常見漏洞和暴露 (CVE) 檢查。解決方案必須自動刪除具有嚴重 (Critical) 或高 (High) 嚴重性結果的新映像標籤。解決方案還必須在發生此類刪除時通知開發團隊。\n哪個解決方案能滿足這些需求？","options":{"A":"在存放庫上設定推送時掃描。使用 Amazon EventBridge，在針對具有嚴重或高嚴重性結果的映像完成掃描時叫用 AWS Step Functions 狀態機器。使用 Step Functions 狀態機器刪除這些映像的映像標籤，並透過 Amazon Simple Notification Service (Amazon SNS) 通知開發團隊。","B":"在存放庫上設定推送時掃描。設定將掃描結果推送至 Amazon Simple Queue Service (Amazon SQS) 佇列。在新訊息新增至 SQS 佇列時叫用 AWS Lambda 函數。使用 Lambda 函數刪除具有嚴重或高嚴重性結果的映像的映像標籤。使用 Amazon Simple Email Service (Amazon SES) 通知開發團隊。","C":"排程 AWS Lambda 函數每小時啟動一次手動映像掃描。設定 Amazon EventBridge 在掃描完成時叫用另一個 Lambda 函數。使用第二個 Lambda 函數刪除具有嚴重或高嚴重性結果的映像的映像標籤。使用 Amazon Simple Notification Service (Amazon SNS) 通知開發團隊。","D":"在存放庫上設定定期映像掃描。設定將掃描結果新增至 Amazon Simple Queue Service (Amazon SQS) 佇列。在新訊息新增至 SQS 佇列時叫用 AWS Step Functions 狀態機器。使用 Step Functions 狀態機器刪除具有嚴重或高嚴重性結果的映像的映像標籤。使用 Amazon Simple Email Service (Amazon SES) 通知開發團隊。"},"answer":"C"},{"num":225,"stem":"一家公司在 AWS 上執行許多工作負載，並使用 AWS Organizations 管理其帳戶。工作負載託管在 Amazon EC2、AWS Fargate 和 AWS Lambda 上。部分工作負載的需求不可預測。帳戶在某些月份記錄到高使用量，在其他月份則記錄到低使用量。\n公司希望在未來 3 年內優化其運算成本。解決方案架構師取得組織中每個帳戶的 6 個月平均值以計算使用量。\n哪個解決方案能為組織的所有運算使用量提供最大的成本節省？","options":{"A":"為組織購買 Reserved Instances，以符合來自成員帳戶中最常見 EC2 執行個體的大小和數量。","B":"從管理帳戶使用管理帳戶層級的建議，為組織購買 Compute Savings Plan。","C":"根據過去 6 個月的資料，為每個 EC2 使用量高的成員帳戶購買 Reserved Instances。","D":"根據過去 6 個月的 EC2 使用量資料，從管理帳戶為每個成員帳戶購買 EC2 Instance Savings Plan。"},"answer":"B"},{"num":226,"stem":"一家公司擁有數百個 AWS 帳戶。該公司使用 AWS Organizations 中的組織來管理所有帳戶，並已啟用所有功能。\n\n一個財務團隊為 AWS 費用分配了每日預算。如果組織的 AWS 費用超過已分配預算的 80%，財務團隊必須收到電子郵件通知。一位解決方案架構師需要實作一個解決方案來追蹤費用並發送通知。\n哪個解決方案能滿足這些要求？","options":{"A":"在組織的管理帳戶中，使用 AWS Budgets 建立一個以每日為週期的預算。新增警報閾值並將其設為 80%。使用 Amazon Simple Notification Service (Amazon SNS) 通知財務團隊。","B":"在組織的管理帳戶中，為 AWS Trusted Advisor 設定組織視圖功能。建立一份針對成本最佳化的組織視圖報告。設定 80% 的警報閾值。配置通知偏好設定。新增財務團隊的電子郵件地址。","C":"向 AWS Control Tower 註冊組織。啟用選用的成本控制（護欄）。將控制（護欄）參數設為 80%。配置控制（護欄）通知偏好設定。使用 Amazon Simple Notification Service (Amazon SNS) 通知財務團隊。","D":"將成員帳戶配置為每天將 AWS Cost and Usage Report 儲存至組織管理帳戶中的 Amazon S3 儲存貯體。使用 Amazon EventBridge 排程每日 Amazon Athena 查詢以計算組織的費用。配置 Athena 在總費用超過已分配預算 80% 時發送 Amazon CloudWatch 警報。使用 Amazon Simple Notification Service (Amazon SNS) 通知財務團隊。"},"answer":"A"},{"num":227,"stem":"一家公司為藝術品提供拍賣服務，其用戶遍佈北美和歐洲。該公司將其應用程式託管在 us-east-1 區域的 Amazon EC2 執行個體上。藝術家使用行動電話將其作品的大尺寸、高解析度圖片檔案上傳至在 us-east-1 區域建立的集中式 Amazon S3 儲存貯體。歐洲用戶反映其圖片上傳效能緩慢。\n解決方案架構師如何改善圖片上傳流程的效能？","options":{"A":"重新部署應用程式以使用 S3 multipart uploads。","B":"建立 Amazon CloudFront 分發並將應用程式指定為自訂來源。","C":"將儲存貯體配置為使用 S3 Transfer Acceleration。","D":"為 EC2 執行個體建立 Auto Scaling 群組並建立擴展政策。"},"answer":"C"},{"num":228,"stem":"一家公司希望將多層 Web 應用程式容器化，並將應用程式從本地端資料中心遷移至 AWS。該應用程式包含 Web 層、應用程式層和資料庫層。公司需要使應用程式具備容錯性和可擴展性。某些頻繁存取的資料必須始終在應用程式伺服器之間可用。前端 Web 伺服器需要工作階段持久性，且必須能夠擴展以應對流量增加。\n哪個解決方案能以最少的持續營運開銷滿足這些要求？","options":{"A":"在 AWS Fargate 上的 Amazon Elastic Container Service (Amazon ECS) 中執行應用程式。使用 Amazon Elastic File System (Amazon EFS) 儲存 Web 層與應用程式層之間頻繁存取的資料。將前端 Web 伺服器的工作階段資料儲存在 Amazon Simple Queue Service (Amazon SQS) 中。","B":"在 Amazon EC2 上的 Amazon Elastic Container Service (Amazon ECS) 中執行應用程式。使用 Amazon ElastiCache for Redis 快取前端 Web 伺服器的工作階段資料。在分散於多個可用區域的 EC2 執行個體上使用具有 Multi-Attach 功能的 Amazon Elastic Block Store (Amazon EBS)。","C":"在 Amazon Elastic Kubernetes Service (Amazon EKS) 上執行應用程式。配置 Amazon EKS 使用受管節點群組。使用 ReplicaSets 執行 Web 伺服器和應用程式。建立 Amazon Elastic File System (Amazon EFS) 檔案系統。將 EFS 檔案系統掛載到所有 EKS Pod 以儲存前端 Web 伺服器的工作階段資料。","D":"在 Amazon Elastic Kubernetes Service (Amazon EKS) 上部署應用程式。配置 Amazon EKS 使用受管節點群組。在 EKS 叢集中以 Kubernetes deployments 的方式執行 Web 伺服器和應用程式。將前端 Web 伺服器的工作階段資料儲存在 Amazon DynamoDB 資料表中。建立一個供所有應用程式在部署時掛載的 Amazon Elastic File System (Amazon EFS) 磁碟區。"},"answer":"B"},{"num":229,"stem":"一位解決方案架構師正在規劃將重要的 Microsoft SQL Server 資料庫遷移至 AWS。由於這些資料庫是舊版系統，解決方案架構師將把資料庫遷移至現代資料架構。解決方案架構師必須以接近零停機時間完成資料庫遷移。\n哪個解決方案能滿足這些要求？","options":{"A":"使用 AWS Application Migration Service 和 AWS Schema Conversion Tool (AWS SCT)。在遷移前先執行原地升級。在切換後將遷移的資料匯出至 Amazon Aurora Serverless。將應用程式重新指向 Amazon Aurora。","B":"使用 AWS Database Migration Service (AWS DMS) 重新託管資料庫。將 Amazon S3 設為目標。設定變更資料擷取 (CDC) 複寫。當來源與目的地完全同步後，將資料從 Amazon S3 載入 Amazon RDS for Microsoft SQL Server DB 執行個體。","C":"使用原生資料庫高可用性工具。將來源系統連接至 Amazon RDS for Microsoft SQL Server DB 執行個體。依此配置複寫。當資料複寫完成後，將工作負載切換至 Amazon RDS for Microsoft SQL Server DB 執行個體。","D":"使用 AWS Application Migration Service。在 Amazon EC2 上重新託管資料庫伺服器。當資料複寫完成後，分離資料庫並將其移至 Amazon RDS for Microsoft SQL Server DB 執行個體。重新附加資料庫，然後切換所有網路連線。"},"answer":"C"},{"num":230,"stem":"一家公司的解決方案架構師正在分析多應用程式環境的費用。該環境部署在單一 AWS 區域中的多個可用區域。在最近一次收購後，該公司在 AWS Organizations 中管理兩個組織。公司已在其中一個組織中建立了多個以 AWS PrivateLink 為基礎的 VPC 端點服務作為服務提供者應用程式，並在另一個組織中建立了多個服務消費者應用程式。\n\n資料傳輸費用遠高於公司預期，解決方案架構師需要降低費用。解決方案架構師必須為開發人員提供部署服務時應遵循的指引，這些指引必須將整個環境的資料傳輸費用降至最低。\n哪些指引能滿足這些要求？（選擇兩個）","options":{"A":"使用 AWS Resource Access Manager 與組織中的其他帳戶共用託管服務提供者應用程式的子網路。","B":"將服務提供者應用程式和服務消費者應用程式放在同一組織的 AWS 帳戶中。","C":"在所有服務提供者應用程式部署中，關閉 Network Load Balancer 的跨可用區域負載平衡。","D":"確保服務消費者的運算資源透過使用端點的本地 DNS 名稱來使用特定可用區域的端點服務。","E":"建立一個 Savings Plan，為組織計劃的可用區域間資料傳輸用量提供足夠的覆蓋。"},"answer":"AB"},{"num":231,"stem":"一家公司擁有一個本地端 Microsoft SQL Server 資料庫，每晚會將 200 GB 的匯出資料寫入本地磁碟機。該公司希望將備份移至 Amazon S3 上更可靠的雲端儲存。公司已在本地端資料中心與 AWS 之間設置了 10 Gbps 的 AWS Direct Connect 連線。\n哪個解決方案能以最符合成本效益的方式滿足這些要求？","options":{"A":"建立一個新的 S3 儲存貯體。在連接至 Direct Connect 連線的 VPC 中部署 AWS Storage Gateway 檔案閘道。建立新的 SMB 檔案共用。將每晚的資料庫匯出資料寫入新的 SMB 檔案共用。","B":"在連接至 Direct Connect 連線的 VPC 中建立 Amazon FSx for Windows File Server 單一可用區域檔案系統。建立新的 SMB 檔案共用。將每晚的資料庫匯出資料寫入 Amazon FSx 檔案系統上的 SMB 檔案共用。啟用每晚備份。","C":"在連接至 Direct Connect 連線的 VPC 中建立 Amazon FSx for Windows File Server 多可用區域檔案系統。建立新的 SMB 檔案共用。將每晚的資料庫匯出資料寫入 Amazon FSx 檔案系統上的 SMB 檔案共用。啟用每晚備份。","D":"建立一個新的 S3 儲存貯體。在連接至 Direct Connect 連線的 VPC 中部署 AWS Storage Gateway 磁碟區閘道。建立新的 SMB 檔案共用。將每晚的資料庫匯出資料寫入磁碟區閘道上的新 SMB 檔案共用，並自動將此資料複製至 S3 儲存貯體。"},"answer":"A"},{"num":232,"stem":"一家公司需要建立從其本地端資料中心至 AWS 的連線。公司需要連接位於不同 AWS 區域的所有 VPC，並在 VPC 網路之間提供傳遞路由功能。公司還必須降低網路輸出流量費用、增加頻寬吞吐量，並為終端用戶提供一致的網路體驗。\n哪個解決方案能滿足這些要求？","options":{"A":"在本地端資料中心與新的中央 VPC 之間建立 AWS Site-to-Site VPN 連線。建立從中央 VPC 發起至所有其他 VPC 的 VPC 對等連線。","B":"在本地端資料中心與 AWS 之間建立 AWS Direct Connect 連線。佈建 transit VIF，並將其連接至 Direct Connect 閘道。使用每個區域中的 transit gateway 將 Direct Connect 閘道連接至所有其他 VPC。","C":"在本地端資料中心與新的中央 VPC 之間建立 AWS Site-to-Site VPN 連線。使用具有動態路由功能的 transit gateway。將 transit gateway 連接至所有其他 VPC。","D":"在本地端資料中心與 AWS 之間建立 AWS Direct Connect 連線。在每個區域的所有 VPC 之間建立 AWS Site-to-Site VPN 連線。建立從中央 VPC 發起至所有其他 VPC 的 VPC 對等連線。"},"answer":"B"},{"num":233,"stem":"一家公司正在將其開發和生產工作負載遷移至 AWS Organizations 中的新組織。公司已為開發建立了一個獨立的成員帳戶，並為生產建立了另一個獨立的成員帳戶。合併帳單已連結至管理帳戶。解決方案架構師需要在管理帳戶中建立一個能夠停止或終止兩個成員帳戶中資源的 IAM 使用者。\n哪個解決方案能滿足此要求？","options":{"A":"在管理帳戶中建立一個 IAM 使用者和一個跨帳戶角色。將跨帳戶角色配置為對成員帳戶具有最小權限存取。","B":"在每個成員帳戶中建立一個 IAM 使用者。在管理帳戶中，建立一個具有最小權限存取的跨帳戶角色。使用信任政策授予 IAM 使用者存取跨帳戶角色的權限。","C":"在管理帳戶中建立一個 IAM 使用者。在成員帳戶中，建立一個具有最小權限存取的 IAM 群組。將管理帳戶中的 IAM 使用者新增至每個成員帳戶的 IAM 群組。","D":"在管理帳戶中建立一個 IAM 使用者。在成員帳戶中，建立具有最小權限存取的跨帳戶角色。使用信任政策授予 IAM 使用者存取這些角色的權限。"},"answer":"D"},{"num":234,"stem":"一家公司希望使用 AWS 作為本地端應用程式的災難復原方案。公司擁有數百台執行應用程式的 Windows 伺服器，所有伺服器都掛載了一個共用磁碟區。\n\n公司的 RTO 為 15 分鐘，RPO 為 5 分鐘。解決方案必須支援原生容錯移轉和容錯回復功能。\n哪個解決方案能以最符合成本效益的方式滿足這些要求？","options":{"A":"建立 AWS Storage Gateway 檔案閘道。排程每日 Windows 伺服器備份。將資料儲存至 Amazon S3。發生災難時，從備份中還原本地端伺服器。進行容錯回復時，在 Amazon EC2 執行個體上執行本地端伺服器。","B":"建立一組 AWS CloudFormation 範本以建立基礎設施。使用 AWS DataSync 將所有資料複寫至 Amazon Elastic File System (Amazon EFS)。發生災難時，使用 AWS CodePipeline 部署範本以還原本地端伺服器。使用 DataSync 進行資料容錯回復。","C":"建立 AWS Cloud Development Kit (AWS CDK) 管道，在 AWS 上建立多站點主動-主動環境。使用 s3 sync 指令將資料複寫至 Amazon S3。發生災難時，切換 DNS 端點指向 AWS。使用 s3 sync 指令進行資料容錯回復。","D":"使用 AWS Elastic Disaster Recovery 複寫本地端伺服器。使用 AWS DataSync 將資料複寫至 Amazon FSx for Windows File Server 檔案系統。將檔案系統掛載至 AWS 伺服器。發生災難時，將本地端伺服器容錯移轉至 AWS。使用 Elastic Disaster Recovery 容錯回復至新的或現有的伺服器。"},"answer":"B"},{"num":235,"stem":"一家公司在 AWS 中為緊密耦合的工作負載建立了一個高效能運算 (HPC) 叢集，該工作負載會產生大量儲存於 Amazon EFS 的共用檔案。當 Amazon EC2 執行個體數量為 100 時，叢集效能良好。然而，當公司將叢集規模增加至 1,000 個 EC2 執行個體時，整體效能遠低於預期。\n解決方案架構師應採用哪些設計選擇組合以達到 HPC 叢集的最大效能？（選擇三個）","options":{"A":"確保 HPC 叢集在單一可用區域內啟動。","B":"以四的倍數啟動 EC2 執行個體並附加彈性網路介面。","C":"選擇啟用 Elastic Fabric Adapter (EFA) 的 EC2 執行個體類型。","D":"確保叢集跨多個可用區域啟動。","E":"將 Amazon EFS 替換為 RAID 陣列中的多個 Amazon EBS 磁碟區。","F":"將 Amazon EFS 替換為 Amazon FSx for Lustre。"},"answer":"ACF"},{"num":236,"stem":"一家公司正在設計 AWS Organizations 結構。公司希望標準化跨整個組織套用標籤的流程。當使用者建立新資源時，公司將要求具有特定值的標籤。公司的每個 OU 將有不同的標籤值。\n哪個解決方案能滿足這些要求？","options":{"A":"使用 SCP 拒絕建立沒有必要標籤的資源。建立一個包含公司為每個 OU 指定的標籤值的標籤政策。將標籤政策附加至 OU。","B":"使用 SCP 拒絕建立沒有必要標籤的資源。建立一個包含公司為每個 OU 指定的標籤值的標籤政策。將標籤政策附加至組織的管理帳戶。","C":"使用 SCP 僅允許在資源具有必要標籤的情況下建立資源。建立一個包含公司為每個 OU 指定的標籤值的標籤政策。將標籤政策附加至 OU。","D":"使用 SCP 拒絕建立沒有必要標籤的資源。定義標籤清單。將 SCP 附加至 OU。"},"answer":"C"},{"num":237,"stem":"一家公司擁有超過 10,000 個感測器，這些感測器使用訊息佇列遙測傳輸 (MQTT) 協定將資料傳送至本地端 Apache Kafka 伺服器。本地端 Kafka 伺服器轉換資料後，將結果以物件形式儲存至 Amazon S3 儲存貯體。最近，Kafka 伺服器發生當機。在伺服器還原期間，公司遺失了感測器資料。解決方案架構師必須在 AWS 上建立一個高可用性且可擴展的新設計，以防止類似情況再次發生。\n哪個解決方案能滿足這些要求？","options":{"A":"啟動兩個 Amazon EC2 執行個體，跨兩個可用區域以主動/待機配置託管 Kafka 伺服器。在 Amazon Route 53 中建立網域名稱。建立 Route 53 容錯移轉政策。將感測器路由至該網域名稱以傳送資料。","B":"將本地端 Kafka 伺服器遷移至 Amazon Managed Streaming for Apache Kafka (Amazon MSK)。建立指向 Amazon MSK 代理的 Network Load Balancer (NLB)。啟用 NLB 健康檢查。將感測器路由至 NLB 以傳送資料。","C":"部署 AWS IoT Core，並將其連接至 Amazon Kinesis Data Firehose 傳遞串流。使用 AWS Lambda 函數處理資料轉換。將感測器路由至 AWS IoT Core 以傳送資料。","D":"部署 AWS IoT Core，並啟動一個 Amazon EC2 執行個體來託管 Kafka 伺服器。配置 AWS IoT Core 將資料傳送至 EC2 執行個體。將感測器路由至 AWS IoT Core 以傳送資料。"},"answer":"A"},{"num":238,"stem":"一家公司最近開始在 AWS 雲端中託管新的應用程式工作負載。公司正在使用 Amazon EC2 執行個體、Amazon Elastic File System (Amazon EFS) 檔案系統和 Amazon RDS DB 執行個體。\n\n為了符合法規和業務要求，公司必須對資料備份進行以下變更：\n• 備份必須依照自訂的每日、每週和每月要求保留。\n• 備份必須在擷取後立即複寫至至少另一個 AWS 區域。\n• 備份解決方案必須提供跨 AWS 環境的單一備份狀態來源。\n• 備份解決方案必須在任何資源備份失敗時立即傳送通知。\n哪些步驟組合能以最少的營運開銷滿足這些要求？（選擇三個）","options":{"A":"建立 AWS Backup 計劃，並針對每個保留要求建立備份規則。","B":"配置 AWS Backup 計劃以將備份複製至另一個區域。","C":"建立 AWS Lambda 函數以將備份複寫至另一個區域，並在發生失敗時傳送通知。","D":"將 Amazon Simple Notification Service (Amazon SNS) 主題新增至備份計劃，以針對狀態非 BACKUP_JOB_COMPLETED 的已完成任務傳送通知。","E":"為每個保留要求建立 Amazon Data Lifecycle Manager (Amazon DLM) 快照生命週期政策。 F. 在每個資料庫上設定 RDS 快照。"},"answer":"ABD"},{"num":239,"stem":"一家公司正在開發一款基因報告裝置，該裝置將收集基因組資訊，以協助研究人員從多元族群中收集大量資料樣本。該裝置每秒將 8 KB 的基因組資料推送至需要處理和分析資料並將資訊回傳給研究人員的資料平台。資料平台必須符合以下要求：\n• 提供對傳入基因組資料的近即時分析\n• 確保資料具有彈性、並行性和持久性\n• 將處理結果傳遞至資料倉儲\n解決方案架構師應使用哪種策略來滿足這些要求？","options":{"A":"使用 Amazon Kinesis Data Firehose 收集傳入的感測器資料，使用 Kinesis 用戶端分析資料，並將結果儲存至 Amazon RDS 執行個體。","B":"使用 Amazon Kinesis Data Streams 收集傳入的感測器資料，使用 Kinesis 用戶端分析資料，並使用 Amazon EMR 將結果儲存至 Amazon Redshift 叢集。","C":"使用 Amazon S3 收集傳入的裝置資料，使用 Amazon SQS 配合 Kinesis 分析資料，並將結果儲存至 Amazon Redshift 叢集。","D":"使用 Amazon API Gateway 將請求放入 Amazon SQS 佇列，使用 AWS Lambda 函數分析資料，並使用 Amazon EMR 將結果儲存至 Amazon Redshift 叢集。"},"answer":"B"},{"num":240,"stem":"解決方案架構師需要為具有 Web 層、應用程式層和 NoSQL 資料層的三層應用程式定義參考架構。該參考架構必須符合以下要求：\n• 在 AWS 區域內具有高可用性\n• 能夠在 1 分鐘內容錯移轉至另一個 AWS 區域以進行災難復原\n• 提供最有效率的解決方案，同時將對用戶體驗的影響降至最低\n哪些步驟組合能滿足這些要求？（選擇三個）","options":{"A":"使用 Amazon Route 53 加權路由政策，在兩個選定的區域之間設定為 100/0。將存留時間 (TTL) 設為 1 小時。","B":"使用 Amazon Route 53 容錯移轉路由政策，從主要區域容錯移轉至災難復原區域。將存留時間 (TTL) 設為 30 秒。","C":"在 Amazon DynamoDB 中使用全域資料表，以便在兩個選定的區域中存取資料。","D":"每 60 分鐘備份一次主要區域中的 Amazon DynamoDB 資料表，然後將資料寫入 Amazon S3。使用 S3 跨區域複寫將資料從主要區域複製至災難復原區域。準備一個指令碼，以便在災難復原情境中將資料匯入 DynamoDB。","E":"在各區域中跨多個可用區域使用 Auto Scaling 群組實作 Web 層和應用程式層的熱備援模型。對最少數量的伺服器使用區域性 Reserved Instances，對任何額外資源使用 On-Demand Instances。","F":"在各區域中跨多個可用區域對 Web 層和應用程式層使用 Auto Scaling 群組。對所需資源使用 Spot Instances。"},"answer":"FDE"},{"num":241,"stem":"一家公司製造智慧型車輛。公司使用自訂應用程式收集車輛資料。車輛使用 MQTT 協定連接至應用程式。公司每 5 分鐘處理一次資料。然後公司將車輛遙測資料複製至本地端儲存。自訂應用程式分析這些資料以偵測異常。\n\n傳送資料的車輛數量持續增長。較新的車輛會產生大量資料。本地端儲存解決方案無法因應尖峰流量進行擴展，導致資料遺失。公司必須將解決方案現代化並遷移至 AWS，以解決擴展性挑戰。\n哪個解決方案能以最少的營運開銷滿足這些要求？","options":{"A":"使用 AWS IoT Greengrass 將車輛資料傳送至 Amazon Managed Streaming for Apache Kafka (Amazon MSK)。建立 Apache Kafka 應用程式以將資料儲存在 Amazon S3 中。使用 Amazon SageMaker 中的預訓練模型偵測異常。","B":"使用 AWS IoT Core 接收車輛資料。配置規則以將資料路由至儲存資料於 Amazon S3 的 Amazon Kinesis Data Firehose 傳遞串流。建立一個從傳遞串流讀取資料以偵測異常的 Amazon Kinesis Data Analytics 應用程式。","C":"使用 AWS IoT FleetWise 收集車輛資料。將資料傳送至 Amazon Kinesis 資料串流。使用 Amazon Kinesis Data Firehose 傳遞串流將資料儲存在 Amazon S3 中。使用 AWS Glue 中的內建機器學習轉換功能偵測異常。","D":"使用 Amazon MQ for RabbitMQ 收集車輛資料。將資料傳送至 Amazon Kinesis Data Firehose 傳遞串流以將資料儲存在 Amazon S3 中。使用 Amazon Lookout for Metrics 偵測異常。"},"answer":"C"},{"num":242,"stem":"在一次稽核中，安全團隊發現開發團隊將 IAM 使用者的秘密存取金鑰放入程式碼中，然後提交至 AWS CodeCommit 儲存庫。安全團隊希望自動找出並修復此安全漏洞的情況。\n哪個解決方案能確保憑證自動得到適當保護？","options":{"A":"使用 AWS Systems Manager Run Command 每晚執行指令碼，在開發執行個體上搜尋憑證。若找到，則使用 AWS Secrets Manager 輪換憑證。","B":"使用已排程的 AWS Lambda 函數從 CodeCommit 下載並掃描應用程式程式碼。若找到憑證，則產生新憑證並將其儲存在 AWS KMS 中。","C":"配置 Amazon Macie 掃描 CodeCommit 儲存庫中的憑證。若找到憑證，則觸發 AWS Lambda 函數停用憑證並通知使用者。","D":"配置 CodeCommit 觸發程序以調用 AWS Lambda 函數，掃描新提交的程式碼中是否含有憑證。若找到憑證，則在 AWS IAM 中停用它們並通知使用者。"},"answer":"A"},{"num":243,"stem":"一家公司在 Amazon S3 中擁有一個資料湖，需要跨多個 AWS 帳戶的數百個應用程式存取。公司的資訊安全政策規定，S3 儲存貯體不得透過公共網際網路存取，且每個應用程式應具備執行功能所需的最小權限。\n\n為了滿足這些要求，解決方案架構師計劃針對每個應用程式使用限制為特定 VPC 的 S3 存取點。\n解決方案架構師應採取哪些步驟組合來實作此解決方案？（選擇兩個）","options":{"A":"在擁有 S3 儲存貯體的 AWS 帳戶中為每個應用程式建立 S3 存取點。將每個存取點配置為只能從應用程式的 VPC 存取。更新儲存貯體政策以要求透過存取點進行存取。","B":"在每個應用程式的 VPC 中為 Amazon S3 建立介面端點。配置端點政策以允許存取 S3 存取點。為 S3 端點建立 VPC 閘道附件。","C":"在每個應用程式的 VPC 中為 Amazon S3 建立閘道端點。配置端點政策以允許存取 S3 存取點。指定用於存取存取點的路由表。","D":"在每個 AWS 帳戶中為每個應用程式建立 S3 存取點，並將存取點附加至 S3 儲存貯體。將每個存取點配置為只能從應用程式的 VPC 存取。更新儲存貯體政策以要求透過存取點進行存取。","E":"在資料湖的 VPC 中為 Amazon S3 建立閘道端點。附加端點政策以允許存取 S3 儲存貯體。指定用於存取儲存貯體的路由表。"},"answer":"DB"},{"num":244,"stem":"一家公司在其資料中心與 AWS 之間建立了混合解決方案。公司使用 Amazon VPC 和 Amazon EC2 執行個體將應用程式日誌傳送至 Amazon CloudWatch。EC2 執行個體從多個本地端託管的關聯式資料庫讀取資料。\n\n公司希望以近即時方式監控哪些 EC2 執行個體連接至資料庫。公司已在本地端擁有使用 Splunk 的監控解決方案。解決方案架構師需要決定如何將網路流量傳送至 Splunk。\n解決方案架構師應如何滿足這些要求？","options":{"A":"啟用 VPC 流量日誌，並將其傳送至 CloudWatch。建立 AWS Lambda 函數，使用預先定義的匯出函數定期將 CloudWatch 日誌匯出至 Amazon S3 儲存貯體。產生 ACCESS_KEY 和 SECRET_KEY AWS 憑證。配置 Splunk 使用這些憑證從 S3 儲存貯體提取日誌。","B":"建立以 Splunk 為目的地的 Amazon Kinesis Data Firehose 傳遞串流。配置一個使用 Kinesis Data Firehose 串流處理器的預處理 AWS Lambda 函數，從 CloudWatch Logs 訂閱篩選器傳送的記錄中提取個別日誌事件。啟用 VPC 流量日誌，並將其傳送至 CloudWatch。建立將日誌事件傳送至 Kinesis Data Firehose 傳遞串流的 CloudWatch Logs 訂閱。","C":"要求公司記錄對資料庫的每個請求及 EC2 執行個體 IP 位址。將 CloudWatch 日誌匯出至 Amazon S3 儲存貯體。使用 Amazon Athena 依資料庫名稱分組查詢日誌。將 Athena 結果匯出至另一個 S3 儲存貯體。調用 AWS Lambda 函數以自動將放入 S3 儲存貯體的任何新檔案傳送至 Splunk。","D":"將 CloudWatch 日誌傳送至具有 Amazon Kinesis Data Analytics for SQL Applications 的 Amazon Kinesis 資料串流。配置 1 分鐘滑動視窗以收集事件。建立一個使用異常偵測範本以近即時監控任何網路流量異常的 SQL 查詢。將結果傳送至以 Splunk 為目的地的 Amazon Kinesis Data Firehose 傳遞串流。"},"answer":"A"},{"num":245,"stem":"一家公司有五個開發團隊，每個團隊各自建立了五個 AWS 帳戶用於開發和託管應用程式。為了追蹤支出，開發團隊每個月分別登入各帳戶，從 AWS Billing and Cost Management 主控台記錄當前費用，並將資訊提供給公司的財務團隊。\n\n公司有嚴格的合規要求，需要確保資源只在美國境內的 AWS 區域建立。然而，部分資源已在其他區域建立。\n\n解決方案架構師需要實作一個解決方案，讓財務團隊能夠追蹤並整合所有帳戶的支出。該解決方案還必須確保公司只能在美國境內的區域建立資源。\n哪些步驟組合能以最具營運效率的方式滿足這些要求？（選擇三個）","options":{"A":"建立一個新帳戶作為管理帳戶。為財務團隊建立 Amazon S3 儲存貯體。使用 AWS Cost and Usage Reports 建立每月報告，並將資料儲存在財務團隊的 S3 儲存貯體中。","B":"建立一個新帳戶作為管理帳戶。在 AWS Organizations 中部署一個啟用所有功能的組織。邀請所有現有帳戶加入該組織。確保每個帳戶接受邀請。","C":"建立一個包含所有開發團隊的 OU。建立一個僅允許在美國境內區域建立資源的 SCP。將 SCP 套用至該 OU。","D":"建立一個包含所有開發團隊的 OU。建立一個拒絕在美國境外區域建立資源的 SCP。將 SCP 套用至該 OU。","E":"在管理帳戶中建立 IAM 角色。附加包含查看 Billing and Cost Management 主控台權限的政策。允許財務團隊使用者擔任該角色。使用 AWS Cost Explorer 和 Billing and Cost Management 主控台分析費用。","F":"在每個 AWS 帳戶中建立 IAM 角色。附加包含查看 Billing and Cost Management 主控台權限的政策。允許財務團隊使用者擔任該角色。"},"answer":"ACF"},{"num":246,"stem":"一家公司需要從中央位置為多個部門建立和管理多個 AWS 帳戶。安全團隊需要從其自己的 AWS 帳戶對所有帳戶進行唯讀存取。公司正在使用 AWS Organizations，並已為安全團隊建立了一個帳戶。\n解決方案架構師應如何滿足這些要求？","options":{"A":"使用 OrganizationAccountAccessRole IAM 角色，在每個成員帳戶中建立具有唯讀存取權限的新 IAM 政策。在每個成員帳戶的 IAM 政策與安全帳戶之間建立信任關係。請安全團隊使用 IAM 政策取得存取權限。","B":"使用 OrganizationAccountAccessRole IAM 角色，在每個成員帳戶中建立具有唯讀存取權限的新 IAM 角色。在每個成員帳戶的 IAM 角色與安全帳戶之間建立信任關係。請安全團隊使用 IAM 角色取得存取權限。","C":"請安全團隊使用 AWS Security Token Service (AWS STS) 從安全帳戶呼叫管理帳戶中 OrganizationAccountAccessRole IAM 角色的 AssumeRole API。使用產生的臨時憑證取得存取權限。","D":"請安全團隊使用 AWS Security Token Service (AWS STS) 從安全帳戶呼叫成員帳戶中 OrganizationAccountAccessRole IAM 角色的 AssumeRole API。使用產生的臨時憑證取得存取權限。"},"answer":"B"},{"num":247,"stem":"一家大型公司在部署於數百個 AWS 帳戶的 VPC 中執行工作負載。每個 VPC 包含跨多個可用區域的公有子網路和私有子網路。NAT 閘道部署在公有子網路中，允許私有子網路對網際網路進行輸出連線。\n\n解決方案架構師正在設計中樞輪輻架構。輪輻 VPC 中的所有私有子網路必須透過出口 VPC 將流量路由至網際網路。解決方案架構師已在中央 AWS 帳戶的出口 VPC 中部署了 NAT 閘道。\n解決方案架構師應採取哪些額外步驟來滿足這些要求？","options":{"A":"在出口 VPC 和輪輻 VPC 之間建立對等連線。配置所需的路由以允許存取網際網路。","B":"建立 transit gateway，並與現有的 AWS 帳戶共用。將現有 VPC 附加至 transit gateway。配置所需的路由以允許存取網際網路。","C":"在每個帳戶中建立 transit gateway。將 NAT 閘道附加至 transit gateway。配置所需的路由以允許存取網際網路。","D":"在出口 VPC 和輪輻 VPC 之間建立 AWS PrivateLink 連線。配置所需的路由以允許存取網際網路。"},"answer":"A"},{"num":248,"stem":"一家教育公司正在運營一個供全球大學生使用的 Web 應用程式。該應用程式在 Application Load Balancer (ALB) 後方的 Auto Scaling 群組中的 Amazon Elastic Container Service (Amazon ECS) 叢集中執行。系統管理員偵測到每週出現登入嘗試失敗次數激增的情況，這些失敗的登入嘗試使應用程式的驗證服務不堪負荷。所有失敗的登入嘗試均來自每週約 500 個不同的 IP 位址。解決方案架構師必須防止失敗的登入嘗試使驗證服務不堪負荷。\n哪個解決方案能以最高的營運效率滿足這些要求？","options":{"A":"使用 AWS Firewall Manager 建立安全群組和安全群組政策，以拒絕來自這些 IP 位址的存取。","B":"建立具有速率型規則的 AWS WAF Web ACL，並將規則動作設為封鎖。將 Web ACL 連接至 ALB。","C":"使用 AWS Firewall Manager 建立安全群組和安全群組政策，以僅允許來自特定 CIDR 範圍的存取。","D":"建立具有 IP 組合比對規則的 AWS WAF Web ACL，並將規則動作設為封鎖。將 Web ACL 連接至 ALB。"},"answer":"B"},{"num":249,"stem":"一家公司運營一個本地端的軟體即服務 (SaaS) 解決方案，每天接收多個檔案。公司向客戶提供多個公共 SFTP 端點以促進檔案傳輸。客戶將 SFTP 端點 IP 位址新增至其防火牆的輸出流量允許清單中。不允許變更 SFTP 端點 IP 位址。\n\n公司希望將 SaaS 解決方案遷移至 AWS，並降低檔案傳輸服務的營運開銷。\n哪個解決方案能滿足這些要求？","options":{"A":"在公司的 AWS 帳戶中註冊客戶自有的 IP 位址區塊。從位址集區建立 Elastic IP 位址，並將其指定至 AWS Transfer for SFTP 端點。使用 AWS Transfer 將檔案儲存在 Amazon S3 中。","B":"將包含客戶自有 IP 位址區塊的子網路新增至 VPC。從位址集區建立 Elastic IP 位址，並將其指定至 Application Load Balancer (ALB)。在 ALB 後方的 Auto Scaling 群組中啟動託管 FTP 服務的 EC2 執行個體。將檔案儲存在附加的 Amazon Elastic Block Store (Amazon EBS) 磁碟區中。","C":"向 Amazon Route 53 註冊客戶自有的 IP 位址區塊。在 Route 53 中建立指向 Network Load Balancer (NLB) 的別名記錄。在 NLB 後方的 Auto Scaling 群組中啟動託管 FTP 服務的 EC2 執行個體。將檔案儲存在 Amazon S3 中。","D":"在公司的 AWS 帳戶中註冊客戶自有的 IP 位址區塊。從位址集區建立 Elastic IP 位址，並將其指定至 Amazon S3 VPC 端點。在 S3 儲存貯體上啟用 SFTP 支援。"},"answer":"D"},{"num":250,"stem":"一家公司有一個新應用程式，需要在單一 AWS 區域的五個 Amazon EC2 執行個體上執行。應用程式需要在執行應用程式的所有 EC2 執行個體之間建立高吞吐量、低延遲的網路連線。應用程式沒有容錯的要求。\n哪個解決方案能滿足這些要求？","options":{"A":"將五個新 EC2 執行個體啟動至叢集型置放群組。確保 EC2 執行個體類型支援增強型網路功能。","B":"將五個新 EC2 執行個體啟動至同一可用區域中的 Auto Scaling 群組。為每個 EC2 執行個體附加額外的彈性網路介面。","C":"將五個新 EC2 執行個體啟動至分割區型置放群組。確保 EC2 執行個體類型支援增強型網路功能。","D":"將五個新 EC2 執行個體啟動至分散型置放群組。為每個 EC2 執行個體附加額外的彈性網路介面。"},"answer":"A"},{"num":251,"stem":"一家公司正在建立一個 REST API，與位於美國的六家合作夥伴共享資訊。該公司已建立一個 Amazon API Gateway Regional endpoint。六家合作夥伴每天各存取一次 API，以發佈每日銷售數字。\n\n初始部署後，公司觀察到每秒 1,000 個請求來自全球各地 500 個不同的 IP 位址。公司認為此流量來自殭屍網路，希望在最小化成本的同時保護其 API。\n\n公司應採取哪種方法來保護其 API？","options":{"A":"以 API 作為來源建立 Amazon CloudFront distribution。建立一個 AWS WAF web ACL，其中包含一條規則，用於封鎖每天提交超過五個請求的用戶端。將 web ACL 與 CloudFront distribution 關聯。使用 origin access identity (OAI) 配置 CloudFront 並將其與 distribution 關聯。配置 API Gateway 以確保只有 OAI 才能執行 POST 方法。","B":"以 API 作為來源建立 Amazon CloudFront distribution。建立一個 AWS WAF web ACL，其中包含一條規則，用於封鎖每天提交超過五個請求的用戶端。將 web ACL 與 CloudFront distribution 關聯。在 CloudFront distribution 中新增一個以 API 金鑰填入的自訂標頭。配置 API 以要求 POST 方法上的 API 金鑰。","C":"建立一個 AWS WAF web ACL，其中包含一條規則，允許存取六家合作夥伴使用的 IP 位址。將 web ACL 與 API 關聯。建立一個有請求限制的資源政策並將其與 API 關聯。配置 API 以要求 POST 方法上的 API 金鑰。","D":"建立一個 AWS WAF web ACL，其中包含一條規則，允許存取六家合作夥伴使用的 IP 位址。將 web ACL 與 API 關聯。建立一個有請求限制的使用計畫並將其與 API 關聯。建立一個 API 金鑰並將其新增至使用計畫。"},"answer":"C"},{"num":252,"stem":"一家公司在單一 AWS Region 中使用 Amazon Aurora PostgreSQL DB cluster 為應用程式提供服務。該公司的資料庫團隊必須監控所有資料庫上的所有資料活動。\n\n哪個解決方案能達成此目標？","options":{"A":"設定一個 AWS Database Migration Service (AWS DMS) change data capture (CDC) 任務。將 Aurora DB cluster 指定為來源。將 Amazon Kinesis Data Firehose 指定為目標。使用 Kinesis Data Firehose 將資料上傳至 Amazon OpenSearch Service cluster 以進行進一步分析。","B":"在 Aurora DB cluster 上啟動資料庫活動串流，以在 Amazon EventBridge 中擷取活動串流。將 AWS Lambda 函數定義為 EventBridge 的目標。對 Lambda 函數進行程式設計，以解密來自 EventBridge 的訊息，並將所有資料庫活動發佈至 Amazon S3 以進行進一步分析。","C":"在 Aurora DB cluster 上啟動資料庫活動串流，以將活動串流推送至 Amazon Kinesis data stream。配置 Amazon Kinesis Data Firehose 以使用 Kinesis data stream，並將資料傳遞至 Amazon S3 以進行進一步分析。","D":"設定一個 AWS Database Migration Service (AWS DMS) change data capture (CDC) 任務。將 Aurora DB cluster 指定為來源。將 Amazon Kinesis Data Firehose 指定為目標。使用 Kinesis Data Firehose 將資料上傳至 Amazon Redshift cluster。在 Amazon Redshift 資料上執行查詢，以確定 Aurora 資料庫上的資料庫活動。"},"answer":"D"},{"num":253,"stem":"一家娛樂公司最近推出了一款新遊戲。為確保玩家在推出期間有良好體驗，公司在 Network Load Balancer 後方部署了 12 台 r6g.16xlarge（記憶體最佳化）Amazon EC2 執行個體的靜態數量。公司的營運團隊使用 Amazon CloudWatch agent 和自訂指標，將記憶體使用率納入其監控策略。\n\n對推出期間 CloudWatch 指標的分析顯示，消耗量約為公司預期 CPU 和記憶體的四分之一。遊戲的初始需求已消退，並且變得更加多變。公司決定使用監控 CPU 和記憶體消耗的 Auto Scaling group，以動態擴展執行個體群。解決方案架構師需要以最具成本效益的方式配置 Auto Scaling group 以滿足需求。\n\n哪個解決方案能滿足這些要求？","options":{"A":"配置 Auto Scaling group 以部署 c6g.4xlarge（運算最佳化）執行個體。配置最小容量為 3、所需容量為 3、最大容量為 12。","B":"配置 Auto Scaling group 以部署 m6g.4xlarge（一般用途）執行個體。配置最小容量為 3、所需容量為 3、最大容量為 12。","C":"配置 Auto Scaling group 以部署 r6g.4xlarge（記憶體最佳化）執行個體。配置最小容量為 3、所需容量為 3、最大容量為 12。","D":"配置 Auto Scaling group 以部署 r6g.8xlarge（記憶體最佳化）執行個體。配置最小容量為 2、所需容量為 2、最大容量為 6。"},"answer":"D"},{"num":254,"stem":"一家金融服務公司將數百萬筆歷史股票交易記錄載入 Amazon DynamoDB 資料表。該資料表使用隨需容量模式。每天午夜，數百萬筆新記錄會被載入資料表。針對該資料表的應用程式讀取活動在一天中以爆發方式發生，且有限的金鑰集合被重複查找。公司需要降低與 DynamoDB 相關的成本。\n\n解決方案架構師應建議哪種策略來滿足此要求？","options":{"A":"在 DynamoDB 資料表前方部署 Amazon ElastiCache cluster","B":"部署 DynamoDB Accelerator (DAX)。配置 DynamoDB auto scaling。在 Cost Explorer 中購買 Savings Plans。","C":"使用佈建容量模式。在 Cost Explorer 中購買 Savings Plans。","D":"部署 DynamoDB Accelerator (DAX)。使用佈建容量模式。配置 DynamoDB auto scaling。"},"answer":"A"},{"num":255,"stem":"一家公司正在建立一個在 Amazon EC2 上運行的集中式日誌記錄服務，該服務將接收和分析來自數百個 AWS 帳戶的日誌。AWS PrivateLink 被用於提供用戶端服務和日誌記錄服務之間的連線。\n\n在每個具有用戶端的 AWS 帳戶中，已為日誌記錄服務建立了一個 interface endpoint 且可供使用。在 EC2 執行個體上運行的日誌記錄服務與 Network Load Balancer (NLB) 部署在不同的子網路中。用戶端無法使用 VPC endpoint 提交日誌。\n\n解決方案架構師應採取哪種組合步驟來解決此問題？（選擇兩個）","options":{"A":"檢查附加到日誌記錄服務子網路的 NACL，以允許與 NLB 子網路之間的通訊。檢查附加到 NLB 子網路的 NACL，以允許與在 EC2 執行個體上運行的日誌記錄服務子網路之間的通訊。","B":"檢查附加到日誌記錄服務子網路的 NACL，以允許與 interface endpoint 子網路之間的通訊。檢查附加到 interface endpoint 子網路的 NACL，以允許與在 EC2 執行個體上運行的日誌記錄服務子網路之間的通訊。","C":"檢查在 EC2 執行個體上運行的日誌記錄服務的安全群組，以確保它允許來自 NLB 子網路的輸入流量。","D":"檢查在 EC2 執行個體上運行的日誌記錄服務的安全群組，以確保它允許來自用戶端的輸入流量。","E":"檢查 NLB 的安全群組，以確保它允許來自 interface endpoint 子網路的輸入流量。"},"answer":"AC"},{"num":256,"stem":"一家公司在 Amazon S3 儲存貯體中有數百萬個物件。這些物件屬於 S3 Standard 儲存類別。所有 S3 物件都被頻繁存取。存取這些物件的使用者和應用程式數量正在迅速增加。這些物件使用 AWS KMS 金鑰的伺服器端加密 (SSE-KMS) 進行加密。\n\n解決方案架構師審查公司每月的 AWS 發票，發現由於 Amazon S3 的大量請求，AWS KMS 成本正在增加。解決方案架構師需要以對應用程式最小變更來最佳化成本。\n\n哪個解決方案能以最少的營運負擔滿足這些要求？","options":{"A":"建立一個以客戶提供金鑰的伺服器端加密 (SSE-C) 作為加密類型的新 S3 儲存貯體。將現有物件複製到新的 S3 儲存貯體。指定 SSE-C。","B":"建立一個以 Amazon S3 受管金鑰的伺服器端加密 (SSE-S3) 作為加密類型的新 S3 儲存貯體。使用 S3 Batch Operations 將現有物件複製到新的 S3 儲存貯體。指定 SSE-S3。","C":"使用 AWS CloudHSM 儲存加密金鑰。建立一個新的 S3 儲存貯體。使用 S3 Batch Operations 將現有物件複製到新的 S3 儲存貯體。使用 CloudHSM 中的金鑰加密物件。","D":"對 S3 儲存貯體使用 S3 Intelligent-Tiering 儲存類別。建立一個 S3 Intelligent-Tiering 封存配置，以將 90 天未存取的物件轉移至 S3 Glacier Deep Archive。"},"answer":"A"},{"num":257,"stem":"一個媒體儲存應用程式將使用者照片上傳至 Amazon S3，供 AWS Lambda 函數處理。應用程式狀態儲存在 Amazon DynamoDB 資料表中。使用者回報部分上傳的照片未被正確處理。應用程式開發人員追蹤日誌，發現當數千名使用者同時上傳照片時，Lambda 遭遇照片處理問題。這些問題是由 Lambda 並行限制以及儲存資料時 DynamoDB 的效能所導致。\n\n解決方案架構師應採取哪種組合行動來提升應用程式的效能和可靠性？（選擇兩個）","options":{"A":"評估並調整 DynamoDB 資料表的 RCU。","B":"評估並調整 DynamoDB 資料表的 WCU。","C":"新增 Amazon ElastiCache 層以提升 Lambda 函數的效能。","D":"在 Amazon S3 和 Lambda 函數之間新增 Amazon Simple Queue Service (Amazon SQS) 佇列和重新處理邏輯。","E":"使用 S3 Transfer Acceleration 為使用者提供更低的延遲。"},"answer":"BD"},{"num":258,"stem":"一家公司在內部部署資料中心運行一個應用程式。該應用程式讓使用者能夠上傳媒體檔案。這些檔案保存在檔案伺服器上。該 Web 應用程式有許多使用者。應用程式伺服器過度使用，導致資料上傳偶爾失敗。公司經常向檔案伺服器新增新的儲存空間。公司希望透過將應用程式遷移至 AWS 來解決這些挑戰。\n\n來自美國和加拿大各地的使用者存取該應用程式。只有經過驗證的使用者才能存取應用程式以上傳檔案。公司將考慮重構應用程式的解決方案，且公司需要加速應用程式開發。\n\n哪個解決方案能以最少的營運負擔滿足這些要求？","options":{"A":"使用 AWS Application Migration Service 將應用程式伺服器遷移至 Amazon EC2 執行個體。為 EC2 執行個體建立 Auto Scaling group。使用 Application Load Balancer 分發請求。修改應用程式以使用 Amazon S3 保存檔案。使用 Amazon Cognito 驗證使用者。","B":"使用 AWS Application Migration Service 將應用程式伺服器遷移至 Amazon EC2 執行個體。為 EC2 執行個體建立 Auto Scaling group。使用 Application Load Balancer 分發請求。設定 AWS IAM Identity Center (AWS Single Sign-On) 讓使用者能夠登入應用程式。修改應用程式以使用 Amazon S3 保存檔案。","C":"建立一個用於上傳媒體檔案的靜態網站。將靜態資產儲存在 Amazon S3 中。使用 AWS AppSync 建立 API。使用 AWS Lambda resolvers 將媒體檔案上傳至 Amazon S3。使用 Amazon Cognito 驗證使用者。","D":"使用 AWS Amplify 建立一個用於上傳媒體檔案的靜態網站。使用 Amplify Hosting 透過 Amazon CloudFront 提供網站服務。使用 Amazon S3 儲存上傳的媒體檔案。使用 Amazon Cognito 驗證使用者。"},"answer":"A"},{"num":259,"stem":"一家公司有一個應用程式，部署在 Application Load Balancer (ALB) 後方的 Amazon EC2 執行個體上。這些執行個體屬於 Auto Scaling group 的一部分。應用程式的工作負載無法預測，經常進行擴展和縮減。公司的開發團隊希望分析應用程式日誌以找到提升應用程式效能的方法。然而，執行個體縮減後，日誌便不再可用。\n\n哪個解決方案能讓開發團隊在縮減事件後查看應用程式日誌？","options":{"A":"為 ALB 啟用存取日誌。將日誌儲存在 Amazon S3 儲存貯體中。","B":"配置 EC2 執行個體，使用統一的 CloudWatch agent 將日誌發佈至 Amazon CloudWatch Logs。","C":"修改 Auto Scaling group 以使用步驟擴展政策。","D":"使用 AWS X-Ray tracing 對應用程式進行工具化。"},"answer":"B"},{"num":260,"stem":"一家公司運行一個未經驗證的靜態網站 (www.example.com)，其中包含一個供使用者使用的註冊表單。該網站使用 Amazon S3 進行託管，並使用 Amazon CloudFront 作為內容傳遞網路，並已配置 AWS WAF。提交註冊表單時，網站會呼叫 Amazon API Gateway API endpoint，該 endpoint 會叫用 AWS Lambda 函數來處理有效負載並將有效負載轉發至外部 API 呼叫。\n\n在測試期間，解決方案架構師遇到了 cross-origin resource sharing (CORS) 錯誤。解決方案架構師確認 CloudFront distribution origin 的 Access-Control-Allow-Origin 標頭已設定為 www.example.com。\n\n解決方案架構師應採取什麼措施來解決此錯誤？","options":{"A":"變更 S3 儲存貯體上的 CORS 配置。為 www.example.com 在 AllowedOrigin 元素中新增 CORS 規則。","B":"在 AWS WAF 中啟用 CORS 設定。建立一個 web ACL 規則，將 Access-Control-Allow-Origin 標頭設定為 www.example.com。","C":"在 API Gateway API endpoint 上啟用 CORS 設定。確保 API endpoint 配置為傳回所有將 Access-Control-Allow-Origin 標頭設定為 www.example.com 的回應。","D":"在 Lambda 函數上啟用 CORS 設定。確保函數的傳回碼將 Access-Control-Allow-Origin 標頭設定為 www.example.com。"},"answer":"B"},{"num":261,"stem":"一家公司擁有許多獨立的 AWS 帳戶，且沒有使用集中式帳單或管理。每個 AWS 帳戶為公司不同部門提供服務。該公司已部署 Microsoft Azure Active Directory。\n\n解決方案架構師需要集中管理公司 AWS 帳戶的帳單和管理。公司希望開始使用身份聯合而非手動使用者管理。公司也希望使用臨時憑證而非長期存取金鑰。\n\n哪種組合步驟能滿足這些要求？（選擇三個）","options":{"A":"建立一個新的 AWS 帳戶作為管理帳戶。在 AWS Organizations 中部署一個組織。邀請每個現有的 AWS 帳戶加入該組織。確保每個帳戶接受邀請。","B":"將每個 AWS 帳戶的電子郵件地址配置為 aws+@example.com，以便帳戶管理電子郵件和發票被發送到同一個地方。","C":"在管理帳戶中部署 AWS IAM Identity Center (AWS Single Sign-On)。將 IAM Identity Center 連接至 Azure Active Directory。配置 IAM Identity Center 以自動同步使用者和群組。","D":"在管理帳戶中部署 AWS Managed Microsoft AD 目錄。使用 AWS Resource Access Manager (AWS RAM) 與組織中的所有其他帳戶共享該目錄。","E":"建立 AWS IAM Identity Center (AWS Single Sign-On) 權限集。將權限集附加至適當的 IAM Identity Center 群組和 AWS 帳戶。 F. 在每個 AWS 帳戶中配置 AWS Identity and Access Management (IAM)，以使用 AWS Managed Microsoft AD 進行驗證和授權。"},"answer":"CDE"},{"num":262,"stem":"一家公司希望透過遷移至 AWS 來管理與一組 20 個不常使用但仍對業務至關重要的應用程式相關的成本。這些應用程式是 Java 和 Node.js 的混合，分佈在不同的執行個體叢集中。公司希望透過使用單一部署方法來最小化成本並實現標準化。\n\n大多數應用程式是月末處理常式的一部分，並發使用者數量少，但偶爾也會在其他時間運行。應用程式平均記憶體消耗低於 1 GB，儘管某些應用程式在峰值處理期間使用多達 2.5 GB 的記憶體。該組中最重要的應用程式是一個用 Java 編寫的帳單報告，它存取多個資料來源，通常需要運行數小時。\n\n哪個是最具成本效益的解決方案？","options":{"A":"為每個應用程式部署一個單獨的 AWS Lambda 函數。使用 AWS CloudTrail 日誌和 Amazon CloudWatch 警示來驗證關鍵工作的完成。","B":"在 Amazon EC2 上的 Amazon ECS containers 中進行部署，並配置記憶體使用率 75% 的 Auto Scaling。為每個被遷移的應用程式部署一個 ECS 任務，並配置 ECS 任務擴展。使用 Amazon CloudWatch 監控服務和主機。","C":"為每個應用程式部署 AWS Elastic Beanstalk 並配置 Auto Scaling，以確保所有請求都有足夠的資源。使用 CloudWatch 警示監控每個 AWS Elastic Beanstalk 部署。","D":"部署一個新的 Amazon EC2 執行個體叢集，使用 EC2 Auto Scaling 和 Application Load Balancers 共同託管所有應用程式。根據執行個體記憶體使用率上設定的自訂指標調整叢集大小。購買等於 Auto Scaling group 的 GroupMaxSize 參數的 3 年 Reserved Instance 預留。"},"answer":"B"},{"num":263,"stem":"解決方案架構師需要審查使用 EMR File System (EMRFS) 的 Amazon EMR cluster 的設計。該 cluster 執行對業務需求至關重要的任務。cluster 始終在所有任務節點、主節點和核心節點上運行 Amazon EC2 On-Demand 執行個體。EMR 任務每天早上 1:00 AM 開始運行，需要 6 小時才能完成。完成處理的時間並非優先考量，因為資料直到當天晚些時候才會被參考。\n\n解決方案架構師必須審查架構並建議一個最小化運算成本的解決方案。\n\n解決方案架構師應建議哪個解決方案來滿足這些要求？","options":{"A":"在執行個體群中的所有任務節點、主節點和核心節點上啟動 Spot 執行個體。處理完成後終止 cluster，包括所有執行個體。","B":"在 On-Demand 執行個體上啟動主節點和核心節點。在執行個體群中的 Spot 執行個體上啟動任務節點。處理完成後終止 cluster，包括所有執行個體。購買 Compute Savings Plans 以涵蓋 On-Demand 執行個體的使用量。","C":"繼續在 On-Demand 執行個體上啟動所有節點。處理完成後終止 cluster，包括所有執行個體。購買 Compute Savings Plans 以涵蓋 On-Demand 執行個體的使用量。","D":"在 On-Demand 執行個體上啟動主節點和核心節點。在執行個體群中的 Spot 執行個體上啟動任務節點。處理完成後僅終止任務節點執行個體。購買 Compute Savings Plans 以涵蓋 On-Demand 執行個體的使用量。"},"answer":"C"},{"num":264,"stem":"一家公司已將遺留應用程式遷移至 AWS Cloud。該應用程式在分佈於三個 Availability Zone 的三個 Amazon EC2 執行個體上運行。每個 Availability Zone 中有一個 EC2 執行個體。EC2 執行個體在 VPC 的三個私有子網路中運行，並設定為與三個公共子網路關聯的 Application Load Balancer (ALB) 的目標。\n\n應用程式需要與內部部署系統通訊。只有來自公司 IP 位址範圍內的 IP 位址才被允許存取內部部署系統。公司的安全團隊僅將其內部 IP 位址範圍中的一個 IP 位址帶到雲端。公司已將此 IP 位址新增至公司防火牆的允許清單中。公司也為此 IP 位址建立了一個 Elastic IP 位址。\n\n解決方案架構師需要建立一個解決方案，讓應用程式能夠與內部部署系統通訊。該解決方案還必須能夠自動緩解故障。\n\n哪個解決方案能滿足這些要求？","options":{"A":"在每個公共子網路中各部署三個 NAT gateway，共三個。將 Elastic IP 位址指派給 NAT gateway。為 NAT gateway 開啟健康檢查。如果 NAT gateway 的健康檢查失敗，重新建立 NAT gateway 並將 Elastic IP 位址指派給新的 NAT gateway。","B":"將 ALB 替換為 Network Load Balancer (NLB)。將 Elastic IP 位址指派給 NLB。為 NLB 開啟健康檢查。在健康檢查失敗的情況下，在不同的子網路中重新部署 NLB。","C":"在公共子網路中部署單一 NAT gateway。將 Elastic IP 位址指派給 NAT gateway。使用 Amazon CloudWatch 和自訂指標監控 NAT gateway。如果 NAT gateway 不健康，叫用 AWS Lambda 函數在不同的子網路中建立新的 NAT gateway。將 Elastic IP 位址指派給新的 NAT gateway。","D":"將 Elastic IP 位址指派給 ALB。使用 Elastic IP 位址作為值建立 Amazon Route 53 簡單記錄。建立 Route 53 健康檢查。在健康檢查失敗的情況下，在不同的子網路中重新建立 ALB。"},"answer":"A"},{"num":265,"stem":"一家公司使用 AWS Organizations 管理超過 1,000 個 AWS 帳戶。公司已建立一個新的開發者組織。必須將 540 個開發者成員帳戶移至新的開發者組織。所有帳戶都已設定完所有必要資訊，以便每個帳戶可以作為獨立帳戶運作。\n\n解決方案架構師應採取哪種組合步驟將所有開發者帳戶移至新的開發者組織？（選擇三個）","options":{"A":"從舊組織的管理帳戶在 Organizations API 中呼叫 MoveAccount 操作，將開發者帳戶遷移至新的開發者組織。","B":"從管理帳戶，使用 Organizations API 中的 RemoveAccountFromOrganization 操作，從舊組織中移除每個開發者帳戶。","C":"從每個開發者帳戶，使用 Organizations API 中的 RemoveAccountFromOrganization 操作，從舊組織中移除帳戶。","D":"登入新開發者組織的管理帳戶，並建立一個佔位成員帳戶，作為開發者帳戶遷移的目標。","E":"從新開發者組織的管理帳戶，在 Organizations API 中呼叫 InviteAccountToOrganization 操作，向開發者帳戶發送邀請。","F":"讓每個開發者登入其帳戶，並確認加入新的開發者組織。"},"answer":"CEF"},{"num":266,"stem":"一家公司的互動式 Web 應用程式使用 Amazon CloudFront distribution 從 Amazon S3 儲存貯體提供圖片服務。偶爾，第三方工具會將損毀的圖片輸入至 S3 儲存貯體。這種圖片損毀會在稍後的應用程式中導致使用者體驗不佳。公司已成功實作並測試了用於偵測損毀圖片的 Python 邏輯。\n\n解決方案架構師必須建議一個解決方案，以最小的輸入和提供之間的延遲來整合偵測邏輯。\n\n哪個解決方案能滿足這些要求？","options":{"A":"使用由 viewer-response 事件叫用的 Lambda@Edge 函數。","B":"使用由 origin-response 事件叫用的 Lambda@Edge 函數。","C":"使用叫用 AWS Lambda 函數的 S3 event notification。","D":"使用叫用 AWS Step Functions state machine 的 S3 event notification。"},"answer":"B"},{"num":267,"stem":"一家公司有一個應用程式，在 Amazon EC2 Auto Scaling group 中的 Amazon EC2 執行個體上運行。公司使用 AWS CodePipeline 部署應用程式。由於擴展事件，在 Auto Scaling group 中運行的執行個體不斷變化。\n\n當公司部署新的應用程式程式碼版本時，公司會在任何新的目標 EC2 執行個體上安裝 AWS CodeDeploy agent，並將執行個體與 CodeDeploy 部署群組關聯。應用程式將在未來 24 小時內上線。\n\n解決方案架構師應建議什麼，以使用最少的營運負擔自動化應用程式部署流程？","options":{"A":"配置 Amazon EventBridge，在新的 EC2 執行個體啟動至 Auto Scaling group 時叫用 AWS Lambda 函數。對 Lambda 函數進行程式設計，以將 EC2 執行個體與 CodeDeploy 部署群組關聯。","B":"編寫一個指令碼，在部署新程式碼之前暫停 Amazon EC2 Auto Scaling 操作。部署完成後，建立一個新的 AMI，並配置 Auto Scaling group 的啟動範本以使用新的 AMI 進行新的啟動。恢復 Amazon EC2 Auto Scaling 操作。","C":"建立一個新的 AWS CodeBuild 專案，建立包含新程式碼的新 AMI。配置 CodeBuild 以更新 Auto Scaling group 的啟動範本至新的 AMI。執行 Amazon EC2 Auto Scaling 執行個體重新整理操作。","D":"建立一個已安裝 CodeDeploy agent 的新 AMI。配置 Auto Scaling group 的啟動範本以使用新的 AMI。將 CodeDeploy 部署群組與 Auto Scaling group 而非 EC2 執行個體關聯。"},"answer":"D"},{"num":268,"stem":"一家公司有一個網站，在 Application Load Balancer (ALB) 後方的四個 Amazon EC2 執行個體上運行。當 ALB 偵測到 EC2 執行個體不再可用時，Amazon CloudWatch 警示會進入 ALARM 狀態。公司營運團隊的成員然後手動在 ALB 後方新增一個新的 EC2 執行個體。\n\n解決方案架構師需要設計一個能自動處理 EC2 執行個體替換的高可用性解決方案。公司需要在切換到新解決方案期間最小化停機時間。\n\n解決方案架構師應採取哪組步驟來滿足這些要求？","options":{"A":"刪除現有的 ALB。建立一個配置為處理 Web 應用程式流量的 Auto Scaling group。將新的啟動範本附加至 Auto Scaling group。建立新的 ALB。將 Auto Scaling group 附加至新的 ALB。將現有的 EC2 執行個體附加至 Auto Scaling group。","B":"建立一個配置為處理 Web 應用程式流量的 Auto Scaling group。將新的啟動範本附加至 Auto Scaling group。將 Auto Scaling group 附加至現有的 ALB。將現有的 EC2 執行個體附加至 Auto Scaling group。","C":"刪除現有的 ALB 和 EC2 執行個體。建立一個配置為處理 Web 應用程式流量的 Auto Scaling group。將新的啟動範本附加至 Auto Scaling group。建立新的 ALB。將 Auto Scaling group 附加至新的 ALB。等待 Auto Scaling group 啟動最小數量的 EC2 執行個體。","D":"建立一個配置為處理 Web 應用程式流量的 Auto Scaling group。將新的啟動範本附加至 Auto Scaling group。將 Auto Scaling group 附加至現有的 ALB。等待現有的 ALB 向 Auto Scaling group 註冊現有的 EC2 執行個體。"},"answer":"C"},{"num":269,"stem":"一家公司希望在 AWS Organizations 組織內的開發者帳戶之間最佳化 AWS 資料傳輸成本和運算成本。開發者可以在單一 AWS Region 中配置 VPC 並啟動 Amazon EC2 執行個體。EC2 執行個體每天從 Amazon S3 擷取約 1 TB 的資料。\n\n開發者活動導致 EC2 執行個體與 S3 儲存貯體之間每月過高的資料傳輸費用和 NAT gateway 處理費用，以及高額的運算成本。公司希望主動執行已批准的架構模式，用於開發者在 AWS 帳戶中部署的任何 EC2 執行個體和 VPC 基礎架構。公司不希望此執行對開發者執行任務的速度產生負面影響。\n\n哪個解決方案能以最具成本效益的方式滿足這些要求？","options":{"A":"建立 SCP 以防止開發者啟動未批准的 EC2 執行個體類型。為開發者提供 AWS CloudFormation 範本，以部署具有 S3 interface endpoints 的已批准 VPC 配置。限制開發者的 IAM 權限，使開發者只能透過 CloudFormation 啟動 VPC 資源。","B":"使用 AWS Budgets 建立每日預測預算，以監控開發者帳戶的 EC2 運算成本和 S3 資料傳輸成本。當預測成本達到實際預算成本的 75% 時，向開發者團隊發送警示。如果實際預算成本達到 100%，建立預算行動以終止開發者的 EC2 執行個體和 VPC 基礎架構。","C":"建立 AWS Service Catalog portfolio，使用者可用其建立具有 S3 gateway endpoints 和已批准 EC2 執行個體的已批准 VPC 配置。與開發者帳戶共享 portfolio。配置 AWS Service Catalog 啟動限制以使用已批准的 IAM 角色。限制開發者的 IAM 權限，使其只能存取 AWS Service Catalog。","D":"建立並部署 AWS Config 規則，以監控開發者 AWS 帳戶中 EC2 和 VPC 資源的合規性。如果開發者啟動未批准的 EC2 執行個體，或開發者建立沒有 S3 gateway endpoints 的 VPC，則執行補救行動以終止未批准的資源。"},"answer":"C"},{"num":270,"stem":"一家公司正在擴張。公司計劃在多個 AWS Region 的數百個不同 AWS 帳戶中分隔其資源。解決方案架構師必須建議一個解決方案，拒絕存取特定指定 Region 以外的任何操作。\n\n哪個解決方案能滿足這些要求？","options":{"A":"為每個帳戶建立 IAM 角色。建立 IAM 政策，其中包含僅允許帳戶使用已批准 Region 的條件允許權限。","B":"在 AWS Organizations 中建立一個組織。為每個帳戶建立 IAM 使用者。將政策附加至每個使用者，以封鎖對帳戶無法部署基礎架構的 Region 的存取。","C":"啟動 AWS Control Tower landing zone。建立 OU 並附加 SCP，拒絕在已批准 Region 以外執行服務的存取。","D":"在每個帳戶中啟用 AWS Security Hub。建立控制項以指定帳戶可以部署基礎架構的 Region。"},"answer":"B"},{"num":271,"stem":"一家公司希望重構其零售訂購 Web 應用程式，該應用程式目前有用於 Web 託管、資料庫 API 服務和業務邏輯的負載平衡 Amazon EC2 執行個體群。公司需要建立一個去耦合、可擴展的架構，並具有保留失敗訂單的機制，同時最小化營運成本。\n\n哪個解決方案能滿足這些要求？","options":{"A":"使用 Amazon S3 進行 Web 託管，使用 Amazon API Gateway 提供資料庫 API 服務。使用 Amazon Simple Queue Service (Amazon SQS) 進行訂單排隊。使用 Amazon Elastic Container Service (Amazon ECS) 處理業務邏輯，並使用 Amazon SQS 長輪詢保留失敗的訂單。","B":"使用 AWS Elastic Beanstalk 進行 Web 託管，使用 Amazon API Gateway 提供資料庫 API 服務。使用 Amazon MQ 進行訂單排隊。使用 AWS Step Functions 處理業務邏輯，並使用 Amazon S3 Glacier Deep Archive 保留失敗的訂單。","C":"使用 Amazon S3 進行 Web 託管，使用 AWS AppSync 提供資料庫 API 服務。使用 Amazon Simple Queue Service (Amazon SQS) 進行訂單排隊。使用 AWS Lambda 處理業務邏輯，並使用 Amazon SQS dead-letter queue 保留失敗的訂單。","D":"使用 Amazon Lightsail 進行 Web 託管，使用 AWS AppSync 提供資料庫 API 服務。使用 Amazon Simple Email Service (Amazon SES) 進行訂單排隊。使用 Amazon Elastic Kubernetes Service (Amazon EKS) 處理業務邏輯，並使用 Amazon OpenSearch Service 保留失敗的訂單。"},"answer":"A"},{"num":272,"stem":"一家公司在 us-east-1 Region 的 AWS 上託管 Web 應用程式。應用程式伺服器分佈在 Application Load Balancer 後方的三個 Availability Zone 中。資料庫託管在 Amazon EC2 執行個體上的 MySQL 資料庫中。解決方案架構師需要使用 AWS 服務設計跨 Region 資料恢復解決方案，RTO 少於 5 分鐘，RPO 少於 1 分鐘。解決方案架構師正在 us-west-2 中部署應用程式伺服器，並已配置 Amazon Route 53 健康檢查和 DNS 容錯移轉至 us-west-2。\n\n解決方案架構師應採取哪個額外步驟？","options":{"A":"將資料庫遷移至 Amazon RDS for MySQL 執行個體，並在 us-west-2 中設定跨 Region 唯讀複本。","B":"將資料庫遷移至 Amazon Aurora global database，主要節點在 us-east-1，次要節點在 us-west-2。","C":"將資料庫遷移至具有 Multi-AZ 部署的 Amazon RDS for MySQL 執行個體。","D":"在 us-west-2 的 Amazon EC2 執行個體上建立 MySQL 備用資料庫。"},"answer":"D"},{"num":273,"stem":"一家公司正在使用 AWS Organizations 管理多個帳戶。由於監管要求，公司希望限制特定成員帳戶僅能在允許其部署資源的特定 AWS Region 中操作。帳戶中的資源必須被標記，根據群組標準執行，並以最小配置進行集中管理。\n\n解決方案架構師應採取什麼措施來滿足這些要求？","options":{"A":"在特定成員帳戶中建立 AWS Config 規則以限制 Region，並套用標籤政策。","B":"從管理帳戶的 AWS Billing and Cost Management 主控台，停用特定成員帳戶的 Region，並在根目錄套用標籤政策。","C":"將特定成員帳戶與根目錄關聯。使用條件套用標籤政策和 SCP 以限制 Region。","D":"將特定成員帳戶與新的 OU 關聯。使用條件套用標籤政策和 SCP 以限制 Region。"},"answer":"A"},{"num":274,"stem":"一家公司有一個應用程式，可生成報告並將其儲存在 Amazon S3 儲存貯體中。當使用者存取其報告時，應用程式會生成一個簽名 URL，允許使用者下載報告。公司的安全團隊發現這些檔案是公開的，任何人無需驗證即可下載它們。公司已暫停生成新報告，直到問題解決。\n\n哪組行動能立即修復安全問題，同時不影響應用程式的正常工作流程？","options":{"A":"建立一個 AWS Lambda 函數，為未經驗證的使用者套用拒絕所有政策。建立一個排程事件以叫用 Lambda 函數。","B":"審查 AWS Trusted Advisor 儲存貯體權限檢查，並實作建議的行動。","C":"運行一個指令碼，對儲存貯體中的所有物件設定私有 ACL。","D":"使用 Amazon S3 中的 Block Public Access 功能，將儲存貯體的 IgnorePublicAcls 選項設定為 TRUE。"},"answer":"B"},{"num":275,"stem":"一家公司計劃將 Amazon RDS for Oracle 資料庫遷移至另一個 AWS 帳戶中的 RDS for PostgreSQL DB 執行個體。解決方案架構師需要設計一個不需要停機且能最小化完成遷移所需時間的遷移策略。遷移策略必須複製所有現有資料以及在遷移期間建立的任何新資料。目標資料庫在遷移流程完成時必須與來源資料庫相同。\n\n所有應用程式目前使用 Amazon Route 53 CNAME 記錄作為與 RDS for Oracle DB 執行個體通訊的 endpoint。RDS for Oracle DB 執行個體位於私有子網路中。\n\n解決方案架構師應採取哪種組合步驟來滿足這些要求？（選擇三個）","options":{"A":"在目標帳戶中建立新的 RDS for PostgreSQL DB 執行個體。使用 AWS Schema Conversion Tool (AWS SCT) 將資料庫 schema 從來源資料庫遷移至目標資料庫。","B":"使用 AWS Schema Conversion Tool (AWS SCT) 在目標帳戶中建立具有來源資料庫 schema 和初始資料的新 RDS for PostgreSQL DB 執行個體。","C":"在兩個 AWS 帳戶的 VPC 之間配置 VPC peering，以提供從目標帳戶到兩個 DB 執行個體的連線。配置附加至每個 DB 執行個體的安全群組，以允許來自目標帳戶 VPC 的資料庫連接埠流量。","D":"暫時允許來源 DB 執行個體公開存取，以提供從目標帳戶 VPC 的連線。配置附加至每個 DB 執行個體的安全群組，以允許來自目標帳戶 VPC 的資料庫連接埠流量。","E":"在目標帳戶中使用 AWS Database Migration Service (AWS DMS) 執行從來源資料庫到目標資料庫的完整載入加上 change data capture (CDC) 遷移。遷移完成後，變更 CNAME 記錄以指向目標 DB 執行個體 endpoint。","F":"在目標帳戶中使用 AWS Database Migration Service (AWS DMS) 執行從來源資料庫到目標資料庫的 change data capture (CDC) 遷移。遷移完成後，變更 CNAME 記錄以指向目標 DB 執行個體 endpoint。"},"answer":"CEF"},{"num":276,"stem":"一家公司使用事件驅動架構實作了一套訂單處理系統。在初始測試期間，系統停止處理訂單。進一步的日誌分析顯示，Amazon Simple Queue Service（Amazon SQS）標準佇列中的某一筆訂單訊息在後端造成錯誤，並阻擋了所有後續的訂單訊息。佇列的可見性逾時設定為 30 秒，後端處理逾時設定為 10 秒。Solutions architect 需要分析有問題的訂單訊息，並確保系統能繼續處理後續訊息。\nSolutions architect 應採取哪個步驟來滿足這些需求？","options":{"A":"將後端處理逾時增加至 30 秒，以符合可見性逾時。","B":"縮短佇列的可見性逾時，以自動移除有問題的訊息。","C":"設定一個新的 SQS FIFO 佇列作為死信佇列，以隔離有問題的訊息。","D":"設定一個新的 SQS 標準佇列作為死信佇列，以隔離有問題的訊息。"},"answer":"C"},{"num":277,"stem":"一家公司使用 AWS Step Functions 自動化每晚的機器學習模型重新訓練作業。此 workflow 由多個使用 AWS Lambda 的步驟組成。每個步驟都可能因各種原因而失敗，任何失敗都會導致整個 workflow 失敗。\n一次審查發現，重新訓練作業已連續多晚失敗，但公司並未察覺。Solutions architect 需要改善 workflow，使所有類型的重新訓練流程失敗都能發送 notification。\nSolutions architect 應採取哪些步驟組合來滿足這些需求？（選擇三個）","options":{"A":"建立一個 Amazon Simple Notification Service（Amazon SNS）主題，並設定類型為「Email」的訂閱，目標為團隊的郵件清單。","B":"建立一個名為「Email」的任務，將輸入引數轉送至 SNS 主題。","C":"在所有 Task、Map 和 Parallel 狀態中新增 Catch 欄位，其陳述式為 \"ErrorEquals\": [ \"States.ALL\" ] 且 \"Next\": \"Email\"。","D":"在 Amazon Simple Email Service（Amazon SES）中新增電子郵件地址，並驗證該電子郵件地址。","E":"建立一個名為「Email」的任務，將輸入引數轉送至 SES 電子郵件地址。 F. 在所有 Task、Map 和 Parallel 狀態中新增 Catch 欄位，其陳述式為 \"ErrorEquals\": [ \"States.Runtime\" ] 且 \"Next\": \"Email\"。"},"answer":"BDE"},{"num":278,"stem":"一家公司計畫在 VPC 內的 Amazon EC2 執行個體上部署新的私有內部網路服務。AWS Site-to-Site VPN 將 VPC 連接至公司的內部部署網路。新服務必須與現有的內部部署服務通訊。內部部署服務可透過 company.example DNS 區域中的主機名稱存取。此 DNS 區域完全託管於內部部署，僅在公司的私有網路上可用。\nSolutions architect 必須確保新服務能夠解析 company.example 網域的主機名稱，以整合現有服務。\n哪個解決方案可滿足這些需求？","options":{"A":"在 Amazon Route 53 中為 company.example 建立一個空的私有區域。在公司的內部部署 company.example 區域中新增一個額外的 NS 記錄，指向 Route 53 中新私有區域的權威名稱伺服器。","B":"為 VPC 啟用 DNS 主機名稱。使用 Amazon Route 53 Resolver 設定新的輸出端點。建立 Resolver 規則，將 company.example 的請求轉送至內部部署名稱伺服器。","C":"為 VPC 啟用 DNS 主機名稱，使用 Amazon Route 53 Resolver 設定新的輸入解析端點。設定內部部署 DNS 伺服器，將 company.example 的請求轉送至新的解析端點。","D":"使用 AWS Systems Manager 設定執行文件，安裝包含所需主機名稱的 hosts 檔案。使用 Amazon EventBridge 規則，在執行個體進入執行中狀態時執行該文件。"},"answer":"A"},{"num":279,"stem":"一家公司使用 AWS CloudFormation 在多個 VPC 中部署應用程式，這些 VPC 均連接至 transit gateway。每個向公開網際網路傳送 traffic 的 VPC 必須透過共用服務 VPC 傳送 traffic。每個 VPC 內的子網路使用預設 VPC 路由表，traffic 會路由至 transit gateway。Transit gateway 對任何 VPC 附件使用其預設路由表。\n安全稽核發現，部署在某 VPC 內的 Amazon EC2 執行個體可以與部署在公司任何其他 VPC 中的 EC2 執行個體通訊。Solutions architect 需要限制 VPC 之間的 traffic。每個 VPC 必須只能與預先定義的有限授權 VPC 集合進行通訊。\nSolutions architect 應採取什麼措施來滿足這些需求？","options":{"A":"更新每個 VPC 中每個子網路的網路 ACL，以僅允許輸出 traffic 至授權的 VPC。移除除預設拒絕規則以外的所有拒絕規則。","B":"更新 VPC 中使用的所有安全群組，以拒絕至未授權 VPC 中使用的安全群組的輸出 traffic。","C":"為每個 VPC 附件建立專用的 transit gateway 路由表。僅將 traffic 路由至授權的 VPC。","D":"更新每個 VPC 的主路由表，使 traffic 僅透過 transit gateway 路由至授權的 VPC。"},"answer":"C"},{"num":280,"stem":"一家公司有一套 Windows 桌面應用程式，已封裝並部署至使用者的 Windows 機器上。該公司最近收購了另一家公司，其員工主要使用 Linux 作業系統的機器。收購公司決定將 Windows 桌面應用程式遷移並重新託管至 AWS。\n所有員工在使用應用程式前必須經過驗證。收購公司在內部部署使用 Active Directory，但希望以簡化的方式管理所有員工對 AWS 上應用程式的存取。\n哪個解決方案能以最少的開發工作量將應用程式重新託管至 AWS？","options":{"A":"為每位員工設定並佈建 Amazon Workspaces 虛擬桌面。使用 Amazon Cognito 身分集區實作驗證。指示員工從其佈建的 Workspaces 虛擬桌面執行應用程式。","B":"建立 Windows Amazon EC2 執行個體的 Auto Scaling 群組。將每個 EC2 執行個體加入公司的 Active Directory 網域。使用內部部署執行的 Active Directory 實作驗證。指示員工使用 Windows 遠端桌面執行應用程式。","C":"使用 Amazon AppStream 2.0 映像建置器建立包含應用程式及所需設定的映像。為執行映像佈建具有動態 Fleet Auto Scaling 策略的 AppStream 2.0 On-Demand fleet。使用 AppStream 2.0 使用者集區實作驗證。指示員工透過啟動瀏覽器型 AppStream 2.0 串流工作階段來存取應用程式。","D":"重構並容器化應用程式，使其以 Web 型應用程式執行。在 AWS Fargate 上的 Amazon Elastic Container Service（Amazon ECS）中執行應用程式，並搭配步進擴展策略。使用 Amazon Cognito 使用者集區實作驗證。指示員工從其瀏覽器執行應用程式。"},"answer":"D"},{"num":281,"stem":"一家公司正從 IoT 裝置 fleet 收集大量資料。資料以 Optimized Row Columnar（ORC）檔案的形式儲存在永久性 Amazon EMR 叢集上的 Hadoop Distributed File System（HDFS）中。公司的資料分析團隊在同一 EMR 叢集上部署的 Apache Presto 中使用 SQL 查詢資料。查詢會掃描大量資料，執行時間始終少於 15 分鐘，且僅在下午 5 點至晚上 10 點之間執行。\n公司擔心目前解決方案的高成本問題。Solutions architect 必須提出最具成本效益的解決方案，以支援 SQL 資料查詢。\n哪個解決方案能滿足這些需求？","options":{"A":"將資料儲存在 Amazon S3 中。使用 Amazon Redshift Spectrum 查詢資料。","B":"將資料儲存在 Amazon S3 中。使用 AWS Glue Data Catalog 和 Amazon Athena 查詢資料。","C":"將資料儲存在 EMR File System（EMRFS）中。使用 Amazon EMR 中的 Presto 查詢資料。","D":"將資料儲存在 Amazon Redshift 中。使用 Amazon Redshift 查詢資料。"},"answer":"D"},{"num":282,"stem":"一家大型公司近期遭遇 Amazon RDS 和 Amazon DynamoDB 成本意外增加的情況。公司需要提高對 AWS Billing and Cost Management 詳細資訊的可見性。AWS Organizations 中有多個帳戶，包括許多開發和生產帳戶。整個組織中沒有一致的標記策略，但有指導方針要求所有基礎設施都使用 AWS CloudFormation 並進行一致的標記來部署。管理層要求所有現有和未來的 DynamoDB 資料表及 RDS 執行個體均需標記成本中心號碼和專案 ID 號碼。\nSolutions architect 應提供哪種策略來滿足這些需求？","options":{"A":"使用 Tag Editor 標記現有資源。建立成本分配標記以定義成本中心和專案 ID，並等待 24 小時讓標記套用至現有資源。","B":"使用 AWS Config 規則提醒財務團隊未標記的資源。建立以 AWS Lambda 為基礎的集中式解決方案，每小時使用跨帳戶角色標記未標記的 RDS 資料庫和 DynamoDB 資源。","C":"使用 Tag Editor 標記現有資源。建立成本分配標記以定義成本中心和專案 ID。使用 SCP 限制建立未包含成本中心和專案 ID 的資源。","D":"建立成本分配標記以定義成本中心和專案 ID，並等待 24 小時讓標記套用至現有資源。更新現有的聯合角色，限制佈建未包含成本中心和專案 ID 的資源的權限。"},"answer":"B"},{"num":283,"stem":"一家公司希望將內部部署系統的資料傳送至 Amazon S3 儲存貯體。公司在三個不同帳戶中建立了 S3 儲存貯體。公司必須私下傳送資料，不讓資料經過網際網路。公司目前沒有現有的專用 AWS 連線。\nSolutions architect 應採取哪些步驟組合來滿足這些需求？（選擇兩個）","options":{"A":"在 AWS Cloud 中建立網路帳戶。在網路帳戶中建立私有 VPC。在內部部署環境和私有 VPC 之間設定具有私有 VIF 的 AWS Direct Connect 連線。","B":"在 AWS Cloud 中建立網路帳戶。在網路帳戶中建立私有 VPC。在內部部署環境和私有 VPC 之間設定具有公有 VIF 的 AWS Direct Connect 連線。","C":"在網路帳戶中建立 Amazon S3 介面端點。","D":"在網路帳戶中建立 Amazon S3 閘道端點。","E":"在 AWS Cloud 中建立網路帳戶。在網路帳戶中建立私有 VPC。將託管 S3 儲存貯體的帳戶的 VPC 與網路帳戶中的 VPC 進行對等連線。"},"answer":"DA"},{"num":284,"stem":"一家公司經營快速餐廳服務。餐廳遵循可預測的模式，每天有 4 小時的高銷售 traffic，在非尖峰時段的 traffic 較低。\n銷售點和管理平台部署在 AWS Cloud 中，後端基於 Amazon DynamoDB。資料庫資料表使用佈建輸送量模式，設定了 100,000 個 RCU 和 80,000 個 WCU，以符合已知的尖峰資源消耗。\n公司希望降低 DynamoDB 成本，並將 IT 人員的操作負擔降至最低。\n哪個解決方案能最具成本效益地滿足這些需求？","options":{"A":"降低佈建的 RCU 和 WCU。","B":"將 DynamoDB 資料表改為使用隨需容量。","C":"為資料表啟用 DynamoDB Auto Scaling。","D":"購買 1 年保留容量，足以涵蓋每天 4 小時的尖峰負載。"},"answer":"A"},{"num":285,"stem":"一家公司使用 Amazon API Gateway、Amazon DynamoDB 和 AWS Lambda 在 AWS 上託管部落格文章應用程式。應用程式目前不使用 API 金鑰來授權請求。API 模型如下：\nGET /posts/{postId}：取得文章詳細資訊\nGET /users/{userId}：取得使用者詳細資訊\nGET /comments/{commentId}：取得留言詳細資訊\n公司注意到使用者在留言區積極討論話題，公司希望透過讓留言即時顯示來提升使用者參與度。\n應使用哪種設計來降低留言延遲並改善使用者體驗？","options":{"A":"使用 edge-optimized API 搭配 Amazon CloudFront 快取 API 回應。","B":"修改部落格應用程式程式碼，每 10 秒請求一次 GET/comments/{commentId}。","C":"使用 AWS AppSync 並利用 WebSockets 傳遞留言。","D":"變更 Lambda 函數的並行限制以降低 API 回應時間。"},"answer":"C"},{"num":286,"stem":"一家公司在 AWS Organizations 中集中管理數百個 AWS 帳戶。公司最近開始允許產品團隊在其帳戶中建立和管理自己的 S3 存取點。S3 存取點只能在 VPC 內存取，不能透過網際網路存取。\n執行此要求最具操作效率的方式是什麼？","options":{"A":"將 S3 存取點資源政策設定為拒絕 s3:CreateAccessPoint 動作，除非 s3:AccessPointNetworkOrigin 條件金鑰評估為 VPC。","B":"在組織的根層級建立 SCP，以拒絕 s3:CreateAccessPoint 動作，除非 s3:AccessPointNetworkOrigin 條件金鑰評估為 VPC。","C":"使用 AWS CloudFormation StackSets 在每個 AWS 帳戶中建立新的 IAM 政策，僅在 s3:AccessPointNetworkOrigin 條件金鑰評估為 VPC 時允許 s3:CreateAccessPoint 動作。","D":"將 S3 儲存貯體政策設定為拒絕 s3:CreateAccessPoint 動作，除非 s3:AccessPointNetworkOrigin 條件金鑰評估為 VPC。"},"answer":"A"},{"num":287,"stem":"Solutions architect 必須使用藍/綠部署方法更新 AWS Elastic Beanstalk 中的應用程式環境。Solutions architect 建立了一個與現有應用程式環境相同的環境，並將應用程式部署至新環境。\n接下來應採取什麼步驟來完成更新？","options":{"A":"使用 Amazon Route 53 重新導向至新環境。","B":"選擇「交換環境 URL」選項。","C":"取代 Auto Scaling 啟動設定。","D":"更新 DNS 記錄以指向綠色環境。"},"answer":"A"},{"num":288,"stem":"一家公司正在網路上建立圖片服務，允許使用者上傳和搜尋隨機照片。在尖峰使用時，全球最多有 10,000 位使用者上傳其圖片。系統會在上傳的圖片上疊加文字，然後在公司網站上發布。\nSolutions architect 應實作哪種設計？","options":{"A":"將上傳的圖片儲存在 Amazon Elastic File System（Amazon EFS）中。將每張圖片的應用程式日誌資訊傳送至 Amazon CloudWatch Logs。建立 Amazon EC2 執行個體 fleet，使用 CloudWatch Logs 確定哪些圖片需要處理。將已處理的圖片放置在 Amazon EFS 中的另一個目錄。啟用 Amazon CloudFront 並將來源設定為 fleet 中的某個 EC2 執行個體。","B":"將上傳的圖片儲存在 Amazon S3 儲存貯體中，並設定 S3 儲存貯體事件 notification，將訊息傳送至 Amazon Simple Notification Service（Amazon SNS）。在 Application Load Balancer（ALB）後面建立 Amazon EC2 執行個體 fleet，從 Amazon SNS 提取訊息以處理圖片，並將其放置在 Amazon Elastic File System（Amazon EFS）中。使用 Amazon CloudWatch 指標監控 SNS 訊息量以橫向擴展 EC2 執行個體。啟用 Amazon CloudFront 並將來源設定為 EC2 執行個體前面的 ALB。","C":"將上傳的圖片儲存在 Amazon S3 儲存貯體中，並設定 S3 儲存貯體事件 notification，將訊息傳送至 Amazon Simple Queue Service（Amazon SQS）佇列。建立 Amazon EC2 執行個體 fleet，從 SQS 佇列提取訊息以處理圖片，並將其放置在另一個 S3 儲存貯體中。使用 Amazon CloudWatch 指標監控佇列深度以橫向擴展 EC2 執行個體。啟用 Amazon CloudFront 並將來源設定為包含已處理圖片的 S3 儲存貯體。","D":"將上傳的圖片儲存在掛載至 Amazon EC2 Spot 執行個體 fleet 的共用 Amazon Elastic Block Store（Amazon EBS）磁碟區上。建立包含每張上傳圖片資訊及其是否已處理的 Amazon DynamoDB 資料表。使用 Amazon EventBridge 規則橫向擴展 EC2 執行個體。啟用 Amazon CloudFront 並將來源設定為 EC2 執行個體 fleet 前面的 Elastic Load Balancer。"},"answer":"D"},{"num":289,"stem":"一家公司在 us-east-1 區域的 Amazon RDS for MySQL DB 執行個體上部署了其資料庫。公司需要讓歐洲客戶能夠存取其資料。歐洲客戶必須能存取與美國客戶相同的資料，且不能容忍高應用程式延遲或過時資料。歐洲客戶和美國客戶都需要向資料庫寫入資料。兩組客戶都需要即時看到對方的更新。\n哪個解決方案能滿足這些需求？","options":{"A":"建立 RDS for MySQL DB 執行個體的 Amazon Aurora MySQL 副本。暫停應用程式對 RDS DB 執行個體的寫入。將 Aurora 副本提升為獨立的 DB 叢集。重新設定應用程式使用 Aurora 資料庫並恢復寫入。將 eu-west-1 新增為 DB 叢集的次要區域。在 DB 叢集上啟用寫入轉送。在 eu-west-1 部署應用程式。設定應用程式使用 eu-west-1 中的 Aurora MySQL 端點。","B":"為 RDS for MySQL DB 執行個體在 eu-west-1 新增跨區域副本。設定副本以將寫入查詢複寫回主要 DB 執行個體。在 eu-west-1 部署應用程式。設定應用程式使用 eu-west-1 中的 RDS for MySQL 端點。","C":"將 RDS for MySQL DB 執行個體的最新快照複製到 eu-west-1。從快照在 eu-west-1 建立新的 RDS for MySQL DB 執行個體。設定從 us-east-1 到 eu-west-1 的 MySQL 邏輯複寫。在 DB 叢集上啟用寫入轉送。在 eu-west-1 部署應用程式。設定應用程式使用 eu-west-1 中的 RDS for MySQL 端點。","D":"將 RDS for MySQL DB 執行個體轉換為 Amazon Aurora MySQL DB 叢集。將 eu-west-1 新增為 DB 叢集的次要區域。在 DB 叢集上啟用寫入轉送。在 eu-west-1 部署應用程式。設定應用程式使用 eu-west-1 中的 Aurora MySQL 端點。"},"answer":"B"},{"num":290,"stem":"一家公司透過可在網際網路上存取的 SFTP 伺服器向客戶提供檔案服務。SFTP 伺服器在附有 Elastic IP 地址的單一 Amazon EC2 執行個體上執行。客戶透過其 Elastic IP 地址連線至 SFTP 伺服器，並使用 SSH 進行驗證。EC2 執行個體還有一個附加的安全群組，允許所有客戶 IP 地址的存取。\nSolutions architect 必須實作一個解決方案，以提高可用性、降低基礎設施管理的複雜性，並將對存取檔案的客戶造成的中斷降至最低。解決方案不得更改客戶的連線方式。\n哪個解決方案能滿足這些需求？","options":{"A":"解除 EC2 執行個體的 Elastic IP 地址關聯。建立 Amazon S3 儲存貯體用於 SFTP 檔案託管。建立 AWS Transfer Family 伺服器。為 Transfer Family 伺服器設定公開存取的端點。將 SFTP Elastic IP 地址與新端點關聯。將 Transfer Family 伺服器指向 S3 儲存貯體。將所有檔案從 SFTP 伺服器同步至 S3 儲存貯體。","B":"解除 EC2 執行個體的 Elastic IP 地址關聯。建立 Amazon S3 儲存貯體用於 SFTP 檔案託管。建立 AWS Transfer Family 伺服器。為 Transfer Family 伺服器設定 VPC 託管的網際網路面向端點。將 SFTP Elastic IP 地址與新端點關聯。將含有客戶 IP 地址的安全群組附加至新端點。將 Transfer Family 伺服器指向 S3 儲存貯體。將所有檔案從 SFTP 伺服器同步至 S3 儲存貯體。","C":"解除 EC2 執行個體的 Elastic IP 地址關聯。建立新的 Amazon Elastic File System（Amazon EFS）檔案系統用於 SFTP 檔案託管。建立 AWS Fargate 任務定義以執行 SFTP 伺服器。在任務定義中指定 EFS 檔案系統作為掛載點。使用任務定義建立 Fargate 服務，並在服務前面放置 Network Load Balancer（NLB）。在設定服務時，將含有客戶 IP 地址的安全群組附加至執行 SFTP 伺服器的任務。將 Elastic IP 地址與 NLB 關聯。將所有檔案從 SFTP 伺服器同步至 S3 儲存貯體。","D":"解除 EC2 執行個體的 Elastic IP 地址關聯。建立 multi-attach Amazon Elastic Block Store（Amazon EBS）磁碟區用於 SFTP 檔案託管。建立附有 Elastic IP 地址的 Network Load Balancer（NLB）。建立執行 SFTP 伺服器的 EC2 執行個體 Auto Scaling 群組。在 Auto Scaling 群組中定義啟動的執行個體應附加新的 multi-attach EBS 磁碟區。設定 Auto Scaling 群組在 NLB 後面自動新增執行個體。設定 Auto Scaling 群組對 Auto Scaling 群組啟動的 EC2 執行個體使用允許客戶 IP 地址的安全群組。將所有檔案從 SFTP 伺服器同步至新的 multi-attach EBS 磁碟區。"},"answer":"C"},{"num":291,"stem":"一家公司擷取並處理串流市場資料。資料速率是固定的。每晚計算彙總統計資料的程序需要 4 小時才能完成。統計分析對業務並非關鍵，若特定執行失敗，資料點會在下一次迭代中處理。\n目前的架構使用具有 1 年保留期的 Amazon EC2 Reserved Instances 集區。這些 EC2 執行個體全天候運行，以擷取串流資料並儲存在附加的 Amazon Elastic Block Store（Amazon EBS）磁碟區中。計劃性指令碼每晚啟動 EC2 On-Demand Instances 以執行每晚的處理作業。這些執行個體透過擷取伺服器上的 NFS 共用存取儲存的資料。處理完成後，指令碼會終止這些執行個體。\nReserved Instance 保留即將到期。公司需要決定是否購買新的保留，或實作新的設計。\n哪個解決方案能最具成本效益地滿足這些需求？","options":{"A":"更新擷取程序，使用 Amazon Kinesis Data Firehose 將資料儲存至 Amazon S3。使用計劃性指令碼每晚啟動 EC2 On-Demand Instances fleet 以執行 S3 資料的批次處理。設定指令碼在處理完成後終止執行個體。","B":"更新擷取程序，使用 Amazon Kinesis Data Firehose 將資料儲存至 Amazon S3。使用 AWS Batch 搭配 Spot Instances 執行每晚的處理作業，最高 Spot 價格為 On-Demand 價格的 50%。","C":"更新擷取程序，使用 3 年保留期的 EC2 Reserved Instances fleet 搭配 Network Load Balancer。使用 AWS Batch 搭配 Spot Instances 執行每晚的處理作業，最高 Spot 價格為 On-Demand 價格的 50%。","D":"更新擷取程序，使用 Amazon Kinesis Data Firehose 將資料儲存至 Amazon Redshift。使用 Amazon EventBridge 排程 AWS Lambda 函數每晚執行，查詢 Amazon Redshift 以產生每日統計資料。"},"answer":"A"},{"num":292,"stem":"一家公司需要將內部部署的 SFTP 網站遷移至 AWS。SFTP 網站目前在 Linux VM 上執行。上傳的檔案可透過 NFS 共用供下游應用程式使用。\n在遷移至 AWS 的過程中，solutions architect 必須實作高可用性。解決方案必須提供外部廠商一組靜態公有 IP 地址，供廠商加入允許清單。公司已在其內部部署資料中心和 VPC 之間設定 AWS Direct Connect 連線。\n哪個解決方案能以最少的操作負擔滿足這些需求？","options":{"A":"建立 AWS Transfer Family 伺服器。為 Transfer Family 伺服器設定網際網路面向的 VPC 端點。為每個子網路指定 Elastic IP 地址。設定 Transfer Family 伺服器將檔案放置到跨多個可用區域部署的 Amazon Elastic File System（Amazon EFS）檔案系統中。修改下游應用程式上存取現有 NFS 共用的設定，改為掛載 EFS 端點。","B":"建立 AWS Transfer Family 伺服器。為 Transfer Family 伺服器設定可公開存取的端點。設定 Transfer Family 伺服器將檔案放置到跨多個可用區域部署的 Amazon Elastic File System（Amazon EFS）檔案系統中。修改下游應用程式上存取現有 NFS 共用的設定，改為掛載 EFS 端點。","C":"使用 AWS Application Migration Service 將現有 Linux VM 遷移至 Amazon EC2 執行個體。為 EC2 執行個體指定 Elastic IP 地址。將 Amazon Elastic File System（Amazon EFS）檔案系統掛載至 EC2 執行個體。設定 SFTP 伺服器將檔案放置在 EFS 檔案系統中。修改下游應用程式上存取現有 NFS 共用的設定，改為掛載 EFS 端點。","D":"使用 AWS Application Migration Service 將現有 Linux VM 遷移至 AWS Transfer Family 伺服器。為 Transfer Family 伺服器設定可公開存取的端點。設定 Transfer Family 伺服器將檔案放置到跨多個可用區域部署的 Amazon FSx for Lustre 檔案系統中。修改下游應用程式上存取現有 NFS 共用的設定，改為掛載 FSx for Lustre 端點。"},"answer":"B"},{"num":293,"stem":"Solutions architect 在 Auto Scaling 群組的 Amazon EC2 執行個體上部署了一個操作工作負載。VPC 架構跨越兩個可用區域（AZ），每個可用區域中有一個 Auto Scaling 群組目標的子網路。VPC 已連接至內部部署環境，且連線不能中斷。Auto Scaling 群組的最大大小為 20 個服務中的執行個體。VPC IPv4 位址配置如下：\n\nVPC CIDR：10.0.0.0/23，AZ1 子網路 CIDR：10.0.0.0/24，AZ2 子網路 CIDR：10.0.1.0/24。自部署以來，該區域新增了第三個可用區域。Solutions architect 希望在不增加額外 IPv4 地址空間且不中斷服務的情況下採用新的可用區域。\n哪個解決方案能滿足這些需求？","options":{"A":"更新 Auto Scaling 群組以僅使用 AZ2 子網路。刪除並使用前一半地址空間重新建立 AZ1 子網路。調整 Auto Scaling 群組以同時使用新的 AZ1 子網路。當執行個體健康後，調整 Auto Scaling 群組以僅使用 AZ1 子網路。移除目前的 AZ2 子網路。使用原始 AZ1 子網路地址空間的後半部分建立新的 AZ2 子網路。使用原始 AZ2 子網路地址空間的一半建立新的 AZ3 子網路，然後更新 Auto Scaling 群組以目標所有三個新子網路。","B":"終止 AZ1 子網路中的 EC2 執行個體。刪除並使用一半地址空間重新建立 AZ1 子網路。更新 Auto Scaling 群組以使用此新子網路。對第二個 AZ 重複此操作。定義 AZ3 中的新子網路，然後更新 Auto Scaling 群組以目標所有三個新子網路。","C":"建立具有相同 IPv4 地址空間的新 VPC，並定義三個子網路，每個可用區域各一個。更新現有 Auto Scaling 群組以目標新 VPC 中的新子網路。","D":"更新 Auto Scaling 群組以僅使用 AZ2 子網路。將 AZ1 子網路更新為具有前一半地址空間。調整 Auto Scaling 群組以再次同時使用 AZ1 子網路。當執行個體健康後，調整 Auto Scaling 群組以僅使用 AZ1 子網路。更新目前的 AZ2 子網路並指派原始 AZ1 子網路地址空間的後半部分。使用原始 AZ2 子網路地址空間的一半建立新的 AZ3 子網路，然後更新 Auto Scaling 群組以目標所有三個新子網路。"},"answer":"D"},{"num":294,"stem":"一家公司使用 AWS Organizations 中的組織管理公司的 AWS 帳戶。公司使用 AWS CloudFormation 部署所有基礎設施。財務團隊想要建立費用分攤模型。財務團隊要求每個業務單位使用預定義的專案值清單來標記資源。\n當財務團隊在 AWS Cost Explorer 的 AWS Cost and Usage Report 中依專案篩選時，發現了不符規範的專案值。公司希望對新資源強制使用專案標記。\n哪個解決方案能以最少的工作量滿足這些需求？","options":{"A":"在組織的管理帳戶中建立包含允許的專案標記值的標記政策。建立 SCP，拒絕 cloudformation:CreateStack API 操作，除非已新增專案標記。將 SCP 附加至每個 OU。","B":"在每個 OU 中建立包含允許的專案標記值的標記政策。建立 SCP，拒絕 cloudformation:CreateStack API 操作，除非已新增專案標記。將 SCP 附加至每個 OU。","C":"在 AWS 管理帳戶中建立包含允許的專案標記值的標記政策。建立 IAM 政策，拒絕 cloudformation:CreateStack API 操作，除非已新增專案標記。將政策指派給每個使用者。","D":"使用 AWS Service Catalog 將 CloudFormation 堆疊作為產品管理。使用 TagOptions 程式庫控制專案標記值。與組織中的所有 OU 共用產品組合。"},"answer":"C"},{"num":295,"stem":"一個應用程式部署在 Auto Scaling 群組中執行的 Amazon EC2 執行個體上。Auto Scaling 群組設定僅使用一種類型的執行個體。\nCPU 和記憶體使用率指標顯示執行個體未被充分利用。Solutions architect 需要實作解決方案，以永久降低 EC2 成本並提高使用率。\n哪個解決方案能以未來最少的設定變更次數滿足這些需求？","options":{"A":"列出具有與目前執行個體類似屬性的執行個體類型。修改 Auto Scaling 群組的啟動範本設定，以使用清單中的多種執行個體類型。","B":"使用應用程式的 CPU 和記憶體使用率資訊選擇符合需求的執行個體類型。透過新增新執行個體類型來修改 Auto Scaling 群組的設定。從設定中移除目前的執行個體類型。","C":"使用應用程式的 CPU 和記憶體使用率資訊，在 Auto Scaling 群組啟動範本的新版本中指定 CPU 和記憶體需求。從設定中移除目前的執行個體類型。","D":"建立指令碼，從 AWS Price List Bulk API 選取適當的執行個體類型。使用選定的執行個體類型建立 Auto Scaling 群組啟動範本的新版本。"},"answer":"B"},{"num":296,"stem":"一家公司使用 Amazon Elastic Container Service（Amazon ECS）和 Amazon API Gateway 實作容器化應用程式。應用程式資料儲存在 Amazon Aurora 資料庫和 Amazon DynamoDB 資料庫中。公司使用 AWS CloudFormation 自動化基礎設施佈建，並使用 AWS CodePipeline 自動化應用程式部署。\nSolutions architect 需要實作符合 RPO 2 小時和 RTO 4 小時的災難復原（DR）策略。\n哪個解決方案能最具成本效益地滿足這些需求？","options":{"A":"設定 Aurora 全球資料庫和 DynamoDB 全域資料表，以將資料庫複寫至次要 AWS 區域。在主要區域和次要區域中，設定具有區域端點的 API Gateway API。實作 Amazon CloudFront 搭配來源容錯移轉，以在 DR 情境中將 traffic 路由至次要區域。","B":"使用 AWS Database Migration Service（AWS DMS）、Amazon EventBridge 和 AWS Lambda 將 Aurora 資料庫複寫至次要 AWS 區域。使用 DynamoDB Streams、EventBridge 和 Lambda 將 DynamoDB 資料庫複寫至次要區域。在主要區域和次要區域中，設定具有區域端點的 API Gateway API。實作 Amazon Route 53 容錯移轉路由，將 traffic 從主要區域切換至次要區域。","C":"使用 AWS Backup 在次要 AWS 區域中建立 Aurora 資料庫和 DynamoDB 資料庫的備份。在主要區域和次要區域中，設定具有區域端點的 API Gateway API。實作 Amazon Route 53 容錯移轉路由，將 traffic 從主要區域切換至次要區域。","D":"設定 Aurora 全球資料庫和 DynamoDB 全域資料表，以將資料庫複寫至次要 AWS 區域。在主要區域和次要區域中，設定具有區域端點的 API Gateway API。實作 Amazon Route 53 容錯移轉路由，將 traffic 從主要區域切換至次要區域。"},"answer":"A"},{"num":297,"stem":"一家公司有一個複雜的 Web 應用程式，利用 Amazon CloudFront 實現全球擴展性和效能。隨著時間推移，使用者回報 Web 應用程式速度變慢。\n公司的營運團隊回報 CloudFront 快取命中率持續下降。快取指標報告顯示，某些 URL 上的查詢字串排序不一致，有時以大小寫混合的字母指定，有時以小寫字母指定。\nSolutions architect 應採取哪組措施，盡快提高快取命中率？","options":{"A":"部署 Lambda@Edge 函數，依名稱對參數排序，並強制將其設為小寫。選擇 CloudFront viewer request 觸發器來叫用函數。","B":"更新 CloudFront 分配，停用基於查詢字串參數的快取。","C":"在負載平衡器後面部署反向代理，後處理應用程式中發出的 URL，強制 URL 字串為小寫。","D":"更新 CloudFront 分配，指定不區分大小寫的查詢字串處理。"},"answer":"A"},{"num":298,"stem":"一家公司在單一 AWS 區域中執行電子商務應用程式。該應用程式使用五節點的 Amazon Aurora MySQL DB 叢集來儲存客戶資訊及其最近的訂單。DB 叢集全天候承受大量寫入交易。\n公司需要將 Aurora 資料庫中的資料複寫至另一個區域，以符合災難復原需求。公司的 RPO 為 1 小時。\n哪個解決方案能以最低成本滿足這些需求？","options":{"A":"將 Aurora 資料庫修改為 Aurora 全球資料庫。在另一個區域建立第二個 Aurora 資料庫。","B":"為 Aurora 資料庫啟用 Backtrack 功能。建立每天執行的 AWS Lambda 函數，將資料庫快照複製到備份區域。","C":"使用 AWS Database Migration Service（AWS DMS）。建立 DMS 異動資料擷取（CDC）任務，將 Aurora 資料庫的持續變更複寫到另一個區域的 Amazon S3 儲存貯體。","D":"關閉 Aurora 自動備份。設定備份頻率為 1 小時的 Aurora 備份。指定另一個區域為目標區域。選擇 Aurora 資料庫作為資源指派。"},"answer":"C"},{"num":299,"stem":"一家公司的 solutions architect 正在評估幾年前部署的 AWS 工作負載。應用程式層是無狀態的，在從 AMI 啟動的單一大型 Amazon EC2 執行個體上執行。應用程式將資料儲存在單一 EC2 執行個體上執行的 MySQL 資料庫中。\n應用程式伺服器 EC2 執行個體的 CPU 使用率經常達到 100%，導致應用程式停止回應。公司手動在執行個體上安裝修補程式。修補作業在過去曾造成停機。公司需要讓應用程式具備高可用性。\n哪個解決方案能以最少的開發時間滿足這些需求？","options":{"A":"將應用程式層移至現有 VPC 中的 AWS Lambda 函數。建立 Application Load Balancer 以將 traffic 分配至 Lambda 函數。使用 Amazon GuardDuty 掃描 Lambda 函數。將資料庫遷移至 Amazon DocumentDB（與 MongoDB 相容）。","B":"將 EC2 執行個體類型變更為較小的 Graviton 驅動執行個體類型。使用現有 AMI 為 Auto Scaling 群組建立啟動範本。建立 Application Load Balancer 以將 traffic 分配至 Auto Scaling 群組中的執行個體。設定 Auto Scaling 群組根據 CPU 使用率進行擴展。將資料庫遷移至 Amazon DynamoDB。","C":"使用 Docker 將應用程式層移至容器。在具有 EC2 執行個體的 Amazon Elastic Container Service（Amazon ECS）上執行容器。建立 Application Load Balancer 以將 traffic 分配至 ECS 叢集。設定 ECS 叢集根據 CPU 使用率進行擴展。將資料庫遷移至 Amazon Neptune。","D":"建立配置了 AWS Systems Manager Agent（SSM Agent）的新 AMI。使用新 AMI 為 Auto Scaling 群組建立啟動範本。在 Auto Scaling 群組中使用較小的執行個體。建立 Application Load Balancer 以將 traffic 分配至 Auto Scaling 群組中的執行個體。設定 Auto Scaling 群組根據 CPU 使用率進行擴展。將資料庫遷移至 Amazon Aurora MySQL。"},"answer":"D"},{"num":300,"stem":"一家公司計畫將多個應用程式遷移至 AWS。公司對其整個應用程式資產並未有充分的了解。資產由實體機器和 VM 的混合組成。\n公司將要遷移的其中一個應用程式有許多對延遲敏感的相依性。公司不確定所有相依性為何，但知道低延遲通訊使用在連接埠 1000 上執行的自訂 IP 通訊協定。公司希望將應用程式及這些相依性一起遷移，以便同時將所有低延遲介面移至 AWS。\n公司已安裝 AWS Application Discovery Agent，並已收集數個月的資料。\n公司應採取什麼措施來識別需要在應用程式的同一階段一起遷移的相依性？","options":{"A":"使用 AWS Migration Hub 並選取託管應用程式的伺服器。視覺化網路圖以找到與應用程式互動的伺服器。在 Amazon Athena 中開啟資料探索。查詢在伺服器之間傳輸的資料，以識別在連接埠 1000 上通訊的伺服器。返回 Migration Hub。根據 Athena 查詢的結果建立移動群組。","B":"使用 AWS Application Migration Service 並選取託管應用程式的伺服器。視覺化網路圖以找到與應用程式互動的伺服器。設定 Application Migration Service 為所有與應用程式互動的伺服器啟動測試執行個體。對測試執行個體執行驗收測試。若未發現問題，根據測試的伺服器建立移動群組。","C":"使用 AWS Migration Hub 並選取託管應用程式的伺服器。在 Network Access Analyzer 中開啟資料探索。使用 Network Access Analyzer 主控台選取託管應用程式的伺服器。選取連接埠 1000 的 Network Access Scope 並記錄符合的伺服器。返回 Migration Hub。根據 Network Access Analyzer 的結果建立移動群組。","D":"使用 AWS Migration Hub 並選取託管應用程式的伺服器。使用 AWS Application Discovery Agent 將 Amazon CloudWatch Agent 推送至識別的伺服器。將代理程式收集的 CloudWatch 日誌匯出至 Amazon S3。使用 Amazon Athena 查詢日誌，以找到在連接埠 1000 上通訊的伺服器。返回 Migration Hub，根據 Athena 查詢的結果建立移動群組。"},"answer":"A"},{"num":301,"stem":"一家公司正在建置一個將在 AWS Lambda 函數上運行的應用程式。數百名客戶將使用該應用程式。該公司希望為每位客戶提供特定時間段內的請求配額。配額必須符合客戶的使用模式。某些客戶必須在較短的時間段內獲得更高的配額。\n哪個解決方案可以滿足這些需求？","options":{"A":"建立一個 Amazon API Gateway REST API，並透過代理整合來呼叫 Lambda 函數。針對每位客戶，配置包含適當請求配額的 API Gateway 使用計劃。從使用計劃為客戶所需的每個使用者建立 API 金鑰。","B":"建立一個 Amazon API Gateway HTTP API，並透過代理整合來呼叫 Lambda 函數。針對每位客戶，配置包含適當請求配額的 API Gateway 使用計劃。為每個使用計劃配置路由層級的節流。從使用計劃為客戶所需的每個使用者建立 API 金鑰。","C":"為每位客戶建立 Lambda 函數別名。設定包含適當請求配額的並發限制。為每個函數別名建立 Lambda 函數 URL。與相關客戶共用每個別名的 Lambda 函數 URL。","D":"在 VPC 中建立 Application Load Balancer (ALB)。將 Lambda 函數配置為 ALB 的目標。為 ALB 配置 AWS WAF 網路 ACL。針對每位客戶配置包含適當請求配額的速率型規則。"},"answer":"A"},{"num":302,"stem":"一家公司計劃將其內部部署的 VMware 叢集（包含 120 台 VM）遷移到 AWS。這些 VM 安裝了許多不同的作業系統和自訂軟體套件。該公司還有一個容量為 10 TB 的內部部署 NFS 伺服器。該公司已設置一條 10 Gbps 的 AWS Direct Connect 連線用於遷移。\n哪個解決方案能在最短時間內完成遷移至 AWS？","options":{"A":"匯出內部部署的 VM 並將其複製到 Amazon S3 儲存貯體。使用 VM Import/Export 從儲存在 Amazon S3 中的 VM 映像建立 AMI。訂購 AWS Snowball Edge 裝置。將 NFS 伺服器資料複製到裝置。將 NFS 伺服器資料還原到已配置 NFS 的 Amazon EC2 執行個體。","B":"配置 AWS Application Migration Service 以連線至 VMware 叢集。為 VM 建立複寫任務。建立 Amazon Elastic File System (Amazon EFS) 檔案系統。配置 AWS DataSync 透過 Direct Connect 連線將 NFS 伺服器資料複製到 EFS 檔案系統。","C":"在 AWS 上重新建立 VM 為 Amazon EC2 執行個體。安裝所有必要的軟體套件。建立 Amazon FSx for Lustre 檔案系統。配置 AWS DataSync 透過 Direct Connect 連線將 NFS 伺服器資料複製到 FSx for Lustre 檔案系統。","D":"訂購兩台 AWS Snowball Edge 裝置。將 VM 和 NFS 伺服器資料複製到裝置。在裝置資料載入到 Amazon S3 儲存貯體後，執行 VM Import/Export。建立 Amazon Elastic File System (Amazon EFS) 檔案系統。將 NFS 伺服器資料從 Amazon S3 複製到 EFS 檔案系統。"},"answer":"B"},{"num":303,"stem":"一家線上調查公司在 AWS Cloud 中運行其應用程式。該應用程式是分散式架構，由在自動擴展的 Amazon Elastic Container Service (Amazon ECS) 叢集中運行的微服務組成。ECS 叢集是 Application Load Balancer (ALB) 的目標。ALB 是 Amazon CloudFront 發佈的自訂來源。\n該公司有一份包含敏感資料的調查。敏感資料在應用程式中傳輸時必須加密。應用程式的資料處理微服務是唯一應該能夠解密資料的微服務。\n哪個解決方案可以滿足這些需求？","options":{"A":"建立一個專用於資料處理微服務的對稱 AWS Key Management Service (AWS KMS) 金鑰。建立欄位層級加密設定檔和配置。將 KMS 金鑰和配置與 CloudFront 快取行為建立關聯。","B":"建立一個專用於資料處理微服務的 RSA 金鑰組。將公鑰上傳到 CloudFront 發佈。建立欄位層級加密設定檔和配置。將配置新增至 CloudFront 快取行為。","C":"建立一個專用於資料處理微服務的對稱 AWS Key Management Service (AWS KMS) 金鑰。建立 Lambda@Edge 函數。將函數設計為使用 KMS 金鑰加密敏感資料。","D":"建立一個專用於資料處理微服務的 RSA 金鑰組。建立 Lambda@Edge 函數。將函數設計為使用 RSA 金鑰組的私鑰加密敏感資料。"},"answer":"B"},{"num":304,"stem":"一位解決方案架構師正在為現有 VPC 制定 DNS 策略。該 VPC 使用 10.24.34.0/24 CIDR 區塊佈建。VPC 也使用 Amazon Route 53 Resolver 進行 DNS 解析。新的需求規定 DNS 查詢必須使用私有託管區域。此外，具有公有 IP 位址的執行個體必須收到對應的公有主機名稱。\n哪個解決方案可以滿足這些需求，以確保網域名稱在 VPC 內正確解析？","options":{"A":"建立一個私有託管區域。為 VPC 啟用 enableDnsSupport 屬性和 enableDnsHostnames 屬性。更新 VPC DHCP 選項集以包含 domain-name-servers=10.24.34.2。","B":"建立一個私有託管區域。將私有託管區域與 VPC 建立關聯。為 VPC 啟用 enableDnsSupport 屬性和 enableDnsHostnames 屬性。建立新的 VPC DHCP 選項集，並配置 domain-name-servers=AmazonProvidedDNS。將新的 DHCP 選項集與 VPC 建立關聯。","C":"為 VPC 停用 enableDnsSupport 屬性。為 VPC 啟用 enableDnsHostnames 屬性。建立新的 VPC DHCP 選項集，並配置 domain-name-servers=10.24.34.2。將新的 DHCP 選項集與 VPC 建立關聯。","D":"建立一個私有託管區域。將私有託管區域與 VPC 建立關聯。為 VPC 啟用 enableDnsSupport 屬性。為 VPC 停用 enableDnsHostnames 屬性。更新 VPC DHCP 選項集以包含 domain-name-servers=AmazonProvidedDNS。"},"answer":"B"},{"num":305,"stem":"一家資料分析公司有一個由多個預留節點組成的 Amazon Redshift 叢集。由於一組員工正在編制深度稽核分析報告，叢集正在經歷意外的使用量突增。生成報告的查詢是複雜的讀取查詢，且 CPU 密集。\n業務需求規定叢集必須能隨時處理讀取和寫入查詢。解決方案架構師必須設計一個能應對使用量突增的解決方案。\n哪個解決方案以最具成本效益的方式滿足這些需求？","options":{"A":"佈建 Amazon EMR 叢集，將複雜的資料處理任務卸載到該叢集。","B":"部署 AWS Lambda 函數，當 Amazon CloudWatch 中叢集的 CPU 指標達到 80% 時，使用傳統調整大小操作為 Amazon Redshift 叢集新增容量。","C":"部署 AWS Lambda 函數，當 Amazon CloudWatch 中叢集的 CPU 指標達到 80% 時，使用彈性調整大小操作為 Amazon Redshift 叢集新增容量。","D":"為 Amazon Redshift 叢集開啟並發擴展功能。"},"answer":"D"},{"num":306,"stem":"一家研究中心正在遷移到 AWS Cloud，並已將其內部部署的 1 PB 物件儲存移至 Amazon S3 儲存貯體。一百位科學家使用此物件儲存來存放其工作相關文件。每位科學家在物件儲存上都有個人資料夾。所有科學家都是同一個 IAM 使用者群組的成員。\n研究中心的合規主任擔心科學家可能能夠存取彼此的工作。研究中心有嚴格義務報告哪位科學家存取了哪些文件。負責這些報告的團隊 AWS 經驗有限，希望有一個現成可用、能最小化運維負擔的解決方案。\n解決方案架構師應採取哪些組合措施來滿足這些需求？（選擇兩個）","options":{"A":"建立身分識別政策，授予使用者讀取和寫入存取權限。新增條件，指定 S3 路徑必須以 $(aws:username) 為前綴。將政策套用於科學家的 IAM 使用者群組。","B":"使用 AWS CloudTrail 配置追蹤，以擷取 S3 儲存貯體中所有物件層級事件。將追蹤輸出儲存在另一個 S3 儲存貯體。使用 Amazon Athena 查詢日誌並生成報告。","C":"啟用 S3 伺服器存取日誌記錄。將另一個 S3 儲存貯體配置為日誌傳送目標。使用 Amazon Athena 查詢日誌並生成報告。","D":"建立 S3 儲存貯體政策，授予科學家 IAM 使用者群組中使用者的讀取和寫入存取權限。","E":"使用 AWS CloudTrail 配置追蹤，以擷取 S3 儲存貯體中所有物件層級事件，並將事件寫入 Amazon CloudWatch。使用 Amazon Athena CloudWatch 連接器查詢日誌並生成報告。"},"answer":"AB"},{"num":307,"stem":"一家公司使用 AWS Organizations 管理多帳戶架構。該公司擁有數百個 AWS 帳戶，且預計帳戶數量將繼續增加。該公司正在建置一個使用 Docker 映像的新應用程式。公司將把 Docker 映像推送到 Amazon Elastic Container Registry (Amazon ECR)。只有公司組織內的帳戶才應有權存取這些映像。\n該公司有一個頻繁執行的 CI/CD 流程。公司希望保留所有已標記的映像。但公司只希望保留最近五個未標記的映像。\n哪個解決方案以最低的運維負擔滿足這些需求？","options":{"A":"在 Amazon ECR 中建立私有儲存庫。為儲存庫建立權限政策，僅允許必要的 ECR 操作。包含一個條件，僅當 aws:PrincipalOrgID 條件金鑰的值等於公司組織 ID 時才允許 ECR 操作。向 ECR 儲存庫新增生命週期規則，刪除數量超過五個的未標記映像。","B":"在 Amazon ECR 中建立公有儲存庫。在 ECR 帳戶中建立 IAM 角色。設定權限，使任何帳戶在 aws:PrincipalOrgID 條件金鑰的值等於公司組織 ID 時可以擔任該角色。向 ECR 儲存庫新增生命週期規則，刪除數量超過五個的未標記映像。","C":"在 Amazon ECR 中建立私有儲存庫。為儲存庫建立權限政策，僅包含必要的 ECR 操作。包含一個條件，允許組織中所有帳戶 ID 的 ECR 操作。排程每日 Amazon EventBridge 規則以呼叫 AWS Lambda 函數，刪除數量超過五個的未標記映像。","D":"在 Amazon ECR 中建立公有儲存庫。配置 Amazon ECR 使用具有介面 VPC 端點的端點政策，包含公司需要拉取映像的必要權限。包含一個條件，允許公司組織中所有帳戶 ID 的 ECR 操作。排程每日 Amazon EventBridge 規則以呼叫 AWS Lambda 函數，刪除數量超過五個的未標記映像。"},"answer":"A"},{"num":308,"stem":"一位解決方案架構師正在審查一家公司對 Amazon RDS DB 執行個體進行快照的流程。該公司每天自動建立快照，並保留快照 7 天。\n解決方案架構師需要建議一個每 6 小時建立一次快照並保留快照 30 天的解決方案。該公司使用 AWS Organizations 管理其所有 AWS 帳戶。公司需要對 RDS 快照健康狀況的整合檢視。\n哪個解決方案以最低的運維負擔滿足這些需求？","options":{"A":"在 AWS Backup 中開啟跨帳戶管理功能。建立一個指定頻率和保留需求的備份計劃。為 DB 執行個體新增標籤。使用標籤套用備份計劃。使用 AWS Backup 監控備份狀態。","B":"在 Amazon RDS 中開啟跨帳戶管理功能。建立一個指定頻率和保留需求的快照全域政策。使用管理帳戶中的 RDS 主控台監控備份狀態。","C":"在 AWS CloudFormation 中開啟跨帳戶管理功能。從管理帳戶部署包含 AWS Backup 備份計劃（指定頻率和保留需求）的 CloudFormation 堆疊集。在管理帳戶中建立 AWS Lambda 函數以監控備份狀態。在每個帳戶中建立 Amazon EventBridge 規則，按排程執行 Lambda 函數。","D":"在每個帳戶中配置 AWS Backup。建立 Amazon Data Lifecycle Manager 生命週期政策，指定頻率和保留需求。將 DB 執行個體指定為目標資源。使用每個成員帳戶中的 Amazon Data Lifecycle Manager 主控台監控備份狀態。"},"answer":"A"},{"num":309,"stem":"一家公司使用 AWS Organizations 建立多帳戶架構。該公司目前的帳戶架構安全配置包含 SCP、資源型政策、身分識別型政策、信任政策和工作階段政策。\n解決方案架構師需要允許帳戶 A 中的 IAM 使用者擔任帳戶 B 中的角色。\n解決方案架構師必須採取哪些組合步驟來滿足此需求？（選擇三個）","options":{"A":"配置帳戶 A 的 SCP 以允許該操作。","B":"配置資源型政策以允許該操作。","C":"配置帳戶 A 中使用者的身分識別型政策以允許該操作。","D":"配置帳戶 B 中使用者的身分識別型政策以允許該操作。","E":"配置帳戶 B 中目標角色的信任政策以允許該操作。 F. 配置工作階段政策以允許該操作，並透過 GetSessionToken API 操作以程式設計方式傳遞。"},"answer":"ACE"},{"num":310,"stem":"一家公司希望使用 Amazon S3 備份其內部部署的檔案儲存解決方案。該公司的內部部署檔案儲存解決方案支援 NFS，而公司希望新解決方案也支援 NFS。公司希望在 5 天後封存備份檔案。如果公司需要封存的檔案用於災難復原，公司願意等待幾天來取回這些檔案。\n哪個解決方案以最具成本效益的方式滿足這些需求？","options":{"A":"部署與 S3 儲存貯體關聯的 AWS Storage Gateway 檔案閘道。將內部部署檔案儲存解決方案中的檔案移至檔案閘道。建立 S3 生命週期規則，在 5 天後將檔案移至 S3 Standard-Infrequent Access (S3 Standard-IA)。","B":"部署與 S3 儲存貯體關聯的 AWS Storage Gateway 磁碟區閘道。將內部部署檔案儲存解決方案中的檔案移至磁碟區閘道。建立 S3 生命週期規則，在 5 天後將檔案移至 S3 Glacier Deep Archive。","C":"部署與 S3 儲存貯體關聯的 AWS Storage Gateway 磁帶閘道。將內部部署檔案儲存解決方案中的檔案移至磁帶閘道。建立 S3 生命週期規則，在 5 天後將檔案移至 S3 Standard-Infrequent Access (S3 Standard-IA)。","D":"部署與 S3 儲存貯體關聯的 AWS Storage Gateway 檔案閘道。將內部部署檔案儲存解決方案中的檔案移至檔案閘道。建立 S3 生命週期規則，在 5 天後將檔案移至 S3 Glacier Deep Archive。"},"answer":"D"},{"num":311,"stem":"一家公司在 Amazon EC2 執行個體和 AWS Lambda 函數上運行其應用程式。EC2 執行個體承受持續穩定的負載。Lambda 函數承受多變且不可預測的負載。應用程式包含使用 Amazon MemoryDB for Redis 叢集的快取層。\n解決方案架構師必須建議一個能最小化公司每月整體費用的解決方案。\n哪個解決方案可以滿足這些需求？","options":{"A":"購買 EC2 執行個體 Savings Plan 以涵蓋 EC2 執行個體。購買 Compute Savings Plan for Lambda 以涵蓋 Lambda 函數的最低預期消耗。購買預留節點以涵蓋 MemoryDB 快取節點。","B":"購買 Compute Savings Plan 以涵蓋 EC2 執行個體。購買 Lambda 預留並發以涵蓋預期的 Lambda 使用量。購買預留節點以涵蓋 MemoryDB 快取節點。","C":"購買 Compute Savings Plan 以涵蓋 EC2 執行個體、Lambda 函數和 MemoryDB 快取節點的全部預期費用。","D":"購買 Compute Savings Plan 以涵蓋 EC2 執行個體和 MemoryDB 快取節點。購買 Lambda 預留並發以涵蓋預期的 Lambda 使用量。"},"answer":"C"},{"num":312,"stem":"一家公司正在 Amazon EC2 執行個體上推出新的線上遊戲。該遊戲必須在全球範圍內可用。公司計劃在三個 AWS 區域運行遊戲：us-east-1、eu-west-1 和 ap-southeast-1。遊戲的排行榜、玩家庫存和事件狀態必須跨區域可用。\n解決方案架構師必須設計一個解決方案，使任何區域都能擴展以承擔所有區域的負載。此外，使用者必須自動連線到提供最低延遲的區域。\n哪個解決方案以最低的運維負擔滿足這些需求？","options":{"A":"建立 EC2 Spot Fleet。在每個區域將 Spot Fleet 連接到 Network Load Balancer (NLB)。建立指向 NLB 的 AWS Global Accelerator IP 位址。為 Global Accelerator IP 位址建立 Amazon Route 53 延遲型路由項目。將遊戲中繼資料儲存至每個區域的 Amazon RDS for MySQL DB 執行個體。在其他區域設定讀取副本。","B":"為 EC2 執行個體建立 Auto Scaling 群組。在每個區域將 Auto Scaling 群組連接到 Network Load Balancer (NLB)。為每個區域建立使用地理接近性路由並指向該區域 NLB 的 Amazon Route 53 項目。將遊戲中繼資料儲存至每個區域 EC2 執行個體上的 MySQL 資料庫。在每個區域的資料庫 EC2 執行個體之間設定複寫。","C":"為 EC2 執行個體建立 Auto Scaling 群組。在每個區域將 Auto Scaling 群組連接到 Network Load Balancer (NLB)。為每個區域建立使用延遲型路由並指向該區域 NLB 的 Amazon Route 53 項目。將遊戲中繼資料儲存至 Amazon DynamoDB 全域資料表。","D":"使用 EC2 Global View。將 EC2 執行個體部署到每個區域。將執行個體連接到 Network Load Balancer (NLB)。在每個區域的 EC2 執行個體上部署 DNS 伺服器。在每個 DNS 伺服器上設定自訂邏輯，將使用者重新導向到提供最低延遲的區域。將遊戲中繼資料儲存至 Amazon Aurora 全域資料庫。"},"answer":"C"},{"num":313,"stem":"一家公司正在從 AWS Marketplace 部署第三方防火牆設備解決方案，以監控和保護離開公司 AWS 環境的流量。公司希望將此設備部署到共用服務 VPC，並透過設備路由所有對外網際網路流量。\n解決方案架構師需要建議一種部署方法，優先考慮可靠性並在單一 AWS 區域內最小化防火牆設備之間的故障轉移時間。公司已設定從共用服務 VPC 到其他 VPC 的路由。\n解決方案架構師應建議採取哪些步驟來滿足這些需求？（選擇三個）","options":{"A":"將兩台防火牆設備部署到共用服務 VPC，每台分別位於不同的可用區域。","B":"在共用服務 VPC 中建立新的 Network Load Balancer。建立新的目標群組並將其連接到新的 Network Load Balancer。將每台防火牆設備執行個體新增到目標群組。","C":"在共用服務 VPC 中建立新的 Gateway Load Balancer。建立新的目標群組並將其連接到新的 Gateway Load Balancer。將每台防火牆設備執行個體新增到目標群組。","D":"建立 VPC 介面端點。在共用服務 VPC 的路由表中新增路由。將新端點指定為從其他 VPC 進入共用服務 VPC 的流量的下一個躍點。","E":"將兩台防火牆設備部署到共用服務 VPC，兩台都位於同一個可用區域。","F":"建立 VPC Gateway Load Balancer 端點。在共用服務 VPC 的路由表中新增路由。將新端點指定為從其他 VPC 進入共用服務 VPC 的流量的下一個躍點。"},"answer":"ACF"},{"num":314,"stem":"解決方案架構師需要將內部部署的舊版應用程式遷移到 AWS。該應用程式在負載平衡器後方的兩台伺服器上運行。應用程式需要與伺服器網路介面卡 MAC 位址關聯的授權檔案。軟體廠商需要 12 小時才能發送新的授權檔案。應用程式還使用帶有靜態 IP 位址的配置檔案來存取資料庫伺服器，不支援主機名稱。\n鑑於這些需求，應採取哪些組合步驟來在 AWS 中為應用程式伺服器實作高可用性架構？（選擇兩個）","options":{"A":"建立 ENI 集區。向廠商申請集區的授權檔案，並將授權檔案儲存在 Amazon S3 中。建立啟動自動化指令碼以下載授權檔案，並將對應的 ENI 連接到 Amazon EC2 執行個體。","B":"建立 ENI 集區。向廠商申請集區的授權檔案，將授權檔案儲存在 Amazon EC2 執行個體上。從該執行個體建立 AMI，並將此 AMI 用於所有未來的 EC2 執行個體。","C":"建立啟動自動化指令碼以向廠商申請新的授權檔案。收到回應後，將授權檔案套用到 Amazon EC2 執行個體。","D":"編輯啟動自動化指令碼，從 AWS Systems Manager Parameter Store 讀取資料庫伺服器 IP 位址，並將該值注入本機配置檔案。","E":"編輯 Amazon EC2 執行個體，在配置檔案中包含資料庫伺服器 IP 位址，並重新建立 AMI 以用於所有未來的 EC2 執行個體。"},"answer":"AD"},{"num":315,"stem":"一家公司在美國的 AWS 區域運行其銷售報告應用程式。該應用程式使用 Amazon API Gateway Regional API 和 AWS Lambda 函數從 Amazon RDS for MySQL 資料庫生成按需報告。應用程式前端託管在 Amazon S3 上，使用者透過 Amazon CloudFront 發佈存取。公司使用 Amazon Route 53 作為網域的 DNS 服務。Route 53 配置了簡單路由政策，將流量路由至 API Gateway API。\n在未來 6 個月內，公司計劃將業務擴展到歐洲。超過 90% 的資料庫流量是唯讀流量。公司已在新區域部署了 API Gateway API 和 Lambda 函數。\n解決方案架構師必須設計一個能最小化下載報告的使用者延遲的解決方案。\n哪個解決方案可以滿足這些需求？","options":{"A":"使用包含完整載入的 AWS Database Migration Service (AWS DMS) 任務，將原始區域的主要資料庫複寫到新區域的資料庫。將 Route 53 記錄改為延遲型路由以連線至 API Gateway API。","B":"使用包含完整載入加異動資料擷取 (CDC) 的 AWS Database Migration Service (AWS DMS) 任務，將原始區域的主要資料庫複寫到新區域的資料庫。將 Route 53 記錄改為地理位置路由以連線至 API Gateway API。","C":"在新區域為 RDS 資料庫配置跨區域讀取副本。將 Route 53 記錄改為延遲型路由以連線至 API Gateway API。","D":"在新區域為 RDS 資料庫配置跨區域讀取副本。將 Route 53 記錄改為地理位置路由以連線至 API Gateway API。"},"answer":"D"},{"num":316,"stem":"一家軟體公司需要在開發流程中建立短期測試環境，以測試 pull request。每個測試環境由一個位於 Auto Scaling 群組中的單一 Amazon EC2 執行個體組成。\n測試環境必須能夠與中央伺服器通訊以回報測試結果。中央伺服器位於內部部署資料中心。解決方案架構師必須實作一個解決方案，使公司無需任何手動介入即可建立和刪除測試環境。公司已建立一個具有 VPN 附件連線至內部部署網路的傳輸閘道。\n哪個解決方案以最低的運維負擔滿足這些需求？","options":{"A":"建立包含傳輸閘道附件和相關路由配置的 AWS CloudFormation 範本。建立包含此範本的 CloudFormation 堆疊集。使用 CloudFormation StackSets 為帳戶中的每個 VPC 部署新堆疊。為每個測試環境部署新的 VPC。","B":"為測試環境建立單一 VPC。包含傳輸閘道附件和相關路由配置。使用 AWS CloudFormation 將所有測試環境部署到 VPC 中。","C":"在 AWS Organizations 中為測試建立新的 OU。建立包含 VPC、必要網路資源、傳輸閘道附件和相關路由配置的 AWS CloudFormation 範本。建立包含此範本的 CloudFormation 堆疊集。使用 CloudFormation StackSets 部署到測試 OU 下的每個帳戶。為每個測試環境建立新帳戶。","D":"將測試環境 EC2 執行個體轉換為 Docker 映像。使用 AWS CloudFormation 在新 VPC 中配置 Amazon Elastic Kubernetes Service (Amazon EKS) 叢集，建立傳輸閘道附件並建立相關路由配置。使用 Kubernetes 管理測試環境的部署和生命週期。"},"answer":"B"},{"num":317,"stem":"一家公司正在將新 API 部署到 AWS。該 API 使用 Amazon API Gateway 的 Regional API 端點和 AWS Lambda 函數來託管。API 從外部廠商 API 擷取資料、將資料儲存在 Amazon DynamoDB 全域資料表中，並從 DynamoDB 全域資料表擷取資料。廠商 API 的 API 金鑰儲存在 AWS Secrets Manager 中，並使用 AWS Key Management Service (AWS KMS) 中的客戶自管金鑰加密。公司已將其 API 部署到單一 AWS 區域。\n解決方案架構師需要更改公司 API 的元件，以確保這些元件可以在多個區域以主動-主動配置運行。\n哪些組合變更能以最低的運維負擔滿足此需求？（選擇三個）","options":{"A":"將 API 部署到多個區域。使用自訂網域名稱配置 Amazon Route 53，將流量路由至每個 Regional API 端點。實作 Route 53 多值回應路由政策。","B":"建立新的 KMS 多區域客戶自管金鑰。在每個在範圍內的區域建立新的 KMS 客戶自管複本金鑰。","C":"將現有的 Secrets Manager 秘密複寫到其他區域。針對每個在範圍內的區域的複寫秘密，選取適當的 KMS 金鑰。","D":"在每個在範圍內的區域建立新的 AWS 受管 KMS 金鑰。將現有金鑰轉換為多區域金鑰。在其他區域使用多區域金鑰。","E":"在每個在範圍內的區域建立新的 Secrets Manager 秘密。將現有區域的秘密值複製到每個在範圍內的區域的新秘密中。 F. 修改 Lambda 函數的部署流程，在各在範圍內的區域重複部署。為現有 API 開啟多區域選項。選取在每個區域部署的 Lambda 函數作為多區域 API 的後端。"},"answer":"ABC"},{"num":318,"stem":"一家線上零售公司在單一伺服器上的內部部署資料中心託管其有狀態的網路應用程式和 MySQL 資料庫。公司希望透過開展更多行銷活動和促銷來擴大客戶群。為此，公司希望將應用程式和資料庫遷移到 AWS，以提高架構的可靠性。\n哪個解決方案能提供最高等級的可靠性？","options":{"A":"將資料庫遷移到 Amazon RDS MySQL 多可用區 DB 執行個體。在 Application Load Balancer 後方的 Amazon EC2 執行個體的 Auto Scaling 群組中部署應用程式。將工作階段儲存在 Amazon Neptune。","B":"將資料庫遷移到 Amazon Aurora MySQL。在 Application Load Balancer 後方的 Amazon EC2 執行個體的 Auto Scaling 群組中部署應用程式。將工作階段儲存在 Amazon ElastiCache for Redis 複寫群組中。","C":"將資料庫遷移到 Amazon DocumentDB（具有 MongoDB 相容性）。在 Network Load Balancer 後方的 Amazon EC2 執行個體的 Auto Scaling 群組中部署應用程
