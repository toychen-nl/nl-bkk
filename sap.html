PostgreSQL 資料庫叢集。","C":"建立一個具有 Amazon EC2 容量集區的 Amazon Elastic Container Service (Amazon ECS) 叢集。將應用程式容器複製到新的 Amazon Elastic Container Registry (Amazon ECR) 儲存庫。將每個容器映像檔註冊為新的任務定義。為每個任務定義配置 ECS 服務，以符合原始 Kubernetes 部署。建立一個 Amazon Aurora PostgreSQL 資料庫叢集。","D":"透過在 Amazon EC2 執行個體上託管叢集，在 AWS 上重建本地 Kubernetes 叢集。將開源容器映像檔儲存庫遷移到 EC2 執行個體。將 manifest 從本地部署到 AWS 上的新叢集。在新叢集上部署一個開源 PostgreSQL 資料庫。"},"answer":"D"},{"num":433,"stem":"一家公司在 AWS 上使用行動應用程式舉辦線上競賽。公司在每次競賽結束時隨機選出一名獲勝者。競賽持續時間長短不一。競賽結束後，公司不需要保留競賽中的任何資料。\n公司使用託管在 Amazon EC2 執行個體上的自訂程式碼來處理競賽資料並選出獲勝者。EC2 執行個體在 Application Load Balancer 後方運行，並將競賽項目儲存在 Amazon RDS 資料庫執行個體上。公司必須設計新架構以降低舉辦競賽的成本。\n哪個解決方案能以最具成本效益的方式滿足這些需求？","options":{"A":"將競賽項目的儲存遷移到 Amazon DynamoDB。建立一個 DynamoDB Accelerator (DAX) 叢集。將程式碼重寫為使用 Fargate 啟動類型的 Amazon Elastic Container Service (Amazon ECS) 容器。競賽結束時，刪除 DynamoDB 資料表。","B":"將競賽項目的儲存遷移到 Amazon Redshift。將程式碼重寫為 AWS Lambda 函數。競賽結束時，刪除 Redshift 叢集。","C":"在 RDS 資料庫執行個體前方新增一個 Amazon ElastiCache for Redis 叢集，以快取競賽項目。將程式碼重寫為使用 Fargate 啟動類型的 Amazon Elastic Container Service (Amazon ECS) 容器。在每個競賽項目上設定 ElastiCache TTL 屬性，使每個項目在競賽結束時過期。","D":"將競賽項目的儲存遷移到 Amazon DynamoDB。將程式碼重寫為 AWS Lambda 函數。在每個競賽項目上設定 DynamoDB TTL 屬性，使每個項目在競賽結束時過期。"},"answer":"C"},{"num":434,"stem":"一家公司實施了新的安全要求。根據新要求，公司必須掃描來自公司 VPC 中 AWS 執行個體的所有流量，以檢查是否違反公司的安全政策。掃描結果可讓公司封鎖特定 IP 位址的進出存取。\n為了滿足新要求，公司在私有子網路中部署一組 Amazon EC2 執行個體，作為透明代理。公司在這些 EC2 執行個體上安裝經核准的代理伺服器軟體。公司修改所有子網路上的路由表，使用安裝代理軟體的相應 EC2 執行個體作為預設路由。公司還建立了符合安全政策的安全群組，並將這些安全群組指派給 EC2 執行個體。\n儘管進行了這些配置，私有子網路中 EC2 執行個體的流量仍未能正確轉發到網際網路。\n解決方案架構師應如何解決此問題？","options":{"A":"在執行代理軟體的 EC2 執行個體上停用來源/目的地檢查。","B":"在指派給代理 EC2 執行個體的安全群組中新增一條規則，允許擁有此安全群組的執行個體之間的所有流量。將此安全群組指派給 VPC 中的所有 EC2 執行個體。","C":"變更 VPC 的 DHCP 選項集。將 DNS 伺服器選項設定為指向代理 EC2 執行個體的位址。","D":"為每個代理 EC2 執行個體指派一個額外的彈性網路介面。確保其中一個網路介面有到私有子網路的路由。確保另一個網路介面有到網際網路的路由。"},"answer":"A"},{"num":435,"stem":"一家公司正在 AWS 上，以手動建立的 VPC 執行其解決方案。公司使用 AWS CloudFormation 佈建基礎架構的其他部分。根據新要求，公司必須以自動化方式管理所有基礎架構。\n公司應如何以最少的工作量滿足這項新要求？","options":{"A":"建立一個新的 AWS Cloud Development Kit (AWS CDK) 堆疊，嚴格佈建現有的 VPC 資源和配置。使用 AWS CDK 將 VPC 匯入堆疊並管理 VPC。","B":"建立一個建立 VPC 的 CloudFormation 堆疊集。使用堆疊集將 VPC 匯入堆疊。","C":"建立一個新的 CloudFormation 範本，嚴格佈建現有的 VPC 資源和配置。從 CloudFormation 主控台，透過匯入現有資源建立新堆疊。","D":"建立一個建立 VPC 的新 CloudFormation 範本。使用 AWS Serverless Application Model (AWS SAM) CLI 匯入 VPC。"},"answer":"D"},{"num":436,"stem":"一家公司發布了一款熱門電玩遊戲的新版本，並希望提供公開下載。新版本套件大小約為 5 GB。公司透過在本地資料中心託管的 Linux 型公開 FTP 網站提供現有版本的下載。公司預期全球使用者將下載新版本。公司希望提供一個無論使用者所在地點均能改善下載效能並降低傳輸成本的解決方案。","options":{"A":"將遊戲檔案儲存在掛載於 Auto Scaling 群組中 Amazon EC2 執行個體上的 Amazon EBS 磁碟區上。在 EC2 執行個體上配置 FTP 服務。在 Auto Scaling 群組前方使用 Application Load Balancer。發布遊戲下載 URL 供使用者下載套件。","B":"將遊戲檔案儲存在附加到 Auto Scaling 群組中 Amazon EC2 執行個體的 Amazon EFS 磁碟區上。在每個 EC2 執行個體上配置 FTP 服務。在 Auto Scaling 群組前方使用 Application Load Balancer。發布遊戲下載 URL 供使用者下載套件。","C":"配置 Amazon Route 53 和 Amazon S3 儲存貯體用於網站託管。將遊戲檔案上傳到 S3 儲存貯體。對網站使用 Amazon CloudFront。發布遊戲下載 URL 供使用者下載套件。","D":"配置 Amazon Route 53 和 Amazon S3 儲存貯體用於網站託管。將遊戲檔案上傳到 S3 儲存貯體。為 S3 儲存貯體設定請求者付費。發布遊戲下載 URL 供使用者下載套件。"},"answer":"C"},{"num":437,"stem":"一家公司在雲端執行一個由資料庫和網站組成的應用程式。使用者可以在網站上發布資料，讓資料被處理，然後以電子郵件形式回傳給他們。資料儲存在 Amazon EC2 執行個體上執行的 MySQL 資料庫中。資料庫在有兩個私有子網路的 VPC 中執行。網站在不同 VPC 中的單一 EC2 執行個體上執行 Apache Tomcat，該 VPC 有一個公有子網路。資料庫和網站 VPC 之間只有一個 VPC 對等互連連線。\n上個月，網站因流量過高而多次發生中斷。\n解決方案架構師應採取哪些措施來提高應用程式的可靠性？(選擇三個)","options":{"A":"將 Tomcat 伺服器放入 Auto Scaling 群組中，在 Application Load Balancer 後方使用多個 EC2 執行個體。","B":"佈建額外的 VPC 對等互連連線。","C":"將 MySQL 資料庫遷移到具有一個 Aurora 複本的 Amazon Aurora。","D":"在資料庫 VPC 中佈建兩個 NAT 閘道。","E":"將 Tomcat 伺服器移到資料庫 VPC。 F. 在網站 VPC 中的不同可用區域建立一個額外的公有子網路。 C E"},"answer":"A"},{"num":438,"stem":"一家零售公司在 AWS 上運營其電子商務應用程式。該應用程式在 Application Load Balancer (ALB) 後方的 Amazon EC2 執行個體上執行。公司使用 Amazon RDS 資料庫執行個體作為資料庫後端。Amazon CloudFront 配置了一個指向 ALB 的來源。靜態內容已快取。Amazon Route 53 用於託管所有公有區域。\n應用程式更新後，ALB 偶爾會回傳 502 狀態碼（Bad Gateway）錯誤。根本原因是 ALB 收到格式不正確的 HTTP 標頭。當解決方案架構師在錯誤發生後立即重新載入網頁時，網頁能成功回傳。\n公司正在解決問題期間，解決方案架構師需要為訪客提供自訂錯誤頁面，而非標準 ALB 錯誤頁面。\n哪個步驟組合能以最少的操作負擔滿足此需求？(選擇兩個)","options":{"A":"建立一個 Amazon S3 儲存貯體。配置 S3 儲存貯體以託管靜態網頁。將自訂錯誤頁面上傳到 Amazon S3。","B":"建立一個 Amazon CloudWatch 警示，在 ALB 健康檢查回應 Target.FailedHealthChecks 大於 0 時呼叫 AWS Lambda 函數。配置 Lambda 函數修改 ALB 的轉發規則，使其指向可公開存取的 Web 伺服器。","C":"修改現有的 Amazon Route 53 記錄，新增健康檢查。如果健康檢查失敗，配置備援目標。修改 DNS 記錄指向可公開存取的網頁。","D":"建立一個 Amazon CloudWatch 警示，在 ALB 健康檢查回應 Elb.InternalError 大於 0 時呼叫 AWS Lambda 函數。配置 Lambda 函數修改 ALB 的轉發規則，使其指向可公開存取的 Web 伺服器。","E":"透過配置 CloudFront 自訂錯誤頁面新增自訂錯誤回應。修改 DNS 記錄指向可公開存取的網頁。"},"answer":"AE"},{"num":439,"stem":"一家公司希望將 Amazon Aurora MySQL 資料庫叢集從現有 AWS 帳戶遷移到同一 AWS 區域中的新 AWS 帳戶。兩個帳戶都是 AWS Organizations 中同一組織的成員。\n公司必須在對新資料庫執行 DNS 切換之前，將資料庫服務中斷降到最低。\n哪個遷移策略能滿足此需求？(選擇兩個)","options":{"A":"對現有 Aurora 資料庫建立快照。與新 AWS 帳戶共用快照。從快照在新帳戶中建立 Aurora 資料庫叢集。","B":"在新 AWS 帳戶中建立 Aurora 資料庫叢集。使用 AWS Database Migration Service (AWS DMS) 在兩個 Aurora 資料庫叢集之間遷移資料。","C":"使用 AWS Backup 將 Aurora 資料庫備份從現有 AWS 帳戶共用到新 AWS 帳戶。從快照在新 AWS 帳戶中建立 Aurora 資料庫叢集。","D":"在新 AWS 帳戶中建立 Aurora 資料庫叢集。使用 AWS Application Migration Service 在兩個 Aurora 資料庫叢集之間遷移資料。"},"answer":"AD"},{"num":440,"stem":"一家軟體即服務 (SaaS) 公司向客戶提供媒體軟體解決方案。該解決方案託管在各個 AWS 區域和 AWS 帳戶的 50 個 VPC 上。其中一個 VPC 被指定為管理 VPC。這些 VPC 中的運算資源獨立運作。\n公司開發了一項新功能，需要所有 50 個 VPC 能夠相互通訊。新功能還需要從每個客戶的 VPC 對公司管理 VPC 的單向存取。管理 VPC 託管一個用於驗證媒體軟體解決方案授權的運算資源。\n隨著解決方案的成長，公司用於託管解決方案的 VPC 數量將持續增加。\n哪個步驟組合能以最少的操作負擔提供所需的 VPC 連線能力？(選擇兩個)","options":{"A":"建立一個 Transit Gateway。將所有公司的 VPC 和相關子網路附加到 Transit Gateway。","B":"在所有公司的 VPC 之間建立 VPC 對等互連連線。","C":"建立指向授權驗證運算資源的 Network Load Balancer (NLB)。建立一個可供每個客戶 VPC 使用的 AWS PrivateLink 端點服務。將端點服務與 NLB 建立關聯。","D":"在每個客戶的 VPC 中建立 VPN 設備。使用 AWS Site-to-Site VPN 將公司的管理 VPC 連接到每個客戶的 VPC。","E":"在公司管理 VPC 和每個客戶 VPC 之間建立 VPC 對等互連連線。"},"answer":"AC"},{"num":441,"stem":"一家公司有多個業務線 (LOB)，均隸屬於母公司。公司要求其解決方案架構師開發滿足以下需求的解決方案：\n• 為所有 LOB 使用的 AWS 帳戶產生單一 AWS 帳單。\n• 每個 LOB 帳戶的費用應在帳單上分別列出。\n• 能夠依據公司的治理政策，限制 LOB 帳戶中的服務和功能。\n• 無論治理政策如何，每個 LOB 帳戶都應被授予完整的管理員權限。\n解決方案架構師應採取哪些步驟組合來滿足這些需求？(選擇兩個)","options":{"A":"使用 AWS Organizations 在母帳戶中為每個 LOB 建立一個組織。然後邀請每個 LOB 帳戶加入相應的組織。","B":"使用 AWS Organizations 在母帳戶中建立單一組織。然後邀請每個 LOB 的 AWS 帳戶加入該組織。","C":"實施服務配額，定義允許的服務和功能，並根據需要將配額套用到每個 LOB。","D":"建立一個 SCP，僅允許已核准的服務和功能，然後將政策套用到 LOB 帳戶。","E":"在母帳戶的帳單主控台中啟用合併帳單，並連結 LOB 帳戶。"},"answer":"BD"},{"num":442,"stem":"解決方案架構師部署了一個在自訂網域下為兩個 AWS 區域使用者提供服務的 Web 應用程式。該應用程式使用 Amazon Route 53 延遲型路由。解決方案架構師已為每個區域中不同可用區域的一對 Web 伺服器建立了加權記錄集關聯。\n解決方案架構師執行災難復原演練。當一個區域中的所有 Web 伺服器停止後，Route 53 不會自動將使用者重新導向到另一個區域。\n以下哪些是此問題的可能根本原因？(選擇兩個)","options":{"A":"Web 伺服器停止的區域的權重高於另一個區域的權重。","B":"次要區域中有一台 Web 伺服器未通過其 HTTP 健康檢查。","C":"延遲資源記錄集無法與加權資源記錄集結合使用。","D":"評估目標健康狀態的設定未在與 Web 伺服器停止之區域的網域關聯的延遲別名資源記錄集上開啟。","E":"未為與已停止的 Web 伺服器關聯的一個或多個加權資源記錄集設定 HTTP 健康檢查。"},"answer":"AE"},{"num":443,"stem":"一家洪水監測機構部署了超過 10,000 個水位監測感測器。感測器持續傳送資料更新，每次更新小於 1 MB。該機構擁有一批本地應用程式伺服器。這些伺服器從感測器接收更新，將原始資料轉換為人類可讀格式，並將結果寫入本地關聯式資料庫伺服器。資料分析師再使用簡單的 SQL 查詢來監控資料。\n機構希望提高整體應用程式可用性，並減少執行維護任務所需的工作。這些維護任務（包括應用程式伺服器的更新和修補程式）會造成停機時間。當應用程式伺服器停機時，感測器資料會遺失，因為剩餘伺服器無法處理整個工作負載。\n機構希望一個能最佳化操作負擔和成本的解決方案。解決方案架構師建議使用 AWS IoT Core 收集感測器資料。\n解決方案架構師還應建議什麼來滿足這些需求？","options":{"A":"將感測器資料傳送到 Amazon Kinesis Data Firehose。使用 AWS Lambda 函數讀取 Kinesis Data Firehose 資料，將其轉換為 .csv 格式，並插入到 Amazon Aurora MySQL 資料庫執行個體中。指示資料分析師直接從資料庫執行個體查詢資料。","B":"將感測器資料傳送到 Amazon Kinesis Data Firehose。使用 AWS Lambda 函數讀取 Kinesis Data Firehose 資料，將其轉換為 Apache Parquet 格式，並儲存到 Amazon S3 儲存貯體。指示資料分析師使用 Amazon Athena 查詢資料。","C":"將感測器資料傳送到 Amazon Managed Service for Apache Flink（前稱 Amazon Kinesis Data Analytics）應用程式，將資料轉換為 .csv 格式並儲存在 Amazon S3 儲存貯體中。將資料匯入 Amazon Aurora MySQL 資料庫執行個體。指示資料分析師直接從資料庫執行個體查詢資料。","D":"將感測器資料傳送到 Amazon Managed Service for Apache Flink（前稱 Amazon Kinesis Data Analytics）應用程式，將資料轉換為 Apache Parquet 格式並儲存在 Amazon S3 儲存貯體中。指示資料分析師使用 Amazon Athena 查詢資料。"},"answer":"D"},{"num":444,"stem":"一個公開零售 Web 應用程式在區域中跨多個可用區域 (AZ) 執行的 Amazon EC2 執行個體前方使用 Application Load Balancer (ALB)，後端為 Amazon RDS MySQL 多可用區域部署。目標群組健康檢查配置為使用 HTTP，並指向產品目錄頁面。Auto Scaling 配置為根據 ALB 健康檢查維護 Web 機群規模。\n最近，應用程式發生中斷。中斷期間，Auto Scaling 持續替換執行個體。後續調查確定 Web 伺服器指標在正常範圍內，但資料庫層正承受高負載，導致查詢回應時間嚴重延遲。\n以下哪些變更組合能修復這些問題，同時改善對整個應用程式堆疊可用性和功能性的監控能力，以應對未來的成長？(選擇兩個)","options":{"A":"為 Amazon RDS MySQL 配置讀取複本，並在 Web 應用程式中使用單一讀取器端點，以減少後端資料庫層的負載。","B":"配置目標群組健康檢查，使其指向簡單的 HTML 頁面而非產品目錄頁面，並配置 Amazon Route 53 健康檢查指向產品頁面以評估完整應用程式功能。配置 Amazon CloudWatch 警示，在網站失敗時通知管理員。","C":"配置目標群組健康檢查，使用 TCP 檢查 Amazon EC2 Web 伺服器，並配置 Amazon Route 53 健康檢查指向產品頁面以評估完整應用程式功能。配置 Amazon CloudWatch 警示，在網站失敗時通知管理員。","D":"為 Amazon RDS 配置 Amazon CloudWatch 警示，並設定動作以復原資料庫層中負載過高、效能受損的 RDS 執行個體。","E":"配置 Amazon ElastiCache 叢集，並將其置於 Web 應用程式和 RDS MySQL 執行個體之間，以減少後端資料庫層的負載。"},"answer":"AB"},{"num":445,"stem":"一家公司有一個本地資料中心，並使用 Kubernetes 在 AWS 上開發新解決方案。公司使用 Amazon Elastic Kubernetes Service (Amazon EKS) 叢集作為其開發和測試環境。\n生產工作負載的 EKS 控制平面和資料平面必須駐留在本地環境。公司需要一個由 AWS 管理的 Kubernetes 管理解決方案。\n哪個解決方案能以最少的操作負擔滿足這些需求？","options":{"A":"在本地資料中心安裝 AWS Outposts 伺服器。使用 Outposts 伺服器上的本地叢集配置，為生產工作負載部署 Amazon EKS。","B":"在公司本地資料中心的硬體上安裝 Amazon EKS Anywhere。在 EKS Anywhere 叢集上部署生產工作負載。","C":"在本地資料中心安裝 AWS Outposts 伺服器。使用 Outposts 伺服器上的擴充叢集配置，為生產工作負載部署 Amazon EKS。","D":"在本地資料中心安裝 AWS Outposts 伺服器。在 Outposts 伺服器上安裝 Amazon EKS Anywhere。在 EKS Anywhere 叢集上部署生產工作負載。"},"answer":"B"},{"num":446,"stem":"一家公司使用 AWS Organizations 管理其開發環境。公司每個開發團隊都有自己的 AWS 帳戶。每個帳戶都有一個 VPC，且 CIDR 區塊不重疊。\n公司在共用服務帳戶中有一個 Amazon Aurora 資料庫叢集。所有開發團隊都需要使用資料庫叢集中的即時資料。\n哪個解決方案能以最少的操作負擔提供對資料庫叢集的所需連線能力？","options":{"A":"為資料庫叢集建立 AWS Resource Access Manager (AWS RAM) 資源共用。與所有開發帳戶共用資料庫叢集。","B":"在共用服務帳戶中建立 Transit Gateway。為 Transit Gateway 建立 AWS Resource Access Manager (AWS RAM) 資源共用。與所有開發帳戶共用 Transit Gateway。指示開發人員接受資源共用。配置網路。","C":"建立指向資料庫叢集 IP 位址的 Application Load Balancer (ALB)。建立使用 ALB 的 AWS PrivateLink 端點服務。新增允許每個開發帳戶連接到端點服務的權限。","D":"在共用服務帳戶中建立 AWS Site-to-Site VPN 連線。配置網路。在每個開發帳戶中使用 AWS Marketplace VPN 軟體連接到 Site-to-Site VPN 連線。"},"answer":"A"},{"num":447,"stem":"一家公司使用 AWS CloudFormation 在其 AWS 成員帳戶中建立所有新基礎架構。這些資源很少變更，且針對預期負載進行了適當規模調整。每月 AWS 帳單是固定的。\n偶爾，開發人員會為了測試建立新資源，並在測試完成後忘記移除資源。大多數測試持續幾天，之後就不再需要這些資源了。\n公司希望自動化尋找未使用資源的流程。解決方案架構師需要設計一個解決方案，判斷 AWS 帳單中的成本是否在增加。解決方案必須協助識別導致成本增加的資源，並自動通知公司的營運團隊。\n哪個解決方案能滿足這些需求？","options":{"A":"開啟帳單警示。使用 AWS Cost Explorer 確定上個月的費用。為估計總費用建立 Amazon CloudWatch 警示。指定高於 Cost Explorer 確定之費用的成本閾值。新增通知，在超過警示閾值時警示營運團隊。","B":"開啟帳單警示。使用 AWS Cost Explorer 確定過去 3 個月的平均每月費用。為估計總費用建立 Amazon CloudWatch 警示。指定高於 Cost Explorer 確定之費用的成本閾值。新增通知，在超過警示閾值時警示營運團隊。","C":"使用 AWS Cost Anomaly Detection 建立具有連結帳戶監控器類型的成本監控器。建立訂閱，每日傳送 AWS 費用摘要給營運團隊。指定成本差異的閾值。","D":"使用 AWS Cost Anomaly Detection 建立具有 AWS 服務監控器類型的成本監控器。建立訂閱，每日傳送 AWS 費用摘要給營運團隊。指定成本差異的閾值。"},"answer":"A"},{"num":448,"stem":"一家公司正在部署新的 Web 應用程式，並需要 Linux 應用程式伺服器的儲存解決方案。公司希望為所有執行個體的應用程式資料更新建立單一位置。作用中的資料集最大為 100 GB。解決方案架構師確定尖峰操作每天將持續 3 小時，且將需要總計 225 MiBps 的讀取吞吐量。\n解決方案架構師必須設計一個多可用區域解決方案，讓資料的副本可在另一個 AWS 區域中用於災難復原 (DR)。DR 副本的 RPO 少於 1 小時。\n哪個解決方案能滿足這些需求？","options":{"A":"部署新的 Amazon Elastic File System (Amazon EFS) 多可用區域檔案系統。為檔案系統配置 75 MiBps 的佈建吞吐量。實施複寫到 DR 區域中的檔案系統。","B":"部署新的 Amazon FSx for Lustre 檔案系統。為檔案系統配置 Bursting Throughput 模式。使用 AWS Backup 將檔案系統備份到 DR 區域。","C":"部署具有 225 MiBps 吞吐量的一般用途 SSD (gp3) Amazon Elastic Block Store (Amazon EBS) 磁碟區。為 EBS 磁碟區啟用多重附加。使用 AWS Elastic Disaster Recovery 將 EBS 磁碟區複寫到 DR 區域。","D":"在生產區域和 DR 區域中都部署 Amazon FSx for OpenZFS 檔案系統。建立 AWS DataSync 排程任務，每 10 分鐘將資料從生產檔案系統複寫到 DR 檔案系統。"},"answer":"B"},{"num":449,"stem":"一家公司需要從一個沒有網際網路連線的偏遠地點收集實驗資料。在實驗期間，連接到本地網路的感測器將在 1 週內以專有格式產生 6 TB 的資料。感測器可以配置為定期將其資料檔案上傳到 FTP 伺服器，但感測器本身沒有 FTP 伺服器。感測器也不支援其他協定。公司需要集中收集資料，並在實驗結束後盡快將資料移動到 AWS 雲端的物件儲存。\n哪個解決方案能滿足這些需求？","options":{"A":"訂購一台 AWS Snowball Edge Compute Optimized 裝置。將裝置連接到本地網路。使用目標儲存貯體名稱配置 AWS DataSync，並透過 NFS 將資料卸載到裝置。實驗結束後，將裝置退回 AWS，以便將資料載入 Amazon S3。","B":"訂購一台 AWS Snowcone 裝置，包含 Amazon Linux 2 AMI。將裝置連接到本地網路。在裝置上啟動 Amazon EC2 執行個體。建立一個 Shell 腳本，定期從每個感測器下載資料。實驗結束後，將裝置退回 AWS，以便將資料載入為 Amazon Elastic Block Store (Amazon EBS) 磁碟區。","C":"訂購一台 AWS Snowcone 裝置，包含 Amazon Linux 2 AMI。將裝置連接到本地網路。在裝置上啟動 Amazon EC2 執行個體。在 EC2 執行個體上安裝並配置 FTP 伺服器。配置感測器將資料上傳到 EC2 執行個體。實驗結束後，將裝置退回 AWS，以便將資料載入 Amazon S3。","D":"訂購一台 AWS Snowcone 裝置。將裝置連接到本地網路。配置裝置使用 Amazon FSx。配置感測器將資料上傳到裝置。在裝置上配置 AWS DataSync，將上傳的資料與 Amazon S3 儲存貯體同步。將裝置退回 AWS，以便將資料載入為 Amazon Elastic Block Store (Amazon EBS) 磁碟區。"},"answer":"C"},{"num":450,"stem":"一家擁有多個業務單位的公司正在使用啟用所有功能的 AWS Organizations。公司已實施帳戶結構，每個業務單位都有自己的 AWS 帳戶。每個 AWS 帳戶中的管理員需要使用 Amazon Athena 查看其帳戶的詳細成本和使用率資料。\n每個業務單位只能存取自己的成本和使用率資料。管理設定 AWS Cost and Usage Reports 能力的 IAM 政策已到位。包含組織所有資料的集中式 Cost and Usage Report 已可在 Amazon S3 儲存貯體中取得。\n哪個解決方案能以最少的操作複雜度滿足這些需求？","options":{"A":"在組織的管理帳戶中，使用 AWS Resource Access Manager (AWS RAM) 將 Cost and Usage Report 資料與每個成員帳戶共用。","B":"在組織的管理帳戶中，配置 S3 事件，每次新檔案到達包含集中式 Cost and Usage Report 的 S3 儲存貯體時呼叫 AWS Lambda 函數。配置 Lambda 函數提取每個成員帳戶的資料，並將資料放置在 Amazon S3 的個別前綴下。修改 S3 儲存貯體政策，允許每個成員帳戶存取自己的前綴。","C":"在每個成員帳戶中，存取 AWS Cost Explorer。建立一個包含帳戶相關費用資訊的新報告。將報告儲存在 Cost Explorer 中。提供帳戶管理員可用來存取已儲存報告的指示。","D":"在每個成員帳戶中，建立一個新的 S3 儲存貯體以儲存 Cost and Usage Report 資料。設定 Cost and Usage Report 將資料傳送到新的 S3 儲存貯體。"},"answer":"A"},{"num":451,"stem":"一家公司正在為製造應用程式設計 AWS 環境。該應用程式已成功吸引客戶，且使用者數量持續增加。公司透過 1 Gbps 的 AWS Direct Connect 連線將 AWS 環境連接到公司的本地資料中心，並已為該連線配置了 BGP。\n\n公司必須更新現有的網路連線解決方案，以確保解決方案具有高可用性、容錯能力和安全性。\n\n哪個解決方案能以最具成本效益的方式滿足這些要求？","options":{"A":"新增一條動態私有 IP 的 AWS Site-to-Site VPN 作為次要路徑，以保護傳輸中的資料安全，並為 Direct Connect 連線提供彈性。配置 MACsec 以加密 Direct Connect 連線內的 traffic。","B":"在公司的本地資料中心和 AWS 之間佈建另一條 Direct Connect 連線，以提高傳輸速度並提供彈性。配置 MACsec 以加密 Direct Connect 連線內的 traffic。","C":"配置多個私有 VIF。在本地資料中心和 AWS 之間跨 VIF 進行負載平衡以提供彈性。","D":"新增一條靜態 AWS Site-to-Site VPN 作為次要路徑，以保護傳輸中的資料安全並為 Direct Connect 連線提供彈性。"},"answer":"D"},{"num":452,"stem":"一家公司需要將應用程式現代化並遷移到 AWS。該應用程式將使用者個人資料資料以文字形式儲存在本地 MySQL 資料庫的單一資料表中。\n\n現代化之後，使用者將使用該應用程式上傳最大 4 GB 的影片檔案。其他使用者必須能夠從應用程式下載影片檔案。公司需要能快速擴展的影片儲存解決方案，且該解決方案不得影響應用程式效能。\n\n哪個解決方案能滿足這些要求？","options":{"A":"使用 AWS Database Migration Service (AWS DMS) 將資料庫遷移到 Amazon Aurora PostgreSQL。將影片以 base64 編碼字串的形式儲存在資料庫的 TEXT 欄位中。","B":"使用 AWS Database Migration Service (AWS DMS) 搭配 AWS Schema Conversion Tool (AWS SCT) 將資料庫遷移到 Amazon DynamoDB。將影片以物件形式儲存在 Amazon S3 中。將 S3 金鑰儲存在對應的 DynamoDB 項目中。","C":"使用 AWS Database Migration Service (AWS DMS) 搭配 AWS Schema Conversion Tool (AWS SCT) 將資料庫遷移到 Amazon Keyspaces（Apache Cassandra 版）。將影片以物件形式儲存在 Amazon S3 中。將 S3 物件識別碼儲存在對應的 Amazon Keyspaces 項目中。","D":"使用 AWS Database Migration Service (AWS DMS) 搭配 AWS Schema Conversion Tool (AWS SCT) 將資料庫遷移到 Amazon DynamoDB。將影片以 base64 編碼字串的形式儲存在對應的 DynamoDB 項目中。"},"answer":"B"},{"num":453,"stem":"一家公司在 Amazon Elastic File System (Amazon EFS) 檔案系統中儲存和管理文件。該檔案系統使用 AWS Key Management Service (AWS KMS) 金鑰加密。檔案系統掛載到執行專有軟體的 Amazon EC2 執行個體。\n\n公司已為檔案系統啟用自動備份。自動備份使用 AWS Backup 預設備份計劃。\n\n解決方案架構師必須確保已刪除的文件可在 RPO 100 分鐘內恢復。\n\n哪個解決方案能滿足這些要求？","options":{"A":"建立新的 IAM 角色。建立新的備份計劃。使用新的 IAM 角色建立備份。更新 KMS 金鑰政策以允許新的 IAM 角色使用該金鑰。為檔案系統實作每小時備份排程。","B":"建立新的備份計劃。更新 KMS 金鑰政策以允許 AWSServiceRoleForBackup IAM 角色使用該金鑰。實作自訂 cron 表達式，每 30 分鐘對檔案系統執行一次備份。","C":"建立新的 IAM 角色。使用現有的備份計劃。更新 KMS 金鑰政策以允許新的 IAM 角色使用該金鑰。啟用連續備份以進行時間點恢復。","D":"使用現有的備份計劃。更新 KMS 金鑰政策以允許 AWSServiceRoleForBackup IAM 角色使用該金鑰。為檔案系統啟用跨區域複寫。"},"answer":"B"},{"num":454,"stem":"解決方案架構師必須為雲端工程師團隊提供一種安全的方式，使其能夠使用 AWS CLI 將物件上傳到 Amazon S3 儲存桶。每位雲端工程師都有 IAM 使用者、IAM 存取金鑰和虛擬多重驗證 (MFA) 裝置。雲端工程師的 IAM 使用者屬於名為 S3-access 的群組。雲端工程師必須使用 MFA 才能在 Amazon S3 中執行任何操作。\n\n哪個解決方案能滿足這些要求？","options":{"A":"在 S3 儲存桶附加政策，當 IAM 使用者對 S3 儲存桶執行操作時提示輸入 MFA 代碼。使用 IAM 存取金鑰搭配 AWS CLI 呼叫 Amazon S3。","B":"更新 S3-access 群組的信任政策，要求主體在承擔群組時使用 MFA。使用 IAM 存取金鑰搭配 AWS CLI 呼叫 Amazon S3。","C":"在 S3-access 群組附加政策，在沒有 MFA 的情況下拒絕所有 S3 操作。使用 IAM 存取金鑰搭配 AWS CLI 呼叫 Amazon S3。","D":"在 S3-access 群組附加政策，在沒有 MFA 的情況下拒絕所有 S3 操作。從 AWS Security Token Service (AWS STS) 請求臨時憑證。將臨時憑證附加到 Amazon S3 在使用者執行操作時參照的設定檔。"},"answer":"D"},{"num":455,"stem":"一家公司需要將 60 個本地舊有應用程式遷移到 AWS。這些應用程式基於 .NET Framework 並在 Windows 上執行。\n\n公司需要一個能最小化遷移時間且不需要變更應用程式程式碼的解決方案。公司也不想管理基礎設施。\n\n哪個解決方案能滿足這些要求？","options":{"A":"重構應用程式，並使用 AWS Toolkit for .NET Refactoring 將其容器化。使用 Amazon Elastic Container Service (Amazon ECS) 搭配 Fargate 啟動類型來託管容器化應用程式。","B":"使用 Windows Web Application Migration Assistant 將應用程式遷移到 AWS Elastic Beanstalk。使用 Elastic Beanstalk 部署和管理應用程式。","C":"使用 Windows Web Application Migration Assistant 將應用程式遷移到 Amazon EC2 執行個體。使用 EC2 執行個體部署和管理應用程式。","D":"重構應用程式，並使用 AWS Toolkit for .NET Refactoring 將其容器化。使用 Amazon Elastic Kubernetes Service (Amazon EKS) 搭配 Fargate 啟動類型來託管容器化應用程式。"},"answer":"B"},{"num":456,"stem":"一家公司需要對儲存在 Amazon S3 儲存桶中的資料執行大型批次處理工作。這些工作執行模擬計算。工作結果對時間不敏感，且流程可以承受中斷。\n\n每個工作在資料儲存於 S3 儲存桶時必須處理 15-20 GB 的資料。公司將把工作輸出儲存到另一個 Amazon S3 儲存桶以供進一步分析。\n\n哪個解決方案能以最具成本效益的方式滿足這些要求？","options":{"A":"建立無伺服器資料管道。使用 AWS Step Functions 進行協調。使用具有佈建容量的 AWS Lambda 函數處理資料。","B":"建立包含 Amazon EC2 Spot Instances 的 AWS Batch 運算環境。指定 SPOT_CAPACITY_OPTIMIZED 分配策略。","C":"建立包含 Amazon EC2 On-Demand Instances 和 Spot Instances 的 AWS Batch 運算環境。為 Spot Instances 指定 SPOT_CAPACITY_OPTIMIZED 分配策略。","D":"使用 Amazon Elastic Kubernetes Service (Amazon EKS) 執行處理工作。使用包含 Amazon EC2 On-Demand Instances 和 Spot Instances 組合的受管節點群組。"},"answer":"B"},{"num":457,"stem":"一家公司在本地對影像資料進行分析和儲存。應用程式每天接收數百萬個新影像檔案，平均每個檔案大小為 1 MB。這些檔案以 1 GB 為一批進行分析。當應用程式分析一個批次時，會將影像壓縮在一起，然後將其歸檔為本地 NFS 伺服器上的單一檔案以供長期儲存。\n\n公司在本地擁有 Microsoft Hyper-V 環境，並有可用的運算容量。公司沒有儲存容量，希望在 AWS 上歸檔影像。公司需要能夠在請求後 1 週內取回已歸檔的資料。\n\n公司在本地資料中心和 AWS 之間有 10 Gbps 的 AWS Direct Connect 連線。公司需要設定頻寬限制，並排程在非上班時間將已歸檔的影像複製到 AWS。\n\n哪個解決方案能以最具成本效益的方式滿足這些要求？","options":{"A":"在新的 GPU 型 Amazon EC2 執行個體上部署 AWS DataSync 代理程式。配置 DataSync 代理程式將批次檔案從本地 NFS 伺服器複製到 Amazon S3 Glacier Instant Retrieval。成功複製後，從本地儲存空間刪除資料。","B":"在本地將 AWS DataSync 代理程式部署為 Hyper-V VM。配置 DataSync 代理程式將批次檔案從本地 NFS 伺服器複製到 Amazon S3 Glacier Deep Archive。成功複製後，從本地儲存空間刪除資料。","C":"在新的通用型 Amazon EC2 執行個體上部署 AWS DataSync 代理程式。配置 DataSync 代理程式將批次檔案從本地 NFS 伺服器複製到 Amazon S3 Standard。成功複製後，從本地儲存空間刪除資料。建立 S3 生命週期規則，在 1 天後將物件從 S3 Standard 轉換到 S3 Glacier Deep Archive。","D":"在 Hyper-V 環境中本地部署 AWS Storage Gateway Tape Gateway。將 Tape Gateway 連接到 AWS。使用自動磁帶建立。指定 Amazon S3 Glacier Deep Archive 集區。在影像批次複製完成後退出磁帶。"},"answer":"C"},{"num":458,"stem":"一家公司希望從其應用程式記錄關鍵效能指標 (KPI)，作為轉換為基於使用者授權模式策略的一部分。該應用程式是多層架構的應用程式，具有基於 Web 的 UI。公司使用 CloudWatch 代理程式將所有日誌檔案儲存到 Amazon CloudWatch。所有應用程式登入都儲存在日誌檔案中。\n\n作為新授權模式的一部分，公司需要了解每個客戶每天、每週和每月有多少不重複使用者。\n\n哪個解決方案能以最少的應用程式變更提供此資訊？","options":{"A":"配置 Amazon CloudWatch Logs 指標篩選器，將每次成功登入儲存為指標。將使用者名稱和客戶名稱配置為指標的維度。","B":"變更應用程式邏輯，讓每次成功登入呼叫 AWS SDK，以在 CloudWatch 中遞增記錄使用者名稱和客戶名稱維度的自訂指標。","C":"配置 CloudWatch 代理程式從日誌中提取成功登入指標。此外，配置 CloudWatch 代理程式將成功登入指標儲存為以使用者名稱和客戶名稱作為維度的自訂指標。","D":"配置 AWS Lambda 函數以使用應用程式日誌的 Amazon CloudWatch Logs 串流。此外，配置 Lambda 函數在 CloudWatch 中遞增以使用者名稱和客戶名稱作為維度的自訂指標。"},"answer":"A"},{"num":459,"stem":"一家公司正在使用 GitHub Actions 執行 CI/CD 管道，該管道需要存取 AWS 上的資源。公司有一個 IAM 使用者，在管道中使用秘密金鑰向 AWS 進行驗證。現有的 IAM 角色附有授予部署資源所需權限的政策。\n\n公司的安全團隊實施了新要求，即管道不能再使用長期秘密金鑰。解決方案架構師必須用短期解決方案替換秘密金鑰。\n\n哪個解決方案能以最少的營運開銷滿足這些要求？","options":{"A":"在 AWS Identity and Access Management (IAM) 中建立 IAM SAML 2.0 身分提供者 (IdP)。使用允許 sts:AssumeRole API 呼叫的適當信任政策建立新的 IAM 角色。將現有的 IAM 政策附加到新的 IAM 角色。更新 GitHub 以在管道中使用 SAML 驗證。","B":"在 AWS Identity and Access Management (IAM) 中建立 IAM OpenID Connect (OIDC) 身分提供者 (IdP)。使用允許來自 GitHub OIDC IdP 的 sts:AssumeRoleWithWebIdentity API 呼叫的適當信任政策建立新的 IAM 角色。更新 GitHub 以在管道中承擔該角色。","C":"建立 Amazon Cognito 身分集區。配置驗證提供者使用 GitHub。使用允許來自 GitHub 驗證提供者的 sts:AssumeRoleWithWebIdentity API 呼叫的適當信任政策建立新的 IAM 角色。配置管道使用 Cognito 作為其驗證提供者。","D":"為 AWS Private Certificate Authority 建立信任錨點。產生客戶端 certificate 以搭配 AWS IAM Roles Anywhere 使用。使用允許 sts:AssumeRole API 呼叫的適當信任政策建立新的 IAM 角色。將現有的 IAM 政策附加到新的 IAM 角色。配置管道使用憑證輔助工具，並參照客戶端 certificate 公開金鑰來承擔新的 IAM 角色。"},"answer":"B"},{"num":460,"stem":"一家公司正在對目標 URL 清單執行網路爬蟲程序，以取得機器學習訓練演算法的訓練文件。一個由 Amazon EC2 t2.micro 執行個體組成的 fleet 從 Amazon Simple Queue Service (Amazon SQS) 佇列中提取目標 URL，然後將爬蟲演算法的結果以 .csv 檔案形式寫入掛載在 fleet 所有執行個體上的 Amazon Elastic File System (Amazon EFS) 磁碟區。\n\n獨立系統以不規律的頻率將 URL 新增到 SQS 佇列中。執行個體在 10 秒或更短時間內爬取每個 URL。\n\n指標顯示當 SQS 佇列中沒有 URL 時，部分執行個體處於閒置狀態。解決方案架構師需要重新設計架構以最佳化成本。\n\n哪種步驟組合能以最具成本效益的方式滿足這些要求？（選擇兩個）","options":{"A":"使用 m5.8xlarge 執行個體取代 t2.micro 執行個體進行網路爬蟲程序。將 fleet 中的執行個體數量減少 50%。","B":"將網路爬蟲程序轉換為 AWS Lambda 函數。配置 Lambda 函數從 SQS 佇列中提取 URL。","C":"修改網路爬蟲程序，將結果儲存在 Amazon Neptune 中。","D":"修改網路爬蟲程序，將結果儲存在 Amazon Aurora Serverless MySQL 執行個體中。","E":"修改網路爬蟲程序，將結果儲存在 Amazon S3 中。"},"answer":"BE"},{"num":461,"stem":"一家公司需要將其網站從本地資料中心遷移到 AWS。該網站由負載平衡器、在 Linux 作業系統上執行的內容管理系統 (CMS) 和 MySQL 資料庫組成。\n\nCMS 需要持久的 NFS 相容儲存空間作為檔案系統。AWS 上的新解決方案必須能夠從 2 個 Amazon EC2 執行個體擴展到 30 個 EC2 執行個體，以回應不可預測的 traffic 增加。新解決方案還必須不需要對網站進行任何變更，並且必須防止資料遺失。\n\n哪個解決方案能滿足這些要求？","options":{"A":"建立 Amazon Elastic File System (Amazon EFS) 檔案系統。使用 Application Load Balancer 和 Auto Scaling 群組將 CMS 部署到 AWS Elastic Beanstalk。使用 .ebextensions 將 EFS 檔案系統掛載到 EC2 執行個體。建立獨立於 Elastic Beanstalk 環境的 Amazon Aurora MySQL 資料庫。","B":"建立 Amazon Elastic Block Store (Amazon EBS) Multi-Attach 磁碟區。使用 Network Load Balancer 和 Auto Scaling 群組將 CMS 部署到 AWS Elastic Beanstalk。使用 .ebextensions 將 EBS 磁碟區掛載到 EC2 執行個體。在 Elastic Beanstalk 環境中建立 Amazon RDS for MySQL 資料庫。","C":"建立 Amazon Elastic File System (Amazon EFS) 檔案系統。建立啟動範本和 Auto Scaling 群組以啟動 EC2 執行個體來支援 CMS。建立 Network Load Balancer 以分配 traffic。建立 Amazon Aurora MySQL 資料庫。使用 EC2 Auto Scaling 縮減生命週期掛勾將 EFS 檔案系統掛載到 EC2 執行個體。","D":"建立 Amazon Elastic Block Store (Amazon EBS) Multi-Attach 磁碟區。建立啟動範本和 Auto Scaling 群組以啟動 EC2 執行個體來支援 CMS。建立 Application Load Balancer 以分配 traffic。建立 Amazon ElastiCache for Redis 叢集以支援 MySQL 資料庫。使用 EC2 使用者資料將 EBS 磁碟區附加到 EC2 執行個體。"},"answer":"C"},{"num":462,"stem":"一家公司需要為在單一 AWS 區域中執行的關鍵應用程式實作災難復原。應用程式的使用者透過 Application Load Balancer (ALB) 後方的 Amazon EC2 執行個體託管的 Web 前端進行互動。應用程式寫入 Amazon RDS for MySQL DB 執行個體。應用程式還會輸出儲存在 Amazon S3 儲存桶中的已處理文件。\n\n公司的財務團隊直接查詢資料庫以執行報告。在繁忙時段，這些查詢會消耗資源並對應用程式效能產生負面影響。\n\n解決方案架構師必須設計一個在災難期間提供彈性的解決方案。該解決方案必須最小化資料遺失，並解決財務團隊查詢所導致的效能問題。\n\n哪個解決方案能滿足這些要求？","options":{"A":"將資料庫遷移到 Amazon DynamoDB 並使用 DynamoDB 全域資料表。指示財務團隊查詢另一個區域中的全域資料表。建立 AWS Lambda 函數以定期將原始 S3 儲存桶的內容同步到另一個區域中的新 S3 儲存桶。在另一個區域中啟動 EC2 執行個體並建立 ALB。配置應用程式指向新的 S3 儲存桶。","B":"在另一個區域中啟動託管應用程式的額外 EC2 執行個體。將額外的執行個體新增到現有的 ALB。在另一個區域中建立 RDS DB 執行個體的唯讀複本。指示財務團隊對唯讀複本執行查詢。使用 S3 跨區域複寫 (CRR) 將原始 S3 儲存桶複寫到另一個區域中的新 S3 儲存桶。發生災難時，將唯讀複本提升為獨立 DB 執行個體。配置應用程式指向新的 S3 儲存桶和新提升的唯讀複本。","C":"在另一個區域中建立 RDS DB 執行個體的唯讀複本。指示財務團隊對唯讀複本執行查詢。建立託管應用程式前端的 EC2 執行個體 AMI。將 AMI 複製到另一個區域。使用 S3 跨區域複寫 (CRR) 將原始 S3 儲存桶複寫到另一個區域中的新 S3 儲存桶。發生災難時，將唯讀複本提升為獨立 DB 執行個體。從 AMI 啟動 EC2 執行個體並建立 ALB 向終端使用者呈現應用程式。配置應用程式指向新的 S3 儲存桶。","D":"建立 RDS DB 執行個體的每小時快照。將快照複製到另一個區域。在現有 RDS 資料庫前方新增 Amazon ElastiCache 叢集。建立託管應用程式前端的 EC2 執行個體 AMI。將 AMI 複製到另一個區域。使用 S3 跨區域複寫 (CRR) 將原始 S3 儲存桶複寫到另一個區域中的新 S3 儲存桶。發生災難時，從最新的 RDS 快照還原資料庫。從 AMI 啟動 EC2 執行個體並建立 ALB 向終端使用者呈現應用程式。配置應用程式指向新的 S3 儲存桶。"},"answer":"B"},{"num":463,"stem":"一家公司在其本地資料中心中執行許多服務。資料中心透過 AWS Direct Connect (DX) 和 IPSec VPN 連接到 AWS。服務資料屬於敏感資料，連線不能穿越網際網路。公司希望拓展到新的市場區隔，開始向使用 AWS 的其他公司提供其服務。\n\n哪個解決方案能滿足這些要求？","options":{"A":"建立接受 TCP traffic 的 VPC Endpoint Service，將其託管在 Network Load Balancer 後方，並透過 DX 提供該服務。","B":"建立接受 HTTP 或 HTTPS traffic 的 VPC Endpoint Service，將其託管在 Application Load Balancer 後方，並透過 DX 提供該服務。","C":"將網際網路閘道附加到 VPC，並確保網路存取控制和安全群組規則允許相關的輸入和輸出 traffic。","D":"將 NAT 閘道附加到 VPC，並確保網路存取控制和安全群組規則允許相關的輸入和輸出 traffic。"},"answer":"A"},{"num":464,"stem":"一家公司使用 AWS Organizations 管理其 AWS 帳戶。解決方案架構師必須設計一個解決方案，僅允許管理員角色使用 IAM 操作。但是，解決方案架構師無法存取公司中的所有 AWS 帳戶。\n\n哪個解決方案能以最少的營運開銷滿足這些要求？","options":{"A":"建立適用於所有 AWS 帳戶的 SCP，僅允許管理員角色使用 IAM 操作。將 SCP 套用到根 OU。","B":"配置 AWS CloudTrail 以對每個與 IAM 操作相關的事件呼叫 AWS Lambda 函數。配置函數在呼叫操作的使用者不是管理員時拒絕該操作。","C":"建立適用於所有 AWS 帳戶的 SCP，拒絕除管理員角色以外的所有使用者執行 IAM 操作。將 SCP 套用到根 OU。","D":"設定允許 IAM 操作的 IAM 許可邊界。將許可邊界附加到所有 AWS 帳戶中的每個管理員角色。"},"answer":"D"},{"num":465,"stem":"一家公司使用 AWS Organizations 中的組織管理多個 AWS 帳戶。公司在共用服務帳戶的 VPC 中託管一些應用程式。\n\n公司已將 Transit Gateway 附加到共用服務帳戶的 VPC。\n\n公司正在開發新功能，並建立了需要存取共用服務帳戶中應用程式的開發環境。公司打算在開發帳戶中頻繁刪除和重新建立資源。公司也希望讓開發團隊能夠根據需要重新建立與共用服務帳戶的連線。\n\n哪個解決方案能滿足這些要求？","options":{"A":"在開發帳戶中建立 Transit Gateway。向共用服務帳戶建立 Transit Gateway 對等互連請求。配置共用服務 Transit Gateway 自動接受對等互連連線。","B":"為共用服務帳戶中的 Transit Gateway 開啟自動接受功能。使用 AWS Resource Access Manager (AWS RAM) 與開發帳戶共用共用服務帳戶中的 Transit Gateway 資源。在開發帳戶中接受該資源。在開發帳戶中建立 Transit Gateway 附件。","C":"為共用服務帳戶中的 Transit Gateway 開啟自動接受功能。建立 VPC 端點。使用端點政策在 VPC 端點上授予開發帳戶的權限。配置端點服務自動接受連線請求。將端點詳細資訊提供給開發團隊。","D":"建立 Amazon EventBridge 規則以呼叫 AWS Lambda 函數，當開發帳戶發出附件請求時接受 Transit Gateway 附件。使用 AWS Network Manager 與開發帳戶共用共用服務帳戶中的 Transit Gateway。在開發帳戶中接受 Transit Gateway。"},"answer":"B"},{"num":466,"stem":"一家公司計劃將本地資料中心遷移到 AWS Cloud。公司計劃使用在 AWS Organizations 組織中管理的多個 AWS 帳戶。公司最初將建立少量帳戶，並根據需要新增帳戶。解決方案架構師必須設計一個解決方案，為所有 AWS 帳戶開啟 AWS CloudTrail。\n\nSimple Network Management Protocol (SNMP) 已在資料中心的每個 VM 上啟用。公司無法在資料中心新增更多 VM，也無法在 VM 上安裝額外的軟體。探索資料必須自動匯入到 AWS Migration Hub。\n\n哪個解決方案能滿足這些要求？","options":{"A":"使用 AWS Application Migration Service 無代理程式服務和 AWS Migration Hub Strategy Recommendations 產生 TCO 報告。","B":"啟動 Windows Amazon EC2 執行個體。在 EC2 執行個體上安裝 Migration Evaluator 無代理程式收集器。配置 Migration Evaluator 產生 TCO 報告。","C":"啟動 Windows Amazon EC2 執行個體。在 EC2 執行個體上安裝 Migration Evaluator 無代理程式收集器。配置 Migration Hub 產生 TCO 報告。","D":"在 VPC 內使用 AWS Migration Readiness Assessment 工具。配置 Migration Evaluator 產生 TCO 報告。"},"answer":"A"},{"num":467,"stem":"一家正在開發行動遊戲的公司在兩個 AWS 區域提供遊戲資產。遊戲資產從每個區域中 Application Load Balancer (ALB) 後方的一組 Amazon EC2 執行個體提供。公司要求從最近的區域取得遊戲資產。如果最近的區域中的遊戲資產不可用，則應從另一個區域取得。\n\n解決方案架構師應該怎麼做才能滿足這些要求？","options":{"A":"建立 Amazon CloudFront 分發。建立包含每個 ALB 一個來源的來源群組。將其中一個來源設定為主要來源。","B":"為每個 ALB 建立 Amazon Route 53 健康檢查。建立指向兩個 ALB 的 Route 53 容錯移轉路由記錄。將 Evaluate Target Health 值設定為 Yes。","C":"建立兩個 Amazon CloudFront 分發，每個分發以一個 ALB 作為來源。建立指向兩個 CloudFront 分發的 Amazon Route 53 容錯移轉路由記錄。將 Evaluate Target Health 值設定為 Yes。","D":"為每個 ALB 建立 Amazon Route 53 健康檢查。建立指向兩個 ALB 的 Route 53 延遲別名記錄。將 Evaluate Target Health 值設定為 Yes。"},"answer":"D"},{"num":468,"stem":"一家公司在多個 AWS 帳戶中部署工作負載。每個帳戶都有一個 VPC，VPC flow logs 以文字日誌格式發布到集中式 Amazon S3 儲存桶。每個日誌檔案都使用 gzip 壓縮。公司必須無限期保留日誌檔案。\n\n安全工程師偶爾使用 Amazon Athena 分析日誌以查詢 VPC flow logs。隨著擷取的日誌數量增加，查詢效能正在下降。解決方案架構師必須改善日誌分析的效能並減少 VPC flow logs 使用的儲存空間。\n\n哪個解決方案能以最大的效能提升滿足這些要求？","options":{"A":"建立 AWS Lambda 函數以解壓縮 gzip 檔案，並使用 bzip2 壓縮重新壓縮檔案。為 S3 儲存桶的 s3:ObjectCreated:Put S3 事件 notification 訂閱 Lambda 函數。","B":"為 S3 儲存桶啟用 S3 Transfer Acceleration。建立 S3 生命週期配置，在檔案上傳後立即將其移動到 S3 Intelligent-Tiering 儲存類別。","C":"更新 VPC flow log 配置，以 Apache Parquet 格式儲存檔案。為日誌檔案指定每小時分區。","D":"建立沒有資料使用控制限制的新 Athena 工作群組。使用 Athena 引擎版本 2。"},"answer":"C"},{"num":469,"stem":"一家公司希望在其本地基礎設施和 AWS 之間建立專用連線。公司正在設定 1 Gbps 的 AWS Direct Connect 連線到其帳戶 VPC。架構包含 Transit Gateway 和 Direct Connect Gateway，以連接多個 VPC 和本地基礎設施。\n\n公司必須使用 Direct Connect 連線透過 Transit VIF 連接到 VPC 資源。\n\n哪種步驟組合能滿足這些要求？（選擇兩個）","options":{"A":"將 1 Gbps Direct Connect 連線更新為 10 Gbps。","B":"透過 Transit VIF 通告本地網路前綴。","C":"透過 Transit VIF 從 Direct Connect Gateway 向本地網路通告 VPC 前綴。","D":"將 Direct Connect 連線的 MACsec 加密模式屬性更新為 must_encrypt。","E":"將 MACsec Connection Key Name/Connectivity Association Key (CKN/CAK) 對與 Direct Connect 連線關聯。"},"answer":"BC"},{"num":470,"stem":"一家公司希望將 Amazon WorkSpaces 與精簡型用戶端裝置結合使用，以取代老舊的桌面電腦。員工使用桌面電腦存取處理臨床試驗資料的應用程式。公司安全政策規定，對應用程式的存取必須僅限於公司分支機構的位置。公司考慮在未來 6 個月內新增額外的分支機構。\n\n哪個解決方案能以最高的營運效率滿足這些要求？","options":{"A":"建立包含分支機構公用 IP 位址清單的 IP 存取控制群組規則。將 IP 存取控制群組與 WorkSpaces 目錄關聯。","B":"使用 AWS Firewall Manager 建立包含分支機構位置公用 IP 位址清單的 IPSet 的 Web ACL 規則。將 Web ACL 與 WorkSpaces 目錄關聯。","C":"使用 AWS Certificate Manager (ACM) 向部署在分支機構位置的機器核發受信任的裝置 certificate。在 WorkSpaces 目錄上啟用限制存取。","D":"建立自訂 WorkSpace 映像，配置 Windows Firewall 以限制對分支機構公用 IP 位址的存取。使用該映像部署 WorkSpaces。"},"answer":"B"},{"num":471,"stem":"一家公司使用 AWS Organizations。公司在集中式網路帳戶中執行兩個防火牆設備。每個防火牆設備在手動配置的高可用性 Amazon EC2 執行個體上執行。Transit Gateway 將集中式網路帳戶的 VPC 連接到成員帳戶的 VPC。每個防火牆設備使用靜態私有 IP 位址，用於將 traffic 從成員帳戶路由到網際網路。\n\n在最近的一次事故中，配置錯誤的腳本觸發了兩個防火牆設備的終止。在重建防火牆設備期間，公司編寫了新腳本以在啟動時配置防火牆設備。\n\n公司希望將防火牆設備的部署現代化。防火牆設備需要能夠水平擴展以處理網路擴展時增加的 traffic。公司必須繼續使用防火牆設備以符合公司政策。防火牆設備的供應商已確認最新版本的防火牆程式碼可與所有 AWS 服務搭配使用。\n\n解決方案架構師應建議哪種步驟組合以最具成本效益的方式滿足這些要求？（選擇三個）","options":{"A":"在集中式網路帳戶中部署 Gateway Load Balancer。設定使用 AWS PrivateLink 的端點服務。","B":"在集中式網路帳戶中部署 Network Load Balancer。設定使用 AWS PrivateLink 的端點服務。","C":"建立 Auto Scaling 群組和啟動範本，使用新腳本作為使用者資料以在啟動時配置防火牆設備。建立使用執行個體目標類型的目標群組。","D":"建立 Auto Scaling 群組。配置使用新腳本作為使用者資料的 AWS Launch Wizard 部署以配置防火牆設備。建立使用 IP 目標類型的目標群組。","E":"在每個成員帳戶中建立 VPC 端點。更新路由表以指向 VPC 端點。","F":"在集中式網路帳戶中建立 VPC 端點。更新每個成員帳戶中的路由表以指向 VPC 端點。"},"answer":"ACF"},{"num":472,"stem":"解決方案架構師必須為支援 Web 應用程式的 Amazon RDS for PostgreSQL 資料庫實作多區域架構。資料庫從包含主要和次要區域中都存在的 AWS 服務和功能的 AWS CloudFormation 範本啟動。\n\n資料庫配置為自動備份，RTO 為 15 分鐘，RPO 為 2 小時。Web 應用程式配置為使用 Amazon Route 53 記錄將 traffic 路由到資料庫。\n\n哪種步驟組合能產生滿足所有要求的高可用性架構？（選擇兩個）","options":{"A":"在次要區域中建立資料庫的跨區域唯讀複本。配置次要區域中的 AWS Lambda 函數，在容錯移轉事件期間提升唯讀複本。","B":"在主要區域中，對資料庫建立健康檢查，在偵測到故障時呼叫 AWS Lambda 函數。將 Lambda 函數設計為從次要區域中最新的資料庫快照重新建立資料庫，並更新資料庫的 Route 53 主機記錄。","C":"建立 AWS Lambda 函數，每 2 小時將最新的自動備份複製到次要區域。","D":"在 Route 53 中為資料庫 DNS 記錄建立容錯移轉路由政策。將主要和次要端點設定為每個區域中的端點。","E":"在次要區域中建立熱備用資料庫。使用 AWS Lambda 函數在主要資料庫發生故障時將次要資料庫還原到最新的 RDS 自動備份。"},"answer":"AD"},{"num":473,"stem":"一家電子商務公司在 AWS 上執行應用程式。該應用程式有一個 Amazon API Gateway API，用於呼叫 AWS Lambda 函數。資料儲存在 Amazon RDS for PostgreSQL DB 執行個體中。\n\n在公司最近的快閃特賣活動中，API 呼叫的突然增加對應用程式效能產生了負面影響。解決方案架構師在此期間查看了 Amazon CloudWatch 指標，注意到 Lambda 呼叫次數和資料庫連線數量顯著增加，且 DB 執行個體的 CPU 使用率也很高。\n\n解決方案架構師應建議什麼來最佳化應用程式效能？","options":{"A":"增加 Lambda 函數的記憶體。修改 Lambda 函數，在取回資料後關閉資料庫連線。","B":"新增 Amazon ElastiCache for Redis 叢集，以儲存來自 RDS 資料庫的頻繁存取資料。","C":"使用 Lambda 主控台建立 RDS proxy。修改 Lambda 函數以使用 proxy 端點。","D":"修改 Lambda 函數，在函數的處理常式之外連接到資料庫。在建立新連線之前檢查是否存在現有的資料庫連線。"},"answer":"B"},{"num":474,"stem":"一家零售公司希望改善其應用程式架構。公司的應用程式負責登記新訂單、處理商品退貨並提供分析。應用程式將零售資料儲存在 MySQL 資料庫和 Oracle OLAP 分析資料庫中。所有應用程式和資料庫都託管在 Amazon EC2 執行個體上。\n\n每個應用程式由幾個處理訂單流程不同部分的元件組成。這些元件使用來自不同來源的輸入資料。每週執行一個單獨的 ETL 工作，將資料從每個應用程式複製到分析資料庫。\n\n解決方案架構師必須將架構重新設計為使用無伺服器服務的事件驅動解決方案。解決方案必須以近乎即時的方式提供更新的分析資料。\n\n哪個解決方案能滿足這些要求？","options":{"A":"將個別應用程式作為微服務遷移到使用 AWS Fargate 的 Amazon Elastic Container Service (Amazon ECS) 容器中。在 Amazon EC2 上保留零售 MySQL 資料庫。將分析資料庫移動到 Amazon Neptune。使用 Amazon Simple Queue Service (Amazon SQS) 將所有輸入資料傳送到微服務和分析資料庫。","B":"為每個應用程式建立 Auto Scaling 群組。在每個 Auto Scaling 群組中指定必要的 EC2 執行個體數量。將零售 MySQL 資料庫和分析資料庫遷移到 Amazon Aurora MySQL。使用 Amazon Simple Notification Service (Amazon SNS) 將所有輸入資料傳送到正確的 EC2 執行個體和分析資料庫。","C":"將個別應用程式作為微服務遷移到使用 AWS Fargate 的 Amazon Elastic Kubernetes Service (Amazon EKS) 容器中。將零售 MySQL 資料庫遷移到 Amazon Aurora Serverless MySQL。將分析資料庫遷移到 Amazon Redshift Serverless。使用 Amazon EventBridge 將所有輸入資料傳送到微服務和分析資料庫。","D":"將個別應用程式作為微服務遷移到 Amazon AppStream 2.0。將零售 MySQL 資料庫遷移到 Amazon Aurora MySQL。將分析資料庫遷移到 Amazon Redshift Serverless。使用 AWS IoT Core 將所有輸入資料傳送到微服務和分析資料庫。"},"answer":"C"},{"num":475,"stem":"一家公司正在規劃從本地資料中心遷移到 AWS Cloud。公司計劃使用在 AWS Organizations 組織中管理的多個 AWS 帳戶。公司最初將建立少量帳戶，並根據需要新增帳戶。解決方案架構師必須設計一個解決方案，為所有 AWS 帳戶開啟 AWS CloudTrail。\n\n哪個解決方案能以最高的營運效率滿足這些要求？","options":{"A":"建立 AWS Lambda 函數，在組織中的所有 AWS 帳戶中建立新的 CloudTrail 追蹤。使用 Amazon EventBridge 中的排程動作每天呼叫 Lambda 函數。","B":"在組織的管理帳戶中建立新的 CloudTrail 追蹤。配置追蹤以記錄組織中所有 AWS 帳戶的所有事件。","C":"在組織的所有 AWS 帳戶中建立新的 CloudTrail 追蹤。每次建立新帳戶時建立新的追蹤。定義防止刪除或修改追蹤的 SCP。將 SCP 套用到根 OU。","D":"建立 AWS Systems Manager Automation 執行手冊，在組織的所有 AWS 帳戶中建立 CloudTrail 追蹤。使用 Systems Manager State Manager 呼叫自動化。"},"answer":"B"},{"num":476,"stem":"一家軟體開發公司有多位遠端工作的工程師。該公司在 Amazon EC2 執行個體上運行 Active Directory Domain Services (AD DS)。公司的安全政策規定，所有部署在 VPC 中的內部非公開服務都必須透過 VPN 才能存取。存取 VPN 時必須使用多因素驗證（MFA）。\n解決方案架構師應採取什麼措施來滿足這些要求？","options":{"A":"建立 AWS Site-to-Site VPN 連線。配置 VPN 與 AD DS 的整合。使用啟用 MFA 支援的 Amazon WorkSpaces 用戶端來建立 VPN 連線。","B":"建立 AWS Client VPN 端點。建立 AD Connector 目錄以整合 AD DS。為 AD Connector 啟用 MFA。使用 AWS Client VPN 建立 VPN 連線。","C":"使用 AWS VPN CloudHub 建立多個 AWS Site-to-Site VPN 連線。配置 AWS VPN CloudHub 與 AD DS 的整合。使用 AWS Copilot 建立 VPN 連線。","D":"建立 Amazon WorkLink 端點。配置 Amazon WorkLink 與 AD DS 的整合。在 Amazon WorkLink 中啟用 MFA。使用 AWS Client VPN 建立 VPN 連線。"},"answer":"B"},{"num":477,"stem":"一家公司在本地資料中心運行三層式 Web 應用程式。前端由 Apache Web 伺服器提供服務，中間層是單體式 Java 應用程式，儲存層是 PostgreSQL 資料庫。\n在最近一次行銷促銷活動中，由於應用程式崩潰，客戶無法透過應用程式下訂單。分析顯示三層全部超載。應用程式無回應，且由於讀取操作，資料庫達到了容量上限。該公司近期還有幾個類似的促銷活動已排程。\n解決方案架構師必須制定遷移至 AWS 的計劃以解決這些問題。解決方案必須最大化可擴展性，並最大程度減少營運工作量。\n哪些步驟組合可以滿足這些要求？(選擇三個)","options":{"A":"重構前端，使靜態資產可以託管在 Amazon S3 上。使用 Amazon CloudFront 向客戶提供前端服務。將前端連接到 Java 應用程式。","B":"將前端的 Apache Web 伺服器重新託管在 Auto Scaling 群組中的 Amazon EC2 執行個體上。在 Auto Scaling 群組前面使用負載平衡器。使用 Amazon Elastic File System (Amazon EFS) 來託管 Apache Web 伺服器所需的靜態資產。","C":"將 Java 應用程式重新託管在包含自動擴展的 AWS Elastic Beanstalk 環境中。","D":"重構 Java 應用程式。開發 Docker 容器來運行 Java 應用程式。使用 AWS Fargate 託管容器。","E":"使用 AWS Database Migration Service (AWS DMS) 將 PostgreSQL 資料庫重新平台化至 Amazon Aurora PostgreSQL 資料庫。使用 Aurora Auto Scaling 進行讀取副本擴展。 F. 將 PostgreSQL 資料庫重新託管在記憶體是本地伺服器兩倍的 Amazon EC2 執行個體上。"},"answer":"ADE"},{"num":478,"stem":"一家公司正在 AWS 上部署新應用程式。該應用程式由 Amazon Elastic Kubernetes Service (Amazon EKS) 叢集和 Amazon Elastic Container Registry (Amazon ECR) 儲存庫組成。EKS 叢集具有 AWS 受管節點群組。\n公司的安全準則規定，AWS 上的所有資源必須持續掃描安全漏洞。\n哪個解決方案能以最少的營運負擔滿足此要求？","options":{"A":"啟用 AWS Security Hub。配置 Security Hub 掃描 EKS 節點和 ECR 儲存庫。","B":"啟用 Amazon Inspector 掃描 EKS 節點和 ECR 儲存庫。","C":"啟動新的 Amazon EC2 執行個體，並從 AWS Marketplace 安裝漏洞掃描工具。配置 EC2 執行個體掃描 EKS 節點。配置 Amazon ECR 在推送時執行基本掃描。","D":"在 EKS 節點上安裝 Amazon CloudWatch 代理程式。配置 CloudWatch 代理程式持續掃描。配置 Amazon ECR 在推送時執行基本掃描。"},"answer":"B"},{"num":479,"stem":"一家公司需要提高其售票應用程式的可靠性。該應用程式在 Amazon Elastic Container Service (Amazon ECS) 叢集上運行。公司使用 Amazon CloudFront 提供應用程式服務。ECS 叢集的單一 ECS 服務是 CloudFront 發行版的來源。\n應用程式只允許特定數量的活躍用戶進入購票流程。這些用戶透過其 JSON Web Token (JWT) 中的加密屬性來識別。所有其他用戶將被重新導向至等候室模組，直到有可用的購票容量為止。\n應用程式正面臨高負載。等候室模組按設計運作，但等候室的負載正在破壞應用程式的可用性。\n此中斷對應用程式的票務銷售交易產生負面影響。\n哪個解決方案能在高負載期間為票務銷售交易提供最高的可靠性？","options":{"A":"在 ECS 叢集中為等候室建立獨立的服務。使用獨立的擴展配置。確保售票服務使用 JWT 資訊，並適當地將請求轉發至等候室服務。","B":"將應用程式移至 Amazon Elastic Kubernetes Service (Amazon EKS) 叢集。將等候室模組拆分為獨立於售票 Pod 的 Pod。使售票 Pod 成為 StatefulSet 的一部分。確保售票 Pod 使用 JWT 資訊，並適當地將請求轉發至等候室 Pod。","C":"在 ECS 叢集中為等候室建立獨立的服務。使用獨立的擴展配置。建立 CloudFront 函數，檢查 JWT 資訊，並適當地將請求轉發至售票服務或等候室服務。","D":"將應用程式移至 Amazon Elastic Kubernetes Service (Amazon EKS) 叢集。將等候室模組拆分為獨立於售票 Pod 的 Pod。透過為 Kubernetes 佈建 App Mesh 控制器來使用 AWS App Mesh。啟用售票 Pod 與等候室 Pod 之間通訊的 mTLS 驗證和服務到服務驗證。確保售票 Pod 使用 JWT 資訊，並適當地將請求轉發至等候室 Pod。"},"answer":"C"},{"num":480,"stem":"解決方案架構師正在從現有的手動建立的非生產 AWS 環境建立 AWS CloudFormation 範本。CloudFormation 範本可以根據需要銷毀和重建。該環境包含一個 Amazon EC2 執行個體。EC2 執行個體有一個執行個體設定檔，EC2 執行個體使用該設定檔來承擔父帳戶中的角色。\n解決方案架構師在 CloudFormation 範本中重新建立了角色，並使用相同的角色名稱。當 CloudFormation 範本在子帳戶中啟動時，由於權限不足，EC2 執行個體無法再承擔父帳戶中的角色。\n解決方案架構師應採取什麼措施來解決此問題？","options":{"A":"在父帳戶中，編輯 EC2 執行個體需要承擔的角色的信任政策。確保允許 sts:AssumeRole 動作的現有陳述式中的目標角色 ARN 正確。儲存信任政策。","B":"在父帳戶中，編輯 EC2 執行個體需要承擔的角色的信任政策。新增一個陳述式，允許子帳戶的根主體執行 sts:AssumeRole 動作。儲存信任政策。","C":"再次更新 CloudFormation 堆疊。僅指定 CAPABILITY_NAMED_IAM 功能。","D":"再次更新 CloudFormation 堆疊。同時指定 CAPABILITY_IAM 功能和 CAPABILITY_NAMED_IAM 功能。"},"answer":"B"},{"num":481,"stem":"一家公司的 Web 應用程式存在可靠性問題。該應用程式在全球為客戶提供服務。應用程式在單一 Amazon EC2 執行個體上運行，並對 Amazon RDS for MySQL 資料庫執行讀取密集型操作。\n在高負載期間，應用程式變得無回應，需要手動重新啟動 EC2 執行個體。解決方案架構師必須提高應用程式的可靠性。\n哪個解決方案能以最少的開發工作量滿足此要求？","options":{"A":"建立 Amazon CloudFront 發行版。將 EC2 執行個體指定為發行版的來源。為 RDS for MySQL 資料庫配置多可用區域部署。使用待機資料庫執行個體進行讀取密集型操作。","B":"在 Auto Scaling 群組中的 EC2 執行個體上運行應用程式。將 EC2 執行個體放在 Elastic Load Balancing (ELB) 負載平衡器後面。用 Amazon Aurora 替換資料庫服務。使用 Aurora 副本進行讀取密集型操作。","C":"部署 AWS Global Accelerator。為 RDS for MySQL 資料庫配置多可用區域部署。使用待機資料庫執行個體進行讀取密集型操作。","D":"將應用程式遷移至 AWS Lambda 函數。為 RDS for MySQL 資料庫建立讀取副本。使用讀取副本進行讀取密集型操作。"},"answer":"A"},{"num":482,"stem":"一家公司需要使用啟用 AWS Transfer Family SFTP 的伺服器和 Amazon S3 儲存桶，從第三方資料供應商接收更新。資料使用 Pretty Good Privacy (PGP) 加密進行加密。公司需要一個在收到資料後自動解密資料的解決方案。\n解決方案架構師將使用 Transfer Family 受管 workflow。公司已使用允許存取 AWS Secrets Manager 和 S3 儲存桶的 IAM 政策建立了 IAM 服務角色。角色的信任關係允許 transfer.amazonaws.com 服務承擔該角色。\n解決方案架構師接下來應採取什麼措施來完成自動解密的解決方案？","options":{"A":"將 PGP 公鑰儲存在 Secrets Manager 中。在 Transfer Family 受管 workflow 中新增名義步驟以解密檔案。在名義步驟中配置 PGP 加密參數。將 workflow 與 Transfer Family 伺服器關聯。","B":"將 PGP 私鑰儲存在 Secrets Manager 中。在 Transfer Family 受管 workflow 中新增例外處理步驟以解密檔案。在例外處理程式中配置 PGP 加密參數。將 workflow 與 SFTP 用戶關聯。","C":"將 PGP 私鑰儲存在 Secrets Manager 中。在 Transfer Family 受管 workflow 中新增名義步驟以解密檔案。在名義步驟中配置 PGP 解密參數。將 workflow 與 Transfer Family 伺服器關聯。","D":"將 PGP 公鑰儲存在 Secrets Manager 中。在 Transfer Family 受管 workflow 中新增例外處理步驟以解密檔案。在例外處理程式中配置 PGP 解密參數。將 workflow 與 SFTP 用戶關聯。"},"answer":"D"},{"num":483,"stem":"一家公司正在將其大型多人遊戲的基礎設施遷移至 AWS。遊戲應用程式的功能包括一個玩家可以即時查看排名的排行榜。排行榜需要微秒級讀取和個位數毫秒的寫入延遲。資料集大小為個位數 TB，並且在主節點發生故障後必須在一分鐘內可接受寫入。\n公司需要一個能夠透過資料管道持久保存資料以供進一步分析處理的解決方案。\n哪個解決方案能以最少的營運負擔滿足這些要求？","options":{"B":"建立具有讀取副本的 Amazon RDS 資料庫。配置應用程式將寫入指向寫入端點。配置應用程式將讀取指向讀取端點。","C":"在多可用區域模式下建立 Amazon MemoryDB for Redis 叢集。配置應用程式與主節點互動。","D":"在跨多個可用區域的 Amazon EC2 執行個體上建立多個 Redis 節點。配置備份至 Amazon S3。"},"answer":"B"},{"num":484,"stem":"一家公司在 AWS 雲端運行多個應用程式。這些應用程式針對公司內不同的業務單位。公司在 AWS Organizations 組織中的多個 AWS 帳戶中運行應用程式的各個元件。\n公司組織中的每個雲端資源都有一個名為 BusinessUnit 的標籤。每個標籤已具有適當的業務單位名稱值。\n公司需要將其雲端成本分配至不同的業務單位。公司還需要視覺化每個業務單位的雲端成本。\n哪個解決方案可以滿足這些要求？","options":{"A":"在組織的管理帳戶中，建立名為 BusinessUnit 的成本分配標籤。同樣在管理帳戶中，建立 Amazon S3 儲存桶和 AWS Cost and Usage Report (AWS CUR)。將 S3 儲存桶配置為 AWS CUR 的目的地。從管理帳戶使用 Amazon Athena 查詢 AWS CUR 資料。使用 Amazon QuickSight 進行視覺化。","B":"在每個成員帳戶中，建立名為 BusinessUnit 的成本分配標籤。在組織的管理帳戶中，建立 Amazon S3 儲存桶和 AWS Cost and Usage Report (AWS CUR)。將 S3 儲存桶配置為 AWS CUR 的目的地。建立 Amazon CloudWatch 儀表板進行視覺化。","C":"在組織的管理帳戶中，建立名為 BusinessUnit 的成本分配標籤。在每個成員帳戶中，建立 Amazon S3 儲存桶和 AWS Cost and Usage Report (AWS CUR)。將每個 S3 儲存桶配置為其對應 AWS CUR 的目的地。在管理帳戶中建立 Amazon CloudWatch 儀表板進行視覺化。","D":"在每個成員帳戶中，建立名為 BusinessUnit 的成本分配標籤。同樣在每個成員帳戶中，建立 Amazon S3 儲存桶和 AWS Cost and Usage Report (AWS CUR)。將每個 S3 儲存桶配置為其對應 AWS CUR 的目的地。從管理帳戶使用 Amazon Athena 查詢 AWS CUR 資料。使用 Amazon QuickSight 進行視覺化。"},"answer":"C"},{"num":485,"stem":"一家公用事業公司希望每 5 分鐘從其智慧電表收集使用資料，以促進分時計費。當電表將資料傳送至 AWS 時，資料會傳送至 Amazon API Gateway，由 AWS Lambda 函數處理，並儲存在 Amazon DynamoDB 資料表中。\n在試驗階段，Lambda 函數需要 3 到 5 秒才能完成。\n隨著更多智慧電表的部署，工程師注意到 Lambda 函數需要 1 到 2 分鐘才能完成。隨著從設備收集新類型的指標，函數執行時間也在增加。在對 DynamoDB 執行 PUT 操作時出現許多 ProvisionedThroughputExceededException 錯誤，Lambda 也出現許多 TooManyRequestsException 錯誤。\n哪些變更組合可以解決這些問題？(選擇兩個)","options":{"A":"增加 DynamoDB 資料表的寫入容量單位。","B":"增加 Lambda 函數可用的記憶體。","C":"增加智慧電表的負載大小以傳送更多資料。","D":"從 API Gateway 將資料串流至 Amazon Kinesis 資料串流，並以批次方式處理資料。","E":"在 Amazon SQS FIFO 佇列中收集資料，由佇列觸發 Lambda 函數處理每則訊息。"},"answer":"AB"},{"num":486,"stem":"一家公司最近成功完成了 Amazon WorkSpaces 的概念驗證。解決方案架構師需要在兩個 AWS 區域之間實現高可用性。Amazon WorkSpaces 部署在容錯移轉區域，且託管區域部署在 Amazon Route 53 中。\n解決方案架構師應採取什麼措施來為解決方案配置高可用性？","options":{"A":"在主要區域和容錯移轉區域分別建立連線別名。將連線別名與每個區域中的目錄關聯。建立 Route 53 容錯移轉路由政策。將「評估目標健康狀態」設定為「是」。","B":"在主要區域和容錯移轉區域分別建立連線別名。將連線別名與主要區域中的目錄關聯。建立 Route 53 多值答案路由政策。","C":"在主要區域建立連線別名。將連線別名與主要區域中的目錄關聯。建立 Route 53 加權路由政策。","D":"在主要區域建立連線別名。將連線別名與容錯移轉區域中的目錄關聯。建立 Route 53 容錯移轉路由政策。將「評估目標健康狀態」設定為「是」。"},"answer":"D"},{"num":487,"stem":"一家公司計劃將許多 VM 從本地環境遷移至 AWS。公司需要在遷移前對本地環境進行初步評估、對 VM 上運行的應用程式之間的相依性進行視覺化，以及一份提供本地環境評估的報告。\n為了獲取這些資訊，公司已發起 Migration Evaluator 評估請求。公司能夠在其本地環境中安裝收集器軟體，沒有任何限制。\n哪個解決方案能以最少的營運負擔為公司提供所需資訊？","options":{"A":"在每個本地 VM 上安裝 AWS Application Discovery Agent。資料收集期結束後，使用 AWS Migration Hub 查看應用程式相依性。從 Migration Hub 下載 Quick Insights 評估報告。","B":"在每個本地 VM 上安裝 Migration Evaluator Collector。資料收集期結束後，使用 Migration Evaluator 查看應用程式相依性。從 Migration Evaluator 下載並匯出已發現的伺服器清單。將清單上傳至 Amazon QuickSight。當 QuickSight 報告生成後，下載 Quick Insights 評估報告。","C":"在本地環境中設定 AWS Application Discovery Service Agentless Collector。資料收集期結束後，使用 AWS Migration Hub 查看應用程式相依性。從 Application Discovery Service 匯出已發現的伺服器清單。將清單上傳至 Migration Evaluator。當 Migration Evaluator 報告生成後，下載 Quick Insights 評估。","D":"在本地環境中設定 Migration Evaluator Collector。在每個 VM 上安裝 AWS Application Discovery Agent。資料收集期結束後，使用 AWS Migration Hub 查看應用程式相依性。從 Migration Evaluator 下載 Quick Insights 評估報告。"},"answer":"A"},{"num":488,"stem":"一家公司在 AWS 上使用 Amazon API Gateway API 和包含 API 方法邏輯的 AWS Lambda 函數來託管其主要 API。公司的內部應用程式使用此 API 進行核心功能和業務邏輯。公司的客戶使用此 API 從其帳戶存取資料。部分客戶還可以存取在單一獨立 Amazon EC2 執行個體上運行的舊版 API。\n公司希望增強這些 API 的安全性，以更好地防止阻斷服務（DoS）攻擊、檢查漏洞，並防範常見的安全威脅。\n解決方案架構師應採取什麼措施來滿足這些要求？","options":{"A":"使用 AWS WAF 保護兩個 API。配置 Amazon Inspector 分析舊版 API。配置 Amazon GuardDuty 監控對 API 的惡意存取嘗試。","B":"使用 AWS WAF 保護 API Gateway API。配置 Amazon Inspector 分析兩個 API。配置 Amazon GuardDuty 封鎖對 API 的惡意存取嘗試。","C":"使用 AWS WAF 保護 API Gateway API。配置 Amazon Inspector 分析舊版 API。配置 Amazon GuardDuty 監控對 API 的惡意存取嘗試。","D":"使用 AWS WAF 保護 API Gateway API。配置 Amazon Inspector 保護舊版 API。配置 Amazon GuardDuty 封鎖對 API 的惡意存取嘗試。"},"answer":"C"},{"num":489,"stem":"一家公司在 AWS 上運行無伺服器電子商務應用程式。該應用程式使用 Amazon API Gateway 呼叫 AWS Lambda Java 函數。Lambda 函數連接至 Amazon RDS for MySQL 資料庫以儲存資料。\n在最近的促銷活動中，Web 流量突然增加導致 API 效能不佳和資料庫連線失敗。公司需要實施一個解決方案，以最小化 Lambda 函數的延遲，並支援流量突發。\n哪個解決方案能以最少的應用程式變更量滿足這些要求？","options":{"A":"更新 Lambda 函數的程式碼，使 Lambda 函數在函數處理常式外部開啟資料庫連線。增加 Lambda 函數的預置並行性。","B":"為資料庫建立 RDS Proxy 端點。將資料庫密鑰儲存在 AWS Secrets Manager 中。設定所需的 IAM 權限。更新 Lambda 函數以連接至 RDS Proxy 端點。增加 Lambda 函數的預置並行性。","C":"建立自訂參數群組。增加 max_connections 參數的值。將自訂參數群組與 RDS 資料庫執行個體關聯，並排程重新啟動。增加 Lambda 函數的保留並行性。","D":"為資料庫建立 RDS Proxy 端點。將資料庫密鑰儲存在 AWS Secrets Manager 中。設定所需的 IAM 權限。更新 Lambda 函數以連接至 RDS Proxy 端點。增加 Lambda 函數的保留並行性。"},"answer":"B"},{"num":490,"stem":"一家公司要求所有內部應用程式連線使用私有 IP 位址。為實施此政策，解決方案架構師已建立介面端點以連接至 AWS 公共服務。經測試，解決方案架構師注意到服務名稱解析為公有 IP 位址，且內部服務無法連接至介面端點。\n解決方案架構師應採取哪個步驟來解決此問題？","options":{"A":"更新子網路路由表，新增指向介面端點的路由。","B":"在 VPC 屬性上啟用私有 DNS 選項。","C":"配置介面端點上的安全群組，以允許連接至 AWS 服務。","D":"配置 Amazon Route 53 私有託管區域，並為內部應用程式設定條件式轉發器。"},"answer":"B"},{"num":491,"stem":"一家公司正在開發一個對延遲敏感的應用程式。部分應用程式包括幾個需要盡快初始化的 AWS Lambda 函數。Lambda 函數以 Java 編寫，並在處理常式外部包含初始化程式碼，用於載入函式庫、初始化類別和生成唯一 ID。\n哪個解決方案能以最符合成本效益的方式滿足啟動效能要求？","options":{"A":"將所有初始化程式碼移至每個 Lambda 函數的處理常式中。為每個 Lambda 函數啟用 Lambda SnapStart。配置 SnapStart 以引用每個 Lambda 函數的 $LATEST 版本。","B":"發佈每個 Lambda 函數的版本。為每個 Lambda 函數建立別名。配置每個別名指向其對應版本。為每個 Lambda 函數設定預置並行配置，指向對應別名。","C":"發佈每個 Lambda 函數的版本。為每個 Lambda 函數設定預置並行配置，指向對應版本。為已發佈版本的 Lambda 函數啟用 Lambda SnapStart。","D":"更新 Lambda 函數以新增快照前掛鉤。將生成唯一 ID 的程式碼移至處理常式中。發佈每個 Lambda 函數的版本。為已發佈版本的 Lambda 函數啟用 Lambda SnapStart。"},"answer":"A"},{"num":492,"stem":"解決方案架構師正在使用 AWS Import/Export 的 Amazon EC2 VM Import 功能從本地環境匯入 VM。解決方案架構師已建立 AMI，並已佈建基於該 AMI 的 Amazon EC2 執行個體。EC2 執行個體在 VPC 的公有子網路中運行，並已指派公有 IP 位址。\nEC2 執行個體未在 AWS Systems Manager 主控台中顯示為受管執行個體。\n解決方案架構師應採取哪些步驟組合來排除此問題？(選擇兩個)","options":{"A":"驗證 Systems Manager Agent 是否已安裝在執行個體上並正在運行。","B":"驗證執行個體是否已指派適合 Systems Manager 的 IAM 角色。","C":"驗證 VPC 上是否存在 VPC 端點。","D":"驗證 AWS Application Discovery Agent 是否已配置。","E":"驗證 Systems Manager 服務連結角色的正確配置。"},"answer":"AD"},{"num":493,"stem":"一家公司對所有應用程式使用 AWS CloudFormation 作為部署工具。公司在啟用版本控制的 Amazon S3 儲存桶中暫存所有應用程式二進位檔案和範本。開發人員可以存取託管整合開發環境（IDE）的 Amazon EC2 執行個體。開發人員從 Amazon S3 將應用程式二進位檔案下載到 EC2 執行個體，進行更改，並在本地運行單元測試後將二進位檔案上傳至 S3 儲存桶。開發人員希望改進現有的部署機制，並使用 AWS CodePipeline 實施 CI/CD。\n開發人員有以下要求：\n• 使用 AWS CodeCommit 進行原始碼控制。\n• 自動化單元測試和安全掃描。\n• 在單元測試失敗時通知開發人員。\n• 作為 CI/CD 的一部分，動態開啟和關閉應用程式功能並自訂部署。\n• 在部署應用程式之前由主要開發人員提供核准。\n哪個解決方案可以滿足這些要求？","options":{"A":"使用 AWS CodeBuild 運行單元測試和安全掃描。使用 Amazon EventBridge 規則在單元測試失敗時向開發人員發送 Amazon SNS 警示。為不同的解決方案功能編寫 AWS Cloud Development Kit (AWS CDK) 建構，並使用清單檔案在 AWS CDK 應用程式中開啟和關閉功能。在管道中使用手動核准階段以允許主要開發人員核准應用程式。","B":"使用 AWS Lambda 運行單元測試和安全掃描。在管道的後續階段使用 Lambda 在單元測試失敗時向開發人員發送 Amazon SNS 警示。為不同的解決方案功能編寫 AWS Amplify 外掛程式，並利用使用者提示來開啟和關閉功能。在管道中使用 Amazon SES 以允許主要開發人員核准應用程式。","C":"使用 Jenkins 運行單元測試和安全掃描。在管道中使用 Amazon EventBridge 規則在單元測試失敗時向開發人員發送 Amazon SES 警示。使用 AWS CloudFormation 巢狀堆疊為不同的解決方案功能設定參數，以開啟和關閉功能。在管道中使用 AWS Lambda 以允許主要開發人員核准應用程式。","D":"使用 AWS CodeDeploy 運行單元測試和安全掃描。在管道中使用 Amazon CloudWatch 警示在單元測試失敗時向開發人員發送 Amazon SNS 警示。使用 Docker 映像檔為不同的解決方案功能，並使用 AWS CLI 開啟和關閉功能。在管道中使用手動核准階段以允許主要開發人員核准應用程式。"},"answer":"A"},{"num":494,"stem":"一家全球電子商務公司在全球各地擁有許多資料中心。隨著儲存資料的增長，公司需要建立一個解決方案，為舊版本地檔案應用程式提供可擴展的儲存。公司必須能夠使用 AWS Backup 建立磁碟區的時間點副本，並保持對頻繁存取資料的低延遲存取。公司還需要儲存磁碟區，這些磁碟區可以從公司的本地應用程式伺服器作為 Internet Small Computer System Interface (iSCSI) 設備掛載。\n哪個解決方案可以滿足這些要求？","options":{"A":"佈建 AWS Storage Gateway 磁帶閘道。配置磁帶閘道將資料儲存在 Amazon S3 儲存桶中。部署 AWS Backup 以建立磁碟區的時間點副本。","B":"佈建 Amazon FSx File Gateway 和 Amazon S3 File Gateway。部署 AWS Backup 以建立資料的時間點副本。","C":"以快取模式佈建 AWS Storage Gateway 磁碟區閘道。使用 AWS Backup 備份本地 Storage Gateway 磁碟區。","D":"以快取模式佈建 AWS Storage Gateway 檔案閘道。部署 AWS Backup 以建立磁碟區的時間點副本。"},"answer":"D"},{"num":495,"stem":"一家公司有一個使用 AWS Key Management Service (AWS KMS) 加密和解密資料的應用程式。應用程式將資料儲存在 AWS 區域的 Amazon S3 儲存桶中。公司安全政策要求資料在放入 S3 儲存桶之前必須加密。應用程式在從 S3 儲存桶讀取檔案時必須解密資料。\n公司將 S3 儲存桶複製到其他區域。解決方案架構師必須設計一個解決方案，使應用程式可以跨區域加密和解密資料。應用程式必須在每個區域使用相同的金鑰來解密資料。\n哪個解決方案可以滿足這些要求？","options":{"A":"建立 KMS 多區域主要金鑰。使用 KMS 多區域主要金鑰在應用程式運行的每個額外區域中建立 KMS 多區域複本金鑰。更新應用程式程式碼，在每個區域使用特定的複本金鑰。","B":"在應用程式運行的每個額外區域中建立新的客戶受管 KMS 金鑰。更新應用程式程式碼，在每個區域使用特定的 KMS 金鑰。","C":"使用 AWS Private Certificate Authority 在主要區域建立新的憑證授權機構（CA）。從 CA 為應用程式的網站 URL 核發新的私有憑證。使用 AWS Resource Access Manager (AWS RAM) 與其他區域共享 CA。更新應用程式程式碼，在每個區域使用共享的 CA 憑證。","D":"使用 AWS Systems Manager Parameter Store 在應用程式運行的每個額外區域中建立參數。從主要區域的 KMS 金鑰匯出金鑰材料。將金鑰材料儲存在每個區域的參數中。更新應用程式程式碼，在每個區域使用來自參數的金鑰資料。"},"answer":"A"},{"num":496,"stem":"一家公司在 Application Load Balancer (ALB) 後面的 Auto Scaling 群組中使用多個 Amazon EC2 執行個體來託管應用程式。在 EC2 執行個體的初始啟動期間，EC2 執行個體運行使用者資料指令碼，從 Amazon S3 儲存桶下載應用程式的關鍵內容。\nEC2 執行個體正確啟動。但是，一段時間後，EC2 執行個體因以下錯誤訊息而被終止：「由於 ELB 系統健康狀態檢查失敗，執行個體已退出服務。」EC2 執行個體因 Auto Scaling 事件在無限迴圈中不斷啟動和被終止。\n部署上唯一最近的變更是公司在 S3 儲存桶中新增了大量關鍵內容。公司不希望在生產環境中修改使用者資料指令碼。\n解決方案架構師應採取什麼措施使生產環境能夠成功部署？","options":{"A":"增加 EC2 執行個體的大小。","B":"增加 ALB 的健康狀態檢查逾時時間。","C":"變更 ALB 的健康狀態檢查路徑。","D":"增加 Auto Scaling 群組的健康狀態檢查寬限期。"},"answer":"C"},{"num":497,"stem":"一家公司需要將部分本地 Oracle 資料庫移至 AWS。由於業務合規原因，公司選擇將部分資料庫保留在本地。\n本地資料庫包含空間資料，並運行 cron 作業進行維護。公司需要直接從 AWS 連接到本地系統，以便將資料作為外部資料表查詢。\n哪個解決方案可以滿足這些要求？","options":{"A":"啟用自動擴展的 Amazon DynamoDB 全球資料表。使用 AWS Schema Conversion Tool (AWS SCT) 和 AWS Database Migration Service (AWS DMS) 將資料從本地移至 DynamoDB。建立 AWS Lambda 函數將空間資料移至 Amazon S3。使用 Amazon Athena 查詢資料。使用 Amazon EventBridge 在 DynamoDB 中排程維護作業。使用 Amazon API Gateway 支援外部資料表。","B":"建立 Amazon RDS for Microsoft SQL Server 資料庫執行個體。使用原生複製將資料從本地移至資料庫執行個體。複製後根據需要使用 AWS Schema Conversion Tool (AWS SCT) 修改 SQL Server 結構描述。將空間資料移至 Amazon Redshift。使用預存程序進行系統維護。建立 AWS Glue 爬蟲程式連接至本地 Oracle 資料庫以支援外部資料表。","C":"啟動 Amazon EC2 執行個體以託管 Oracle 資料庫。將 EC2 執行個體放在 Auto Scaling 群組中。使用 AWS Application Migration Service 將資料從本地移至 EC2 執行個體，並進行即時雙向異動資料擷取（CDC）同步。使用 Oracle 原生空間資料支援。建立 AWS Lambda 函數作為 AWS Step Functions workflow 的一部分運行維護作業。建立網際網路閘道以支援外部資料表。","D":"建立 Amazon RDS for PostgreSQL 資料庫執行個體。使用 AWS Schema Conversion Tool (AWS SCT) 和 AWS Database Migration Service (AWS DMS) 將資料從本地移至資料庫執行個體。使用 PostgreSQL 原生空間資料支援。在資料庫執行個體上運行 cron 作業進行維護。使用 AWS Direct Connect 將資料庫執行個體連接至本地環境以支援外部資料表。"},"answer":"C"},{"num":498,"stem":"一家公司在 Amazon EC2 和 AWS Lambda 上運行應用程式。應用程式將暫存資料儲存在 Amazon S3 中。S3 物件在 24 小時後被刪除。\n公司透過啟動 AWS CloudFormation 堆疊來部署新版本的應用程式。堆疊建立所需的資源。在驗證新版本後，公司刪除舊堆疊。最近刪除舊開發堆疊失敗。解決方案架構師需要在不進行重大架構變更的情況下解決此問題。\n哪個解決方案可以滿足這些要求？","options":{"A":"建立 Lambda 函數以從 S3 儲存桶刪除物件。在 CloudFormation 堆疊中將 Lambda 函數新增為自訂資源，並附有指向 S3 儲存桶資源的 DependsOn 屬性。","B":"修改 CloudFormation 堆疊，將值為 Delete 的 DeletionPolicy 屬性附加至 S3 儲存桶。","C":"更新 CloudFormation 堆疊，為 S3 儲存桶資源新增值為 Snapshot 的 DeletionPolicy 屬性。","D":"更新 CloudFormation 範本，建立 Amazon Elastic File System (Amazon EFS) 檔案系統以儲存暫存檔案，而非使用 Amazon S3。配置 Lambda 函數在與 EFS 檔案系統相同的 VPC 中運行。"},"answer":"A"},{"num":499,"stem":"一家公司有一個應用程式，將使用者上傳的影片儲存在使用 S3 Standard 儲存類別的 Amazon S3 儲存桶中。在影片上傳後的前 180 天內，使用者頻繁存取影片。180 天後很少存取。具名使用者和匿名使用者都可以存取這些影片。\n大多數影片大小超過 100 MB。使用者在上傳影片時通常網路連線不佳，導致上傳失敗。公司對影片使用分段上傳。\n解決方案架構師需要優化應用程式的 S3 成本。\n哪些動作組合可以滿足這些要求？(選擇兩個)","options":{"A":"將 S3 儲存桶配置為 Requester Pays 儲存桶。","B":"使用 S3 Transfer Acceleration 將影片上傳至 S3 儲存桶。","C":"建立 S3 生命週期配置，在開始後 7 天使未完成的分段上傳過期。","D":"建立 S3 生命週期配置，在 1 天後將物件轉換至 S3 Glacier Instant Retrieval。","E":"建立 S3 生命週期配置，在 180 天後將物件轉換至 S3 Standard-Infrequent Access (S3 Standard-IA)。"},"answer":"CE"},{"num":500,"stem":"一家公司在 AWS 上運行電子商務 Web 應用程式。Web 應用程式作為靜態網站託管在 Amazon S3 上，使用 Amazon CloudFront 進行內容交付。Amazon API Gateway API 呼叫 AWS Lambda 函數，處理 Web 應用程式的使用者請求和訂單處理。Lambda 函數將資料儲存在使用隨需執行個體的 Amazon RDS for MySQL 資料庫叢集中。過去 12 個月資料庫叢集的使用量一直很穩定。\n最近，網站遭遇 SQL 注入和 Web 安全威脅嘗試。客戶也反映在尖峰使用期間訂單處理時間增加。在這些期間，Lambda 函數經常出現冷啟動。隨著公司的發展，公司需要確保在流量尖峰期間的可擴展性和低延遲存取。公司還必須優化資料庫成本，並增加對 SQL 注入和 Web 安全威脅嘗試的防護。\n哪個解決方案可以滿足這些要求？","options":{"A":"配置 Lambda 函數在尖峰期間具有增加的逾時值。對資料庫使用 RDS Reserved Instances。使用 CloudFront 並訂閱 AWS Shield Advanced 以防護 SQL 注入和 Web 安全威脅嘗試。","B":"增加 Lambda 函數的記憶體。將資料庫移轉至 Amazon Redshift。將 Amazon Inspector 與 CloudFront 整合以防護 SQL 注入和 Web 安全威脅嘗試。","C":"在尖峰期間使用具有預置並行的 Lambda 函數進行運算。將資料庫移轉至 Amazon Aurora Serverless。使用 CloudFront 並訂閱 AWS Shield Advanced 以防護 SQL 注入和 Web 安全威脅嘗試。","D":"在尖峰期間使用具有預置並行的 Lambda 函數進行運算。對資料庫使用 RDS Reserved Instances。將 AWS WAF 與 CloudFront 整合以防護 SQL 注入和 Web 安全威脅嘗試。"},"answer":"C"},{"num":501,"stem":"一家公司在單一 Amazon EC2 執行個體上執行一個 Web 應用程式。在使用尖峰期間，CPU 使用率持續超過 95%，終端使用者會感受到應用程式效能緩慢。\n\n使用者資料指令碼會在 EC2 執行個體上安裝所需的自訂套件。執行個體的啟動程序需要數分鐘。\n\n公司正在建立一個 Auto Scaling 群組，其中包含混合執行個體群組、不同的 CPU，以及最大容量限制。Auto Scaling 群組將使用啟動範本來設定各種 configuration 選項。公司需要在 Auto Scaling 期間，當新執行個體啟動時降低應用程式延遲。\n\n哪種解決方案能夠滿足這些需求？","options":{"A":"使用預測性擴展策略。使用執行個體維護策略來執行使用者資料指令碼。將預設執行個體暖機時間設定為 0 秒。","B":"使用動態擴展策略。使用生命週期掛鉤來執行使用者資料指令碼。將預設執行個體暖機時間設定為 0 秒。","C":"使用預測性擴展策略。為 Auto Scaling 群組啟用暖池。使用執行個體維護策略來執行使用者資料指令碼。","D":"使用動態擴展策略。為 Auto Scaling 群組啟用暖池。使用生命週期掛鉤來執行使用者資料指令碼。"},"answer":"D"},{"num":502,"stem":"一家公司需要將其本地資料庫 fleet 遷移至 Amazon RDS。該公司目前使用 Microsoft SQL Server、MySQL 和 Oracle 資料庫的混合組合。部分資料庫具有自訂結構描述和預存程序。(選擇兩個)\n\n公司應採取哪些步驟組合來進行遷移？","options":{"A":"使用 Migration Evaluator Quick Insights 分析來源資料庫，並識別需要遷移的預存程序。","B":"使用 AWS Application Migration Service 分析來源資料庫，並識別需要遷移的預存程序。","C":"使用 AWS Schema Conversion Tool（AWS SCT）分析來源資料庫，以了解所需的變更。","D":"使用 AWS Database Migration Service（AWS DMS）將來源資料庫遷移至 Amazon RDS。","E":"使用 AWS DataSync 將資料從來源資料庫遷移至 Amazon RDS。"},"answer":"CD"},{"num":503,"stem":"一家公司正在將其部落格平台遷移至 AWS。公司的本地伺服器透過 AWS Site-to-Site VPN 連線連接至 AWS。部落格內容每天由多位作者更新數次，並從網路附加儲存（NAS）伺服器上的檔案共用提供服務。\n\n公司需要在不延遲內容更新的情況下遷移部落格平台。公司已在多個可用區域部署 Amazon EC2 執行個體，以在 Application Load Balancer 後方執行部落格平台。公司還需要儘快將 200 TB 的封存資料從本地伺服器移至 Amazon S3。\n\n哪些步驟組合能夠滿足這些需求？（選擇兩個）","options":{"A":"在 Amazon EventBridge 中建立每週 cron 任務。使用 cron 任務叫用 AWS Lambda 函數，每週從 NAS 伺服器更新 EC2 執行個體。","B":"為 EC2 執行個體設定 Amazon Elastic Block Store（Amazon EBS）Multi-Attach 磁碟區以共用內容存取。撰寫程式碼以每週將 EBS 磁碟區與 NAS 伺服器同步。","C":"將 Amazon Elastic File System（Amazon EFS）檔案系統掛載至本地伺服器，以作為 NAS 伺服器使用。將部落格資料複製到 EFS 檔案系統。將 EFS 檔案系統掛載至 EC2 執行個體以提供內容服務。","D":"訂購 AWS Snowball Edge Storage Optimized 裝置。將靜態資料成品複製到裝置。將裝置寄送至 AWS。","E":"訂購 AWS Snowcone SSD 裝置。將靜態資料成品複製到裝置。將裝置寄送至 AWS。"},"answer":"CD"},{"num":504,"stem":"一家公司計畫將舊有的本地應用程式遷移至 AWS。該應用程式是一個執行在 Apache Tomcat 上的 Java Web 應用程式，並使用 PostgreSQL 資料庫。\n\n公司無法存取原始程式碼，但可以部署應用程式的 Java Archive（JAR）檔案。該應用程式在每個月底會有流量增加的情況。\n\n哪種解決方案能以最低的營運開銷滿足這些需求？","options":{"A":"在多個可用區域中啟動 Amazon EC2 執行個體。使用 Amazon Elastic File System（Amazon EFS）掛載點將 Tomcat 和 PostgreSQL 部署至所有執行個體。使用 AWS Step Functions 部署額外的 EC2 執行個體，以因應流量增加。","B":"在多個 AWS 區域的 Auto Scaling 群組中佈建 Amazon Elastic Kubernetes Service（Amazon EKS）。在容器映像中部署 Tomcat 和 PostgreSQL。使用 Network Load Balancer 以因應流量增加。","C":"將 Java 應用程式重構為以 Python 為基礎的容器。使用 AWS Lambda 函數處理應用程式邏輯。將應用程式資料儲存在 Amazon DynamoDB 全球資料表中。使用 AWS Storage Gateway 和 Lambda 並行數量以因應流量增加。","D":"使用 AWS Elastic Beanstalk 在多個可用區域中部署具備 Auto Scaling 功能的 Tomcat 伺服器。將應用程式資料儲存在 Amazon RDS for PostgreSQL 資料庫中。部署 Amazon CloudFront 和 Application Load Balancer 以因應流量增加。"},"answer":"D"},{"num":505,"stem":"一家公司正在將其本地 IoT 平台遷移至 AWS。該平台由以下元件組成：\n\n• 一個 MongoDB 叢集，作為所有收集和處理的 IoT 資料的資料存放區。\n• 一個應用程式，使用訊息佇列遙測傳輸（MQTT）每 5 分鐘連接至 IoT 裝置以收集資料。\n• 一個應用程式，定期執行工作以從 IoT 資料產生報告。這些工作需要 120 至 600 秒才能完成。\n• 一個在 Web 伺服器上執行的 Web 應用程式。終端使用者使用該 Web 應用程式產生對一般大眾開放存取的報告。\n\n公司需要將平台遷移至 AWS，以在維持效能的同時降低營運開銷。\n\n哪些步驟組合能以最低的營運開銷滿足這些需求？（選擇三個）","options":{"A":"建立具有 AWS Lambda 任務的 AWS Step Functions 狀態機，以準備報告並將報告寫入 Amazon S3。設定一個以 S3 為來源的 Amazon CloudFront 發佈以提供報告服務。","B":"建立一個 AWS Lambda 函數。對 Lambda 函數進行程式設計，以連接至 IoT 裝置、處理資料，並將資料寫入資料存放區。設定 Lambda 層以暫時儲存待處理的訊息。","C":"設定一個使用 Amazon EC2 執行個體的 Amazon Elastic Kubernetes Service（Amazon EKS）叢集來準備報告。在 EKS 叢集上建立 ingress controller 以提供報告服務。","D":"將 IoT 裝置連接至 AWS IoT Core 以發佈訊息。建立一個在收到訊息時執行的 AWS IoT 規則。設定規則以呼叫 AWS Lambda 函數。對 Lambda 函數進行程式設計，以解析、轉換裝置訊息資料並將其儲存至資料存放區。","E":"將 MongoDB 叢集遷移至 Amazon DocumentDB（具有 MongoDB 相容性）。 F. 將 MongoDB 叢集遷移至 Amazon EC2 執行個體。"},"answer":"ADE"},{"num":506,"stem":"一家公司建立了一個 Amazon API Gateway API，並與外部開發團隊共用該 API。此 API 使用 AWS Lambda 函數，並部署至名為 Production 的階段。\n\n外部開發團隊是該 API 的唯一使用者。該 API 在特定時間會出現突然的使用量增加，導致對成本增加的擔憂。公司需要在不重新修改 Lambda 函數的情況下限制成本和使用量。\n\n哪種解決方案能以最低成本滿足這些需求？","options":{"A":"設定 API 以將請求傳送至 Amazon Simple Queue Service（Amazon SQS）佇列，而不是直接傳送至 Lambda 函數。更新 Lambda 函數以從佇列使用訊息並處理請求。設定佇列以在新訊息到達時叫用 Lambda 函數。","B":"為每個 Lambda 函數設定佈建並行數量。使用 AWS Application Auto Scaling 將 Lambda 函數登錄為目標。設定擴展排程以增加和減少容量，以符合 API 使用量的變化。","C":"建立 API Gateway API 金鑰和 AWS WAF 區域性 Web ACL。將 Web ACL 與 Production 階段建立關聯。在 Web ACL 中新增以速率為基礎的規則。在規則中，指定速率限制以及使用 X-API-Key 標頭的自訂請求彙總。與外部開發團隊共用 API 金鑰。","D":"建立 API Gateway API 金鑰和使用量計畫。在使用量計畫中定義節流限制和配額。將使用量計畫與 Production 階段和 API 金鑰建立關聯。與外部開發團隊共用 API 金鑰。"},"answer":"D"},{"num":507,"stem":"一家娛樂公司在一個位於 Auto Scaling 群組中的 Linux Amazon EC2 執行個體 fleet 上託管票務服務。票務服務使用定價檔案。定價檔案儲存在使用 S3 Standard 儲存的 Amazon S3 儲存貯體中。由第三方託管的中央定價解決方案會更新定價檔案。\n\n定價檔案每 1 至 15 分鐘更新一次，並有數千個明細項目。執行個體啟動時，定價檔案會下載至每個 EC2 執行個體。\n\nEC2 執行個體偶爾會使用過時的定價資訊，這可能導致對客戶收取不正確的費用。\n\n哪種解決方案能以最低成本解決此問題？","options":{"A":"建立一個 AWS Lambda 函數，每次更新定價檔案時，以新價格更新 Amazon DynamoDB 資料表。更新票務服務以使用 DynamoDB 查詢定價。","B":"建立一個 AWS Lambda 函數，每次更新定價檔案時，以定價檔案更新 Amazon Elastic File System（Amazon EFS）檔案共用。更新票務服務以使用 Amazon EFS 存取定價檔案。","C":"將 Mountpoint for Amazon S3 載入至 EC2 執行個體的 AMI 中。將 Mountpoint for Amazon S3 設定為掛載包含定價檔案的 S3 儲存貯體。更新票務服務以指向掛載點和路徑來存取 S3 物件。","D":"建立一個 Amazon Elastic Block Store（Amazon EBS）磁碟區。使用 EBS Multi-Attach 將磁碟區附加至每個 EC2 執行個體。當新的 EC2 執行個體啟動時，設定新執行個體以更新 EBS 磁碟區上的定價檔案。更新票務服務以指向新的本地來源。"},"answer":"A"},{"num":508,"stem":"一家公司有一個在 Auto Scaling 群組中使用 Amazon EC2 執行個體的應用程式。品質保證（QA）部門需要啟動大量短期環境來測試應用程式。目前，應用程式環境是由部門主管使用 AWS CloudFormation 範本來啟動的。為了啟動堆疊，主管使用具有 CloudFormation、EC2 和 Auto Scaling API 使用權限的角色。主管希望允許測試人員啟動自己的環境，但不想授予每個使用者廣泛的權限。\n\n哪種設定能夠達成這些目標？","options":{"A":"將 AWS CloudFormation 範本上傳至 Amazon S3。授予 QA 部門使用者擔任主管角色的權限，並新增限制範本和其建立的資源權限的策略。訓練使用者從 CloudFormation 主控台啟動範本。","B":"從環境範本建立 AWS Service Catalog 產品。使用現有角色在產品中新增啟動限制條件。僅授予 QA 部門使用者使用 AWS Service Catalog API 的權限。訓練使用者從 AWS Service Catalog 主控台啟動範本。","C":"將 AWS CloudFormation 範本上傳至 Amazon S3。授予 QA 部門使用者使用 CloudFormation 和 S3 API 的權限，並加入限制範本和其建立的資源權限的條件。訓練使用者從 CloudFormation 主控台啟動範本。","D":"從環境範本建立 AWS Elastic Beanstalk 應用程式。僅授予 QA 部門使用者 Elastic Beanstalk 權限。訓練使用者使用 Elastic Beanstalk CLI 啟動 Elastic Beanstalk 環境，並將現有角色作為服務角色傳遞至環境。"},"answer":"B"},{"num":509,"stem":"一家公司僅使用單一 AWS 區域來運營其電子商務網站。該網站包含一個在 Application Load Balancer（ALB）後方的多個 Amazon EC2 執行個體上執行的 Web 應用程式，以及一個 Amazon DynamoDB 資料表。Amazon Route 53 中的自訂網域名稱已連結至 ALB。公司在 AWS Certificate Manager（ACM）中建立了 SSL/TLS 憑證，並將憑證附加至 ALB。公司設計中未使用內容傳遞網路。\n\n公司希望在第二個區域複製其整個應用程式堆疊，以提供災難復原、規劃未來成長，並為使用者提供更快的存取時間。解決方案架構師需要實作一個能夠達成這些目標並最大程度降低管理開銷的解決方案。\n\n解決方案架構師應採取哪些步驟組合來滿足這些需求？（選擇三個）","options":{"A":"為目前的基礎架構設計建立 AWS CloudFormation 範本。對重要的系統值（包括區域）使用參數。使用 CloudFormation 範本在第二個區域建立新基礎架構。","B":"使用 AWS Management Console 記錄第一個區域中的現有基礎架構設計，並在第二個區域建立新基礎架構。","C":"更新應用程式的 Route 53 託管區域記錄以使用加權路由。將 50% 的流量傳送至每個區域的 ALB。","D":"更新應用程式的 Route 53 託管區域記錄以使用延遲型路由。將流量傳送至每個區域的 ALB。","E":"透過啟用 DynamoDB Streams 更新現有 DynamoDB 資料表的設定。新增第二個區域以建立全球資料表。 F. 建立新的 DynamoDB 資料表。為新資料表啟用 DynamoDB Streams。新增第二個區域以建立全球資料表。以一次性作業將資料從現有 DynamoDB 資料表複製到新資料表。"},"answer":"ADE"},{"num":510,"stem":"一家公司希望為其資料科學家建立單一 Amazon S3 儲存貯體，以儲存與工作相關的文件。公司使用 AWS IAM Identity Center 對所有使用者進行身份驗證。已為資料科學家建立了一個群組。\n\n公司希望讓資料科學家僅能存取自己的工作成果。公司還希望建立每月報告，顯示每位使用者存取了哪些文件。\n\n哪些步驟組合能夠滿足這些需求？（選擇兩個）","options":{"A":"建立自訂 IAM Identity Center 權限集，以授予資料科學家存取與其使用者名稱標籤相符的 S3 儲存貯體前綴的權限。使用策略以 ${aws:PrincipalTag/userName}/* 條件限制對路徑的存取。","B":"為資料科學家群組建立具有 Amazon S3 讀取和寫入存取權的 IAM Identity Center 角色。新增允許存取 IAM Identity Center 角色的 S3 儲存貯體策略。","C":"設定 AWS CloudTrail 記錄 S3 資料事件，並將記錄傳送至 S3 儲存貯體。使用 Amazon Athena 對 Amazon S3 中的 CloudTrail 記錄執行查詢並產生報告。","D":"設定 AWS CloudTrail 將 S3 管理事件記錄至 CloudWatch。使用 Amazon Athena 的 CloudWatch 連接器查詢記錄並產生報告。","E":"啟用 S3 存取記錄至 EMR File System（EMRFS）。使用 Amazon S3 Select 查詢記錄並產生報告。"},"answer":"AC"},{"num":511,"stem":"一家公司在 Amazon EC2 執行個體上託管資料處理應用程式。該應用程式會輪詢 Amazon Elastic File System（Amazon EFS）檔案系統以偵測新上傳的檔案。當偵測到新檔案時，應用程式會從檔案中擷取資料，並執行邏輯以選取 Docker 容器映像來處理該檔案。應用程式會啟動適當的容器映像，並將檔案位置作為參數傳遞。\n\n容器執行的資料處理最多可能需要 2 小時。處理完成後，在容器內執行的程式碼會將檔案寫回 Amazon EFS 並結束。\n\n公司需要重構應用程式，以消除正在執行容器的 EC2 執行個體。\n\n哪種解決方案能夠滿足這些需求？","options":{"A":"建立 Amazon Elastic Container Service（Amazon ECS）叢集。將處理設定為以 AWS Fargate 任務執行。將容器選擇邏輯擷取為 Amazon EventBridge 規則來執行，以啟動適當的 Fargate 任務。設定 EventBridge 規則，使其在檔案新增至 EFS 檔案系統時執行。","B":"建立 Amazon Elastic Container Service（Amazon ECS）叢集。將處理設定為以 AWS Fargate 任務執行。更新容器選擇邏輯並將其容器化，以作為啟動適當 Fargate 任務的 Fargate 服務執行。設定 EFS 事件 notification，以在檔案新增至 EFS 檔案系統時叫用 Fargate 服務。","C":"建立 Amazon Elastic Container Service（Amazon ECS）叢集。將處理設定為以 AWS Fargate 任務執行。將容器選擇邏輯擷取為啟動適當 Fargate 任務的 AWS Lambda 函數來執行。將檔案上傳的儲存遷移至 Amazon S3 儲存貯體。更新處理程式碼以使用 Amazon S3。設定 S3 事件 notification，以在建立物件時叫用 Lambda 函數。","D":"為處理建立 AWS Lambda 容器映像。設定 Lambda 函數以使用容器映像。將容器選擇邏輯擷取為叫用適當 Lambda 處理函數的決策 Lambda 函數來執行。將檔案上傳的儲存遷移至 Amazon S3 儲存貯體。更新處理程式碼以使用 Amazon S3。設定 S3 事件 notification，以在建立物件時叫用決策 Lambda 函數。"},"answer":"C"},{"num":512,"stem":"一家媒體公司有一個 30 TB 的數位新聞影片儲存庫。這些影片以磁帶形式儲存在本地磁帶庫中，並由媒體資產管理（MAM）系統進行參照。公司希望以自動化方式豐富這些影片的中繼資料，並使用 MAM 功能將其放入可搜尋的目錄中。公司必須能夠根據影片中的資訊進行搜尋，例如物件、場景項目或人臉。現有一個目錄，其中包含出現在影片中的人員面孔，以及每個人的影像。公司希望將這些影片遷移至 AWS。\n\n公司與 AWS 之間有一個高速 AWS Direct Connect 連線，並希望直接從其目前的檔案系統移動 MAM 解決方案的影片內容。\n\n如何使用最少的持續管理開銷並對現有系統造成最小的干擾來滿足這些需求？","options":{"A":"在本地設定 AWS Storage Gateway 的檔案閘道設備。使用 MAM 解決方案從目前的封存中擷取影片，並將其推送至檔案閘道。使用面孔目錄在 Amazon Rekognition 中建立集合。建立一個 AWS Lambda 函數，叫用 Rekognition JavaScript SDK，讓 Rekognition 從支援檔案閘道的 Amazon S3 檔案中提取影片，擷取所需的中繼資料，並將中繼資料推送至 MAM 解決方案。","B":"在本地設定 AWS Storage Gateway 的磁帶閘道設備。使用 MAM 解決方案從目前的封存中擷取影片，並將其推送至磁帶閘道。使用面孔目錄在 Amazon Rekognition 中建立集合。建立一個 AWS Lambda 函數，叫用 Rekognition JavaScript SDK，讓 Amazon Rekognition 處理磁帶閘道中的影片，擷取所需的中繼資料，並將中繼資料推送至 MAM 解決方案。","C":"使用 Amazon Kinesis Video Streams 設定影片擷取串流。使用面孔目錄在 Amazon Rekognition 中建立集合。從 MAM 解決方案將影片串流至 Kinesis Video Streams。設定 Amazon Rekognition 以處理串流影片。然後，使用串流消費者擷取所需的中繼資料，並將中繼資料推送至 MAM 解決方案。設定串流以將影片儲存在 Amazon S3 中。","D":"設定執行 OpenCV 函式庫的 Amazon EC2 執行個體。將影片、影像和面孔目錄從本地庫複製到此 EC2 執行個體上掛載的 Amazon EBS 磁碟區。處理影片以擷取所需的中繼資料，並將中繼資料推送至 MAM 解決方案，同時也將影片檔案複製到 Amazon S3 儲存貯體。"},"answer":"A"},{"num":513,"stem":"一家公司需要最佳化 AWS 環境的成本，該環境在 AWS Organizations 的組織中包含多個帳戶。公司在 3 年前進行了成本最佳化活動，並購買了最近到期的 Amazon EC2 Standard Reserved Instances。公司還需要 EC2 執行個體再使用 3 年。此外，公司還部署了新的無伺服器工作負載。\n\n哪種策略能為公司提供最大的成本節省？","options":{"A":"以全額預付方式購買相同的 Reserved Instances，再使用 3 年。在管理帳戶中以全額預付方式購買 3 年期 Compute Savings Plan，以支付任何額外的運算成本。","B":"在每個成員帳戶中以不預付方式購買 1 年期 Compute Savings Plan。在 AWS Cost Management 主控台中使用 Savings Plans 建議來選擇 Compute Savings Plan。","C":"在管理帳戶中以不預付方式購買 3 年期 EC2 Instance Savings Plan，以涵蓋每個 AWS 區域的 EC2 成本。在管理帳戶中以不預付方式購買 3 年期 Compute Savings Plan，以支付任何額外的運算成本。","D":"在每個成員帳戶中以全額預付方式購買 3 年期 EC2 Instance Savings Plan。在 AWS Cost Management 主控台中使用 Savings Plans 建議來選擇 EC2 Instance Savings Plan。"},"answer":"C"},{"num":514,"stem":"一家公司營運一個全球服務客戶的靜態內容發佈平台。客戶從自己的 AWS 帳戶使用內容。\n\n公司從 Amazon S3 儲存貯體提供其內容服務。公司使用 S3 File Gateway 將內容從本地環境上傳至 S3 儲存貯體。\n\n公司希望透過從地理位置最接近客戶的 AWS 區域提供內容服務來改善平台的效能和可靠性。公司必須以最低延遲且不暴露於公共網際網路的方式將本地資料路由至 Amazon S3。\n\n哪些步驟組合能以最低的營運開銷滿足這些需求？（選擇兩個）","options":{"A":"實作 S3 Multi-Region Access Points。","B":"使用 S3 Cross-Region Replication（CRR）將內容複製到不同區域。","C":"建立 AWS Lambda 函數以追蹤客戶端到區域的路由。","D":"使用 AWS Site-to-Site VPN 連線以連接至 Multi-Region Access Point。","E":"使用 AWS PrivateLink 和 AWS Direct Connect 連接至 Multi-Region Access Point。"},"answer":"AE"},{"num":515,"stem":"一家公司正在將其資料中心遷移至 AWS Cloud，並需要儘快完成遷移。公司在資料中心的數百個 VMware VM 上執行許多應用程式。每個 VM 都設定了一個包含通用共用檔案的 Windows 共用資料夾。檔案共用大小超過 100 GB。\n\n公司的合規團隊要求對每個 VM 的每次軟體安裝和修改都需提交並核准變更請求。公司在 AWS 和資料中心之間有一個 10 GB 頻寬的 AWS Direct Connect 連線。\n\n公司應採取哪些步驟，以最短時間完成遷移？","options":{"A":"使用 VM Import/Export 建立每個 VM 的映像。使用 AWS Application Migration Service 管理和檢視映像。將 Windows 檔案共用資料複製至 Amazon Elastic File System（Amazon EFS）檔案系統。遷移後，將檔案共用重新對應至 EFS 檔案系統。","B":"將 AWS Application Discovery Service 無代理程式設備部署至 VMware vCenter。在 AWS Migration Hub 中檢閱已探索 VM 的組合。","C":"將 AWS Application Migration Service 無代理程式設備部署至 VMware vCenter。將 Windows 檔案共用資料複製至新的 Amazon FSx for Windows File Server 檔案系統。遷移後，將每個 VM 上的檔案共用重新對應至 FSx for Windows File Server 檔案系統。","D":"在 AWS Migration Hub 中建立並檢閱組合。訂購 AWS Snowcone 裝置。將 AWS Application Migration Service 部署至 VMware vCenter，並將所有 VM 匯出至 Snowcone 裝置。將所有 Windows 檔案共用資料複製至 Snowcone 裝置。將 Snowcone 裝置寄送至 AWS。使用 Application Migration Service 部署所有已遷移的執行個體。"},"answer":"C"},{"num":516,"stem":"一家公司在 AWS Organizations 的組織中擁有多個 AWS 帳戶。公司需要儲存 AWS 帳戶活動，並從中央位置使用 SQL 查詢資料。\n\n哪種解決方案能夠滿足這些需求？","options":{"A":"在每個帳戶中建立 AWS CloudTrail 追蹤。為追蹤指定 CloudTrail 管理事件。設定 CloudTrail 將事件傳送至 Amazon CloudWatch Logs。設定 CloudWatch 跨帳戶可觀測性。在 CloudWatch Logs Insights 中查詢資料。","B":"使用委派管理員帳戶建立 AWS CloudTrail Lake 資料存放區。為資料存放區指定 CloudTrail 管理事件。為組織中的所有帳戶啟用資料存放區。在 CloudTrail Lake 中查詢資料。","C":"使用委派管理員帳戶建立 AWS CloudTrail 追蹤。為追蹤指定 CloudTrail 管理事件。為組織中的所有帳戶啟用追蹤。保持所有其他設定為預設值。從 CloudTrail 事件歷程記錄頁面查詢 CloudTrail 資料。","D":"使用 AWS CloudFormation StackSets 在每個帳戶中部署 AWS CloudTrail Lake 資料存放區。為資料存放區指定 CloudTrail 管理事件。保持所有其他設定為預設值。在 CloudTrail Lake 中查詢資料。"},"answer":"B"},{"num":517,"stem":"一家公司使用 AWS 開發和管理其生產 Web 應用程式。該應用程式包含一個叫用 AWS Lambda 函數的 Amazon API Gateway HTTP API。Lambda 函數處理資料後，將其儲存在資料庫中。\n\n公司希望以整合的方式為 Web 應用程式實作使用者授權。公司已使用第三方身份提供者，為公司的其他應用程式核發 OAuth 令牌。\n\n哪種解決方案能夠滿足這些需求？","options":{"A":"將公司的第三方身份提供者與 API Gateway 整合。設定 API Gateway Lambda 授權方以驗證來自身份提供者的令牌。在所有 API 路由上要求使用 Lambda 授權方。更新 Web 應用程式以從身份提供者取得令牌，並在呼叫 API Gateway HTTP API 時，將令牌包含在 Authorization 標頭中。","B":"將公司的第三方身份提供者與 AWS Directory Service 整合。將 Directory Service 設定為 API Gateway 授權方以驗證來自身份提供者的令牌。在所有 API 路由上要求使用 Directory Service 授權方。將 AWS IAM Identity Center 設定為 SAML 2.0 身份提供者。將 Web 應用程式設定為自訂 SAML 2.0 應用程式。","C":"將公司的第三方身份提供者與 AWS IAM Identity Center 整合。設定 API Gateway 使用 IAM Identity Center 進行零設定的身份驗證和授權。更新 Web 應用程式以從 IAM Identity Center 擷取 AWS Security Token Service（AWS STS）令牌，並在呼叫 API Gateway HTTP API 時，將令牌包含在 Authorization 標頭中。","D":"將公司的第三方身份提供者與 AWS IAM Identity Center 整合。設定具有呼叫 API Gateway HTTP API 權限的 IAM 使用者。更新 Web 應用程式以從 IAM 使用者擷取請求參數，並在呼叫 API Gateway HTTP API 時，將這些參數包含在 Authorization 標頭中。"},"answer":"A"},{"num":518,"stem":"一家公司在 AWS 帳戶中已將應用程式部署至數千個 Amazon EC2 執行個體。安全稽核發現有多個未加密的 Amazon Elastic Block Store（Amazon EBS）磁碟區已附加至 EC2 執行個體。公司的安全策略要求對 EBS 磁碟區進行加密。\n\n公司需要實作自動化解決方案以加密 EBS 磁碟區。此解決方案還必須防止開發團隊建立未加密的 EBS 磁碟區。\n\n哪種解決方案能夠滿足這些需求？","options":{"A":"設定識別未加密 EBS 磁碟區的 AWS Config 受管規則。設定自動修復動作。關聯包含建立新加密 EBS 磁碟區步驟的 AWS Systems Manager Automation 執行手冊。建立 AWS Key Management Service（AWS KMS）客戶受管金鑰。在金鑰策略中，包含拒絕建立未加密 EBS 磁碟區的陳述式。","B":"使用 AWS Systems Manager Fleet Manager 建立未加密 EBS 磁碟區的清單。建立包含建立新加密 EBS 磁碟區步驟的 Systems Manager Automation 執行手冊。建立 SCP 以拒絕建立未加密 EBS 磁碟區。","C":"使用 AWS Systems Manager Fleet Manager 建立未加密 EBS 磁碟區的清單。建立包含建立新加密 EBS 磁碟區步驟的 Systems Manager Automation 執行手冊。修改 AWS 帳戶的 EBS 加密設定，以一律加密新的 EBS 磁碟區。","D":"設定識別未加密 EBS 磁碟區的 AWS Config 受管規則。設定自動修復動作。關聯包含建立新加密 EBS 磁碟區步驟的 AWS Systems Manager Automation 執行手冊。修改 AWS 帳戶的 EBS 加密設定，以一律加密新的 EBS 磁碟區。"},"answer":"D"},{"num":519,"stem":"一家公司在 AWS Cloud 中執行大型容器化工作負載。該工作負載包含大約 100 個不同的服務。公司使用 Amazon Elastic Container Service（Amazon ECS）協調工作負載。\n\n最近，公司的開發團隊開始在 ECS 叢集中使用 AWS Fargate，而不是 Amazon EC2 執行個體。過去，工作負載幾乎用盡了帳戶中可用的最大 EC2 執行個體數量。\n\n公司擔心工作負載可能會達到允許的最大 ECS 任務數量。解決方案架構師必須實作一個解決方案，以便在 Fargate 達到最大任務數量的 80% 時通知開發團隊。\n\n解決方案架構師應如何滿足此需求？","options":{"A":"使用 Amazon CloudWatch 監控 ECS 叢集中每個服務的 Sample Count 統計資料。當數學運算式 sample count/SERVICE_QUOTA(service)*100 大於 80 時設定警示。使用 Amazon Simple Notification Service（Amazon SNS）通知開發團隊。","B":"使用 Amazon CloudWatch 監控在 AWS/Usage 指標命名空間下發佈的服務配額。當數學運算式 metric/SERVICE_QUOTA(metric)*100 大於 80 時設定警示。使用 Amazon Simple Notification Service（Amazon SNS）通知開發團隊。","C":"建立 AWS Lambda 函數以輪詢 ECS 叢集的詳細指標。當執行中的 Fargate 任務數量超過 80 時，叫用 Amazon Simple Email Service（Amazon SES）以通知開發團隊。","D":"建立 AWS Config 規則以評估 Fargate SERVICE_QUOTA 是否大於 80。當 AWS Config 規則不合規時，使用 Amazon Simple Email Service（Amazon SES）通知開發團隊。"},"answer":"B"},{"num":520,"stem":"一家公司有多個以 Python 撰寫的 AWS Lambda 函數。這些函數以 .zip 套件部署類型進行部署。這些函數使用包含通用函式庫和套件的 Lambda 層，儲存在 .zip 檔案中。Lambda .zip 套件和 Lambda 層 .zip 檔案儲存在 Amazon S3 儲存貯體中。\n\n公司必須對 Lambda 函數和 Lambda 層實作自動掃描，以識別 CVE。部分 Lambda 函數必須接受自動化程式碼掃描，以偵測潛在的資料洩漏和其他漏洞。程式碼掃描必須僅針對選定的 Lambda 函數執行，而非所有 Lambda 函數。\n\n哪些動作組合能夠滿足這些需求？（選擇三個）","options":{"A":"啟用 Amazon Inspector。啟動自動化 CVE 掃描。","B":"在 Amazon Inspector 中啟用 Lambda 標準掃描和 Lambda 程式碼掃描。","C":"啟用 Amazon GuardDuty。在 GuardDuty 中啟用 Lambda Protection 功能。","D":"在需要程式碼掃描的 Lambda 函數的監控設定中啟用掃描。","E":"為不需要程式碼掃描的 Lambda 函數新增標籤。在標籤中，包含鍵為 InspectorCodeExclusion 且值為 LambdaCodeScanning 的項目。 F. 使用 Amazon Inspector 掃描包含 Lambda .zip 套件和 Lambda 層 .zip 檔案的 S3 儲存貯體，以進行程式碼掃描。"},"answer":"ABE"},{"num":521,"stem":"一家公司正在變更其在應用程式帳戶中修補 Amazon EC2 執行個體的方式。目前，公司透過應用程式帳戶 VPC 中的 NAT 閘道透過網際網路修補執行個體。\n\n公司在核心帳戶的專用私有 VPC 中設定了 EC2 執行個體作為修補來源儲存庫。公司希望使用 AWS Systems Manager Patch Manager 和核心帳戶中的修補來源儲存庫，對應用程式帳戶中的 EC2 執行個體進行修補。公司必須防止應用程式帳戶中的所有 EC2 執行個體存取網際網路。\n\n應用程式帳戶中的 EC2 執行個體需要存取儲存應用程式資料的 Amazon S3。這些 EC2 執行個體需要連接至 Systems Manager 以及核心帳戶中私有 VPC 內的修補來源儲存庫。\n\n哪種解決方案能夠滿足這些需求？","options":{"A":"建立一個封鎖連接埠 80 對外流量的網路 ACL。將網路 ACL 與應用程式帳戶中的所有子網路建立關聯。在應用程式帳戶和核心帳戶中，各部署一個執行自訂 VPN 伺服器的 EC2 執行個體。建立 VPN 通道以存取私有 VPC。更新應用程式帳戶中的路由表。","B":"為 Systems Manager 和 Amazon S3 建立私有虛擬介面（Private VIF）。從應用程式帳戶的 VPC 中刪除 NAT 閘道。建立傳輸閘道以存取核心帳戶中的修補來源儲存庫 EC2 執行個體。更新核心帳戶中的路由表。","C":"為 Systems Manager 和 Amazon S3 建立 VPC 端點。從應用程式帳戶的 VPC 中刪除 NAT 閘道。建立 VPC 對等連線以存取核心帳戶中的修補來源儲存庫 EC2 執行個體。更新兩個帳戶中的路由表。","D":"建立一個封鎖連接埠 80 入站流量的網路 ACL。將網路 ACL 與應用程式帳戶中的所有子網路建立關聯。建立傳輸閘道以存取核心帳戶中的修補來源儲存庫 EC2 執行個體。更新兩個帳戶中的路由表。"},"answer":"C"},{"num":522,"stem":"一家位於美國（US）的公司收購了一家歐洲公司。兩家公司都使用 AWS Cloud。美國公司建立了一個採用微服務架構的新應用程式。美國公司在 us-east-2 區域的五個 VPC 中託管應用程式。應用程式必須能夠存取 eu-west-1 區域中一個 VPC 的資源。\n\n但是，應用程式不得存取任何其他 VPC。\n\n兩個區域中的 VPC 沒有重疊的 CIDR 範圍。所有帳戶已合併到 AWS Organizations 的一個組織中。\n\n哪種解決方案能以最低成本滿足這些需求？","options":{"A":"在 eu-west-1 中建立一個傳輸閘道。將 us-east-2 中的 VPC 和 eu-west-1 中的 VPC 附加至傳輸閘道。在每個 VPC 中建立必要的路由項目，使流量透過傳輸閘道路由。","B":"在每個區域中建立一個傳輸閘道。將相關子網路附加至區域傳輸閘道。為每個子網路的關聯路由表建立必要的路由項目，使流量透過區域傳輸閘道路由。為兩個傳輸閘道建立對等連線。","C":"在所有 VPC 之間建立完整網狀 VPC 對等連線設定。在每個 VPC 中建立必要的路由項目，使流量透過 VPC 對等連線路由。","D":"為 us-east-2 中的每個 VPC 建立一個至 eu-west-1 VPC 的 VPC 對等連線。在每個 VPC 中建立必要的路由項目，使流量透過 VPC 對等連線路由。"},"answer":"D"},{"num":523,"stem":"一家旅遊公司建立了一個 Web 應用程式，使用 Amazon Simple Email Service（Amazon SES）向使用者傳送電子郵件 notification。公司需要啟用記錄以協助排解電子郵件傳遞問題。公司還需要能夠根據收件人、主旨和傳送時間進行搜尋。\n\n解決方案架構師應採取哪些步驟組合來滿足這些需求？（選擇兩個）","options":{"A":"建立以 Amazon Data Firehose 為目的地的 Amazon SES configuration set。選擇將記錄傳送至 Amazon S3 儲存貯體。","B":"啟用 AWS CloudTrail 記錄。指定 Amazon S3 儲存貯體作為記錄的目的地。","C":"使用 Amazon Athena 查詢 Amazon S3 儲存貯體中的記錄，以取得收件人、主旨和傳送時間。","D":"建立 Amazon CloudWatch 日誌群組。設定 Amazon SES 將記錄傳送至日誌群組。","E":"使用 Amazon Athena 查詢 Amazon CloudWatch 中的記錄，以取得收件人、主旨和傳送時間。"},"answer":"AC"},{"num":524,"stem":"一家公司已遷移至 AWS，並使用 AWS Business Support。公司希望監控跨 AWS 帳戶的 Amazon EC2 執行個體的成本效益。EC2 執行個體具有部門、業務單位和環境的標籤。開發 EC2 執行個體成本高但使用率低。\n\n公司需要偵測並停止任何使用率不足的開發 EC2 執行個體。如果執行個體在過去 14 天中至少有 4 天的日均 CPU 使用率低於或等於 10%，且網路 I/O 低於或等於 5 MB，則視為使用率不足。\n\n哪種解決方案能以最低的營運開銷滿足這些需求？","options":{"A":"設定 Amazon CloudWatch 儀表板，根據部門、業務單位和環境的標籤監控 EC2 執行個體使用率。建立 Amazon EventBridge 規則，叫用 AWS Lambda 函數以停止使用率不足的開發 EC2 執行個體。","B":"設定 AWS Systems Manager 以追蹤 EC2 執行個體使用率，並將使用率不足的執行個體報告至 Amazon CloudWatch。按部門、業務單位和環境的標籤篩選 CloudWatch 資料。建立 Amazon EventBridge 規則，叫用 AWS Lambda 函數以停止使用率不足的開發 EC2 執行個體。","C":"建立 Amazon EventBridge 規則，以偵測 AWS Trusted Advisor 回報的 EC2 執行個體低使用率。設定規則以叫用 AWS Lambda 函數，該函數按部門、業務單位和環境的標籤篩選資料，並停止使用率不足的開發 EC2 執行個體。","D":"建立 AWS Lambda 函數，每日執行以擷取所有 EC2 執行個體的使用率資料。將資料儲存至 Amazon DynamoDB 資料表。建立以 DynamoDB 資料表作為資料來源的 Amazon QuickSight 儀表板，以識別並停止使用率不足的開發 EC2 執行個體。"},"answer":"C"},{"num":525,"stem":"一家公司在 AWS 上為一個將執行 3 年的專案託管應用程式。該應用程式包含 20 個已在 Network Load Balancer（NLB）目標群組中登錄的 Amazon EC2 隨需執行個體。這些執行個體分佈在兩個可用區域中。應用程式是無狀態的，每週 7 天、每天 24 小時執行。\n\n公司收到使用者關於應用程式回應緩慢的報告。效能指標顯示，在正常應用程式使用期間，執行個體的 CPU 使用率為 10%。然而，在繁忙時段，CPU 使用率會上升至 100%，這種情況通常持續數小時。\n\n公司需要新的架構來解決應用程式回應緩慢的問題。\n\n哪種解決方案能以最低成本滿足這些需求？","options":{"A":"建立 Auto Scaling 群組。將 Auto Scaling 群組附加至 NLB 的目標群組。將最小容量設定為 20，將所需容量設定為 28。為 20 個執行個體購買 Reserved Instances。","B":"建立一個請求類型為 request 的 Spot Fleet。將 TotalTargetCapacity 參數設定為 20。將 DefaultTargetCapacityType 參數設定為 On-Demand。在建立 Spot Fleet 時指定 NLB。","C":"建立一個請求類型為 maintain 的 Spot Fleet。將 TotalTargetCapacity 參數設定為 20。將 DefaultTargetCapacityType 參數設定為 Spot。將 NLB 替換為 Application Load Balancer。","D":"建立 Auto Scaling 群組。將 Auto Scaling 群組附加至 NLB 的目標群組。將最小容量設定為 4，將最大容量設定為 28。為四個執行個體購買 Reserved Instances。"},"answer":"D"},{"num":526,"stem":"一家公司正在建立一個應用程式，用於收集並傳輸工廠的感測器資料。該應用程式將使用 AWS IoT Core 將數百台裝置的資料傳送至 Amazon S3 資料湖。公司必須在將資料載入 Amazon S3 之前先對資料進行豐富化處理。\n該應用程式每 5 秒傳輸一次感測器資料。新的感測器資料必須在應用程式收集資料後 30 分鐘內提供至 Amazon S3。沒有其他應用程式正在處理來自 AWS IoT Core 的感測器資料。\n哪個解決方案能以最具成本效益的方式滿足這些需求？","options":{"A":"在 AWS IoT Core 中建立一個主題以接收感測器資料。建立一個 AWS Lambda 函數以豐富資料並將資料寫入 Amazon S3。設定 AWS IoT 規則動作以叫用 Lambda 函數。","B":"使用 AWS IoT Core Basic Ingest 接收感測器資料。設定 AWS IoT 規則動作以將資料寫入 Amazon Kinesis Data Firehose。將 Kinesis Data Firehose 的緩衝時間間隔設定為 900 秒。使用 Kinesis Data Firehose 叫用 AWS Lambda 函數以豐富資料，並設定 Kinesis Data Firehose 將資料交付至 Amazon S3。","C":"在 AWS IoT Core 中建立一個主題以接收感測器資料。設定 AWS IoT 規則動作以將資料傳送至 Amazon Timestream 表格。建立一個 AWS Lambda 函數以從 Timestream 讀取資料。設定 Lambda 函數以豐富資料並將資料寫入 Amazon S3。","D":"使用 AWS IoT Core Basic Ingest 接收感測器資料。設定 AWS IoT 規則動作以將資料寫入 Amazon Kinesis Data Streams。建立一個消費者 AWS Lambda 函數以處理來自 Kinesis Data Streams 的資料並豐富資料。從 Lambda 函數呼叫 S3 PutObject API 操作以將資料寫入 Amazon S3。"},"answer":"A"},{"num":527,"stem":"一家公司正在從大量 IoT 裝置收集資料。資料儲存於 Amazon S3 資料湖中。資料科學家在另一個 AWS 帳戶中的 VPC 內兩個公有子網路中執行的 Amazon EC2 執行個體上進行分析。\n資料科學家需要從 EC2 執行個體存取資料湖。EC2 執行個體已具有指派的角色，並擁有存取 Amazon S3 的權限。\n根據公司政策，僅允許經授權的網路存取 IoT 資料。\n解決方案架構師應採取哪些組合步驟來滿足這些需求？（選擇兩個）","options":{"A":"在資料科學家的 VPC 中為 Amazon S3 建立一個閘道器 VPC 端點。","B":"在資料科學家的 AWS 帳戶中為資料湖建立一個 S3 存取點。","C":"更新 EC2 執行個體角色。新增一個具有條件的政策，當 s3:DataAccessPointArn 條件金鑰的值為有效的存取點 ARN 時，允許 s3:GetObject 動作。","D":"更新 VPC 路由表，將 S3 流量路由至 S3 存取點。","E":"新增 S3 儲存貯體政策，當 s3:DataAccessPointArn 條件金鑰的值為有效的存取點 ARN 時，允許 s3:GetObject 動作。"},"answer":"BC"},{"num":528,"stem":"一家公司希望將其網站遷移至 AWS。該網站使用部署在本地端自我管理的 Kubernetes 叢集中的容器。網站的所有資料都儲存在本地端的 PostgreSQL 資料庫中。\n公司決定將本地端的 Kubernetes 叢集遷移至 Amazon Elastic Kubernetes Service（Amazon EKS）叢集。EKS 叢集將使用具有固定節點數量的 EKS 受管節點群組。公司也將把本地端資料庫遷移至 Amazon RDS for PostgreSQL 資料庫。\n解決方案架構師需要在遷移前估算此工作負載的總擁有成本（TCO）。\n哪個解決方案能提供所需的 TCO 資訊？","options":{"A":"申請存取 Migration Evaluator。執行 Migration Evaluator Collector 並匯入資料。設定情境。從 Migration Evaluator 匯出快速洞察報告。","B":"為本地端資料庫啟動 AWS Database Migration Service（AWS DMS）。產生評估報告。在 AWS Pricing Calculator 中建立 EKS 遷移成本的估算。","C":"初始化 AWS Application Migration Service。將本地端伺服器新增為來源伺服器。啟動測試執行個體。從 Application Migration Service 輸出 TCO 報告。","D":"存取 AWS Cloud Economics Center 網頁以評估 AWS Cloud Value Framework。從 Cloud Value Framework 建立 AWS Cost and Usage 報告。"},"answer":"A"},{"num":529,"stem":"一家活動公司在 AWS 上執行票務平台。公司的客戶在該平台上設定並排程他們的活動。這些活動會導致平台流量大幅增加。公司知道每位客戶活動的日期和時間。\n公司在 Amazon Elastic Container Service（Amazon ECS）叢集上執行該平台。ECS 叢集由位於 Auto Scaling 群組中的 Amazon EC2 隨需執行個體組成。Auto Scaling 群組使用預測性擴展政策。\nECS 叢集頻繁向 Amazon S3 儲存貯體發出請求以下載票券資產。ECS 叢集與 S3 儲存貯體位於相同的 AWS 區域和相同的 AWS 帳戶中。ECS 叢集與 S3 儲存貯體之間的流量通過 NAT 閘道器傳輸。\n公司需要在不降低平台可用性的情況下優化平台成本。\n哪些組合步驟將滿足這些需求？（選擇兩個）","options":{"A":"為 S3 儲存貯體建立一個閘道器 VPC 端點。","B":"新增另一個使用 Spot 執行個體 Auto Scaling 群組的 ECS 容量提供者。設定新容量提供者策略，使其與現有容量提供者策略具有相同的權重。","C":"為排程擴展政策的時間段，針對適用的執行個體類型建立隨需容量預留。","D":"在 S3 儲存貯體上啟用 S3 Transfer Acceleration。","E":"以排程擴展政策取代預測性擴展政策，以應對排程的活動。"},"answer":"AC"}];

let mode = 'sequential';
let order = [];
let idx = 0;
let correct = 0;
let wrong = 0;
let skipped = 0;
let answered = false;
let selected = [];

function setMode(m) {
  mode = m;
  document.getElementById('btnSeq').classList.toggle('active', m === 'sequential');
  document.getElementById('btnRand').classList.toggle('active', m === 'random');
  restartQuiz();
}

function restartQuiz() {
  correct = 0; wrong = 0; skipped = 0; idx = 0;
  order = DATA.map((_, i) => i);
  if (mode === 'random') shuffle(order);
  document.getElementById('summary').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  updateScore();
  renderQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function renderQuestion() {
  if (idx >= order.length) { finishQuiz(); return; }
  answered = false;
  selected = [];

  const q = DATA[order[idx]];
  document.getElementById('qNum').textContent = '#' + q.num;
  document.getElementById('stem').textContent = q.stem;

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  for (const [letter, text] of Object.entries(q.options)) {
    const div = document.createElement('div');
    div.className = 'option';
    div.dataset.letter = letter;
    div.innerHTML = `<div class="opt-letter">${letter}</div><div class="opt-text">${text}</div>`;
    div.onclick = () => toggleOption(div, letter);
    optDiv.appendChild(div);
  }

  // Check if multi-answer
  const isMulti = q.answer.length > 1;
  document.getElementById('stem').dataset.multi = isMulti;

  document.getElementById('resultBanner').style.display = 'none';
  document.getElementById('resultBanner').className = 'result-banner';
  document.getElementById('btnSubmit').style.display = 'inline-flex';
  document.getElementById('btnNext').style.display = 'none';
  document.getElementById('btnSkip').style.display = 'inline-flex';

  updateProgress();
}

function toggleOption(div, letter) {
  if (answered) return;
  const q = DATA[order[idx]];
  const isMulti = q.answer.length > 1;

  if (isMulti) {
    if (selected.includes(letter)) {
      selected = selected.filter(l => l !== letter);
      div.classList.remove('selected');
      div.querySelector('.opt-letter').style.background = '';
      div.querySelector('.opt-letter').style.color = '';
    } else {
      selected.push(letter);
      div.classList.add('selected');
    }
  } else {
    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
    selected = [letter];
    div.classList.add('selected');
  }
}

function submitAnswer() {
  if (selected.length === 0) {
    alert('請先選擇答案'); return;
  }
  answered = true;

  const q = DATA[order[idx]];
  const correctLetters = q.answer.split('');
  const isCorrect = selected.length === correctLetters.length &&
    selected.every(l => correctLetters.includes(l));

  document.querySelectorAll('.option').forEach(div => {
    div.classList.add('disabled');
    const letter = div.dataset.letter;
    if (correctLetters.includes(letter)) div.classList.add('highlight');
    if (selected.includes(letter) && !correctLetters.includes(letter)) div.classList.add('wrong');
    if (selected.includes(letter) && correctLetters.includes(letter)) div.classList.add('correct');
  });

  const banner = document.getElementById('resultBanner');
  if (isCorrect) {
    correct++;
    banner.className = 'result-banner correct';
    document.getElementById('resultIcon').textContent = '✅';
    document.getElementById('resultText').textContent = '答對了！正確答案：' + q.answer;
  } else {
    wrong++;
    banner.className = 'result-banner wrong';
    document.getElementById('resultIcon').textContent = '❌';
    document.getElementById('resultText').textContent = '答錯了。正確答案：' + q.answer;
  }
  banner.style.display = 'flex';

  document.getElementById('btnSubmit').style.display = 'none';
  document.getElementById('btnNext').style.display = 'inline-flex';
  document.getElementById('btnSkip').style.display = 'none';
  updateScore();
}

function nextQuestion() {
  idx++;
  renderQuestion();
}

function skipQuestion() {
  skipped++;
  idx++;
  updateScore();
  renderQuestion();
}

function finishQuiz() {
  document.getElementById('quizSection').style.display = 'none';
  document.getElementById('summary').style.display = 'block';

  const answered = correct + wrong;
  const pct = answered === 0 ? 0 : Math.round(correct / answered * 100);
  document.getElementById('summaryScore').textContent = pct + '%';
  document.getElementById('summaryTotal').textContent = `已作答 ${answered} 題（共 ${order.length} 題）`;

  let grade = '';
  if (pct >= 90) grade = '🏆 優秀！通過考試應無問題';
  else if (pct >= 72) grade = '✅ 良好，接近及格標準（72分）';
  else if (pct >= 60) grade = '📚 需要加強，繼續努力';
  else grade = '📖 建議重新複習後再測';
  document.getElementById('summaryGrade').textContent = grade;

  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statSkip').textContent = skipped;
}

function updateScore() {
  document.getElementById('scoreChip').textContent = `✓ ${correct}  ✗ ${wrong}`;
}

function updateProgress() {
  const total = order.length;
  const done = idx;
  document.getElementById('progressText').textContent = `第 ${done + 1} 題 / 共 ${total} 題`;
  document.getElementById('progressBar').style.width = (done / total * 100) + '%';
}

// Init
restartQuiz();
</script>
