kms:Sign"},"answer":"A"},{"num":97,"stem":"一家公司開發了一個 Web 應用程式。公司在 Application Load Balancer 後方的一組 Amazon EC2 執行個體上託管應用程式。公司希望改善應用程式的安全態勢，並計畫使用 AWS WAF web ACL。該解決方案不得對應用程式的合法流量產生負面影響。\n解決方案架構師應如何設定 web ACL 以滿足這些需求？","options":{"A":"將 web ACL 規則的動作設定為 Count。啟用 AWS WAF 日誌記錄。分析請求以找出誤判。修改規則以避免任何誤判。隨著時間推移，將 web ACL 規則的動作從 Count 變更為 Block。","B":"在 web ACL 中僅使用基於速率的規則，並將限制閾值設定得盡量高。暫時封鎖所有超過限制的請求。定義巢狀規則以縮小速率追蹤範圍。","C":"將 web ACL 規則的動作設定為 Block。在 web ACL 中僅使用 AWS 受管規則群組。使用 Amazon CloudWatch 指標搭配 AWS WAF 取樣請求或 AWS WAF 日誌來評估規則群組。","D":"在 web ACL 中僅使用自訂規則群組，並將動作設定為 Allow。啟用 AWS WAF 日誌記錄。分析請求以找出誤判。修改規則以避免任何誤判。隨著時間推移，將 web ACL 規則的動作從 Allow 變更為 Block。"},"answer":"A"},{"num":98,"stem":"一家公司的 AWS Organizations 中有許多 AWS 帳戶。解決方案架構師必須改善公司管理組織中各 AWS 帳戶通用安全群組規則的方式。\n公司在每個 AWS 帳戶的允許清單中有一組通用的 IP CIDR 範圍，用於允許進出公司內部部署網路的流量存取。每個帳戶中的開發人員負責將新的 IP CIDR 範圍新增到其安全群組。安全團隊有自己的 AWS 帳戶。目前，當允許清單發生更改時，安全團隊會通知其他 AWS 帳戶的擁有者。\n解決方案架構師必須設計一個在所有帳戶中分發通用 CIDR 範圍集合的解決方案。\n哪個解決方案以最少的操作負擔滿足這些需求？","options":{"A":"在安全團隊的 AWS 帳戶中設定 Amazon Simple Notification Service（Amazon SNS）主題。在每個 AWS 帳戶中部署一個 AWS Lambda 函數。設定 Lambda 函數在每次 SNS 主題收到訊息時執行。設定 Lambda 函數以 IP 位址作為輸入，並將其新增到帳戶中的安全群組清單。指示安全團隊透過向其 SNS 主題發布訊息來分發更改。","B":"在組織內的每個 AWS 帳戶中建立新的客戶受管前綴清單。在每個帳戶的前綴清單中填入所有內部 CIDR 範圍。通知每個 AWS 帳戶的擁有者，在其帳戶的安全群組中允許新的客戶受管前綴清單 ID。指示安全團隊與每個 AWS 帳戶擁有者共用更新。","C":"在安全團隊的 AWS 帳戶中建立新的客戶受管前綴清單。在客戶受管前綴清單中填入所有內部 CIDR 範圍。使用 AWS Resource Access Manager 與組織共用客戶受管前綴清單。通知每個 AWS 帳戶的擁有者，在其安全群組中允許新的客戶受管前綴清單 ID。","D":"在組織的每個帳戶中建立一個 IAM 角色。授予更新安全群組的權限。在安全團隊的 AWS 帳戶中部署一個 AWS Lambda 函數。設定 Lambda 函數以內部 IP 位址清單作為輸入，在每個組織帳戶中擔任角色，並將 IP 位址清單新增到每個帳戶的安全群組中。"},"answer":"C"},{"num":99,"stem":"一家公司推出了新政策，允許員工在透過 VPN 連線的情況下遠端在家工作。公司在多個 AWS 帳戶的 VPC 中託管內部應用程式。目前，應用程式可透過 AWS Site-to-Site VPN 連線從公司的內部部署辦公室網路存取。公司主要 AWS 帳戶中的 VPC 已與其他 AWS 帳戶中的 VPC 建立對等互連。\n解決方案架構師必須為員工在家工作時使用設計可擴展的 AWS Client VPN 解決方案。\n哪個解決方案以最具成本效益的方式滿足這些需求？","options":{"A":"在每個 AWS 帳戶中建立 Client VPN 端點。設定允許存取內部應用程式所需的路由。","B":"在主要 AWS 帳戶中建立 Client VPN 端點。設定允許存取內部應用程式所需的路由。","C":"在主要 AWS 帳戶中建立 Client VPN 端點。佈建連接到每個 AWS 帳戶的 transit gateway。設定允許存取內部應用程式所需的路由。","D":"在主要 AWS 帳戶中建立 Client VPN 端點。在 Client VPN 端點和 AWS Site-to-Site VPN 之間建立連線。"},"answer":"B"},{"num":100,"stem":"一家公司的應用程式在 AWS Cloud 中運行。最近的應用程式指標顯示回應時間不一致，且錯誤率顯著增加。對第三方服務的呼叫造成了延遲。目前，應用程式透過直接呼叫 AWS Lambda 函數來同步呼叫第三方服務。\n解決方案架構師需要解耦第三方服務呼叫，並確保所有呼叫最終都能完成。\n哪個解決方案能滿足這些需求？","options":{"A":"使用 Amazon Simple Queue Service（Amazon SQS）佇列儲存事件並呼叫 Lambda 函數。","B":"使用 AWS Step Functions 狀態機將事件傳遞給 Lambda 函數。","C":"使用 Amazon EventBridge 規則將事件傳遞給 Lambda 函數。","D":"使用 Amazon Simple Notification Service（Amazon SNS）主題儲存事件並呼叫 Lambda 函數。"},"answer":"A"},{"num":101,"stem":"一家公司在多帳戶環境中於 AWS 上執行應用程式。該公司的銷售團隊和行銷團隊在 AWS Organizations 中使用各自獨立的 AWS 帳戶。\n\n銷售團隊將數 PB 的資料儲存在一個 Amazon S3 儲存桶中。行銷團隊使用 Amazon QuickSight 進行資料視覺化。行銷團隊需要存取銷售團隊儲存在 S3 儲存桶中的資料。公司已使用 AWS Key Management Service (AWS KMS) 金鑰加密了該 S3 儲存桶。行銷團隊已在行銷 AWS 帳戶中為 QuickSight 建立了 IAM 服務角色，以提供 QuickSight 存取權限。公司需要一個能在跨 AWS 帳戶之間安全存取 S3 儲存桶資料的解決方案。\n\n哪個解決方案能以最低的營運負擔滿足這些要求？","options":{"A":"在行銷帳戶中建立一個新的 S3 儲存桶。在銷售帳戶中建立一條 S3 複寫規則，將物件複製到行銷帳戶中的新 S3 儲存桶。更新行銷帳戶中的 QuickSight 權限，以授予對新 S3 儲存桶的存取權限。","B":"建立一個 SCP 以授予行銷帳戶對 S3 儲存桶的存取權限。使用 AWS Resource Access Manager (AWS RAM) 將 KMS 金鑰從銷售帳戶共享給行銷帳戶。更新行銷帳戶中的 QuickSight 權限，以授予對 S3 儲存桶的存取權限。","C":"更新行銷帳戶中的 S3 儲存桶政策，以授予 QuickSight 角色存取權限。為 S3 儲存桶中使用的加密金鑰建立 KMS 授權，授予 QuickSight 角色解密存取權限。更新行銷帳戶中的 QuickSight 權限，以授予對 S3 儲存桶的存取權限。","D":"在銷售帳戶中建立一個 IAM 角色並授予對 S3 儲存桶的存取權限。從行銷帳戶承擔銷售帳戶中的 IAM 角色以存取 S3 儲存桶。更新 QuickSight 角色，與銷售帳戶中的新 IAM 角色建立信任關係。"},"answer":"D"},{"num":102,"stem":"一家公司計畫將其業務關鍵應用程式從本地資料中心遷移至 AWS。該公司在本地安裝了 Microsoft SQL Server Always On 叢集，並希望遷移至 AWS 託管的資料庫服務。解決方案架構師必須在 AWS 上設計一個異質資料庫遷移方案。\n\n哪個解決方案能滿足這些要求？","options":{"A":"使用備份與還原工具將 SQL Server 資料庫遷移至 Amazon RDS for MySQL。","B":"使用 AWS Snowball Edge Storage Optimized 裝置將資料傳輸至 Amazon S3。設置 Amazon RDS for MySQL。使用 S3 與 SQL Server 功能整合，例如 BULK INSERT。","C":"使用 AWS Schema Conversion Tool 將資料庫結構描述轉換為 Amazon RDS for MySQL。然後使用 AWS Database Migration Service (AWS DMS) 將資料從本地資料庫遷移至 Amazon RDS。","D":"使用 AWS DataSync 透過網路在本地儲存空間與 Amazon S3 之間遷移資料。設置 Amazon RDS for MySQL。使用 S3 與 SQL Server 功能整合，例如 BULK INSERT。"},"answer":"C"},{"num":103,"stem":"一家出版公司的設計團隊更新電子商務網頁應用程式所使用的圖示和其他靜態資源。公司從託管在生產帳戶中的 Amazon S3 儲存桶提供圖示和資源。公司還有一個開發帳戶，設計團隊成員可以存取。\n\n在設計團隊於開發帳戶中測試靜態資源後，設計團隊需要將資源載入生產帳戶中的 S3 儲存桶。解決方案架構師必須為設計團隊提供對生產帳戶的存取權限，同時不將網頁應用程式的其他部分暴露於非預期變更的風險中。\n\n哪些步驟組合能滿足這些要求？(選擇三個)","options":{"A":"在生產帳戶中，建立一個允許對 S3 儲存桶進行讀寫存取的新 IAM 政策。","B":"在開發帳戶中，建立一個允許對 S3 儲存桶進行讀寫存取的新 IAM 政策。","C":"在生產帳戶中，建立一個角色。將新政策附加至該角色。將開發帳戶定義為受信任的實體。","D":"在開發帳戶中，建立一個角色。將新政策附加至該角色。將生產帳戶定義為受信任的實體。","E":"在開發帳戶中，建立一個包含設計團隊所有 IAM 使用者的群組。將不同的 IAM 政策附加至該群組，以允許對生產帳戶中角色執行 sts:AssumeRole 動作。 F. 在開發帳戶中，建立一個包含設計團隊所有 IAM 使用者的群組。將不同的 IAM 政策附加至該群組，以允許對開發帳戶中角色執行 sts:AssumeRole 動作。"},"answer":"ADE"},{"num":104,"stem":"一家公司使用 AWS Elastic Beanstalk 和 Java 開發了一個試驗性應用程式。為了節省開發成本，公司的開發團隊將應用程式部署在單一執行個體環境中。近期測試顯示，應用程式消耗的 CPU 資源超出預期。CPU 使用率經常超過 85%，導致一些效能瓶頸。\n\n解決方案架構師必須在公司將應用程式推向生產環境之前解決效能問題。\n\n哪個解決方案能以最低的營運負擔滿足這些要求？","options":{"A":"建立一個新的 Elastic Beanstalk 應用程式。選擇負載平衡環境類型。選取所有可用區域。新增一個擴展規則，當最大 CPU 使用率在 5 分鐘內超過 85% 時觸發。","B":"建立第二個 Elastic Beanstalk 環境。套用流量分割部署政策。當平均 CPU 使用率在 5 分鐘內超過 85% 時，指定一定比例的傳入流量導向新環境。","C":"修改現有環境的容量配置，改為使用負載平衡環境類型。選取所有可用區域。新增一個擴展規則，當平均 CPU 使用率在 5 分鐘內超過 85% 時觸發。","D":"選擇使用負載平衡選項重建環境動作。選取可用區域。新增一個擴展規則，當總 CPU 使用率超過 85% 時在 5 分鐘內觸發。"},"answer":"A"},{"num":105,"stem":"一家金融公司在新一代 Linux EC2 執行個體上執行其業務關鍵應用程式。該應用程式包含一個執行大量 I/O 操作的自我管理 MySQL 資料庫。該應用程式在月中處理適度流量時運作正常。然而，即使公司在基礎架構中使用了 Elastic Load Balancers 和 Auto Scaling 以因應需求增加，在每月最後三天進行月底結算報表時仍會變慢。\n\n以下哪種操作能讓資料庫在月底負載時對效能影響最小？","options":{"A":"預熱 Elastic Load Balancers，使用更大的執行個體類型，並將所有 Amazon EBS 磁碟區更改為 GP2 磁碟區。","B":"一次性將資料庫叢集遷移至 Amazon RDS，並建立數個額外的讀取副本以處理月底的負載。","C":"使用 Amazon CloudWatch 與 AWS Lambda，根據特定的 CloudWatch 指標來變更叢集中 Amazon EBS 磁碟區的類型、大小或 IOPS。","D":"在月底前拍攝快照，將所有現有的 Amazon EBS 磁碟區替換為具有最大可用儲存空間和每秒 I/O 的新 PIOPS 磁碟區，並在之後還原。"},"answer":"B"},{"num":106,"stem":"一家公司執行一個 Java 應用程式，該應用程式對公司資料中心中的 VM 有複雜的相依性。應用程式運作穩定，但公司希望現代化技術堆疊。公司希望將應用程式遷移至 AWS，並最大程度地降低維護伺服器的管理負擔。\n\n哪個解決方案能以最少的程式碼變更滿足這些要求？","options":{"A":"使用 AWS App2Container 將應用程式遷移至 Amazon Elastic Container Service (Amazon ECS) on AWS Fargate。將容器映像儲存在 Amazon Elastic Container Registry (Amazon ECR) 中。授予 ECS 任務執行角色存取 ECR 映像儲存庫的權限。配置 Amazon ECS 使用 Application Load Balancer (ALB)。使用 ALB 與應用程式互動。","B":"將應用程式程式碼遷移至在 AWS Lambda 中執行的容器。建立一個帶有 Lambda 整合的 Amazon API Gateway REST API。使用 API Gateway 與應用程式互動。","C":"使用 AWS App2Container 將應用程式遷移至 Amazon Elastic Kubernetes Service (Amazon EKS) on EKS 受管節點群組。將容器映像儲存在 Amazon Elastic Container Registry (Amazon ECR) 中。授予 EKS 節點存取 ECR 映像儲存庫的權限。使用 Amazon API Gateway 與應用程式互動。","D":"將應用程式程式碼遷移至在 AWS Lambda 中執行的容器。配置 Lambda 使用 Application Load Balancer (ALB)。使用 ALB 與應用程式互動。"},"answer":"B"},{"num":107,"stem":"一家公司有一個以 AWS Lambda 函式託管的非同步 HTTP 應用程式。一個公開的 Amazon API Gateway 端點會叫用該 Lambda 函式。Lambda 函式和 API Gateway 端點位於 us-east-1 區域。解決方案架構師需要重新設計應用程式以支援容錯移轉至另一個 AWS 區域。\n\n哪個解決方案能滿足這些要求？","options":{"A":"在 us-west-2 區域建立一個 API Gateway 端點，將流量導向 us-east-1 中的 Lambda 函式。配置 Amazon Route 53 使用容錯移轉路由政策，為兩個 API Gateway 端點路由流量。","B":"建立一個 Amazon Simple Queue Service (Amazon SQS) 佇列。配置 API Gateway 將流量導向 SQS 佇列而非 Lambda 函式。配置 Lambda 函式從佇列中提取訊息以進行處理。","C":"將 Lambda 函式部署至 us-west-2 區域。在 us-west-2 中建立一個 API Gateway 端點，將流量導向 us-west-2 中的 Lambda 函式。配置 AWS Global Accelerator 和 Application Load Balancer 以管理兩個 API Gateway 端點之間的流量。","D":"將 Lambda 函式和 API Gateway 端點部署至 us-west-2 區域。配置 Amazon Route 53 使用容錯移轉路由政策，為兩個 API Gateway 端點路由流量。"},"answer":"B"},{"num":108,"stem":"一家零售公司已將其 AWS 帳戶建構為 AWS Organizations 中的組織。公司已設置合併帳單，並將各部門對應至以下組織單位 (OU)：財務、銷售、人力資源 (HR)、行銷和營運。每個 OU 有多個 AWS 帳戶，部門內每個環境各一個帳戶，包括開發、測試、預生產和生產環境。\n\nHR 部門正在發布一個將在 3 個月後上線的新系統。為此，HR 部門已在其生產 AWS 帳戶中購買了數個預留執行個體 (RI)。HR 部門將在此帳戶上安裝新應用程式。HR 部門希望確保其他部門無法共用 RI 折扣。\n\n哪個解決方案能滿足這些要求？","options":{"A":"在 HR 部門生產帳戶的 AWS Billing and Cost Management 主控台中關閉 RI 共用。","B":"從組織中移除 HR 部門的生產 AWS 帳戶。僅將該帳戶新增至合併帳單配置中。","C":"在 AWS Billing and Cost Management 主控台中，使用組織的管理帳戶關閉 HR 部門生產 AWS 帳戶的 RI 共用。","D":"在組織中建立一個 SCP 以限制對 RI 的存取。將 SCP 套用至其他部門的 OU。"},"answer":"C"},{"num":109,"stem":"一家大型公司正在執行一個熱門的網頁應用程式。該應用程式在私有子網路的 Auto Scaling 群組中的多個 Amazon EC2 Linux 執行個體上執行。Application Load Balancer 以私有子網路中 Auto Scaling 群組的執行個體為目標。已配置 AWS Systems Manager Session Manager，且 AWS Systems Manager Agent 在所有 EC2 執行個體上執行。\n\n公司最近發布了應用程式的新版本。現在有些 EC2 執行個體被標記為不健康並被終止。因此，應用程式的容量已降低。解決方案架構師嘗試透過分析從應用程式收集的 Amazon CloudWatch 日誌來確定根本原因，但日誌沒有提供明確結論。\n\n解決方案架構師應如何存取 EC2 執行個體以排查問題？","options":{"A":"暫停 Auto Scaling 群組的 HealthCheck 擴展流程。使用 Session Manager 登入標記為不健康的執行個體。","B":"啟用 EC2 執行個體終止保護。使用 Session Manager 登入標記為不健康的執行個體。","C":"將 Auto Scaling 群組的終止政策設為 OldestInstance。使用 Session Manager 登入標記為不健康的執行個體。","D":"暫停 Auto Scaling 群組的 Terminate 流程。使用 Session Manager 登入標記為不健康的執行個體。"},"answer":"D"},{"num":110,"stem":"一家公司希望部署 AWS WAF 解決方案，以跨多個 AWS 帳戶管理 AWS WAF 規則。這些帳戶在 AWS Organizations 中由不同的 OU 管理。\n\n管理員必須能夠視需要在受管 AWS WAF 規則集中新增或移除帳戶或 OU。管理員還必須能夠自動更新和修復所有帳戶中不合規的 AWS WAF 規則。\n\n哪個解決方案能以最少的營運負擔滿足這些要求？","options":{"A":"使用 AWS Firewall Manager 管理組織中各帳戶的 AWS WAF 規則。使用 AWS Systems Manager Parameter Store 參數儲存要管理的帳戶號碼和 OU。根據需要更新參數以新增或移除帳戶或 OU。使用 Amazon EventBridge 規則識別參數的任何變更，並叫用 AWS Lambda 函式以更新 Firewall Manager 管理帳戶中的安全政策。","B":"部署一個組織範圍的 AWS Config 規則，要求所選 OU 中的所有資源關聯 AWS WAF 規則。使用 AWS Lambda 部署自動修復動作以修復不合規的資源。使用 AWS CloudFormation 堆疊集部署 AWS WAF 規則，以相同的 OU 為目標（與 AWS Config 規則套用的 OU 相同）。","C":"在組織的管理帳戶中建立 AWS WAF 規則。使用 AWS Lambda 環境變數儲存要管理的帳戶號碼和 OU。根據需要更新環境變數以新增或移除帳戶或 OU。在成員帳戶中建立跨帳戶 IAM 角色。在 Lambda 函式中使用 AWS Security Token Service (AWS STS) 承擔角色，以在成員帳戶中建立和更新 AWS WAF 規則。","D":"使用 AWS Control Tower 管理組織中各帳戶的 AWS WAF 規則。使用 AWS Key Management Service (AWS KMS) 儲存要管理的帳戶號碼和 OU。根據需要更新 AWS KMS 以新增或移除帳戶或 OU。在成員帳戶中建立 IAM 使用者。允許管理帳戶中的 AWS Control Tower 使用存取金鑰和秘密存取金鑰在成員帳戶中建立和更新 AWS WAF 規則。"},"answer":"D"},{"num":111,"stem":"一位解決方案架構師正在稽核一家公司的 AWS Lambda 函式安全設置。該 Lambda 函式從 Amazon Aurora 資料庫擷取最新變更。Lambda 函式和資料庫在同一個 VPC 中執行。Lambda 環境變數將資料庫憑證提供給 Lambda 函式。\n\nLambda 函式彙總資料，並在配置了使用 AWS KMS 受管加密金鑰伺服器端加密 (SSE-KMS) 的 Amazon S3 儲存桶中提供資料。資料不得透過網際網路傳輸。如果任何資料庫憑證遭到洩露，公司需要一個能最大程度降低洩露影響的解決方案。\n\n解決方案架構師應建議什麼來滿足這些要求？","options":{"A":"在 Aurora DB 叢集上啟用 IAM 資料庫驗證。變更 Lambda 函式的 IAM 角色，允許函式使用 IAM 資料庫驗證存取資料庫。在 VPC 中為 Amazon S3 部署閘道 VPC 端點。","B":"在 Aurora DB 叢集上啟用 IAM 資料庫驗證。變更 Lambda 函式的 IAM 角色，允許函式使用 IAM 資料庫驗證存取資料庫。在資料傳輸期間強制對 Amazon S3 的連線使用 HTTPS。","C":"將資料庫憑證儲存在 AWS Systems Manager Parameter Store 中。在 Parameter Store 中設置憑證輪換。變更 Lambda 函式的 IAM 角色，允許函式存取 Parameter Store。修改 Lambda 函式以從 Parameter Store 擷取憑證。在 VPC 中為 Amazon S3 部署閘道 VPC 端點。","D":"將資料庫憑證儲存在 AWS Secrets Manager 中。在 Secrets Manager 中設置密碼輪換。變更 Lambda 函式的 IAM 角色，允許函式存取 Secrets Manager。修改 Lambda 函式以從 Secrets Manager 擷取憑證。在資料傳輸期間強制對 Amazon S3 的連線使用 HTTPS。"},"answer":"D"},{"num":112,"stem":"一家大型行動遊戲公司已成功將所有本地基礎架構遷移至 AWS 雲端。解決方案架構師正在審查環境，以確保其依照設計建構，並與 Well-Architected Framework 保持一致。\n\n在 Cost Explorer 中審查之前的每月費用時，解決方案架構師注意到，數個大型執行個體類型的建立和隨後的終止佔了相當高比例的費用。解決方案架構師發現，公司的開發人員正在啟動新的 Amazon EC2 執行個體作為測試用途，但開發人員未使用適當的執行個體類型。\n\n解決方案架構師必須實施一種控制機制，以限制只有開發人員能啟動的執行個體類型。\n\n哪個解決方案能滿足這些要求？","options":{"A":"在 AWS Config 中建立一個 desired-instance-type 受管規則。使用允許的執行個體類型配置規則。將規則附加至每次啟動新 EC2 執行個體時執行的事件。","B":"在 EC2 主控台中，建立一個指定允許執行個體類型的啟動範本。將啟動範本指派給開發人員的 IAM 帳戶。","C":"建立一個新的 IAM 政策。指定允許的執行個體類型。將政策附加至包含開發人員 IAM 帳戶的 IAM 群組。","D":"使用 EC2 Image Builder 為開發人員建立映像管線，並協助他們建立黃金映像。"},"answer":"C"},{"num":113,"stem":"一家公司在 AWS 雲端中開發和託管多個專案。這些專案在 AWS Organizations 下的同一組織中跨多個 AWS 帳戶開發。公司要求雲端基礎架構的費用分配至擁有的專案。負責所有 AWS 帳戶的團隊發現，有幾個 Amazon EC2 執行個體缺少用於費用分配的 Project 標籤。\n\n解決方案架構師應採取哪些動作來解決問題並防止其再次發生？(選擇三個)","options":{"A":"在每個帳戶中建立 AWS Config 規則，以尋找缺少標籤的資源。","B":"在組織中建立一個 SCP，對 ec2:RunInstances 設定拒絕動作（如果缺少 Project 標籤）。","C":"在組織中使用 Amazon Inspector 尋找缺少標籤的資源。","D":"在每個帳戶中建立 IAM 政策，對 ec2:RunInstances 設定拒絕動作（如果缺少 Project 標籤）。","E":"為組織建立 AWS Config 彙總器，以收集缺少 Project 標籤的 EC2 執行個體清單。 F. 使用 AWS Security Hub 彙總缺少 Project 標籤的 EC2 執行個體清單。"},"answer":"CDE"},{"num":114,"stem":"一家公司有一個本地監控解決方案，使用 PostgreSQL 資料庫來持久化事件。由於大量資料擷取，該資料庫無法擴展，且經常耗盡儲存空間。\n\n公司希望建立一個混合解決方案，並已設置與 AWS 之間的 VPN 連線。解決方案應包括以下特性：\n• 使用受管 AWS 服務以降低營運複雜性。\n• 一個能自動擴展以符合資料吞吐量且無需持續管理的緩衝區。\n• 一個視覺化工具，用於建立儀表板以近乎即時地觀察事件。\n• 支援半結構化 JSON 資料和動態結構描述。\n\n哪些元件組合能讓公司建立滿足這些要求的監控解決方案？(選擇兩個)","options":{"A":"使用 Amazon Kinesis Data Firehose 緩衝事件。建立一個 AWS Lambda 函式以處理和轉換事件。","B":"建立 Amazon Kinesis 資料串流以緩衝事件。建立一個 AWS Lambda 函式以處理和轉換事件。","C":"配置 Amazon Aurora PostgreSQL DB 叢集以接收事件。使用 Amazon QuickSight 從資料庫讀取資料，並建立近乎即時的視覺化和儀表板。","D":"配置 Amazon Elasticsearch Service (Amazon ES) 以接收事件。使用隨 Amazon ES 部署的 Kibana 端點建立近乎即時的視覺化和儀表板。","E":"配置 Amazon Neptune DB 執行個體以接收事件。使用 Amazon QuickSight 從資料庫讀取資料，並建立近乎即時的視覺化和儀表板。"},"answer":"AD"},{"num":115,"stem":"一個團隊收集並路由整個公司的行為資料。公司執行一個具有公有子網路、私有子網路和網際網路閘道的多可用區域 VPC 環境。每個公有子網路還包含一個 NAT 閘道。公司的大多數應用程式對 Amazon Kinesis Data Streams 進行讀寫操作。大多數工作負載在私有子網路中執行。\n\n解決方案架構師必須審查基礎架構。架構師需要降低成本並維持應用程式的功能。解決方案架構師使用 Cost Explorer 並注意到 EC2-Other 類別的費用持續偏高。進一步審查顯示，NatGateway-Bytes 費用正在增加 EC2-Other 類別的費用。\n\n解決方案架構師應如何滿足這些要求？","options":{"A":"啟用 VPC Flow Logs。使用 Amazon Athena 分析日誌，以找出可以移除的流量。確保安全群組封鎖導致高費用的流量。","B":"在 VPC 中為 Kinesis Data Streams 新增一個介面 VPC 端點。確保應用程式具有使用介面 VPC 端點的正確 IAM 權限。","C":"啟用 VPC Flow Logs 和 Amazon Detective。審查與 Kinesis Data Streams 無關的流量的 Detective 結果。配置安全群組以封鎖該流量。","D":"在 VPC 中為 Kinesis Data Streams 新增一個介面 VPC 端點。確保 VPC 端點政策允許來自應用程式的流量。"},"answer":"D"},{"num":116,"stem":"一家零售公司在歐洲有一個本地資料中心。該公司在 AWS 的多個區域也有部署，包括 eu-west-1 和 us-east-1 區域。公司希望能夠將網路流量從本地基礎架構路由至這兩個區域的 VPC。公司還需要支援在這些區域的 VPC 之間直接路由的流量。網路上不能存在單點故障。\n\n公司已從本地資料中心建立了兩條 1 Gbps 的 AWS Direct Connect 連線。每條連線進入歐洲不同的 Direct Connect 位置以實現高可用性。這兩個位置分別命名為 DX-A 和 DX-B。每個區域都有一個 AWS Transit Gateway，配置為路由該區域內所有 VPC 間的流量。\n\n哪個解決方案能滿足這些要求？","options":{"A":"從 DX-A 連線建立一個私有 VIF 到 Direct Connect 閘道。從 DX-B 連線建立一個私有 VIF 到同一個 Direct Connect 閘道以實現高可用性。將 eu-west-1 和 us-east-1 兩個 Transit Gateway 都關聯至該 Direct Connect 閘道。將 Transit Gateway 相互對等以支援跨區域路由。","B":"從 DX-A 連線建立一個 Transit VIF 到 Direct Connect 閘道。將 eu-west-1 Transit Gateway 與此 Direct Connect 閘道關聯。從 DX-B 連線建立一個 Transit VIF 到另一個獨立的 Direct Connect 閘道。將 us-east-1 Transit Gateway 與此獨立的 Direct Connect 閘道關聯。將 Direct Connect 閘道相互對等以支援高可用性和跨區域路由。","C":"從 DX-A 連線建立一個 Transit VIF 到 Direct Connect 閘道。從 DX-B 連線建立一個 Transit VIF 到同一個 Direct Connect 閘道以實現高可用性。將 eu-west-1 和 us-east-1 兩個 Transit Gateway 都關聯至此 Direct Connect 閘道。配置 Direct Connect 閘道以路由 Transit Gateway 之間的流量。","D":"從 DX-A 連線建立一個 Transit VIF 到 Direct Connect 閘道。從 DX-B 連線建立一個 Transit VIF 到同一個 Direct Connect 閘道以實現高可用性。將 eu-west-1 和 us-east-1 兩個 Transit Gateway 都關聯至此 Direct Connect 閘道。將 Transit Gateway 相互對等以支援跨區域路由。"},"answer":"A"},{"num":117,"stem":"一家公司在 AWS 雲端中執行應用程式。公司的安全團隊必須核准所有新 IAM 使用者的建立。建立新 IAM 使用者時，必須自動移除該使用者的所有存取權限。然後安全團隊必須收到通知以核准該使用者。公司在 AWS 帳戶中有一個多區域 AWS CloudTrail 記錄追蹤。\n\n哪些步驟組合能滿足這些要求？(選擇三個)","options":{"A":"建立一個 Amazon EventBridge (Amazon CloudWatch Events) 規則。定義一個模式，將 detail-type 值設為 AWS API Call via CloudTrail，並將 eventName 設為 CreateUser。","B":"配置 CloudTrail 將 CreateUser 事件的通知發送至 Amazon Simple Notification Service (Amazon SNS) 主題。","C":"叫用在 Amazon Elastic Container Service (Amazon ECS) 中以 AWS Fargate 技術執行的容器以移除存取權限。","D":"叫用 AWS Step Functions 狀態機以移除存取權限。","E":"使用 Amazon Simple Notification Service (Amazon SNS) 通知安全團隊。 F. 使用 Amazon Pinpoint 通知安全團隊。"},"answer":"ADE"},{"num":118,"stem":"一家公司希望遷移至 AWS。公司希望使用多帳戶結構，並集中管理對所有帳戶和應用程式的存取。公司還希望將流量保持在私有網路上。登入時需要多重要素驗證 (MFA)，並為使用者群組指派特定角色。\n\n公司必須為開發、預備、生產和共享網路建立獨立的帳戶。生產帳戶和共享網路帳戶必須與所有帳戶保持連線。開發帳戶和預備帳戶只能相互存取。\n\n解決方案架構師應採取哪些步驟組合來滿足這些要求？(選擇三個)","options":{"A":"使用 AWS Control Tower 部署落地區環境。在 AWS Organizations 中的結果組織中註冊帳戶並邀請現有帳戶加入。","B":"在所有帳戶中啟用 AWS Security Hub 以管理跨帳戶存取。透過 AWS CloudTrail 收集結果以強制執行 MFA 登入。","C":"在每個帳戶中建立 Transit Gateway 和 Transit Gateway VPC 附件。配置適當的路由表。","D":"設置並啟用 AWS IAM Identity Center (AWS Single Sign-On)。為現有帳戶建立具有必要 MFA 的適當權限集。","E":"在所有帳戶中啟用 AWS Control Tower 以管理帳戶之間的路由。透過 AWS CloudTrail 收集結果以強制執行 MFA 登入。","F":"建立 IAM 使用者和群組。為所有使用者配置 MFA。設置 Amazon Cognito 使用者集區和身份集區以管理對帳戶的存取和帳戶之間的存取。"},"answer":"BDF"},{"num":119,"stem":"一家公司在 eu-west-1 區域執行其應用程式，並為每個環境（開發、測試和生產）各有一個帳戶。所有環境使用有狀態的 Amazon EC2 執行個體和 Amazon RDS for MySQL 資料庫全天候運行（每週 7 天、每天 24 小時）。資料庫大小在 500 GB 至 800 GB 之間。\n\n開發團隊和測試團隊在工作日的上班時間工作，但生產環境全天候運行（每週 7 天、每天 24 小時）。公司希望降低成本。所有資源均以環境標籤標記，值為 development、testing 或 production。\n\n解決方案架構師應以最少的營運工作量做什麼來降低成本？","options":{"A":"建立一個每天執行一次的 Amazon EventBridge 規則。配置規則叫用一個 AWS Lambda 函式，根據 me 標籤、日期和時間來啟動或停止執行個體。","B":"建立一個在每個工作日傍晚執行的 Amazon EventBridge 規則。配置規則叫用一個 AWS Lambda 函式，根據標籤停止執行個體。建立第二個在每個工作日早晨執行的 EventBridge 規則。配置第二個規則叫用另一個 Lambda 函式，根據標籤啟動執行個體。","C":"建立一個在每個工作日傍晚執行的 Amazon EventBridge 規則。配置規則叫用一個 AWS Lambda 函式，根據標籤終止執行個體。建立第二個在每個工作日早晨執行的 EventBridge 規則。配置第二個規則叫用另一個 Lambda 函式，根據標籤從最後備份還原執行個體。","D":"建立一個每小時執行一次的 Amazon EventBridge 規則。配置規則叫用一個 AWS Lambda 函式，根據標籤、日期和時間來終止或從最後備份還原執行個體。"},"answer":"A"},{"num":120,"stem":"一家公司正在 AWS 上建構軟體即服務 (SaaS) 解決方案。公司已在多個 AWS 區域和同一個生產帳戶中部署了帶有 AWS Lambda 整合的 Amazon API Gateway REST API。\n\n公司提供分層定價，讓客戶能夠付費購買每秒可進行一定數量 API 呼叫的容量。進階方案最多提供每秒 3,000 次呼叫，客戶由唯一的 API 金鑰識別。多個區域的多位進階方案客戶報告，在尖峰使用時段，他們在多個 API 方法中收到 429 Too Many Requests 的錯誤回應。日誌顯示 Lambda 函式從未被叫用。\n\n這些客戶收到錯誤訊息的可能原因是什麼？","options":{"A":"Lambda 函式達到其並行限制。","B":"Lambda 函式達到其區域並行限制。","C":"公司達到了 API Gateway 帳戶層級的每秒呼叫次數限制。","D":"公司達到了 API Gateway 預設的每個方法每秒呼叫次數限制。"},"answer":"C"},{"num":121,"stem":"一家金融公司計畫將其網頁應用程式從本地遷移至 AWS。公司使用第三方安全工具來監控傳入應用程式的流量。公司使用該安全工具已有 15 年，其供應商尚未提供雲端解決方案。公司的安全團隊擔心如何將安全工具與 AWS 技術整合。\n\n公司計畫將應用程式遷移部署至 Amazon EC2 執行個體上。EC2 執行個體將在專屬 VPC 的 Auto Scaling 群組中執行。公司需要使用安全工具來檢查進出 VPC 的所有封包。此檢查必須即時發生，且不能影響應用程式的效能。解決方案架構師必須在 AWS 區域內設計一個高可用的目標架構。\n\n解決方案架構師應採取哪些步驟組合來滿足這些要求？(選擇兩個)","options":{"A":"在現有 VPC 的新 Auto Scaling 群組中的 EC2 執行個體上部署安全工具。","B":"在 Network Load Balancer 後方部署網頁應用程式。","C":"在安全工具執行個體前方部署 Application Load Balancer。","D":"在每個可用區域佈建 Gateway Load Balancer 以將流量重新導向至安全工具。","E":"佈建 Transit Gateway 以促進 VPC 之間的通訊。"},"answer":"AD"},{"num":122,"stem":"一家公司從不同供應商購買了設備。所有設備都有 IoT 感測器。感測器以供應商的專有格式將狀態資訊發送至一個舊有應用程式，該應用程式將資訊解析為 JSON。解析過程簡單，但每個供應商的格式各不相同。每天一次，應用程式解析所有 JSON 記錄，並將記錄儲存在關聯式資料庫中以供分析。\n\n公司需要設計一個能更快交付並優化成本的新資料分析解決方案。\n\n哪個解決方案能滿足這些要求？","options":{"A":"將 IoT 感測器連接至 AWS IoT Core。設定規則叫用 AWS Lambda 函式以解析資訊，並將 .csv 檔案儲存至 Amazon S3。使用 AWS Glue 分類檔案。使用 Amazon Athena 和 Amazon QuickSight 進行分析。","B":"將應用程式伺服器遷移至 AWS Fargate，由其接收 IoT 感測器的資訊並將資訊解析為關聯式格式。將解析後的資訊儲存至 Amazon Redshift 以進行分析。","C":"建立一個 AWS Transfer for SFTP 伺服器。更新 IoT 感測器程式碼，透過 SFTP 將資訊作為 .csv 檔案發送至伺服器。使用 AWS Glue 分類檔案。使用 Amazon Athena 進行分析。","D":"使用 AWS Snowball Edge 直接從 IoT 感測器收集資料以執行本地分析。定期將資料收集至 Amazon Redshift 以執行全域分析。"},"answer":"C"},{"num":123,"stem":"一家公司正在將其某些應用程式遷移至 AWS。公司希望在確定網路和安全策略後，快速遷移和現代化應用程式。公司已在中央網路帳戶中設置了 AWS Direct Connect 連線。\n\n公司預計在不久的將來將擁有數百個 AWS 帳戶和 VPC。企業網路必須能夠無縫存取 AWS 上的資源，並且還必須能夠與所有 VPC 通訊。公司還希望透過其本地資料中心路由雲端資源到網際網路的流量。\n\n哪些步驟組合能滿足這些要求？(選擇三個)","options":{"A":"在中央帳戶中建立 Direct Connect 閘道。在每個帳戶中，使用 Direct Connect 閘道和帳戶 ID 為每個虛擬私有閘道建立關聯提案。","B":"在中央網路帳戶中建立 Direct Connect 閘道和 Transit Gateway。使用 Transit VIF 將 Transit Gateway 附加至 Direct Connect 閘道。","C":"佈建網際網路閘道。將網際網路閘道附加至子網路。允許透過閘道的網際網路流量。","D":"與其他帳戶共享 Transit Gateway。將 VPC 附加至 Transit Gateway。","E":"視需要佈建 VPC 對等連線。","F":"僅佈建私有子網路。在 Transit Gateway 和客戶閘道上開啟必要的路由，以允許來自 AWS 的出站網際網路流量透過資料中心中執行的 NAT 服務流出。"},"answer":"BDF"},{"num":124,"stem":"一家公司擁有數百個 AWS 帳戶。公司最近實施了一個集中化的內部流程，用於購買新的預留執行個體和修改現有的預留執行個體。此流程要求所有希望購買或修改預留執行個體的業務部門向專門的採購團隊提交請求。此前，業務部門在各自的 AWS 帳戶中自主直接購買或修改預留執行個體。\n\n解決方案架構師需要以最安全的方式執行新流程。\n\n解決方案架構師應採取哪些步驟組合來滿足這些要求？(選擇兩個)","options":{"A":"確保所有 AWS 帳戶都屬於啟用了所有功能的 AWS Organizations 組織。","B":"使用 AWS Config 報告附加 IAM 政策的情況，該政策拒絕存取 ec2:PurchaseReservedInstancesOffering 動作和 ec2:ModifyReservedInstances 動作。","C":"在每個 AWS 帳戶中，建立一個拒絕 ec2:PurchaseReservedInstancesOffering 動作和 ec2:ModifyReservedInstances 動作的 IAM 政策。","D":"建立一個拒絕 ec2:PurchaseReservedInstancesOffering 動作和 ec2:ModifyReservedInstances 動作的 SCP。將 SCP 附加至組織的每個 OU。","E":"確保所有 AWS 帳戶都屬於使用合併帳單功能的 AWS Organizations 組織。"},"answer":"AD"},{"num":125,"stem":"一家公司正在執行一個關鍵應用程式，該應用程式使用 Amazon RDS for MySQL 資料庫來儲存資料。RDS DB 執行個體以多可用區域模式部署。\n\n最近一次 RDS 資料庫容錯移轉測試導致應用程式中斷 40 秒。解決方案架構師需要設計一個解決方案，將中斷時間縮短至不超過 20 秒。\n\n解決方案架構師應採取哪些步驟組合來滿足這些要求？(選擇三個)","options":{"A":"在資料庫前方使用 Amazon ElastiCache for Memcached。","B":"在資料庫前方使用 Amazon ElastiCache for Redis。","C":"在資料庫前方使用 RDS Proxy。","D":"將資料庫遷移至 Amazon Aurora MySQL。","E":"建立一個 Amazon Aurora 副本。","F":"建立一個 RDS for MySQL 讀取副本。"},"answer":"BCF"},{"num":126,"stem":"一家 AWS 合作夥伴公司正在使用其名為 org1 的 AWS Organizations 組織中建構服務。此服務需要該合作夥伴公司存取位於另一個名為 org2 的獨立組織中客戶帳戶的 AWS 資源。該公司必須使用 API 或命令列工具，以最低權限安全性存取客戶帳戶。\n允許 org1 存取 org2 中資源的最安全方式是什麼？","options":{"A":"客戶應向合作夥伴公司提供其 AWS 帳戶存取金鑰，以便登入並執行所需任務。","B":"客戶應建立一個 IAM 使用者，並將所需權限指派給該 IAM 使用者。然後客戶應將憑證提供給合作夥伴公司，以便登入並執行所需任務。","C":"客戶應建立一個 IAM 角色，並將所需權限指派給該 IAM 角色。合作夥伴公司在請求存取以執行所需任務時，應使用該 IAM 角色的 Amazon Resource Name (ARN)。","D":"客戶應建立一個 IAM 角色，並將所需權限指派給該 IAM 角色。合作夥伴公司在請求存取以執行所需任務時，應使用該 IAM 角色的 Amazon Resource Name (ARN)，並在 IAM 角色的信任政策中包含外部 ID。"},"answer":"D"},{"num":127,"stem":"一家快遞公司需要將其第三方路線規劃應用程式遷移至 AWS。第三方從公共登錄檔提供受支援的 Docker 映像。該映像可在所需數量的容器中執行，以產生路線圖。\n該公司已將配送區域劃分為帶有供應中心的區段，使配送司機能以最短距離從中心抵達客戶處。為縮短產生路線圖所需的時間，每個區段使用其自己的一組 Docker 容器，並搭配自訂設定，僅處理該區段範圍內的訂單。\n該公司需要能夠根據執行中容器的數量，以符合成本效益的方式分配資源。\n哪種解決方案能以最少的操作負擔滿足這些需求？","options":{"A":"在 Amazon EC2 上建立 Amazon Elastic Kubernetes Service (Amazon EKS) 叢集。使用 Amazon EKS CLI，搭配 --tags 選項，以 Pod 方式啟動規劃應用程式，並為 Pod 指派自訂標籤。","B":"在 AWS Fargate 上建立 Amazon Elastic Kubernetes Service (Amazon EKS) 叢集。使用 Amazon EKS CLI 啟動規劃應用程式。使用 AWS CLI tag-resource API 呼叫為 Pod 指派自訂標籤。","C":"在 Amazon EC2 上建立 Amazon Elastic Container Service (Amazon ECS) 叢集。使用 AWS CLI，將 run-tasks 設為 true，搭配 --tags 選項啟動規劃應用程式，並為任務指派自訂標籤。","D":"在 AWS Fargate 上建立 Amazon Elastic Container Service (Amazon ECS) 叢集。使用 AWS CLI run-task 命令，將 enableECSManagedTags 設為 true 以啟動規劃應用程式。使用 --tags 選項為任務指派自訂標籤。"},"answer":"D"},{"num":128,"stem":"一家軟體公司在多個 AWS 帳戶和 Region 的 AWS 上托管應用程式。該應用程式在 us-east-1 Region 的應用程式 VPC 中的一組 Amazon EC2 執行個體上執行，其 IPv4 CIDR 區塊為 10.10.0.0/16。在另一個 AWS 帳戶中，共用服務 VPC 位於 us-east-2 Region，其 IPv4 CIDR 區塊為 10.10.10.0/24。當雲端工程師使用 AWS CloudFormation 嘗試將應用程式 VPC 與共用服務 VPC 建立對等連接時，錯誤訊息顯示對等連接失敗。\n哪些因素可能導致此錯誤？(選擇兩個)","options":{"A":"兩個 VPC 的 IPv4 CIDR 範圍重疊","B":"VPC 不在同一個 Region","C":"一個或兩個帳戶都沒有存取 Internet gateway 的權限","D":"其中一個 VPC 未透過 AWS Resource Access Manager 共用","E":"對等接受方帳戶中的 IAM 角色沒有正確的權限"},"answer":"AE"},{"num":129,"stem":"一家公司的無伺服器應用程式外部稽核揭露了 IAM 政策授予過多權限的問題。這些政策附加至公司的 AWS Lambda 執行角色。公司數百個 Lambda 函數具有廣泛的存取權限，例如對 Amazon S3 儲存貯體和 Amazon DynamoDB 資料表的完整存取權。公司希望每個函數僅擁有完成其任務所需的最低權限。\n解決方案架構師必須確定每個 Lambda 函數所需的權限。\n解決方案架構師應採取什麼行動，以最少的工作量滿足此需求？","options":{"A":"設定 Amazon CodeGuru 以分析 Lambda 函數並搜尋 AWS API 呼叫。建立每個 Lambda 函數所需 API 呼叫和資源的清單。為每個 Lambda 函數建立新的 IAM 存取政策。審查新政策以確保其符合公司的業務需求。","B":"為 AWS 帳戶開啟 AWS CloudTrail 日誌記錄。使用 AWS Identity and Access Management Access Analyzer，根據 CloudTrail 日誌中記錄的活動產生 IAM 存取政策。審查產生的政策以確保其符合公司的業務需求。","C":"為 AWS 帳戶開啟 AWS CloudTrail 日誌記錄。建立指令碼以解析 CloudTrail 日誌，依 Lambda 執行角色搜尋 AWS API 呼叫，並建立摘要報告。審查報告。建立 IAM 存取政策，為每個 Lambda 函數提供更嚴格的權限。","D":"為 AWS 帳戶開啟 AWS CloudTrail 日誌記錄。將 CloudTrail 日誌匯出至 Amazon S3。使用 Amazon EMR 處理 Amazon S3 中的 CloudTrail 日誌，並產生每個執行角色所使用的 API 呼叫和資源報告。為每個角色建立新的 IAM 存取政策。將產生的角色匯出至 S3 儲存貯體。審查產生的政策以確保其符合公司的業務需求。"},"answer":"B"},{"num":130,"stem":"解決方案架構師必須分析一家公司的 Amazon EC2 執行個體和 Amazon Elastic Block Store (Amazon EBS) 磁碟區，以確定公司是否有效率地使用資源。公司正在執行數個大型高記憶體 EC2 執行個體，以托管以主動/被動設定部署的資料庫叢集。這些 EC2 執行個體的使用率因使用資料庫的應用程式而異，公司尚未識別出規律性。\n解決方案架構師必須分析環境並根據發現採取行動。\n哪種解決方案以最符合成本效益的方式滿足這些需求？","options":{"A":"使用 AWS Systems Manager OpsCenter 建立儀表板。設定與 EC2 執行個體及其 EBS 磁碟區相關聯的 Amazon CloudWatch 指標視覺化。定期審查儀表板並識別使用模式。根據指標中的峰值調整 EC2 執行個體大小。","B":"為 EC2 執行個體及其 EBS 磁碟區開啟 Amazon CloudWatch 詳細監控。根據指標建立並審查儀表板。識別使用模式。根據指標中的峰值調整 EC2 執行個體大小。","C":"在每個 EC2 執行個體上安裝 Amazon CloudWatch 代理程式。開啟 AWS Compute Optimizer，讓其至少執行 12 小時。審查 Compute Optimizer 的建議，並按指示調整 EC2 執行個體大小。","D":"註冊 AWS Enterprise Support 方案。開啟 AWS Trusted Advisor。等待 12 小時。審查 Trusted Advisor 的建議，並按指示調整 EC2 執行個體大小。"},"answer":"C"},{"num":131,"stem":"一家公司使用 AWS Organizations 在 AWS Cloud 中進行多帳戶設定。公司使用 AWS Control Tower 進行治理，並使用 AWS Transit Gateway 進行帳戶間的 VPC 連線。\n在 AWS 應用程式帳戶中，公司的應用程式團隊已部署使用 AWS Lambda 和 Amazon RDS 的 Web 應用程式。公司的資料庫管理員有一個獨立的 DBA 帳戶，並使用該帳戶集中管理整個組織中的所有資料庫。資料庫管理員使用部署在 DBA 帳戶中的 Amazon EC2 執行個體，存取部署在應用程式帳戶中的 RDS 資料庫。\n應用程式團隊已將資料庫憑證作為 Secrets 儲存在應用程式帳戶的 AWS Secrets Manager 中。應用程式團隊正在手動與資料庫管理員共用這些 Secrets。這些 Secrets 由應用程式帳戶中 Secrets Manager 的預設 AWS 受管金鑰加密。解決方案架構師需要實作一個解決方案，讓資料庫管理員能夠存取資料庫，並消除手動共用 Secrets 的需求。\n哪種解決方案能滿足這些需求？","options":{"A":"使用 AWS Resource Access Manager (AWS RAM) 將 Secrets 從應用程式帳戶共用至 DBA 帳戶。在 DBA 帳戶中，建立名為 DBA-Admin 的 IAM 角色。授予該角色存取共用 Secrets 所需的權限。將 DBA-Admin 角色附加至 EC2 執行個體，以便存取跨帳戶 Secrets。","B":"在應用程式帳戶中，建立名為 DBA-Secret 的 IAM 角色。授予該角色存取 Secrets 所需的權限。在 DBA 帳戶中，建立名為 DBA-Admin 的 IAM 角色。授予 DBA-Admin 角色擔任應用程式帳戶中 DBA-Secret 角色所需的權限。將 DBA-Admin 角色附加至 EC2 執行個體，以便存取跨帳戶 Secrets。","C":"在 DBA 帳戶中，建立名為 DBA-Admin 的 IAM 角色。授予該角色存取應用程式帳戶中 Secrets 和預設 AWS 受管金鑰所需的權限。在應用程式帳戶中，將資源型政策附加至金鑰，以允許來自 DBA 帳戶的存取。將 DBA-Admin 角色附加至 EC2 執行個體，以便存取跨帳戶 Secrets。","D":"在 DBA 帳戶中，建立名為 DBA-Admin 的 IAM 角色。授予該角色存取應用程式帳戶中 Secrets 所需的權限。將 SCP 附加至應用程式帳戶，以允許來自 DBA 帳戶的 Secrets 存取。將 DBA-Admin 角色附加至 EC2 執行個體，以便存取跨帳戶 Secrets。"},"answer":"A"},{"num":132,"stem":"一家公司使用 AWS Organizations 管理多個 AWS 帳戶。在根 OU 下，公司有兩個 OU：Research 和 DataOps。\n由於法規要求，公司在組織中部署的所有資源必須位於 ap-northeast-1 Region。此外，公司在 DataOps OU 中部署的 EC2 執行個體必須使用預先定義的執行個體類型清單。\n解決方案架構師必須實作一個套用這些限制的解決方案。該解決方案必須最大化操作效率並最小化持續維護。\n哪種步驟組合能滿足這些需求？(選擇兩個)","options":{"A":"在 DataOps OU 下的一個帳戶中建立 IAM 角色。在角色的內嵌政策中使用 ec2:InstanceType 條件金鑰，將存取限制為特定執行個體類型。","B":"在根 OU 下的所有帳戶中建立 IAM 使用者。在每個使用者的內嵌政策中使用 aws:RequestedRegion 條件金鑰，將存取限制為除 ap-northeast-1 以外的所有 AWS Region。","C":"建立 SCP。使用 aws:RequestedRegion 條件金鑰，將存取限制為除 ap-northeast-1 以外的所有 AWS Region。將 SCP 套用至根 OU。","D":"建立 SCP。使用 ec2:Region 條件金鑰，將存取限制為除 ap-northeast-1 以外的所有 AWS Region。將 SCP 套用至根 OU、DataOps OU 和 Research OU。","E":"建立 SCP。使用 ec2:InstanceType 條件金鑰，將存取限制為特定執行個體類型。將 SCP 套用至 DataOps OU。"},"answer":"CE"},{"num":133,"stem":"一家公司在單一 AWS Region 中執行無伺服器應用程式。該應用程式存取外部 URL 並從這些網站擷取中繼資料。公司使用 Amazon Simple Notification Service (Amazon SNS) 主題將 URL 發布至 Amazon Simple Queue Service (Amazon SQS) 佇列。AWS Lambda 函數使用該佇列作為事件來源，並處理佇列中的 URL。結果儲存至 Amazon S3 儲存貯體。\n公司希望在其他 Region 中處理每個 URL，以比較網站本地化的可能差異。URL 必須從現有 Region 發布。結果必須寫入目前 Region 中的現有 S3 儲存貯體。\n哪種變更組合能產生滿足這些需求的多 Region 部署？(選擇兩個)","options":{"A":"將 SQS 佇列與 Lambda 函數部署至其他 Region。","B":"將每個 Region 中的 SNS 主題訂閱至 SQS 佇列。","C":"將每個 Region 中的 SQS 佇列訂閱至 SNS 主題。","D":"設定 SQS 佇列將 URL 發布至每個 Region 中的 SNS 主題。","E":"將 SNS 主題和 Lambda 函數部署至其他 Region。"},"answer":"AC"},{"num":134,"stem":"一家公司在 Amazon EC2 Linux 執行個體上執行專有的無狀態 ETL 應用程式。該應用程式是 Linux 二進位檔，無法修改原始碼。該應用程式為單執行緒，使用 2 GB RAM，且 CPU 密集度高。該應用程式排程每 4 小時執行一次，每次執行最多 20 分鐘。解決方案架構師希望修改此解決方案的架構。\n解決方案架構師應使用哪種策略？","options":{"A":"使用 AWS Lambda 執行應用程式。使用 Amazon CloudWatch Logs 每 4 小時叫用 Lambda 函數一次。","B":"使用 AWS Batch 執行應用程式。使用 AWS Step Functions 狀態機每 4 小時叫用 AWS Batch 任務一次。","C":"使用 AWS Fargate 執行應用程式。使用 Amazon EventBridge (Amazon CloudWatch Events) 每 4 小時叫用 Fargate 任務一次。","D":"使用 Amazon EC2 Spot Instances 執行應用程式。使用 AWS CodeDeploy 每 4 小時部署並執行應用程式一次。"},"answer":"C"},{"num":135,"stem":"一家公司正在為一款熱門線上遊戲創作續作。在上線後的第一週內，全球大量使用者將開始遊玩此遊戲。目前，遊戲由以下部署在單一 AWS Region 中的元件組成：\n• 儲存遊戲資產的 Amazon S3 儲存貯體\n• 儲存玩家分數的 Amazon DynamoDB 資料表\n解決方案架構師需要設計一個多 Region 解決方案，以降低延遲、提高可靠性，並需要最少的實作工作量。\n解決方案架構師應採取什麼措施來滿足這些需求？","options":{"A":"建立 Amazon CloudFront 分佈，以從 S3 儲存貯體提供資產。設定 S3 跨 Region 複寫。在新 Region 中建立新的 DynamoDB 資料表。使用新資料表作為 DynamoDB 全域資料表的複本目標。","B":"建立 Amazon CloudFront 分佈，以從 S3 儲存貯體提供資產。設定 S3 同 Region 複寫。在新 Region 中建立新的 DynamoDB 資料表。使用 AWS Database Migration Service (AWS DMS) 搭配異動資料擷取 (CDC) 設定 DynamoDB 資料表之間的非同步複寫。","C":"在新 Region 中建立另一個 S3 儲存貯體，並設定儲存貯體之間的 S3 跨 Region 複寫。建立 Amazon CloudFront 分佈，並設定以兩個來源存取每個 Region 中 S3 儲存貯體的來源容錯移轉。啟用 Amazon DynamoDB Streams 以設定 DynamoDB 全域資料表，並在新 Region 中新增複本資料表。","D":"在相同 Region 中建立另一個 S3 儲存貯體，並設定儲存貯體之間的 S3 同 Region 複寫。建立 Amazon CloudFront 分佈，並設定以兩個來源存取 S3 儲存貯體的來源容錯移轉。在新 Region 中建立新的 DynamoDB 資料表。使用新資料表作為 DynamoDB 全域資料表的複本目標。"},"answer":"C"},{"num":136,"stem":"一家公司擁有一個內部部署的房地產資訊網站應用程式，供潛在租屋者和買家使用。該網站使用 Java 後端和 NoSQL MongoDB 資料庫來儲存訂閱者資料。\n公司需要將整個應用程式遷移至 AWS，並保持類似的架構。應用程式必須以高可用性方式部署，且公司無法對應用程式進行修改。\n哪種解決方案能滿足這些需求？","options":{"A":"使用 Amazon Aurora DB 叢集作為訂閱者資料的資料庫。在跨多個 Availability Zone 的 Auto Scaling 群組中部署 Amazon EC2 執行個體，作為 Java 後端應用程式。","B":"使用 Amazon EC2 執行個體上的 MongoDB 作為訂閱者資料的資料庫。在單一 Availability Zone 的 Auto Scaling 群組中部署 EC2 執行個體，作為 Java 後端應用程式。","C":"在多個 Availability Zone 中，設定適當大小執行個體的 Amazon DocumentDB (與 MongoDB 相容) 作為訂閱者資料的資料庫。在跨多個 Availability Zone 的 Auto Scaling 群組中部署 Amazon EC2 執行個體，作為 Java 後端應用程式。","D":"在多個 Availability Zone 中，以隨需容量模式設定 Amazon DocumentDB (與 MongoDB 相容) 作為訂閱者資料的資料庫。在跨多個 Availability Zone 的 Auto Scaling 群組中部署 Amazon EC2 執行個體，作為 Java 後端應用程式。"},"answer":"D"},{"num":137,"stem":"一家數位行銷公司擁有屬於不同團隊的多個 AWS 帳戶。創意團隊在其 AWS 帳戶中使用 Amazon S3 儲存貯體，安全地儲存用於公司行銷活動內容的圖片和媒體檔案。創意團隊希望與策略團隊共用此 S3 儲存貯體，以便策略團隊可以檢視物件。\n解決方案架構師已在策略帳戶中建立名為 strategy_reviewer 的 IAM 角色。解決方案架構師也在創意帳戶中設定了自訂 AWS Key Management Service (AWS KMS) 金鑰，並將該金鑰與 S3 儲存貯體建立關聯。但是，當策略帳戶中的使用者擔任 IAM 角色並嘗試存取 S3 儲存貯體中的物件時，他們收到「存取被拒絕」錯誤。\n解決方案架構師必須確保策略帳戶中的使用者可以存取 S3 儲存貯體。解決方案必須只為這些使用者提供所需的最低權限。\n解決方案架構師應採取哪些步驟組合來滿足這些需求？(選擇三個)","options":{"A":"建立包含 S3 儲存貯體讀取權限的儲存貯體政策。將儲存貯體政策的主體設定為策略帳戶的帳戶 ID。","B":"更新 strategy_reviewer IAM 角色，以授予 S3 儲存貯體的完整權限，以及自訂 KMS 金鑰的解密權限。","C":"更新創意帳戶中的自訂 KMS 金鑰政策，以授予 strategy_reviewer IAM 角色解密權限。","D":"建立包含 S3 儲存貯體讀取權限的儲存貯體政策。將儲存貯體政策的主體設定為匿名使用者。","E":"更新創意帳戶中的自訂 KMS 金鑰政策，以授予 strategy_reviewer IAM 角色加密權限。","F":"更新 strategy_reviewer IAM 角色，以授予 S3 儲存貯體的讀取權限，以及自訂 KMS 金鑰的解密權限。"},"answer":"BCF"},{"num":138,"stem":"一家生命科學公司使用開源工具組合來管理資料分析工作流程，並在其內部部署資料中心的伺服器上執行 Docker 容器來處理基因體資料。定序資料在本地儲存區域網路 (SAN) 上產生和儲存，然後進行處理。研發團隊遇到容量問題，決定在 AWS 上重新設計其基因體分析平台，以根據工作負載需求進行擴展，並將週轉時間從數週縮短至數天。\n公司擁有高速 AWS Direct Connect 連線。定序儀將為每個基因體產生約 200 GB 的資料，在理想運算容量下，個別任務可能需要數小時來處理資料。最終結果將儲存在 Amazon S3 中。公司預計每天收到 10 至 15 個任務請求。\n哪種解決方案能滿足這些需求？","options":{"A":"使用定期排程的 AWS Snowball Edge 裝置將定序資料傳輸至 AWS。當 AWS 收到 Snowball Edge 裝置且資料載入 Amazon S3 後，使用 S3 事件觸發 AWS Lambda 函數來處理資料。","B":"使用 AWS Data Pipeline 將定序資料傳輸至 Amazon S3。使用 S3 事件觸發 Amazon EC2 Auto Scaling 群組，以啟動執行 Docker 容器的自訂 AMI EC2 執行個體來處理資料。","C":"使用 AWS DataSync 將定序資料傳輸至 Amazon S3。使用 S3 事件觸發 AWS Lambda 函數，以啟動 AWS Step Functions 工作流程。將 Docker 映像儲存在 Amazon Elastic Container Registry (Amazon ECR) 中，並觸發 AWS Batch 執行容器並處理定序資料。","D":"使用 AWS Storage Gateway 檔案閘道將定序資料傳輸至 Amazon S3。使用 S3 事件觸發在 Amazon EC2 執行個體上執行 Docker 容器的 AWS Batch 任務來處理資料。"},"answer":"C"},{"num":139,"stem":"一家公司在開發環境中的單一 Windows Amazon EC2 執行個體上執行內容管理應用程式。該應用程式從附加至執行個體作為根裝置的 2 TB Amazon Elastic Block Store (Amazon EBS) 磁碟區讀取和寫入靜態內容。公司計劃在生產環境中，以高可用性和容錯解決方案部署此應用程式，並在跨多個 Availability Zone 的至少三個 EC2 執行個體上執行。\n解決方案架構師必須設計一個解決方案，將執行應用程式的所有執行個體加入 Active Directory 網域。解決方案還必須實作 Windows ACL 以控制對檔案內容的存取。應用程式在任何時間點都必須在所有執行中的執行個體上維持完全相同的內容。\n哪種解決方案能以最少的管理負擔滿足這些需求？","options":{"A":"建立 Amazon Elastic File System (Amazon EFS) 檔案共用。建立跨三個 Availability Zone 延伸且最小大小為三個執行個體的 Auto Scaling 群組。實作使用者資料指令碼以安裝應用程式、將執行個體加入 AD 網域，並掛載 EFS 檔案共用。","B":"從目前執行中的 EC2 執行個體建立新的 AMI。建立 Amazon FSx for Lustre 檔案系統。建立跨三個 Availability Zone 延伸且最小大小為三個執行個體的 Auto Scaling 群組。實作使用者資料指令碼，將執行個體加入 AD 網域並掛載 FSx for Lustre 檔案系統。","C":"建立 Amazon FSx for Windows File Server 檔案系統。建立跨三個 Availability Zone 延伸且最小大小為三個執行個體的 Auto Scaling 群組。實作使用者資料指令碼以安裝應用程式並掛載 FSx for Windows File Server 檔案系統。執行無縫網域加入，將執行個體加入 AD 網域。","D":"從目前執行中的 EC2 執行個體建立新的 AMI。建立 Amazon Elastic File System (Amazon EFS) 檔案系統。建立跨三個 Availability Zone 延伸且最小大小為三個執行個體的 Auto Scaling 群組。執行無縫網域加入，將執行個體加入 AD 網域。"},"answer":"B"},{"num":140,"stem":"一家軟體即服務 (SaaS) 公司向客戶提供案例管理解決方案。作為解決方案的一部分，公司使用獨立的 Simple Mail Transfer Protocol (SMTP) 伺服器從應用程式發送電子郵件訊息。應用程式還儲存了一個確認電子郵件訊息的範本，該範本在應用程式將電子郵件訊息發送給客戶之前，會填入客戶資料。\n公司計劃將此訊息功能遷移至 AWS Cloud，並需要最小化操作負擔。\n哪種解決方案能以最符合成本效益的方式滿足這些需求？","options":{"A":"使用 AWS Marketplace 的 AMI 在 Amazon EC2 執行個體上設定 SMTP 伺服器。將電子郵件範本儲存在 Amazon S3 儲存貯體中。建立 AWS Lambda 函數，從 S3 儲存貯體擷取範本，並將應用程式中的客戶資料與範本合併。使用 Lambda 函數中的 SDK 發送電子郵件訊息。","B":"設定 Amazon Simple Email Service (Amazon SES) 以發送電子郵件訊息。將電子郵件範本儲存在 Amazon S3 儲存貯體中。建立 AWS Lambda 函數，從 S3 儲存貯體擷取範本，並將應用程式中的客戶資料與範本合併。使用 Lambda 函數中的 SDK 發送電子郵件訊息。","C":"使用 AWS Marketplace 的 AMI 在 Amazon EC2 執行個體上設定 SMTP 伺服器。將電子郵件範本儲存在 Amazon Simple Email Service (Amazon SES) 中，並設定客戶資料的參數。建立 AWS Lambda 函數，呼叫 SES 範本並傳遞客戶資料以替換參數。使用 AWS Marketplace SMTP 伺服器發送電子郵件訊息。","D":"設定 Amazon Simple Email Service (Amazon SES) 以發送電子郵件訊息。將電子郵件範本儲存在 Amazon SES 中，並設定客戶資料的參數。建立 AWS Lambda 函數，呼叫 SendTemplatedEmail API 操作，並傳遞客戶資料以替換參數和電子郵件目的地。"},"answer":"B"},{"num":141,"stem":"一家公司正在使用 Auto Scaling 群組中的 Amazon EC2 執行個體，在 AWS Cloud 中處理影片。處理一個影片需要 30 分鐘。數個 EC2 執行個體根據 Amazon Simple Queue Service (Amazon SQS) 佇列中的影片數量進行擴展和縮減。公司已將 SQS 佇列設定為重新驅動政策，指定目標無效信件佇列，並將 maxReceiveCount 設為 1。公司已將 SQS 佇列的可見性逾時設為 1 小時。公司已設定 Amazon CloudWatch 警示，在無效信件佇列中有訊息時通知開發團隊。\n一天中多次，開發團隊收到無效信件佇列中有訊息且影片未正確處理的通知。調查發現應用程式日誌中沒有錯誤。\n公司如何解決此問題？","options":{"A":"為 EC2 執行個體開啟終止保護","B":"將 SQS 佇列的可見性逾時更新為 3 小時","C":"在處理期間為執行個體設定縮減保護","D":"更新重新驅動政策，將 maxReceiveCount 設為 0"},"answer":"D"},{"num":142,"stem":"一家公司開發了使用 Amazon API Gateway 搭配 Regional 端點的 API。這些 API 呼叫使用 API Gateway 驗證機制的 AWS Lambda 函數。設計審查後，解決方案架構師識別出一組不需要公開存取的 API。\n解決方案架構師必須設計一個解決方案，使這組 API 只能從 VPC 存取。所有 API 都需要透過已驗證的使用者來呼叫。\n哪種解決方案能以最少的工作量滿足這些需求？","options":{"A":"建立內部 Application Load Balancer (ALB)。建立目標群組。選擇要呼叫的 Lambda 函數。使用 ALB DNS 名稱從 VPC 呼叫 API。","B":"移除 API Gateway 中與 API 相關聯的 DNS 項目。在 Amazon Route 53 中建立託管區域。在託管區域中建立 CNAME 記錄。使用 CNAME 記錄更新 API Gateway 中的 API。使用 CNAME 記錄從 VPC 呼叫 API。","C":"在 API Gateway 中將 API 端點從 Regional 更新為 Private。在 VPC 中建立介面 VPC 端點。建立資源政策並將其附加至 API。使用 VPC 端點從 VPC 呼叫 API。","D":"將 Lambda 函數部署至 VPC 內部。佈建 EC2 執行個體並安裝 Apache 伺服器。從 Apache 伺服器呼叫 Lambda 函數。使用 EC2 執行個體的內部 CNAME 記錄從 VPC 呼叫 API。"},"answer":"D"},{"num":143,"stem":"一家氣象服務在 AWS eu-west-1 Region 托管的 Web 應用程式中提供高解析度天氣圖。天氣圖會頻繁更新，並與靜態 HTML 內容一起儲存在 Amazon S3 中。Web 應用程式透過 Amazon CloudFront 提供服務。\n公司最近擴展以服務 us-east-1 Region 的使用者，這些新使用者回報有時查看其天氣圖速度緩慢。\n哪種步驟組合能解決 us-east-1 的效能問題？(選擇兩個)","options":{"A":"為 eu-west-1 中的 S3 儲存貯體設定 AWS Global Accelerator 端點。在 us-east-1 中為 TCP 連接埠 80 和 443 設定端點群組。","B":"在 us-east-1 中建立新的 S3 儲存貯體。設定 S3 跨 Region 複寫，從 eu-west-1 的 S3 儲存貯體同步。","C":"使用 Lambda@Edge 修改來自北美的請求，使其使用 us-east-1 中的 S3 Transfer Acceleration 端點。","D":"使用 Lambda@Edge 修改來自北美的請求，使其使用 us-east-1 中的 S3 儲存貯體。","E":"將 us-east-1 的 AWS Global Accelerator 端點設定為 CloudFront 分佈上的來源。使用 Lambda@Edge 修改來自北美的請求，使其使用新來源。"},"answer":"BD"},{"num":144,"stem":"解決方案架構師正在調查一個公司無法在 Amazon WorkSpaces 中建立新工作階段的問題。初步分析指出問題涉及使用者設定檔。Amazon WorkSpaces 環境已設定為使用 Amazon FSx for Windows File Server 作為設定檔共用儲存空間。FSx for Windows File Server 檔案系統已設定 10 TB 的儲存空間。\n解決方案架構師發現檔案系統已達到其最大容量。解決方案架構師必須確保使用者能夠重新取得存取權限。解決方案還必須防止問題再次發生。\n哪種解決方案能滿足這些需求？","options":{"A":"移除舊使用者設定檔以建立空間。將使用者設定檔遷移至 Amazon FSx for Lustre 檔案系統。","B":"使用 update-file-system 命令增加容量。實作監控可用空間的 Amazon CloudWatch 指標。使用 Amazon EventBridge 叫用 AWS Lambda 函數，以根據需要增加容量。","C":"使用 Amazon CloudWatch 中的 FreeStorageCapacity 指標監控檔案系統。使用 AWS Step Functions 根據需要增加容量。","D":"移除舊使用者設定檔以建立空間。建立額外的 FSx for Windows File Server 檔案系統。將 50% 使用者的使用者設定檔重新導向更新至使用新檔案系統。"},"answer":"C"},{"num":145,"stem":"一家國際快遞公司在 AWS 上托管一個快遞管理系統。司機使用該系統上傳配送確認。確認內容包括收件人的簽名或包裹與收件人的照片。司機的手持裝置透過 FTP 將簽名和照片上傳至單一 Amazon EC2 執行個體。每個手持裝置根據登入使用者將檔案儲存在目錄中，檔案名稱與配送編號相符。EC2 執行個體隨後查詢中央資料庫以提取配送資訊，並在檔案中新增中繼資料。然後將檔案放入 Amazon S3 進行存檔。\n隨著公司擴張，司機回報系統拒絕連線。FTP 伺服器因連線中斷和記憶體問題而出現問題。為了應對這些問題，系統工程師排程 cron 任務每 30 分鐘重新啟動一次 EC2 執行個體。帳務團隊回報檔案並不總是在存檔中，且中央系統並不總是被更新。\n解決方案架構師需要設計一個最大化可擴展性的解決方案，以確保存檔始終接收檔案，且系統始終被更新。手持裝置無法修改，因此公司無法部署新應用程式。\n哪種解決方案能滿足這些需求？","options":{"A":"從現有 EC2 執行個體建立 AMI。在 Application Load Balancer 後方建立 EC2 執行個體的 Auto Scaling 群組。將 Auto Scaling 群組設定為最少三個執行個體。","B":"使用 AWS Transfer Family 建立 FTP 伺服器，將檔案放置在 Amazon Elastic File System (Amazon EFS) 中。將 EFS 磁碟區掛載至現有 EC2 執行個體。將 EC2 執行個體指向新路徑以進行檔案處理。","C":"使用 AWS Transfer Family 建立 FTP 伺服器，將檔案放置在 Amazon S3 中。透過 Amazon Simple Notification Service (Amazon SNS) 使用 S3 事件通知來叫用 AWS Lambda 函數。設定 Lambda 函數以新增中繼資料並更新配送系統。","D":"更新手持裝置，將檔案直接放置在 Amazon S3 中。透過 Amazon Simple Queue Service (Amazon SQS) 使用 S3 事件通知來叫用 AWS Lambda 函數。設定 Lambda 函數以新增中繼資料並更新配送系統。"},"answer":"B"},{"num":146,"stem":"一家公司在 AWS Cloud 中執行應用程式。該應用程式在 Amazon Elastic Container Service (Amazon ECS) 叢集中的容器上執行。ECS 任務使用 Fargate 啟動類型。應用程式的資料是關聯式資料，儲存在 Amazon Aurora MySQL 中。為符合法規要求，應用程式在發生應用程式故障時必須能夠恢復至另一個 AWS Region。在發生故障的情況下，不允許任何資料遺失。\n哪種解決方案能以最少的操作負擔滿足這些需求？","options":{"A":"在不同的 Region 中佈建 Aurora 複本。","B":"設定 AWS DataSync 以持續將資料複寫至不同的 Region。","C":"設定 AWS Database Migration Service (AWS DMS) 以對不同的 Region 執行持續的資料複寫。","D":"使用 Amazon Data Lifecycle Manager (Amazon DLM) 每 5 分鐘排程一次快照。"},"answer":"A"},{"num":147,"stem":"一家金融服務公司定期從其信用卡服務合作夥伴接收資料饋送。大約每 15 分鐘傳送 5,000 筆記錄，以純文字形式透過 HTTPS 直接傳送至具有伺服器端加密的 Amazon S3 儲存貯體。此饋送包含敏感的信用卡主帳號 (PAN) 資料。公司需要在將資料傳送至另一個 S3 儲存貯體進行額外內部處理之前，自動遮罩 PAN。公司還需要移除和合併特定欄位，然後將記錄轉換為 JSON 格式。此外，未來可能會新增額外的饋送，因此任何設計都需要易於擴展。\n哪種解決方案能滿足這些需求？","options":{"A":"在檔案傳送時叫用 AWS Lambda 函數，擷取每筆記錄並將其寫入 Amazon SQS 佇列。當 SQS 佇列中有新訊息時叫用另一個 Lambda 函數，處理記錄並將結果寫入 Amazon S3 中的暫存位置。當 SQS 佇列為空時叫用最後一個 Lambda 函數，將記錄轉換為 JSON 格式，並將結果傳送至另一個 S3 儲存貯體進行內部處理。","B":"在檔案傳送時叫用 AWS Lambda 函數，擷取每筆記錄並將其寫入 Amazon SQS 佇列。設定 AWS Fargate 容器應用程式，在 SQS 佇列包含訊息時自動擴展至單一執行個體。讓應用程式處理每筆記錄，並將記錄轉換為 JSON 格式。當佇列為空時，將結果傳送至另一個 S3 儲存貯體進行內部處理，並縮減 AWS Fargate 執行個體。","C":"根據資料饋送格式建立 AWS Glue 爬蟲程式和自訂分類器，並建立符合的資料表定義。在檔案傳送時叫用 AWS Lambda 函數，以啟動 AWS Glue ETL 任務，根據處理和轉換需求轉換整筆記錄。將輸出格式定義為 JSON。完成後，讓 ETL 任務將結果傳送至另一個 S3 儲存貯體進行內部處理。","D":"根據資料饋送格式建立 AWS Glue 爬蟲程式和自訂分類器，並建立符合的資料表定義。在檔案傳送時執行 Amazon Athena 查詢，以啟動 Amazon EMR ETL 任務，根據處理和轉換需求轉換整筆記錄。將輸出格式定義為 JSON。完成後，將結果傳送至另一個 S3 儲存貯體進行內部處理，並縮減 EMR 叢集。"},"answer":"C"},{"num":148,"stem":"一家公司希望使用 AWS 建立業務持續性解決方案，以防公司的主要內部部署應用程式發生故障。該應用程式在同時執行其他應用程式的實體伺服器上執行。公司計劃遷移的內部部署應用程式使用 MySQL 資料庫作為資料儲存區。公司所有內部部署應用程式都使用與 Amazon EC2 相容的作業系統。\n哪種解決方案能以最少的操作負擔達成公司目標？","options":{"A":"在來源伺服器（包括 MySQL 伺服器）上安裝 AWS Replication Agent。設定所有伺服器的複寫。啟動測試執行個體進行定期演練。在發生故障事件時，切換至測試執行個體以容錯移轉工作負載。","B":"在來源伺服器（包括 MySQL 伺服器）上安裝 AWS Replication Agent。在目標 AWS Region 中初始化 AWS Elastic Disaster Recovery。定義啟動設定。頻繁地從最近的時間點執行容錯移轉和回復。","C":"建立 AWS Database Migration Service (AWS DMS) 複寫伺服器和目標 Amazon Aurora MySQL DB 叢集以托管資料庫。建立 DMS 複寫任務，將現有資料複製至目標 DB 叢集。建立本地 AWS Schema Conversion Tool (AWS SCT) 異動資料擷取 (CDC) 任務，以保持資料同步。從相容的基礎 AMI 開始，在 EC2 執行個體上安裝其餘軟體。","D":"在內部部署環境中部署 AWS Storage Gateway Volume Gateway。在所有內部部署伺服器上掛載磁碟區。在新磁碟區上安裝應用程式和 MySQL 資料庫。定期拍攝快照。從相容的基礎 AMI 開始，在 EC2 執行個體上安裝所有軟體。在 EC2 執行個體上啟動 Volume Gateway。從最新快照還原磁碟區。在發生故障事件時，將新磁碟區掛載至 EC2 執行個體。"},"answer":"C"},{"num":149,"stem":"一家公司須接受其財務資訊的法規稽核。使用單一 AWS 帳戶的外部稽核人員需要存取公司的 AWS 帳戶。解決方案架構師必須為稽核人員提供對公司 AWS 帳戶的安全唯讀存取權。解決方案必須符合 AWS 安全最佳實踐。\n哪種解決方案能滿足這些需求？","options":{"A":"在公司的 AWS 帳戶中，為帳戶中的所有資源建立資源政策，以授予稽核人員 AWS 帳戶的存取權。為資源政策指派唯一的外部 ID。","B":"在公司的 AWS 帳戶中，建立信任稽核人員 AWS 帳戶的 IAM 角色。建立具有所需權限的 IAM 政策。將政策附加至角色。為角色的信任政策指派唯一的外部 ID。","C":"在公司的 AWS 帳戶中，建立 IAM 使用者。將所需的 IAM 政策附加至 IAM 使用者。為 IAM 使用者建立 API 存取金鑰。與稽核人員共用存取金鑰。","D":"在公司的 AWS 帳戶中，建立具有所需權限的 IAM 群組。在公司帳戶中為每位稽核人員建立 IAM 使用者。將 IAM 使用者新增至 IAM 群組。"},"answer":"B"},{"num":150,"stem":"一家公司擁有一個對延遲敏感的交易平台，使用 Amazon DynamoDB 作為儲存後端。公司已將 DynamoDB 資料表設定為使用隨需容量模式。解決方案架構師需要設計一個解決方案，以提升交易平台的效能。新解決方案必須確保交易平台的高可用性。\n哪種解決方案能以最低延遲滿足這些需求？","options":{"A":"建立雙節點 DynamoDB Accelerator (DAX) 叢集。設定應用程式使用 DAX 讀取和寫入資料。","B":"建立三節點 DynamoDB Accelerator (DAX) 叢集。設定應用程式使用 DAX 讀取資料，並直接將資料寫入 DynamoDB 資料表。","C":"建立三節點 DynamoDB Accelerator (DAX) 叢集。設定應用程式直接從 DynamoDB 資料表讀取資料，並使用 DAX 寫入資料。","D":"建立單節點 DynamoDB Accelerator (DAX) 叢集。設定應用程式使用 DAX 讀取資料，並直接將資料寫入 DynamoDB 資料表。"},"answer":"A"},{"num":151,"stem":"一家公司已將應用程式從本地端遷移至 AWS。應用程式前端是一個靜態網站，運行在 Application Load Balancer (ALB) 後方的兩個 Amazon EC2 執行個體上。應用程式後端是一個 Python 應用程式，運行在另一個 ALB 後方的三個 EC2 執行個體上。這些 EC2 執行個體是大型、通用的隨需執行個體，其規格是依照應用程式的本地端尖峰使用量需求來調整的。\n該應用程式每月平均處理數十萬個請求。然而，應用程式主要在午餐時段使用，其餘時間的 traffic 極少。\n解決方案架構師需要在不影響應用程式可用性的前提下，優化應用程式的基礎設施成本。\n哪種步驟組合能滿足這些要求？（選擇兩個）","options":{"A":"將所有 EC2 執行個體更換為與現有 EC2 執行個體具有相同核心數量的運算優化執行個體。","B":"將應用程式前端移至託管在 Amazon S3 上的靜態網站。","C":"使用 AWS Elastic Beanstalk 部署應用程式前端。對節點使用相同的執行個體類型。","D":"將所有後端 EC2 執行個體更換為 Spot 執行個體。","E":"將後端 Python 應用程式部署到與現有 EC2 執行個體具有相同核心數量的通用突發型 EC2 執行個體上。"},"answer":"BE"},{"num":152,"stem":"一家公司在 AWS 上運行一個活動售票平台，並希望優化平台的成本效益。該平台部署在使用 Amazon EC2 的 Amazon Elastic Kubernetes Service (Amazon EKS) 上，並由 Amazon RDS for MySQL 資料庫執行個體作為後端。該公司正在開發新的應用程式功能，以在使用 AWS Fargate 的 Amazon EKS 上運行。\n該平台會不定期出現需求高峰，需求激增的情況取決於活動日期。\n哪種解決方案能為平台提供最具成本效益的設定？","options":{"A":"為 EKS 叢集在基準負載中使用的 EC2 執行個體購買標準預留執行個體。使用 Spot 執行個體擴展叢集以應對高峰。購買 1 年全額預付預留執行個體以滿足當年預測的資料庫尖峰負載。","B":"為 EKS 叢集的預測中等負載購買 Compute Savings Plans。根據活動日期使用隨需容量預留來擴展叢集以應對高峰。購買 1 年無需預付預留執行個體以滿足預測的資料庫基準負載。在高峰期間臨時橫向擴展資料庫讀取複本。","C":"為 EKS 叢集的預測基準負載購買 EC2 Instance Savings Plans。使用 Spot 執行個體擴展叢集以應對高峰。購買 1 年全額預付預留執行個體以滿足預測的資料庫基準負載。在高峰期間手動臨時擴大 DB 執行個體規模。","D":"為 EKS 叢集的預測基準負載購買 Compute Savings Plans。使用 Spot 執行個體擴展叢集以應對高峰。購買 1 年全額預付預留執行個體以滿足預測的資料庫基準負載。在高峰期間手動臨時擴大 DB 執行個體規模。"},"answer":"B"},{"num":153,"stem":"一家公司已在 AWS Elastic Beanstalk 上部署了一個應用程式。該應用程式使用 Amazon Aurora 作為資料庫層。Amazon CloudFront 分發負責處理網頁請求，並將 Elastic Beanstalk 網域名稱作為來源伺服器。該分發配置了一個訪客使用的替代網域名稱以存取應用程式。\n每週，公司會將應用程式停機進行例行維護。在應用程式不可用期間，公司希望訪客收到一則資訊性訊息，而不是 CloudFront 錯誤訊息。\n解決方案架構師建立了一個 Amazon S3 儲存貯體作為流程的第一步。\n解決方案架構師接下來應採取哪種步驟組合來滿足這些要求？（選擇三個）","options":{"A":"將靜態資訊性內容上傳到 S3 儲存貯體。","B":"建立新的 CloudFront 分發。將 S3 儲存貯體設為來源。","C":"將 S3 儲存貯體設為原始 CloudFront 分發中的第二個來源。配置分發和 S3 儲存貯體以使用來源存取身分 (OAI)。","D":"在每週維護期間，編輯預設快取行為以使用 S3 來源。維護完成後恢復更改。","E":"在每週維護期間，在新分發上為 S3 來源建立快取行為。將路徑模式設為 \\。將優先順序設為 0。維護完成後刪除快取行為。 F. 在每週維護期間，配置 Elastic Beanstalk 從 S3 儲存貯體提供 traffic。"},"answer":"ACD"},{"num":154,"stem":"一家公司讓使用者能夠從自訂應用程式上傳圖片。上傳流程會呼叫 AWS Lambda 函數，該函數會處理圖片並將其儲存在 Amazon S3 儲存貯體中。應用程式使用特定的函數版本 ARN 來呼叫 Lambda 函數。\nLambda 函數透過環境變數接受圖片處理參數。公司經常調整 Lambda 函數的環境變數以達到最佳的圖片處理輸出效果。公司在驗證結果後測試不同的參數，並發布附有更新環境變數的新函數版本。這個更新流程也需要頻繁地修改自訂應用程式以呼叫新的函數版本 ARN，這些更改會對使用者造成中斷。\n解決方案架構師需要簡化此流程以將對使用者的干擾降至最低。\n哪種解決方案能以最少的操作負擔滿足這些要求？","options":{"A":"直接修改已發布 Lambda 函數版本的環境變數。使用 $LATEST 版本測試圖片處理參數。","B":"建立 Amazon DynamoDB 資料表來儲存圖片處理參數。修改 Lambda 函數以從 DynamoDB 資料表中取得圖片處理參數。","C":"直接在 Lambda 函數中對圖片處理參數進行硬式編碼，並移除環境變數。當公司更新參數時發布新的函數版本。","D":"建立 Lambda 函數別名。修改客戶端應用程式以使用函數別名 ARN。當公司完成測試後，重新配置 Lambda 別名以指向新版本的函數。"},"answer":"D"},{"num":155,"stem":"一家全球媒體公司正在規劃應用程式的多區域部署。Amazon DynamoDB 全球資料表將支援此部署，以在使用者集中的兩個大洲之間提供一致的使用者體驗。每個部署都將有一個公開的 Application Load Balancer (ALB)。公司在內部管理公開 DNS。公司希望透過頂點網域提供應用程式存取。\n哪種解決方案能以最少的工作量滿足這些要求？","options":{"A":"將公開 DNS 遷移至 Amazon Route 53。為頂點網域建立 CNAME 記錄以指向 ALB。使用地理位置路由政策根據使用者位置路由 traffic。","B":"在 ALB 前方放置 Network Load Balancer (NLB)。將公開 DNS 遷移至 Amazon Route 53。為頂點網域建立 CNAME 記錄以指向 NLB 的靜態 IP 位址。使用地理位置路由政策根據使用者位置路由 traffic。","C":"建立一個 AWS Global Accelerator 加速器，其中包含針對適當 AWS 區域中端點的多個端點群組。使用加速器的靜態 IP 位址在公開 DNS 中為頂點網域建立記錄。","D":"建立一個由 AWS Lambda 支援的 Amazon API Gateway API，部署在其中一個 AWS 區域中。配置 Lambda 函數使用循環配置資源方法將 traffic 路由到應用程式部署。為頂點網域建立 CNAME 記錄以指向 API 的 URL。"},"answer":"C"},{"num":156,"stem":"一家公司正在使用 Amazon API Gateway 和 AWS Lambda 開發一個新的無伺服器 API。公司將 Lambda 函數與 API Gateway 整合，以使用多個共用程式庫和自訂類別。\n解決方案架構師需要簡化解決方案的部署並優化程式碼重用。\n哪種解決方案能滿足這些要求？","options":{"A":"將共用程式庫和自訂類別部署到 Docker 映像中。將映像儲存在 S3 儲存貯體中。建立使用 Docker 映像作為來源的 Lambda 層。將 API 的 Lambda 函數部署為 Zip 套件。配置套件以使用 Lambda 層。","B":"將共用程式庫和自訂類別部署到 Docker 映像中。將映像上傳至 Amazon Elastic Container Registry (Amazon ECR)。建立使用 Docker 映像作為來源的 Lambda 層。將 API 的 Lambda 函數部署為 Zip 套件。配置套件以使用 Lambda 層。","C":"使用 AWS Fargate 啟動類型，將共用程式庫和自訂類別部署到 Amazon Elastic Container Service (Amazon ECS) 中的 Docker 容器。將 API 的 Lambda 函數部署為 Zip 套件。配置套件以使用已部署的容器作為 Lambda 層。","D":"將共用程式庫、自訂類別和 API Lambda 函數的程式碼部署到 Docker 映像中。將映像上傳至 Amazon Elastic Container Registry (Amazon ECR)。配置 API 的 Lambda 函數以使用 Docker 映像作為部署套件。"},"answer":"D"},{"num":157,"stem":"一家製造公司正在為其工廠建立檢測解決方案。公司在每條裝配線末端安裝了 IP 攝影機。公司已使用 Amazon SageMaker 訓練了一個機器學習 (ML) 模型，從靜態圖片中識別常見缺陷。\n公司希望在偵測到缺陷時為工廠工人提供即時的本地端回饋。即使工廠的網際網路連線中斷，公司也必須能夠提供此回饋。公司有一台本地端 Linux 伺服器，託管了一個向工人提供本地端回饋的 API。\n公司應如何部署 ML 模型以滿足這些要求？","options":{"A":"從每個 IP 攝影機設定 Amazon Kinesis 影片串流至 AWS。使用 Amazon EC2 執行個體截取串流的靜態圖片。將圖片上傳至 Amazon S3 儲存貯體。使用 ML 模型部署 SageMaker 端點。配置 AWS Lambda 函數，在新圖片上傳時呼叫推論端點。配置 Lambda 函數，在偵測到缺陷時呼叫本地端 API。","B":"在本地端伺服器上部署 AWS IoT Greengrass。將 ML 模型部署到 Greengrass 伺服器。建立一個 Greengrass 元件，從攝影機截取靜態圖片並執行推論。配置元件，在偵測到缺陷時呼叫本地端 API。","C":"訂購一台 AWS Snowball 裝置。在 Snowball 裝置上部署 SageMaker 端點、ML 模型和 Amazon EC2 執行個體。從攝影機截取靜態圖片。從 EC2 執行個體執行推論。配置執行個體，在偵測到缺陷時呼叫本地端 API。","D":"在每個 IP 攝影機上部署 Amazon Monitron 裝置。在本地端部署 Amazon Monitron Gateway。將 ML 模型部署到 Amazon Monitron 裝置。使用 Amazon Monitron 健康狀態警報，在偵測到缺陷時透過 AWS Lambda 函數呼叫本地端 API。"},"answer":"B"},{"num":158,"stem":"一位解決方案架構師必須為一家公司的本地端資料中心遷移至 AWS 雲端建立商業案例。解決方案架構師將使用公司所有伺服器的配置管理資料庫 (CMDB) 匯出資料來建立此案例。\n哪種解決方案能以最具成本效益的方式滿足這些要求？","options":{"A":"使用 AWS Well-Architected Tool 匯入 CMDB 資料以執行分析並產生建議。","B":"使用 Migration Evaluator 執行分析。使用資料匯入範本上傳 CMDB 匯出的資料。","C":"實作資源比對規則。使用 CMDB 匯出資料和 AWS Price List Bulk API 批量查詢 CMDB 資料與 AWS 服務的對應關係。","D":"使用 AWS Application Discovery Service 匯入 CMDB 資料以執行分析。"},"answer":"B"},{"num":159,"stem":"一家公司有一個網站，運行在 Application Load Balancer (ALB) 後方的 Amazon EC2 執行個體上。這些執行個體在 Auto Scaling 群組中。ALB 與 AWS WAF web ACL 相關聯。\n該網站經常遭受應用程式層的攻擊。這些攻擊會導致應用程式伺服器上的 traffic 突然大幅增加。存取日誌顯示每次攻擊來自不同的 IP 位址。解決方案架構師需要實作一個解決方案來緩解這些攻擊。\n哪種解決方案能以最少的操作負擔滿足這些要求？","options":{"A":"建立一個監控伺服器存取的 Amazon CloudWatch 警報。根據 IP 位址的存取設定閾值。配置警報動作，將 IP 位址新增至 web ACL 的拒絕清單中。","B":"在 AWS WAF 之外額外部署 AWS Shield Advanced。將 ALB 新增為受保護的資源。","C":"建立一個監控使用者 IP 位址的 Amazon CloudWatch 警報。根據 IP 位址的存取設定閾值。配置警報以呼叫 AWS Lambda 函數，針對觸發警報的 IP 位址在應用程式伺服器的子網路路由表中新增拒絕規則。","D":"檢查存取日誌以找出發起攻擊的 IP 位址模式。使用 Amazon Route 53 地理位置路由政策拒絕來自託管這些 IP 位址之國家/地區的 traffic。"},"answer":"B"},{"num":160,"stem":"一家公司有一個關鍵應用程式，其資料層部署在單一 AWS 區域中。資料層使用 Amazon DynamoDB 資料表和 Amazon Aurora MySQL 資料庫叢集。目前的 Aurora MySQL 引擎版本支援全球資料庫。應用程式層已部署在兩個區域中。\n公司政策規定，關鍵應用程式必須在兩個區域中部署應用程式層元件和資料層元件。RTO 和 RPO 必須各不超過幾分鐘。解決方案架構師必須建議一個解決方案，使資料層符合公司政策。\n哪種步驟組合能滿足這些要求？（選擇兩個）","options":{"A":"將另一個區域新增至 Aurora MySQL 資料庫叢集。","B":"將另一個區域新增至 Aurora MySQL 資料庫叢集中的每個資料表。","C":"為 DynamoDB 資料表和 Aurora MySQL 資料庫叢集設定排程跨區域備份。","D":"透過在配置中新增另一個區域，將現有的 DynamoDB 資料表轉換為全球資料表。","E":"使用 Amazon Route 53 Application Recovery Controller 將資料庫備份和復原自動化至次要區域。"},"answer":"AD"},{"num":161,"stem":"一家電信公司正在 AWS 上運行一個應用程式。公司已在本地端資料中心與 AWS 之間建立了 AWS Direct Connect 連線。公司在多個可用區域中的 Application Load Balancer (ALB) 後方的 Amazon EC2 執行個體上部署了應用程式，供內部使用。公司的客戶端從本地端網路使用 HTTPS 進行連線。TLS 在 ALB 終止。公司有多個目標群組，並使用基於路徑的路由根據 URL 路徑轉發請求。\n公司計劃部署具有基於 IP 位址允許清單的本地端防火牆設備。解決方案架構師必須開發一個解決方案，允許從本地端網路流向 AWS 的 traffic，以便客戶端可以繼續存取應用程式。\n哪種解決方案能滿足這些要求？","options":{"A":"配置現有 ALB 以使用靜態 IP 位址。在多個可用區域中為 ALB 指定 IP 位址。將 ALB IP 位址新增至防火牆設備。","B":"建立 Network Load Balancer (NLB)。在多個可用區域中為 NLB 關聯一個靜態 IP 位址。為 NLB 建立 ALB 類型的目標群組，並新增現有的 ALB。將 NLB IP 位址新增至防火牆設備。更新客戶端以連線至 NLB。","C":"建立 Network Load Balancer (NLB)。在多個可用區域中為 NLB 關聯一個靜態 IP 位址。將現有目標群組新增至 NLB。更新客戶端以連線至 NLB。刪除 ALB。將 NLB IP 位址新增至防火牆設備。","D":"建立 Gateway Load Balancer (GWLB)。在多個可用區域中為 GWLB 指定靜態 IP 位址。為 GWLB 建立 ALB 類型的目標群組，並新增現有的 ALB。將 GWLB IP 位址新增至防火牆設備。更新客戶端以連線至 GWLB。"},"answer":"B"},{"num":162,"stem":"一家公司在私有子網路中的 Amazon EC2 執行個體 fleet 上運行一個應用程式，這些執行個體位於面向網際網路的 Application Load Balancer (ALB) 後方。ALB 是 Amazon CloudFront 分發的來源。與 CloudFront 分發相關聯的 AWS WAF web ACL 包含各種 AWS 受管規則。\n公司需要一個解決方案，防止網際網路 traffic 直接存取 ALB。\n哪種解決方案能以最少的操作負擔滿足這些要求？","options":{"A":"建立一個包含現有 web ACL 相同規則的新 web ACL。將新的 web ACL 與 ALB 關聯。","B":"將現有的 web ACL 與 ALB 關聯。","C":"在 ALB 的安全群組中新增規則，僅允許來自 CloudFront 的 AWS 受管前綴清單的 traffic。","D":"在 ALB 的安全群組中新增規則，僅允許各種 CloudFront IP 位址範圍。"},"answer":"C"},{"num":163,"stem":"一家公司運行的應用程式使用 Amazon ElastiCache for Redis 叢集作為快取層。最近的安全稽核顯示，公司已為 ElastiCache 配置了靜態加密。然而，公司未配置 ElastiCache 使用傳輸中加密。此外，使用者可以在沒有身份驗證的情況下存取快取。\n解決方案架構師必須進行更改，以要求使用者身份驗證並確保公司使用端對端加密。\n哪種解決方案能滿足這些要求？","options":{"A":"建立 AUTH 權杖。將權杖以加密參數的形式儲存在 AWS Systems Manager Parameter Store 中。使用 AUTH 建立新叢集，並配置傳輸中加密。更新應用程式，以便在必要時從 Parameter Store 取得 AUTH 權杖，並使用 AUTH 權杖進行身份驗證。","B":"建立 AUTH 權杖。將權杖儲存在 AWS Secrets Manager 中。配置現有叢集使用 AUTH 權杖，並配置傳輸中加密。更新應用程式，以便在必要時從 Secrets Manager 取得 AUTH 權杖，並使用 AUTH 權杖進行身份驗證。","C":"建立 SSL 憑證。將憑證儲存在 AWS Secrets Manager 中。建立新叢集，並配置傳輸中加密。更新應用程式，以便在必要時從 Secrets Manager 取得 SSL 憑證，並使用憑證進行身份驗證。","D":"建立 SSL 憑證。將憑證以加密進階參數的形式儲存在 AWS Systems Manager Parameter Store 中。更新現有叢集以配置傳輸中加密。更新應用程式，以便在必要時從 Parameter Store 取得 SSL 憑證，並使用憑證進行身份驗證。"},"answer":"B"},{"num":164,"stem":"一家公司使用 Auto Scaling 群組中的 Amazon EC2 Spot 執行個體 fleet 運行計算工作負載。啟動範本使用兩個放置群組和單一執行個體類型。\n最近，監控系統報告了 Auto Scaling 執行個體啟動失敗的情況，這與系統使用者的更長等待時間相關。公司需要提高工作負載的整體可靠性。\n哪種解決方案能滿足這個要求？","options":{"A":"將啟動範本替換為啟動組態，以使用採用基於屬性的執行個體類型選擇的 Auto Scaling 群組。","B":"建立一個使用基於屬性的執行個體類型選擇的新啟動範本版本。配置 Auto Scaling 群組以使用新的啟動範本版本。","C":"更新啟動範本的 Auto Scaling 群組以增加放置群組的數量。","D":"更新啟動範本以使用較大的執行個體類型。"},"answer":"B"},{"num":165,"stem":"一家公司正在將文件處理工作負載遷移至 AWS。公司已更新許多應用程式，以原生方式使用 Amazon S3 API 來儲存、取得和修改處理伺服器以每秒約 5 個文件的速率產生的文件。文件處理完成後，客戶可以直接從 Amazon S3 下載文件。\n在遷移過程中，公司發現無法立即更新產生許多文件的處理伺服器以支援 S3 API。該伺服器在 Linux 上運行，並需要對伺服器產生和修改的檔案進行快速的本地端存取。當伺服器完成處理後，這些檔案必須在 30 分鐘內供公眾下載。\n哪種解決方案能以最少的工作量滿足這些要求？","options":{"A":"將應用程式遷移至 AWS Lambda 函數。使用 AWS SDK for Java 直接在 Amazon S3 中產生、修改和存取公司儲存的檔案。","B":"設定 Amazon S3 File Gateway 並配置連結至文件存放區的檔案共用。使用 NFS 將檔案共用掛載在 Amazon EC2 執行個體上。當 Amazon S3 發生變更時，發起 RefreshCache API 呼叫以更新 S3 File Gateway。","C":"配置 Amazon FSx for Lustre，設定匯入和匯出政策。將新的檔案系統連結至 S3 儲存貯體。安裝 Lustre 客戶端，並使用 NFS 將文件存放區掛載在 Amazon EC2 執行個體上。","D":"配置 AWS DataSync 以連線至 Amazon EC2 執行個體。配置一個任務，將產生的檔案與 Amazon S3 之間進行雙向同步。"},"answer":"C"},{"num":166,"stem":"一家快遞公司在 AWS 雲端中運行一個無伺服器解決方案。該解決方案管理使用者資料、配送資訊和過去的購買詳情。該解決方案由多個微服務組成。中央使用者服務將敏感資料儲存在 Amazon DynamoDB 資料表中。其他幾個微服務在不同的儲存服務中儲存部分敏感資料的副本。\n公司需要能夠依要求刪除使用者資訊。一旦中央使用者服務刪除某個使用者，其他所有微服務也必須立即刪除其資料副本。\n哪種解決方案能滿足這些要求？","options":{"A":"在 DynamoDB 資料表上啟用 DynamoDB Streams。為 DynamoDB 串流建立 AWS Lambda 觸發器，將使用者刪除事件發布到 Amazon Simple Queue Service (Amazon SQS) 佇列中。配置每個微服務輪詢佇列並從 DynamoDB 資料表中刪除使用者。","B":"在 DynamoDB 資料表上設定 DynamoDB 事件通知。建立 Amazon Simple Notification Service (Amazon SNS) 主題作為 DynamoDB 事件通知的目標。配置每個微服務訂閱 SNS 主題，並從 DynamoDB 資料表中刪除使用者。","C":"配置中央使用者服務，在公司刪除使用者時在自訂 Amazon EventBridge 事件匯流排上發布事件。為每個微服務建立 EventBridge 規則，以比對使用者刪除事件模式，並在微服務中呼叫邏輯以從 DynamoDB 資料表中刪除使用者。","D":"配置中央使用者服務，在公司刪除使用者時在 Amazon Simple Queue Service (Amazon SQS) 佇列上發布訊息。配置每個微服務在 SQS 佇列上建立事件篩選器，並從 DynamoDB 資料表中刪除使用者。"},"answer":"C"},{"num":167,"stem":"一家公司在 VPC 中運行一個 Web 應用程式。該 Web 應用程式在 Application Load Balancer (ALB) 後方的一組 Amazon EC2 執行個體上運行。ALB 正在使用 AWS WAF。\n外部客戶需要連接到該 Web 應用程式。公司必須向所有外部客戶提供 IP 位址。\n哪種解決方案能以最少的操作負擔滿足這些要求？","options":{"A":"將 ALB 替換為 Network Load Balancer (NLB)。為 NLB 指定 Elastic IP 位址。","B":"分配 Elastic IP 位址。將 Elastic IP 位址指定給 ALB。將 Elastic IP 位址提供給客戶。","C":"建立 AWS Global Accelerator 標準加速器。將 ALB 指定為加速器的端點。將加速器的 IP 位址提供給客戶。","D":"配置 Amazon CloudFront 分發。將 ALB 設為來源。Ping 分發的 DNS 名稱以確定分發的公開 IP 位址。將 IP 位址提供給客戶。"},"answer":"C"},{"num":168,"stem":"一家公司有幾個用於開發的 AWS 帳戶，並希望將其生產應用程式移至 AWS。公司需要僅在目前的生產帳戶和未來的生產帳戶上強制執行 Amazon Elastic Block Store (Amazon EBS) 靜態加密。公司需要包含內建藍圖和護欄的解決方案。\n哪種步驟組合能滿足這些要求？（選擇三個）","options":{"A":"使用 AWS CloudFormation StackSets 在生產帳戶上部署 AWS Config 規則。","B":"在現有的開發人員帳戶中建立新的 AWS Control Tower 登陸區域。為帳戶建立 OU。分別將生產和開發帳戶新增至生產和開發 OU。","C":"在公司的管理帳戶中建立新的 AWS Control Tower 登陸區域。分別將生產和開發帳戶新增至生產和開發 OU。","D":"邀請現有帳戶加入 AWS Organizations 中的組織。建立 SCP 以確保合規性。","E":"從管理帳戶建立護欄以偵測 EBS 加密。","F":"為生產 OU 建立護欄以偵測 EBS 加密。"},"answer":"CEF"},{"num":169,"stem":"一家公司在 Application Load Balancer (ALB) 後方的兩個 Linux Amazon EC2 執行個體上運行一個關鍵的有狀態 Web 應用程式，並使用 Amazon RDS for MySQL 資料庫。公司在 Amazon Route 53 中託管應用程式的 DNS 記錄。解決方案架構師必須建議一個提高應用程式韌性的解決方案。\n解決方案必須滿足以下目標：\n• 應用程式層：RPO 為 2 分鐘，RTO 為 30 分鐘\n• 資料庫層：RPO 為 5 分鐘，RTO 為 30 分鐘\n公司不希望對現有應用程式架構進行重大更改。公司必須確保在故障轉移後的最佳延遲。\n哪種解決方案能滿足這些要求？","options":{"A":"配置 EC2 執行個體以使用 AWS Elastic Disaster Recovery。為 RDS 資料庫執行個體建立跨區域唯讀複本。在第二個 AWS 區域中建立 ALB。建立 AWS Global Accelerator 端點，並將端點與 ALB 關聯。更新 DNS 記錄以指向 Global Accelerator 端點。","B":"配置 EC2 執行個體以使用 Amazon Data Lifecycle Manager (Amazon DLM) 建立 EBS 磁碟區的快照。配置 RDS 自動備份。配置備份複寫至第二個 AWS 區域。在第二個區域中建立 ALB。建立 AWS Global Accelerator 端點，並將端點與 ALB 關聯。更新 DNS 記錄以指向 Global Accelerator 端點。","C":"在 AWS Backup 中為 EC2 執行個體和 RDS 資料庫執行個體建立備份計劃。配置備份複寫至第二個 AWS 區域。在第二個區域中建立 ALB。在 ALB 前方配置 Amazon CloudFront 分發。更新 DNS 記錄以指向 CloudFront。","D":"配置 EC2 執行個體以使用 Amazon Data Lifecycle Manager (Amazon DLM) 建立 EBS 磁碟區的快照。為 RDS 資料庫執行個體建立跨區域唯讀複本。在第二個 AWS 區域中建立 ALB。建立 AWS Global Accelerator 端點，並將端點與 ALB 關聯。"},"answer":"A"},{"num":170,"stem":"一位解決方案架構師希望對單一 AWS 帳戶中的 Amazon EC2 執行個體進行成本優化和適當調整規格。解決方案架構師希望確保根據 CPU、記憶體和網路指標對執行個體進行優化。\n解決方案架構師應採取哪種步驟組合來滿足這些要求？（選擇兩個）","options":{"A":"為帳戶購買 AWS Business Support 或 AWS Enterprise Support。","B":"開啟 AWS Trusted Advisor 並查看任何「低使用率 Amazon EC2 執行個體」的建議。","C":"安裝 Amazon CloudWatch 代理程式並在 EC2 執行個體上配置記憶體指標收集。","D":"在 AWS 帳戶中配置 AWS Compute Optimizer 以接收發現結果和優化建議。","E":"為感興趣的 AWS 區域、執行個體系列和作業系統建立 EC2 Instance Savings Plan。"},"answer":"CD"},{"num":171,"stem":"一家公司使用 AWS CodeCommit 儲存庫。公司必須在第二個 AWS 區域中儲存儲存庫中資料的備份副本。\n哪種解決方案能滿足這些要求？","options":{"A":"配置 AWS Elastic Disaster Recovery 以將 CodeCommit 儲存庫資料複寫至第二個區域。","B":"使用 AWS Backup 按照每小時排程備份 CodeCommit 儲存庫。在第二個區域中建立跨區域副本。","C":"建立 Amazon EventBridge 規則，在公司將程式碼推送至儲存庫時呼叫 AWS CodeBuild。使用 CodeBuild 複製儲存庫。建立內容的 .zip 檔案。將檔案複製到第二個區域的 S3 儲存貯體中。","D":"建立一個按照每小時排程運行的 AWS Step Functions 工作流程，以取得 CodeCommit 儲存庫的快照。配置工作流程將快照複製到第二個區域的 S3 儲存貯體中。"},"answer":"C"},{"num":172,"stem":"一家公司擁有多個業務單位，每個業務單位在 AWS 上都有獨立的帳戶。每個業務單位管理自己的網路，擁有多個 CIDR 範圍重疊的 VPC。公司的行銷團隊建立了一個新的內部應用程式，並希望讓所有其他業務單位都能存取該應用程式。解決方案必須僅使用私有 IP 位址。\n哪種解決方案能以最少的操作負擔滿足這些要求？","options":{"A":"指示每個業務單位在其 VPC 中新增唯一的次要 CIDR 範圍。對 VPC 進行對等連線，並在次要範圍中使用私有 NAT 閘道將 traffic 路由至行銷團隊。","B":"在行銷帳戶的 VPC 中建立 Amazon EC2 執行個體以充當虛擬設備。在行銷團隊與每個業務單位的 VPC 之間建立 AWS Site-to-Site VPN 連線。在必要時執行 NAT。","C":"建立 AWS PrivateLink 端點服務以共用行銷應用程式。授予特定 AWS 帳戶連線至服務的權限。在其他帳戶中建立介面 VPC 端點，以使用私有 IP 位址存取應用程式。","D":"在私有子網路中的行銷應用程式前方建立 Network Load Balancer (NLB)。建立 API Gateway API。使用 Amazon API Gateway 私有整合將 API 連接至 NLB。為 API 啟用 IAM 授權。授予其他業務單位帳戶的存取權限。"},"answer":"C"},{"num":173,"stem":"一家公司需要稽核新收購的 AWS 帳戶的安全態勢。公司的資料安全團隊要求僅在 Amazon S3 儲存貯體變為公開暴露時才發送通知。公司已建立了一個 Amazon Simple Notification Service (Amazon SNS) 主題，該主題已訂閱了資料安全團隊的電子郵件地址。\n哪種解決方案能滿足這些要求？","options":{"A":"在所有 S3 儲存貯體上為 isPublic 事件建立 S3 事件通知。選擇 SNS 主題作為事件通知的目標。","B":"在 AWS Identity and Access Management Access Analyzer 中建立分析器。為事件類型「Access Analyzer Finding」建立 Amazon EventBridge 規則，並篩選「isPublic: true」。選擇 SNS 主題作為 EventBridge 規則目標。","C":"為事件類型「Bucket-Level API Call via CloudTrail」建立 Amazon EventBridge 規則，並篩選「PutBucketPolicy」。選擇 SNS 主題作為 EventBridge 規則目標。","D":"啟用 AWS Config 並新增 cloudtrail-s3-dataevents-enabled 規則。為事件類型「Config Rules Re-evaluation Status」建立 Amazon EventBridge 規則，並篩選「NON_COMPLIANT」。選擇 SNS 主題作為 EventBridge 規則目標。"},"answer":"B"},{"num":174,"stem":"一位解決方案架構師需要評估新收購公司的應用程式和資料庫組合。解決方案架構師必須建立一個將組合遷移至 AWS 的商業案例。新收購的公司在本地端資料中心運行應用程式。資料中心文件記錄不完整。解決方案架構師無法立即確定存在多少應用程式和資料庫。應用程式的 traffic 不穩定。部分應用程式是在每月月底運行的批次流程。\n解決方案架構師必須在遷移至 AWS 開始之前，對組合有更深入的了解。\n哪種解決方案能滿足這些要求？","options":{"A":"使用 AWS Server Migration Service (AWS SMS) 和 AWS Database Migration Service (AWS DMS) 評估遷移。使用 AWS Service Catalog 了解應用程式和資料庫相依性。","B":"使用 AWS Application Migration Service。在本地端基礎設施上安裝代理程式。使用 AWS Migration Hub 管理代理程式。使用 AWS Storage Gateway 評估本地端儲存需求和資料庫相依性。","C":"使用 Migration Evaluator 產生伺服器清單。建立商業案例報告。使用 AWS Migration Hub 查看組合。使用 AWS Application Discovery Service 了解應用程式相依性。","D":"在目標帳戶中使用 AWS Control Tower 產生應用程式組合。使用 AWS Server Migration Service (AWS SMS) 產生更深入的報告和商業案例。使用登陸區域管理核心帳戶和資源。"},"answer":"C"},{"num":175,"stem":"一家公司有一個應用程式，作為 Amazon Elastic Kubernetes Service (Amazon EKS) 叢集中多個 Pod 的 ReplicaSet 運行。EKS 叢集在多個可用區域中有節點。應用程式產生許多小檔案，這些檔案必須可供所有正在運行的應用程式執行個體存取。公司需要備份這些檔案，並將備份保留 1 年。\n哪種解決方案能在提供最快儲存效能的同時滿足這些要求？","options":{"A":"建立 Amazon Elastic File System (Amazon EFS) 檔案系統，並為 EKS 叢集中包含節點的每個子網路建立掛載目標。配置 ReplicaSet 掛載檔案系統。指示應用程式將檔案儲存在檔案系統中。配置 AWS Backup 備份並保留資料副本 1 年。","B":"建立 Amazon Elastic Block Store (Amazon EBS) 磁碟區。啟用 EBS Multi-Attach 功能。配置 ReplicaSet 掛載 EBS 磁碟區。指示應用程式將檔案儲存在 EBS 磁碟區中。配置 AWS Backup 備份並保留資料副本 1 年。","C":"建立 Amazon S3 儲存貯體。配置 ReplicaSet 掛載 S3 儲存貯體。指示應用程式將檔案儲存在 S3 儲存貯體中。配置 S3 版本控制以保留資料副本。配置 S3 生命週期政策在 1 年後刪除物件。","D":"配置 ReplicaSet 使用每個正在運行的應用程式 Pod 上可用的儲存空間在本地端儲存檔案。使用第三方工具備份 EKS 叢集 1 年。"},"answer":"A"},{"num":176,"stem":"一家公司經營客服中心，負責接聽電話，並自動透過簡訊向所有客戶發送受管理的互動式雙向體驗調查。支援客服中心的應用程式運行在公司託管於本地資料中心的機器上。公司使用的硬體已老舊，且系統經常發生停機。公司希望將系統遷移至 AWS 以提高可靠性。\n哪個解決方案能以最少的持續運維負擔滿足這些需求？","options":{"A":"使用 Amazon Connect 取代舊有的話務中心硬體。使用 Amazon Pinpoint 向客戶發送簡訊調查。","B":"使用 Amazon Connect 取代舊有的話務中心硬體。使用 Amazon Simple Notification Service (Amazon SNS) 向客戶發送簡訊調查。","C":"將話務中心軟體遷移至 Auto Scaling 群組中的 Amazon EC2 執行個體。使用這些 EC2 執行個體向客戶發送簡訊調查。","D":"使用 Amazon Pinpoint 取代舊有的話務中心硬體，並向客戶發送簡訊調查。"},"answer":"A"},{"num":177,"stem":"一家公司正在使用 Amazon Connect 建置話務中心。公司的營運團隊正在跨 AWS 區域定義災難復原 (DR) 策略。該話務中心擁有數十個聯絡流程、數百位使用者，以及數十個已申請的電話號碼。\n哪個解決方案能提供最低 RTO 的 DR？","options":{"A":"建立一個 AWS Lambda 函數，用於檢查 Amazon Connect 執行個體的可用性，並在無法使用時通知營運團隊。建立一個 Amazon EventBridge 規則，每 5 分鐘叫用該 Lambda 函數。收到通知後，指示營運團隊使用 AWS Management Console 在第二個區域佈建新的 Amazon Connect 執行個體。使用 AWS CloudFormation 範本部署聯絡流程、使用者及已申請的電話號碼。","B":"在第二個區域佈建包含所有現有使用者的新 Amazon Connect 執行個體。建立一個 AWS Lambda 函數，用於檢查 Amazon Connect 執行個體的可用性。建立一個 Amazon EventBridge 規則，每 5 分鐘叫用該 Lambda 函數。發生問題時，設定 Lambda 函數部署一個 AWS CloudFormation 範本，在第二個區域佈建聯絡流程和已申請的號碼。","C":"在第二個區域佈建包含所有現有聯絡流程和已申請電話號碼的新 Amazon Connect 執行個體。為 Amazon Connect 執行個體的 URL 建立 Amazon Route 53 健康檢查。為失敗的健康檢查建立 Amazon CloudWatch 警示。建立一個 AWS Lambda 函數，用於部署佈建所有使用者的 AWS CloudFormation 範本。設定警示叫用該 Lambda 函數。","D":"在第二個區域佈建包含所有現有使用者和聯絡流程的新 Amazon Connect 執行個體。為 Amazon Connect 執行個體的 URL 建立 Amazon Route 53 健康檢查。為失敗的健康檢查建立 Amazon CloudWatch 警示。建立一個 AWS Lambda 函數，用於部署佈建已申請電話號碼的 AWS CloudFormation 範本。設定警示叫用該 Lambda 函數。"},"answer":"D"},{"num":178,"stem":"一家公司在 AWS 上運行應用程式。公司從多個不同來源整理資料，並使用專有演算法執行資料轉換和彙總。完成 ETL 流程後，公司將結果儲存在 Amazon Redshift 資料表中。公司將此資料銷售給其他公司。公司從 Amazon Redshift 資料表下載資料為檔案，並透過 FTP 將檔案傳輸給多個資料客戶。資料客戶的數量已大幅增長，資料客戶的管理變得困難。\n公司將使用 AWS Data Exchange 建立資料產品，以便與客戶共享資料。公司希望在共享資料之前確認客戶的身份。客戶在公司發布資料後也需要存取最新資料。\n哪個解決方案能以最少的運維負擔滿足這些需求？","options":{"A":"使用 AWS Data Exchange for APIs 與客戶共享資料。設定訂閱驗證。在資料生產公司的 AWS 帳戶中，建立 Amazon API Gateway Data API 服務與 Amazon Redshift 的整合。要求資料客戶訂閱資料產品。","B":"在資料生產公司的 AWS 帳戶中，透過將 AWS Data Exchange 連接至 Redshift 叢集，建立 AWS Data Exchange 資料分享。設定訂閱驗證。要求資料客戶訂閱資料產品。","C":"定期將 Amazon Redshift 資料表中的資料下載至 Amazon S3 儲存貯體。使用 AWS Data Exchange for S3 與客戶共享資料。設定訂閱驗證。要求資料客戶訂閱資料產品。","D":"將 Amazon Redshift 資料發布至 AWS Data Exchange 上的開放資料。要求客戶在 AWS Data Exchange 中訂閱資料產品。在資料生產公司的 AWS 帳戶中，將 IAM 資源型政策附加至 Amazon Redshift 資料表，以僅允許已驗證的 AWS 帳戶存取。"},"answer":"B"},{"num":179,"stem":"一位解決方案架構師正在設計一個處理事件的解決方案。該解決方案必須能夠根據收到的事件數量進行擴展和縮減。如果發生處理錯誤，事件必須移至一個獨立的佇列以供審查。\n哪個解決方案能滿足這些需求？","options":{"A":"將事件詳細資訊傳送至 Amazon Simple Notification Service (Amazon SNS) 主題。設定 AWS Lambda 函數作為 SNS 主題的訂閱者以處理事件。為函數新增失敗時的目的地。將 Amazon Simple Queue Service (Amazon SQS) 佇列設為目標。","B":"將事件發布至 Amazon Simple Queue Service (Amazon SQS) 佇列。建立 Amazon EC2 Auto Scaling 群組。設定 Auto Scaling 群組根據佇列的 ApproximateAgeOfOldestMessage 指標進行擴展和縮減。設定應用程式將失敗的訊息寫入死信佇列。","C":"將事件寫入 Amazon DynamoDB 資料表。為該資料表設定 DynamoDB 串流。設定串流叫用 AWS Lambda 函數。設定 Lambda 函數處理事件。","D":"將事件發布至 Amazon EventBridge 事件匯流排。建立並在具有 Auto Scaling 群組的 Amazon EC2 執行個體上運行應用程式，該群組位於 Application Load Balancer (ALB) 後方。將 ALB 設為事件匯流排目標。設定事件匯流排重試事件。若應用程式無法處理訊息，則將訊息寫入死信佇列。"},"answer":"B"},{"num":180,"stem":"一家公司在 AWS Cloud 中運行處理引擎。該引擎處理來自物流中心的環境資料以計算永續性指數。公司在遍布歐洲的物流中心擁有數百萬台設備。這些設備透過 RESTful API 將資訊傳送至處理引擎。\nAPI 面臨無法預測的流量突增。公司必須實施一個解決方案，以處理設備傳送至處理引擎的所有資料。資料遺失是不可接受的。\n哪個解決方案能滿足這些需求？","options":{"A":"為 RESTful API 建立 Application Load Balancer (ALB)。建立 Amazon Simple Queue Service (Amazon SQS) 佇列。為 ALB 建立接聽程式和目標群組，將 SQS 佇列新增為目標。使用在 Amazon Elastic Container Service (Amazon ECS) 中以 Fargate 啟動類型運行的容器來處理佇列中的訊息。","B":"建立實作 RESTful API 的 Amazon API Gateway HTTP API。建立 Amazon Simple Queue Service (Amazon SQS) 佇列。建立 API Gateway 與 SQS 佇列的服務整合。建立 AWS Lambda 函數以處理 SQS 佇列中的訊息。","C":"建立實作 RESTful API 的 Amazon API Gateway REST API。建立 Auto Scaling 群組中的 Amazon EC2 執行個體群。建立 API Gateway Auto Scaling 群組代理整合。使用 EC2 執行個體處理傳入資料。","D":"為 RESTful API 建立 Amazon CloudFront 分發。在 Amazon Kinesis Data Streams 中建立資料串流。將資料串流設為分發的來源。建立 AWS Lambda 函數以消費和處理資料串流中的資料。"},"answer":"B"},{"num":181,"stem":"一家公司正在 AWS Cloud 中設計其網路設定。公司使用 AWS Organizations 管理多帳戶設置。公司有三個 OU，每個 OU 包含超過 100 個 AWS 帳戶。每個帳戶有一個 VPC，每個 OU 中的所有 VPC 都在相同的 AWS 區域中。\n所有 AWS 帳戶的 CIDR 範圍不重疊。公司需要實施一個解決方案，使同一 OU 中的 VPC 可以互相通訊，但無法與其他 OU 中的 VPC 通訊。\n哪個解決方案能以最少的運維負擔滿足這些需求？","options":{"A":"建立 AWS CloudFormation 堆疊集，在每個 OU 的帳戶之間建立 VPC 對等互連。在每個 OU 中佈建堆疊集。","B":"在每個 OU 中，建立一個擁有單一 VPC 的專用網路帳戶。使用 AWS Resource Access Manager (AWS RAM) 將此 VPC 與 OU 中的所有其他帳戶共享。在網路帳戶和 OU 中的每個帳戶之間建立 VPC 對等互連。","C":"在每個 OU 的一個帳戶中佈建 transit gateway。使用 AWS Resource Access Manager (AWS RAM) 在整個組織中共享 transit gateway。為每個 VPC 建立 transit gateway VPC 附件。","D":"在每個 OU 中，建立一個擁有單一 VPC 的專用網路帳戶。在網路帳戶和 OU 中的其他帳戶之間建立 VPN 連線。使用第三方路由軟體在 VPC 之間路由傳遞流量。"},"answer":"D"},{"num":182,"stem":"一家公司正在將應用程式遷移至 AWS。公司希望在遷移過程中盡量使用全受管服務。公司需要在應用程式中儲存大量重要文件，並有以下需求：\n1. 資料必須具有高耐久性和可用性\n2. 資料必須始終在靜態和傳輸中加密\n3. 加密金鑰必須由公司管理並定期輪換\n解決方案架構師應推薦以下哪個解決方案？","options":{"A":"以檔案閘道模式將 Storage Gateway 部署至 AWS。使用 AWS KMS 金鑰進行 Amazon EBS 磁碟區加密，以加密 Storage Gateway 磁碟區。","B":"使用 Amazon S3，並設定儲存貯體政策以強制對儲存貯體的連線使用 HTTPS，並強制使用伺服器端加密和 AWS KMS 進行物件加密。","C":"使用 Amazon DynamoDB，並透過 SSL 連接至 DynamoDB。使用 AWS KMS 金鑰在靜態時加密 DynamoDB 物件。","D":"部署附加 Amazon EBS 磁碟區的執行個體以儲存此資料。使用 AWS KMS 金鑰進行 EBS 磁碟區加密以加密資料。"},"answer":"B"},{"num":183,"stem":"一家公司的公開 API 以 Amazon Elastic Container Service (Amazon ECS) 上的任務形式運行。這些任務在 AWS Fargate 上運行，位於 Application Load Balancer (ALB) 後方，並根據 CPU 使用率為任務設定了 Service Auto Scaling。此服務已穩定運行數個月。\n最近，API 效能下降，導致應用程式無法使用。公司發現針對 API 發生了大量 SQL 注入攻擊，且 API 服務已擴展至最大容量。\n解決方案架構師需要實施一個阻止 SQL 注入攻擊到達 ECS API 服務的解決方案。該解決方案必須允許合法流量通過，並最大化運維效率。\n哪個解決方案符合這些需求？","options":{"A":"建立新的 AWS WAF web ACL，以監控轉發至 ECS 任務前方 ALB 的 HTTP 請求和 HTTPS 請求。","B":"建立新的 AWS WAF Bot Control 實作。在 AWS WAF Bot Control 受管規則群組中新增一條規則，以監控流量並僅允許合法流量到達 ECS 任務前方的 ALB。","C":"建立新的 AWS WAF web ACL。新增一條規則，封鎖符合 SQL 資料庫規則群組的請求。將 web ACL 設定為允許所有不符合這些規則的其他流量。將 web ACL 附加至 ECS 任務前方的 ALB。","D":"建立新的 AWS WAF web ACL。在 AWS WAF 中建立一個新的空白 IP 集。在 web ACL 中新增一條規則，封鎖來自新 IP 集中 IP 位址的請求。建立 AWS Lambda 函數，從 API 日誌中擷取發送 SQL 注入攻擊的 IP 位址，並將這些 IP 位址新增至 IP 集。將 web ACL 附加至 ECS 任務前方的 ALB。"},"answer":"C"},{"num":184,"stem":"一家環保公司正在一個國家的主要城市部署感測器，以測量空氣品質。感測器連接至 AWS IoT Core 以擷取時間序列資料讀數。公司將資料儲存在 Amazon DynamoDB 中。\n為了業務連續性，公司必須能夠在兩個 AWS 區域中擷取和儲存資料。\n哪個解決方案能滿足這些需求？","options":{"A":"建立 Amazon Route 53 別名容錯移轉路由政策，使用兩個區域中 AWS IoT Core 資料端點的值。將資料遷移至 Amazon Aurora 全域資料表。","B":"在每個區域為 AWS IoT Core 建立網域設定。建立 Amazon Route 53 延遲型路由政策。使用兩個區域中的 AWS IoT Core 資料端點作為值。將資料遷移至 Amazon MemoryDB for Redis 並設定跨區域複寫。","C":"在每個區域為 AWS IoT Core 建立網域設定。建立評估網域設定健康狀態的 Amazon Route 53 健康檢查。使用 AWS IoT Core 網域設定的網域名稱值建立容錯移轉路由政策。將 DynamoDB 資料表更新為全域資料表。","D":"建立 Amazon Route 53 延遲型路由政策。使用兩個區域中的 AWS IoT Core 資料端點作為值。設定 DynamoDB 串流和跨區域資料複寫。"},"answer":"C"},{"num":185,"stem":"一家公司在 AWS Cloud 中使用 AWS Organizations 進行多帳戶設置。公司財務團隊有一個使用 AWS Lambda 和 Amazon DynamoDB 的資料處理應用程式。公司的行銷團隊希望存取儲存在 DynamoDB 資料表中的資料。\nDynamoDB 資料表包含機密資料。行銷團隊只能存取 DynamoDB 資料表中的特定屬性資料。財務團隊和行銷團隊擁有各自獨立的 AWS 帳戶。\n解決方案架構師應如何為行銷團隊提供對 DynamoDB 資料表的適當存取權限？","options":{"A":"建立 SCP，授予行銷團隊的 AWS 帳戶存取 DynamoDB 資料表特定屬性的權限。將 SCP 附加至財務團隊的 OU。","B":"使用針對特定 DynamoDB 屬性的 IAM 政策條件（細粒度存取控制），在財務團隊的帳戶中建立 IAM 角色。與行銷團隊的帳戶建立信任關係。在行銷團隊的帳戶中，建立具有代入財務團隊帳戶中 IAM 角色權限的 IAM 角色。","C":"建立包含特定 DynamoDB 屬性條件（細粒度存取控制）的資源型 IAM 政策。將政策附加至 DynamoDB 資料表。在行銷團隊的帳戶中，建立具有存取財務團隊帳戶中 DynamoDB 資料表權限的 IAM 角色。","D":"在財務團隊的帳戶中建立 IAM 角色以存取 DynamoDB 資料表。使用 IAM 權限邊界將存取限制在特定屬性。在行銷團隊的帳戶中，建立具有代入財務團隊帳戶中 IAM 角色權限的 IAM 角色。"},"answer":"B"},{"num":186,"stem":"一位解決方案架構師正在建立一個將物件儲存在 Amazon S3 儲存貯體中的應用程式。解決方案架構師必須將應用程式同時部署在兩個 AWS 區域。兩個 S3 儲存貯體中的物件必須保持彼此同步。\n哪個步驟組合能以最少的運維負擔滿足這些需求？(選擇三個)","options":{"A":"建立 S3 多區域存取點。修改應用程式以參照多區域存取點。","B":"在兩個 S3 儲存貯體之間設定雙向 S3 跨區域複寫 (CRR)。","C":"修改應用程式以將物件儲存在每個 S3 儲存貯體中。","D":"為每個 S3 儲存貯體建立 S3 生命週期規則，將物件從一個 S3 儲存貯體複製到另一個 S3 儲存貯體。","E":"為每個 S3 儲存貯體啟用 S3 版本控制。 F. 為每個 S3 儲存貯體設定事件通知，叫用 AWS Lambda 函數將物件從一個 S3 儲存貯體複製到另一個 S3 儲存貯體。"},"answer":"ABE"},{"num":187,"stem":"一家公司擁有在本地環境中運行的 IoT 平台。該平台由一台使用 MQTT 協定連接 IoT 設備的伺服器組成。平台至少每 5 分鐘從設備收集一次遙測資料。平台還將設備元資料儲存在 MongoDB 叢集中。\n安裝在本地機器上的應用程式執行定期任務，以彙總和轉換遙測資料和設備元資料。應用程式建立報告，使用者透過在同一本地機器上運行的另一個 Web 應用程式查看這些報告。定期任務需要 120 至 600 秒才能完成。但 Web 應用程式始終保持運行。\n公司正在將平台遷移至 AWS，且必須減少堆疊的運維負擔。\n哪個步驟組合能以最少的運維負擔滿足這些需求？(選擇三個)","options":{"A":"使用 AWS Lambda 函數連接 IoT 設備。","B":"設定 IoT 設備發布至 AWS IoT Core。","C":"將元資料寫入 Amazon EC2 執行個體上的自我管理 MongoDB 資料庫。","D":"將元資料寫入 Amazon DocumentDB（具有 MongoDB 相容性）。","E":"使用帶有 AWS Lambda 任務的 AWS Step Functions 狀態機準備報告，並將報告寫入 Amazon S3。使用以 S3 為來源的 Amazon CloudFront 提供報告服務。 F. 使用帶有 Amazon EC2 執行個體的 Amazon Elastic Kubernetes Service (Amazon EKS) 叢集準備報告。使用 EKS 叢集中的 ingress 控制器提供報告服務。"},"answer":"BDE"},{"num":188,"stem":"一家全球製造公司計劃將大多數應用程式遷移至 AWS。但是，公司擔心某些應用程式因資料法規要求或個位數毫秒延遲需求，必須保留在特定國家或公司的中央本地資料中心內。公司還擔心其在部分工廠廠區託管的應用程式，這些廠區的網路基礎架構有限。\n公司希望提供一致的開發人員體驗，使開發人員能夠一次建置應用程式，並部署在本地、雲端或混合架構中。開發人員必須能夠使用他們熟悉的相同工具、API 和服務。\n哪個解決方案能提供一致的混合體驗以滿足這些需求？","options":{"A":"將所有應用程式遷移至最近的符合規範 AWS 區域。在中央本地資料中心和 AWS 之間設定 AWS Direct Connect 連線。部署 Direct Connect 閘道。","B":"對具有資料法規要求或個位數毫秒延遲需求的應用程式使用 AWS Snowball Edge Storage Optimized 設備。將設備保留在本地。部署 AWS Wavelength 以在工廠廠區託管工作負載。","C":"為具有資料法規要求或個位數毫秒延遲需求的應用程式安裝 AWS Outposts。使用 AWS Snowball Edge Compute Optimized 設備在工廠廠區託管工作負載。","D":"將具有資料法規要求或個位數毫秒延遲需求的應用程式遷移至 AWS Local Zone。部署 AWS Wavelength 以在工廠廠區託管工作負載。"},"answer":"C"},{"num":189,"stem":"一家公司正在更新客戶用於線上下單的應用程式。最近，針對應用程式的惡意行為者攻擊次數有所增加。\n公司將把更新後的應用程式託管在 Amazon Elastic Container Service (Amazon ECS) 叢集上。公司將使用 Amazon DynamoDB 儲存應用程式資料。公開的 Application Load Balancer (ALB) 將為終端使用者提供對應用程式的存取。公司必須防止攻擊，並在持續攻擊期間以最少的服務中斷確保業務連續性。\n哪個步驟組合能以最具成本效益的方式滿足這些需求？(選擇兩個)","options":{"A":"以 ALB 作為來源建立 Amazon CloudFront 分發。在 CloudFront 網域上新增自訂標頭和隨機值。設定 ALB 在標頭和值匹配時條件式轉發流量。","B":"在兩個 AWS 區域部署應用程式。設定 Amazon Route 53 以相等權重將流量路由至兩個區域。","C":"設定 Amazon ECS 任務的自動擴展。建立 DynamoDB Accelerator (DAX) 叢集。","D":"設定 Amazon ElastiCache 以減少 DynamoDB 的負擔。","E":"部署包含適當規則群組的 AWS WAF web ACL。將 web ACL 與 Amazon CloudFront 分發關聯。"},"answer":"AE"},{"num":190,"stem":"一家公司在 AWS 上運行 Web 應用程式。該 Web 應用程式從位於 Amazon CloudFront 分發後方的 Amazon S3 儲存貯體提供靜態內容。應用程式使用 Application Load Balancer (ALB) 提供動態內容，ALB 將請求分發至 Auto Scaling 群組中的 Amazon EC2 執行個體群。應用程式使用在 Amazon Route 53 中設置的網域名稱。\n部分使用者報告在尖峰時段嘗試存取網站時偶爾出現問題。運營團隊發現 ALB 有時會返回 HTTP 503 Service Unavailable 錯誤。公司希望在出現這些錯誤時顯示自訂錯誤訊息頁面。對於此錯誤代碼，頁面應立即顯示。\n哪個解決方案能以最少的運維負擔滿足這些需求？","options":{"A":"設定 Route 53 容錯移轉路由政策。設定健康檢查以確定 ALB 端點的狀態，並容錯移轉至備用 S3 儲存貯體端點。","B":"建立第二個 CloudFront 分發和 S3 靜態網站以託管自訂錯誤頁面。設定 Route 53 容錯移轉路由政策。在兩個分發之間使用主動-被動設定。","C":"建立具有兩個來源的 CloudFront 來源群組。將 ALB 端點設為主要來源。對於次要來源，設定配置為託管靜態網站的 S3 儲存貯體。為 CloudFront 分發設定來源容錯移轉。更新 S3 靜態網站以加入自訂錯誤頁面。","D":"建立 CloudFront 函數，驗證 ALB 返回的每個 HTTP 回應代碼。在 S3 儲存貯體中建立 S3 靜態網站。將自訂錯誤頁面上傳至 S3 儲存貯體作為容錯移轉。更新函數以讀取 S3 儲存貯體並向終端使用者提供錯誤頁面。"},"answer":"C"},{"num":191,"stem":"一家公司正在將應用程式遷移至 AWS。該應用程式以 Docker 容器形式運行，並使用 NFS 第 4 版檔案共享。\n解決方案架構師必須設計一個安全且可擴展的容器化解決方案，且不需要佈建或管理底層基礎架構。\n哪個解決方案能滿足這些需求？","options":{"A":"使用 Fargate 啟動類型透過 Amazon Elastic Container Service (Amazon ECS) 部署應用程式容器。使用 Amazon Elastic File System (Amazon EFS) 作為共享儲存。在 ECS 任務定義中參照 EFS 檔案系統 ID、容器掛載點和 EFS 授權 IAM 角色。","B":"使用 Fargate 啟動類型透過 Amazon Elastic Container Service (Amazon ECS) 部署應用程式容器。使用 Amazon FSx for Lustre 作為共享儲存。在 ECS 任務定義中參照 FSx for Lustre 檔案系統 ID、容器掛載點和 FSx for Lustre 授權 IAM 角色。","C":"使用啟用自動擴展的 Amazon EC2 啟動類型透過 Amazon Elastic Container Service (Amazon ECS) 部署應用程式容器。使用 Amazon Elastic File System (Amazon EFS) 作為共享儲存。在 ECS 容器執行個體上掛載 EFS 檔案系統。將 EFS 授權 IAM 角色新增至 EC2 執行個體設定檔。","D":"使用啟用自動擴展的 Amazon EC2 啟動類型透過 Amazon Elastic Container Service (Amazon ECS) 部署應用程式容器。使用已啟用 Multi-Attach 的 Amazon Elastic Block Store (Amazon EBS) 磁碟區作為共享儲存。將 EBS 磁碟區附加至 ECS 容器執行個體。將 EBS 授權 IAM 角色新增至 EC2 執行個體設定檔。"},"answer":"A"},{"num":192,"stem":"一家公司在 AWS Cloud 中運行應用程式。核心業務邏輯在 Auto Scaling 群組中的一組 Amazon EC2 執行個體上運行。Application Load Balancer (ALB) 將流量分發至 EC2 執行個體。Amazon Route 53 記錄 api.example.com 指向 ALB。\n公司的開發團隊對業務邏輯進行重大更新。公司有一條規則，在部署變更時，測試視窗期間只有 10% 的客戶可以接收新邏輯。在測試視窗期間，客戶必須使用相同版本的業務邏輯。\n公司應如何部署更新以滿足這些需求？","options":{"A":"建立第二個 ALB，並將新邏輯部署到新 Auto Scaling 群組中的一組 EC2 執行個體。設定 ALB 將流量分發至 EC2 執行個體。更新 Route 53 記錄以使用加權路由，並將記錄指向兩個 ALB。","B":"建立由 ALB 參照的第二個目標群組。將新邏輯部署至此新目標群組中的 EC2 執行個體。更新 ALB 接聽程式規則以使用加權目標群組。設定 ALB 目標群組黏性。","C":"為 Auto Scaling 群組建立新的啟動設定。指定啟動設定使用 AutoScalingRollingUpdate 政策，並將 MaxBatchSize 選項設為 10。替換 Auto Scaling 群組上的啟動設定。部署變更。","D":"建立由 ALB 參照的第二個 Auto Scaling 群組。在此新 Auto Scaling 群組中的一組 EC2 執行個體上部署新邏輯。將 ALB 路由演算法更改為最少未完成請求 (LOR)。設定 ALB 工作階段黏性。"},"answer":"B"},{"num":193,"stem":"一家大型教育公司最近引進了 Amazon WorkSpaces，以為多所大學提供對內部應用程式的存取。公司將使用者設定檔儲存在 Amazon FSx for Windows File Server 檔案系統上。該檔案系統已設定 DNS 別名，並連接至自我管理的 Active Directory。隨著越來越多使用者開始使用 WorkSpaces，登入時間增加至無法接受的程度。\n調查顯示檔案系統的效能有所下降。公司以 HDD 儲存和 16 MBps 的吞吐量建立了該檔案系統。解決方案架構師必須在定義的維護視窗期間改善檔案系統的效能。\n解決方案架構師應如何以最少的管理工作量滿足這些需求？","options":{"A":"使用 AWS Backup 建立檔案系統的時間點備份。將備份還原至新的 FSx for Windows File Server 檔案系統。選擇 SSD 作為儲存類型。選擇 32 MBps 作為吞吐量容量。備份和還原流程完成後，相應調整 DNS 別名。刪除原始檔案系統。","B":"將使用者與檔案系統中斷連線。在 Amazon FSx 主控台中，將吞吐量容量更新至 32 MBps。將儲存類型更新為 SSD。重新連線使用者至檔案系統。","C":"將 AWS DataSync 代理程式部署至新的 Amazon EC2 執行個體。建立任務。將現有檔案系統設定為來源位置。將新的 FSx for Windows File Server 檔案系統（使用 SSD 儲存和 32 MBps 吞吐量）設定為目標位置。排程任務。任務完成後，相應調整 DNS 別名。刪除原始檔案系統。","D":"使用 Windows PowerShell 命令在現有檔案系統上啟用磁碟區陰影複製。排程磁碟區陰影複製任務以建立檔案系統的時間點備份。選擇還原先前版本。建立使用 SSD 儲存和 32 MBps 吞吐量的新 FSx for Windows File Server 檔案系統。複製任務完成後，調整 DNS 別名。刪除原始檔案系統。"},"answer":"A"},{"num":194,"stem":"一家公司在 AWS 上託管應用程式。應用程式讀取和寫入儲存在單一 Amazon S3 儲存貯體中的物件。公司必須修改應用程式，以在兩個 AWS 區域部署應用程式。\n哪個解決方案能以最少的運維負擔滿足這些需求？","options":{"A":"以 S3 儲存貯體作為來源設定 Amazon CloudFront 分發。將應用程式部署至第二個區域。修改應用程式以使用 CloudFront 分發。使用 AWS Global Accelerator 存取 S3 儲存貯體中的資料。","B":"在第二個區域建立新的 S3 儲存貯體。在原始 S3 儲存貯體和新 S3 儲存貯體之間設定雙向 S3 跨區域複寫 (CRR)。設定使用兩個 S3 儲存貯體的 S3 多區域存取點。將修改後的應用程式部署至兩個區域。","C":"在第二個區域建立新的 S3 儲存貯體。在第二個區域部署應用程式。設定應用程式使用新 S3 儲存貯體。設定從原始 S3 儲存貯體至新 S3 儲存貯體的 S3 跨區域複寫 (CRR)。","D":"以 S3 儲存貯體作為來源設定 S3 閘道端點。將應用程式部署至第二個區域。修改應用程式以使用新的 S3 閘道端點。在 S3 儲存貯體上使用 S3 Intelligent-Tiering。"},"answer":"B"},{"num":195,"stem":"一家線上遊戲公司需要將其遊戲平台遷移至 AWS。公司的遊戲應用程式需要高效能運算 (HPC) 處理，並有一個頻繁變更的排行榜。一台針對計算世代優化的 Ubuntu 執行個體託管了用於遊戲顯示的 Node.js 應用程式。遊戲狀態在本地 Redis 執行個體中追蹤。\n公司需要一個能優化應用程式效能的遷移策略。\n哪個解決方案能滿足這些需求？","options":{"A":"在 Application Load Balancer 後方建立 m5.large Amazon EC2 Spot 執行個體的 Auto Scaling 群組。使用 Amazon ElastiCache for Redis 叢集維護排行榜。","B":"在 Application Load Balancer 後方建立 c5.large Amazon EC2 Spot 執行個體的 Auto Scaling 群組。使用 Amazon OpenSearch Service 叢集維護排行榜。","C":"在 Application Load Balancer 後方建立 c5.large Amazon EC2 On-Demand 執行個體的 Auto Scaling 群組。使用 Amazon ElastiCache for Redis 叢集維護排行榜。","D":"在 Application Load Balancer 後方建立 m5.large Amazon EC2 On-Demand 執行個體的 Auto Scaling 群組。使用 Amazon DynamoDB 資料表維護排行榜。"},"answer":"C"},{"num":196,"stem":"一位解決方案架構師正在設計一個接受員工從行動裝置提交工時表的應用程式。工時表將每週提交一次，大多數提交發生在星期五。資料必須以允許薪資管理員執行每月報告的格式儲存。基礎架構必須高度可用，並能夠擴展以匹配傳入資料和報告請求的速率。\n哪個步驟組合在最小化運維負擔的同時滿足這些需求？(選擇兩個)","options":{"A":"將應用程式部署至跨多個可用區域具有負載平衡的 Amazon EC2 On-Demand 執行個體。使用排程的 Amazon EC2 Auto Scaling 在星期五大量提交之前增加容量。","B":"使用 Amazon Elastic Container Service (Amazon ECS) 以容器形式部署應用程式，並跨多個可用區域進行負載平衡。使用排程的 Service Auto Scaling 在星期五大量提交之前增加容量。","C":"將應用程式前端部署至由 Amazon CloudFront 提供服務的 Amazon S3 儲存貯體。使用 Amazon API Gateway 搭配 AWS Lambda 代理整合部署應用程式後端。","D":"將工時表提交資料儲存在 Amazon Redshift 中。使用 Amazon QuickSight 以 Amazon Redshift 作為資料來源產生報告。","E":"將工時表提交資料儲存在 Amazon S3 中。使用 Amazon Athena 和 Amazon QuickSight 以 Amazon S3 作為資料來源產生報告。"},"answer":"BE"},{"num":197,"stem":"一家公司將敏感資料儲存在 Amazon S3 儲存貯體中。公司必須記錄 S3 儲存貯體中物件的所有活動，並必須將日誌保留 5 年。公司的安全團隊還必須在每次嘗試刪除 S3 儲存貯體中的資料時收到電子郵件通知。\n哪個步驟組合能以最具成本效益的方式滿足這些需求？(選擇三個)","options":{"A":"設定 AWS CloudTrail 記錄 S3 資料事件。","B":"為 S3 儲存貯體設定 S3 伺服器存取日誌記錄。","C":"設定 Amazon S3 將物件刪除事件傳送至 Amazon Simple Email Service (Amazon SES)。","D":"設定 Amazon S3 將物件刪除事件傳送至 Amazon EventBridge 事件匯流排，該匯流排發布至 Amazon Simple Notification Service (Amazon SNS) 主題。","E":"設定 Amazon S3 透過資料儲存分層將日誌傳送至 Amazon Timestream。","F":"設定新的 S3 儲存貯體以使用 S3 生命週期政策儲存日誌。"},"answer":"ADF"},{"num":198,"stem":"一家公司正在建立混合環境，其中包含本地資料中心和 AWS Cloud 中的伺服器。公司已在三個 VPC 中部署 Amazon EC2 執行個體，每個 VPC 位於不同的 AWS 區域。公司已從最靠近資料中心的區域建立了 AWS Direct Connect 連線至資料中心。\n公司需要本地資料中心的伺服器能夠存取所有三個 VPC 中的 EC2 執行個體。本地資料中心的伺服器還必須能夠存取 AWS 公有服務。\n哪個步驟組合能以最低成本滿足這些需求？(選擇兩個)","options":{"A":"在最靠近資料中心的區域建立 Direct Connect 閘道。將 Direct Connect 連線附加至 Direct Connect 閘道。使用 Direct Connect 閘道連接其他兩個區域中的 VPC。","B":"從本地資料中心到其他兩個區域設定額外的 Direct Connect 連線。","C":"建立私有 VIF。透過私有 VIF 建立 AWS Site-to-Site VPN 連線至其他兩個區域的 VPC。","D":"建立公有 VIF。透過公有 VIF 建立 AWS Site-to-Site VPN 連線至其他兩個區域的 VPC。","E":"使用 VPC 對等互連在跨區域的 VPC 之間建立連線。使用現有 Direct Connect 連線建立私有 VIF 以連接至對等互連的 VPC。"},"answer":"AD"},{"num":199,"stem":"一家公司使用 AWS Organizations 中的組織管理數百個 AWS 帳戶。一位解決方案架構師正在為開放 Web 應用程式安全性專案 (OWASP) 前 10 大 Web 應用程式漏洞提供基準保護解決方案。解決方案架構師正在為組織內部署的所有現有和新 Amazon CloudFront 分發使用 AWS WAF。\n解決方案架構師應採取哪個步驟組合來提供基準保護？(選擇三個)","options":{"A":"在所有帳戶中啟用 AWS Config。","B":"在所有帳戶中啟用 Amazon GuardDuty。","C":"為組織啟用所有功能。","D":"使用 AWS Firewall Manager 為所有帳戶中的所有 CloudFront 分發部署 AWS WAF 規則。","E":"使用 AWS Shield Advanced 為所有帳戶中的所有 CloudFront 分發部署 AWS WAF 規則。","F":"使用 AWS Security Hub 為所有帳戶中的所有 CloudFront 分發部署 AWS WAF 規則。"},"answer":"CDF"},{"num":200,"stem":"一位解決方案架構師已使用公司的本地識別提供者 (IdP) 實施了 SAML 2.0 聯合身份解決方案，以驗證使用者對 AWS 環境的存取。當解決方案架構師透過聯合身份 Web 入口網站測試驗證時，AWS 環境存取已授予。但是，當測試使用者嘗試透過聯合身份 Web 入口網站驗證時，他們無法存取 AWS 環境。\n解決方案架構師應檢查哪些項目以確保正確設定了身份聯合？(選擇三個)","options":{"A":"IAM 使用者的權限政策已允許該使用者使用 SAML 聯合。","B":"測試使用者不在公司 IdP 的 AWSFederatedUsers 群組中。","C":"Web 入口網站使用 SAML 提供者的 ARN、IAM 角色的 ARN 和來自 IdP 的 SAML 斷言呼叫 AWS STS AssumeRoleWithSAML API。","D":"本地 IdP 的 DNS 主機名稱可從 AWS 環境 VPC 連線。","E":"公司的 IdP 定義了 SAML 斷言，可將使用者或群組正確對應至具有適當權限的 IAM 角色。"},"answer":"BCE"},{"num":201,"stem":"一位解決方案架構師需要改善託管在 AWS Cloud 中的應用程式。該應用程式使用 Amazon Aurora MySQL DB 執行個體，目前正面臨連線數過載的問題。應用程式的大多數操作都是向資料庫寫入記錄。應用程式目前將憑證儲存在純文字設定檔中。\n解決方案架構師需要實作一個解決方案，讓應用程式能夠處理目前的連線負載。該解決方案必須確保憑證安全，並提供定期自動輪換憑證的能力。\n哪個解決方案能滿足這些需求？","options":{"A":"在 DB 執行個體前方部署 Amazon RDS Proxy 層，並將連線憑證以 secret 形式儲存在 AWS Secrets Manager 中。","B":"在 DB 執行個體前方部署 Amazon RDS Proxy 層，並將連線憑證儲存在 AWS Systems Manager Parameter Store 中。","C":"建立 Aurora Replica，並將連線憑證以 secret 形式儲存在 AWS Secrets Manager 中。","D":"建立 Aurora Replica，並將連線憑證儲存在 AWS Systems Manager Parameter Store 中。"},"answer":"A"},{"num":202,"stem":"一家公司需要為其電子商務網站建立災難復原 (DR) 解決方案。該 Web 應用程式託管在一組 t3.large Amazon EC2 執行個體上，並使用 Amazon RDS for MySQL DB 執行個體。EC2 執行個體位於跨多個可用區域的 Auto Scaling 群組中。\n發生災難時，Web 應用程式必須容錯移轉至次要環境，要求 RPO 為 30 秒、RTO 為 10 分鐘。\n哪個解決方案能以最具成本效益的方式滿足這些需求？","options":{"A":"使用基礎設施即程式碼 (IaC) 在 DR 區域佈建新基礎設施。為 DB 執行個體建立跨區域唯讀副本。在 AWS Backup 中設定備份計劃，每 30 秒將 EC2 執行個體和 DB 執行個體備份至 DR 區域。從最新的 EC2 備份復原 EC2 執行個體。使用 Amazon Route 53 地理位置路由政策，在災難發生時自動容錯移轉至 DR 區域。","B":"使用基礎設施即程式碼 (IaC) 在 DR 區域佈建新基礎設施。為 DB 執行個體建立跨區域唯讀副本。設定 AWS Elastic Disaster Recovery 持續將 EC2 執行個體複寫至 DR 區域。以最低容量在 DR 區域執行 EC2 執行個體。使用 Amazon Route 53 容錯移轉路由政策，在災難發生時自動容錯移轉至 DR 區域。然後增加 Auto Scaling 群組的所需容量。","C":"在 AWS Backup 中設定備份計劃，每 30 秒將 EC2 執行個體和 DB 執行個體備份至 DR 區域。使用基礎設施即程式碼 (IaC) 在 DR 區域佈建新基礎設施。手動在新執行個體上還原備份資料。使用 Amazon Route 53 簡單路由政策，在災難發生時自動容錯移轉至 DR 區域。","D":"使用基礎設施即程式碼 (IaC) 在 DR 區域佈建新基礎設施。建立 Amazon Aurora 全域資料庫。設定 AWS Elastic Disaster Recovery 持續將 EC2 執行個體複寫至 DR 區域。在 DR 區域以滿載容量執行 EC2 執行個體的 Auto Scaling 群組。使用 Amazon Route 53 容錯移轉路由政策，在災難發生時自動容錯移轉至 DR 區域。"},"answer":"B"},{"num":203,"stem":"一家公司計劃將本地端 MySQL 資料庫一次性遷移至 us-east-1 區域的 Amazon Aurora MySQL。公司目前的網際網路連線頻寬有限。本地端 MySQL 資料庫大小為 60 TB。公司估計透過目前的網際網路連線將資料傳輸至 AWS 需要一個月的時間。公司需要能更快速完成資料庫遷移的解決方案。\n哪個解決方案能以最短時間完成資料庫遷移？","options":{"A":"申請在本地端資料中心與 AWS 之間建立 1 Gbps 的 AWS Direct Connect 連線。使用 AWS Database Migration Service (AWS DMS) 將本地端 MySQL 資料庫遷移至 Aurora MySQL。","B":"使用 AWS DataSync 搭配目前的網際網路連線，加速本地端資料中心與 AWS 之間的資料傳輸。使用 AWS Application Migration Service 將本地端 MySQL 資料庫遷移至 Aurora MySQL。","C":"訂購 AWS Snowball Edge 裝置。使用 S3 介面將資料載入 Amazon S3 儲存貯體。使用 AWS Database Migration Service (AWS DMS) 將資料從 Amazon S3 遷移至 Aurora MySQL。","D":"訂購 AWS Snowball 裝置。使用 S3 Adapter for Snowball 將資料載入 Amazon S3 儲存貯體。使用 AWS Application Migration Service 將資料從 Amazon S3 遷移至 Aurora MySQL。"},"answer":"C"},{"num":204,"stem":"一家公司在 AWS Cloud 中執行應用程式。該應用程式在 20 個 Amazon EC2 執行個體的機群上執行。EC2 執行個體為持久性執行個體，並將資料儲存在多個掛載的 Amazon Elastic Block Store (Amazon EBS) 磁碟區上。\n公司必須在不同的 AWS 區域中維護備份。公司必須能夠在 1 個工作日內復原 EC2 執行個體及其設定，且資料遺失不得超過 1 天。公司人員有限，需要一個能優化操作效率和成本的備份解決方案。公司已建立可在次要區域部署所需網路設定的 AWS CloudFormation 範本。\n哪個解決方案能滿足這些需求？","options":{"A":"建立第二個 CloudFormation 範本，用於在次要區域重新建立 EC2 執行個體。使用 AWS Systems Manager Automation Runbook 執行每日多磁碟區快照。將快照複製至次要區域。發生故障時，啟動 CloudFormation 範本，從快照還原 EBS 磁碟區，並將使用切換至次要區域。","B":"使用 Amazon Data Lifecycle Manager (Amazon DLM) 建立 EBS 磁碟區的每日多磁碟區快照。發生故障時，啟動 CloudFormation 範本，並使用 Amazon DLM 還原 EBS 磁碟區，然後將使用切換至次要區域。","C":"使用 AWS Backup 建立排程的每日備份計劃，對 EC2 執行個體進行備份。設定備份任務，將備份複製至次要區域的保存庫。發生故障時，啟動 CloudFormation 範本，從備份保存庫還原執行個體磁碟區和設定，並將使用切換至次要區域。","D":"在次要區域部署相同大小和設定的 EC2 執行個體。設定 AWS DataSync 每日將資料從主要區域複製至次要區域。發生故障時，啟動 CloudFormation 範本並將使用切換至次要區域。"},"answer":"C"},{"num":205,"stem":"一家公司正在設計一個託管靜態內容的新網站。該網站將提供使用者上傳和下載大型檔案的功能。根據公司要求，所有資料在傳輸中和靜態儲存時都必須加密。解決方案架構師使用 Amazon S3 和 Amazon CloudFront 建構解決方案。\n哪些步驟組合能滿足加密需求？(選擇三個)","options":{"A":"為 Web 應用程式使用的 S3 儲存貯體啟用 S3 伺服器端加密。","B":"在 S3 ACL 的讀取和寫入操作中新增政策屬性 \"aws:SecureTransport\": \"true\"。","C":"建立儲存貯體政策，拒絕 Web 應用程式使用的 S3 儲存貯體中任何未加密的操作。","D":"使用 AWS KMS 金鑰的伺服器端加密 (SSE-KMS)，在 CloudFront 上設定靜態加密。","E":"在 CloudFront 中設定將 HTTP 請求重新導向至 HTTPS 請求。 F. 在為 Web 應用程式使用的 S3 儲存貯體建立預先簽署 URL 時使用 RequireSSL 選項。"},"answer":"ACE"},{"num":206,"stem":"一家公司正在使用 AWS Lambda 函數實作無伺服器架構，這些函數需要存取 Amazon RDS 上的 Microsoft SQL Server DB 執行個體。公司有開發和生產的獨立環境，包括資料庫系統的複本。\n公司的開發人員可以存取開發資料庫的憑證。但生產資料庫的憑證必須使用只有 IT 安全團隊 IAM 使用者群組成員才能存取的金鑰進行加密。此金鑰必須定期輪換。\n解決方案架構師在生產環境中應如何做才能滿足這些需求？","options":{"A":"使用由 AWS Key Management Service (AWS KMS) 客戶自管金鑰加密的 SecureString 參數，將資料庫憑證儲存在 AWS Systems Manager Parameter Store 中。為每個 Lambda 函數附加角色以提供對 SecureString 參數的存取。限制對 SecureString 參數和客戶自管金鑰的存取，使其僅供 IT 安全團隊存取。","B":"使用 AWS Key Management Service (AWS KMS) 預設 Lambda 金鑰加密資料庫憑證。將憑證儲存在每個 Lambda 函數的環境變數中。在 Lambda 程式碼中從環境變數載入憑證。限制對 KMS 金鑰的存取，使其僅供 IT 安全團隊存取。","C":"將資料庫憑證儲存在每個 Lambda 函數的環境變數中。使用 AWS Key Management Service (AWS KMS) 客戶自管金鑰加密環境變數。限制對客戶自管金鑰的存取，使其僅供 IT 安全團隊存取。","D":"將資料庫憑證以與 AWS Key Management Service (AWS KMS) 客戶自管金鑰關聯的 secret 形式儲存在 AWS Secrets Manager 中。為每個 Lambda 函數附加角色以提供對 secret 的存取。限制對 secret 和客戶自管金鑰的存取，使其僅供 IT 安全團隊存取。"},"answer":"D"},{"num":207,"stem":"一家線上零售公司正在將其舊版本地端 .NET 應用程式遷移至 AWS。該應用程式在負載平衡的前端 Web 伺服器、負載平衡的應用程式伺服器和 Microsoft SQL Server 資料庫上執行。\n公司希望盡可能使用 AWS 受管服務，且不想重寫應用程式。解決方案架構師需要實作解決方案，以解決擴展問題並在應用程式擴展時最小化授權成本。\n哪個解決方案能以最具成本效益的方式滿足這些需求？","options":{"A":"為 Web 層和應用程式層，在 Application Load Balancer 後方的 Auto Scaling 群組中部署 Amazon EC2 執行個體。使用已啟用 Babelfish 的 Amazon Aurora PostgreSQL 重新平台化 SQL Server 資料庫。","B":"使用 AWS Database Migration Service (AWS DMS) 建立所有伺服器的映像。根據本地端匯入部署 Amazon EC2 執行個體。為 Web 層和應用程式層，在 Network Load Balancer 後方的 Auto Scaling 群組中部署執行個體。使用 Amazon DynamoDB 作為資料庫層。","C":"將 Web 前端層和應用程式層容器化。佈建 Amazon Elastic Kubernetes Service (Amazon EKS) 叢集。為 Web 層和應用程式層在 Network Load Balancer 後方建立 Auto Scaling 群組。使用 Amazon RDS for SQL Server 託管資料庫。","D":"將應用程式功能拆分為 AWS Lambda 函數。使用 Amazon API Gateway 作為 Web 前端層和應用程式層。將資料遷移至 Amazon S3。使用 Amazon Athena 查詢資料。"},"answer":"A"},{"num":208,"stem":"一家軟體即服務 (SaaS) 供應商透過 Application Load Balancer (ALB) 公開 API。ALB 連接到部署在 us-east-1 區域的 Amazon Elastic Kubernetes Service (Amazon EKS) 叢集。公開的 API 包含幾個非標準的 REST 方法：LINK、UNLINK、LOCK 和 UNLOCK。\n美國境外的使用者反映這些 API 的回應時間冗長且不穩定。解決方案架構師需要以最小化操作負擔的解決方案解決此問題。\n哪個解決方案能滿足這些需求？","options":{"A":"新增 Amazon CloudFront 分發，並將 ALB 設定為來源。","B":"新增 Amazon API Gateway 邊緣優化 API 端點以公開 API，並將 ALB 設定為目標。","C":"在 AWS Global Accelerator 中新增加速器，並將 ALB 設定為來源。","D":"將 API 部署至另外兩個 AWS 區域：eu-west-1 和 ap-southeast-2。在 Amazon Route 53 中新增延遲型路由記錄。"},"answer":"C"},{"num":209,"stem":"一家公司在 AWS Cloud 中執行 IoT 應用程式。公司有數百萬個感應器，用於收集美國各地家庭的資料。感應器使用 MQTT 協定連接並將資料傳送至自訂 MQTT 代理程式。MQTT 代理程式將資料儲存在單一 Amazon EC2 執行個體上。感應器透過名為 iot.example.com 的網域連接至代理程式。公司使用 Amazon Route 53 作為其 DNS 服務。公司將資料儲存在 Amazon DynamoDB 中。\n在多次事件中，資料量使 MQTT 代理程式過載，導致感應器資料遺失。公司必須提高解決方案的可靠性。\n哪個解決方案能滿足這些需求？","options":{"A":"為 MQTT 代理程式建立 Application Load Balancer (ALB) 和 Auto Scaling 群組。使用 Auto Scaling 群組作為 ALB 的目標。將 Route 53 中的 DNS 記錄更新為別名記錄，並將別名記錄指向 ALB。使用 MQTT 代理程式儲存資料。","B":"設定 AWS IoT Core 接收感應器資料。建立並設定自訂網域以連接至 AWS IoT Core。將 Route 53 中的 DNS 記錄更新為指向 AWS IoT Core Data-ATS 端點。設定 AWS IoT 規則以儲存資料。","C":"建立 Network Load Balancer (NLB)，並將 MQTT 代理程式設定為目標。建立 AWS Global Accelerator 加速器，並將 NLB 設定為加速器的端點。將 Route 53 中的 DNS 記錄更新為多值回答記錄，並將 Global Accelerator IP 位址設定為值。使用 MQTT 代理程式儲存資料。","D":"設定 AWS IoT Greengrass 接收感應器資料。將 Route 53 中的 DNS 記錄更新為指向 AWS IoT Greengrass 端點。設定 AWS IoT 規則以叫用 AWS Lambda 函數儲存資料。"},"answer":"C"},{"num":210,"stem":"一家公司擁有 Linux 型的 Amazon EC2 執行個體。使用者必須使用 SSH 搭配 EC2 SSH 金
