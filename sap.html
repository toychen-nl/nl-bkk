式。將工作階段儲存在 Amazon Kinesis Data Firehose 中。","D":"將資料庫遷移到 Amazon RDS MariaDB 多可用區 DB 執行個體。在 Application Load Balancer 後方的 Amazon EC2 執行個體的 Auto Scaling 群組中部署應用程式。將工作階段儲存在 Amazon ElastiCache for Memcached 中。"},"answer":"B"},{"num":319,"stem":"一家公司的解決方案架構師需要為使用者提供安全的遠端桌面連線，以連線到 VPC 中託管的 Amazon EC2 Windows 執行個體。解決方案必須將集中式使用者管理與公司的內部部署 Active Directory 整合。透過網際網路連線至 VPC。公司擁有可用於建立 AWS Site-to-Site VPN 連線的硬體。\n哪個解決方案以最具成本效益的方式滿足這些需求？","options":{"A":"使用 AWS Directory Service for Microsoft Active Directory 部署受管 Active Directory。與內部部署 Active Directory 建立信任關係。在 VPC 中部署 EC2 執行個體作為堡壘主機。確保 EC2 執行個體已加入網域。使用堡壘主機透過 RDP 存取目標執行個體。","B":"配置 AWS IAM Identity Center (AWS Single Sign-On)，使用 AWS Directory Service for Microsoft Active Directory AD Connector 與內部部署 Active Directory 整合。針對使用者群組配置存取 AWS Systems Manager 的權限集。使用 Systems Manager Fleet Manager 透過 RDP 存取目標執行個體。","C":"在內部部署環境和目標 VPC 之間實作 VPN。確保目標執行個體透過 VPN 連線加入內部部署 Active Directory 網域。透過 VPN 配置 RDP 存取。從公司網路連線至目標執行個體。","D":"使用 AWS Directory Service for Microsoft Active Directory 部署受管 Active Directory。與內部部署 Active Directory 建立信任關係。使用 AWS Quick Start 在 AWS 上部署遠端桌面閘道。確保遠端桌面閘道已加入網域。使用遠端桌面閘道透過 RDP 存取目標執行個體。"},"answer":"C"},{"num":320,"stem":"一家公司的合規稽核發現，在 AWS 帳戶中建立的某些 Amazon Elastic Block Store (Amazon EBS) 磁碟區未經加密。解決方案架構師必須實作一個解決方案，對所有新 EBS 磁碟區進行靜態加密。\n哪個解決方案以最少的工作量滿足此需求？","options":{"A":"建立 Amazon EventBridge 規則以偵測建立未加密 EBS 磁碟區的情況。呼叫 AWS Lambda 函數刪除不合規的磁碟區。","B":"使用帶有資料加密的 AWS Audit Manager。","C":"建立 AWS Config 規則以偵測建立新 EBS 磁碟區的情況。使用 AWS Systems Manager Automation 加密磁碟區。","D":"在所有 AWS 區域中預設開啟 EBS 加密功能。"},"answer":"D"},{"num":321,"stem":"一家研究公司在 AWS Cloud 中每天執行模擬以滿足高需求。這些模擬在數百個基於 Amazon Linux 2 的 Amazon EC2 執行個體上運行。有時模擬會卡住，需要雲端運維工程師透過 SSH 連線至 EC2 執行個體來解決問題。\n公司政策規定沒有 EC2 執行個體可以使用相同的 SSH 金鑰，並且所有連線必須記錄在 AWS CloudTrail 中。\n解決方案架構師如何滿足這些需求？","options":{"A":"啟動新的 EC2 執行個體，並為每個執行個體生成個別的 SSH 金鑰。將 SSH 金鑰儲存在 AWS Secrets Manager 中。建立新的 IAM 政策，並以包含 GetSecretValue 動作的 Allow 陳述式附加到工程師的 IAM 角色。指示工程師在透過任何 SSH 客戶端連線時從 Secrets Manager 取得 SSH 金鑰。","B":"建立 AWS Systems Manager 文件，在 EC2 執行個體上執行命令以設定新的唯一 SSH 金鑰。建立新的 IAM 政策，並以包含執行 Systems Manager 文件的 Allow 陳述式附加到工程師的 IAM 角色。指示工程師執行該文件以設定 SSH 金鑰並透過任何 SSH 客戶端連線。","C":"在不設定任何 SSH 金鑰的情況下啟動新的 EC2 執行個體。在每個執行個體上設定 EC2 Instance Connect。建立新的 IAM 政策，並以包含 SendSSHPublicKey 動作的 Allow 陳述式附加到工程師的 IAM 角色。指示工程師使用 EC2 主控台的瀏覽器型 SSH 客戶端連線至執行個體。","D":"設定 AWS Secrets Manager 以儲存 EC2 SSH 金鑰。建立新的 AWS Lambda 函數，以建立新的 SSH 金鑰並呼叫 AWS Systems Manager Session Manager 在 EC2 執行個體上設定 SSH 金鑰。配置 Secrets Manager 使用 Lambda 函數每天自動輪換一次。指示工程師在透過任何 SSH 客戶端連線時從 Secrets Manager 取得 SSH 金鑰。"},"answer":"C"},{"num":322,"stem":"一家公司正在將行動銀行應用程式遷移到 VPC 中的 Amazon EC2 執行個體上運行。後端服務應用程式在內部部署資料中心運行。資料中心有一條 AWS Direct Connect 連線至 AWS。在 VPC 中運行的應用程式需要解析到在資料中心運行的內部部署 Active Directory 網域的 DNS 請求。\n哪個解決方案以最低的管理負擔滿足這些需求？","options":{"A":"在 VPC 中跨兩個可用區域佈建一組 EC2 執行個體作為快取 DNS 伺服器，以解析來自 VPC 內應用程式伺服器的 DNS 查詢。","B":"佈建 Amazon Route 53 私有託管區域。配置指向內部部署 DNS 伺服器的 NS 記錄。","C":"使用 Amazon Route 53 Resolver 建立 DNS 端點。新增條件轉發規則，以解析內部部署資料中心和 VPC 之間的 DNS 命名空間。","D":"在 VPC 中佈建新的 Active Directory 網域控制器，並在此新網域與內部部署 Active Directory 網域之間建立雙向信任關係。"},"answer":"C"},{"num":323,"stem":"一家公司處理環境資料。公司已設置感測器，提供來自城市不同區域的連續資料串流。資料以 JSON 格式提供。\n公司希望使用 AWS 解決方案將資料傳送到不需要固定結構描述進行儲存的資料庫。資料必須即時傳送。\n哪個解決方案可以滿足這些需求？","options":{"A":"使用 Amazon Kinesis Data Firehose 將資料傳送到 Amazon Redshift。","B":"使用 Amazon Kinesis Data Streams 將資料傳送到 Amazon DynamoDB。","C":"使用 Amazon Managed Streaming for Apache Kafka (Amazon MSK) 將資料傳送到 Amazon Aurora。","D":"使用 Amazon Kinesis Data Firehose 將資料傳送到 Amazon Keyspaces（適用於 Apache Cassandra）。"},"answer":"A"},{"num":324,"stem":"一家公司正在將舊版應用程式從內部部署資料中心遷移到 AWS。該應用程式使用 MongoDB 作為鍵值資料庫。根據公司的技術準則，所有 Amazon EC2 執行個體必須託管在沒有網際網路連線的私有子網路中。此外，應用程式和資料庫之間的所有連線必須加密。資料庫必須能夠根據需求擴展。\n哪個解決方案可以滿足這些需求？","options":{"A":"使用 Provisioned IOPS 磁碟區為應用程式建立新的 Amazon DocumentDB（具有 MongoDB 相容性）資料表。使用執行個體端點連線至 Amazon DocumentDB。","B":"使用按需容量為應用程式建立新的 Amazon DynamoDB 資料表。使用 DynamoDB 的閘道 VPC 端點連線至 DynamoDB 資料表。","C":"使用按需容量為應用程式建立新的 Amazon DynamoDB 資料表。使用 DynamoDB 的介面 VPC 端點連線至 DynamoDB 資料表。","D":"使用 Provisioned IOPS 磁碟區為應用程式建立新的 Amazon DocumentDB（具有 MongoDB 相容性）資料表。使用叢集端點連線至 Amazon DocumentDB。"},"answer":"D"},{"num":325,"stem":"一家公司在 AWS Cloud 的 Amazon EC2 執行個體上運行應用程式。該應用程式使用具有複本集的 MongoDB 資料庫作為資料層。MongoDB 資料庫安裝在公司內部部署資料中心的系統上，並可透過 AWS Direct Connect 連線至資料中心環境進行存取。\n解決方案架構師必須將內部部署的 MongoDB 資料庫遷移到 Amazon DocumentDB（具有 MongoDB 相容性）。\n解決方案架構師應選擇哪種策略來執行此遷移？","options":{"A":"建立 EC2 執行個體的機群。在 EC2 執行個體上安裝 MongoDB Community Edition 並建立資料庫。配置與在內部部署資料中心運行的資料庫進行連續同步複寫。","B":"建立 AWS Database Migration Service (AWS DMS) 複寫執行個體。使用異動資料擷取 (CDC) 為內部部署 MongoDB 資料庫建立來源端點。為 Amazon DocumentDB 資料庫建立目標端點。建立並執行 DMS 遷移任務。","C":"使用 AWS Data Pipeline 建立資料遷移管線。為內部部署 MongoDB 資料庫和 Amazon DocumentDB 資料庫定義資料節點。建立排程任務以執行資料管線。","D":"使用 AWS Glue 爬蟲程式為內部部署 MongoDB 資料庫建立來源端點。配置 MongoDB 資料庫和 Amazon DocumentDB 資料庫之間的連續非同步複寫。"},"answer":"B"},{"num":326,"stem":"一家公司正在重新架構其應用程式以在 AWS 上執行。該公司的基礎架構包含多個 Amazon EC2 執行個體。公司的開發團隊需要不同等級的存取權限。公司希望實施一項政策，要求所有 Windows EC2 執行個體加入 AWS 上的 Active Directory 網域。公司還希望實施增強型安全程序，例如多因素驗證（MFA）。公司希望盡可能使用受管 AWS 服務。\n哪個解決方案能符合這些需求？","options":{"A":"建立 AWS Directory Service for Microsoft Active Directory 實作。啟動 Amazon Workspace。連線並使用 Workspace 執行網域安全性設定任務。","B":"建立 AWS Directory Service for Microsoft Active Directory 實作。啟動 EC2 執行個體。連線並使用 EC2 執行個體執行網域安全性設定任務。","C":"建立 AWS Directory Service Simple AD 實作。啟動 EC2 執行個體。連線並使用 EC2 執行個體執行網域安全性設定任務。","D":"建立 AWS Directory Service Simple AD 實作。啟動 Amazon Workspace。連線並使用 Workspace 執行網域安全性設定任務。"},"answer":"A"},{"num":327,"stem":"一家公司想要將其內部部署應用程式遷移到 AWS。該應用程式的資料庫儲存結構化的產品資料和臨時的使用者工作階段資料。公司需要將產品資料與使用者工作階段資料解耦。公司還需要在另一個 AWS 區域實作複寫以進行災難復原。\n哪個解決方案能以最高效能符合這些需求？","options":{"A":"建立一個 Amazon RDS DB 執行個體，使用獨立的結構描述來存放產品資料和使用者工作階段資料。在另一個區域為 DB 執行個體設定讀取複本。","B":"建立一個 Amazon RDS DB 執行個體來存放產品資料。在另一個區域為 DB 執行個體設定讀取複本。在 Amazon ElastiCache for Memcached 中建立全域資料儲存來存放使用者工作階段資料。","C":"建立兩個 Amazon DynamoDB 全域資料表。使用一個全域資料表存放產品資料。使用另一個全域資料表存放使用者工作階段資料。使用 DynamoDB Accelerator（DAX）進行快取。","D":"建立一個 Amazon RDS DB 執行個體來存放產品資料。在另一個區域為 DB 執行個體設定讀取複本。建立一個 Amazon DynamoDB 全域資料表來存放使用者工作階段資料。"},"answer":"D"},{"num":328,"stem":"一家公司使用 AWS Control Tower 在 AWS 上協調多帳戶架構。公司正在使用 AWS Organizations、AWS Config 和 AWS Trusted Advisor。公司為開發人員用於在 AWS 上進行實驗的開發帳戶設有一個專用的 OU。公司有數百位開發人員，每位開發人員都有一個獨立的開發帳戶。\n公司希望最佳化這些開發帳戶的成本。這些帳戶中的 Amazon EC2 執行個體和 Amazon RDS 執行個體必須是可突發類型。公司希望禁止使用不相關的其他服務。\n解決方案架構師應建議什麼來符合這些需求？","options":{"A":"在 AWS Organizations 中建立自訂 SCP，僅允許部署可突發執行個體，並禁止不相關的服務。將 SCP 套用至開發 OU。","B":"在 AWS Control Tower 中建立自訂偵測性控制（護欄）。將控制（護欄）設定為僅允許部署可突發執行個體，並禁止不相關的服務。將控制（護欄）套用至開發 OU。","C":"在 AWS Control Tower 中建立自訂預防性控制（護欄）。將控制（護欄）設定為僅允許部署可突發執行個體，並禁止不相關的服務。將控制（護欄）套用至開發 OU。","D":"在 AWS Control Tower 帳戶中建立 AWS Config 規則。將 AWS Config 規則設定為僅允許部署可突發執行個體，並禁止不相關的服務。使用 AWS CloudFormation StackSets 將 AWS Config 規則部署至開發 OU。"},"answer":"A"},{"num":329,"stem":"一家金融服務公司在 Amazon EC2 執行個體和 AWS Lambda 函數上執行複雜的多層式應用程式。應用程式將臨時資料儲存在 Amazon S3 中。S3 物件僅在 45 分鐘內有效，並在 24 小時後刪除。\n公司透過啟動 AWS CloudFormation 堆疊來部署每個版本的應用程式。堆疊會建立執行應用程式所需的所有資源。當公司部署並驗證新應用程式版本後，公司會刪除舊版本的 CloudFormation 堆疊。\n公司最近嘗試刪除舊版本應用程式的 CloudFormation 堆疊，但操作失敗。分析顯示 CloudFormation 無法刪除現有的 S3 儲存貯體。解決方案架構師需要在不對應用程式架構進行重大變更的情況下解決此問題。\n哪個解決方案能符合這些需求？","options":{"A":"實作一個 Lambda 函數，用於刪除指定 S3 儲存貯體中的所有檔案。將此 Lambda 函數作為自訂資源整合至 CloudFormation 堆疊中。確保自訂資源具有指向 S3 儲存貯體資源的 DependsOn 屬性。","B":"修改 CloudFormation 範本，改為佈建 Amazon Elastic File System（Amazon EFS）檔案系統來儲存臨時檔案，而非儲存在 Amazon S3 中。將 Lambda 函數設定為在與檔案系統相同的 VPC 中執行。將檔案系統掛載至 EC2 執行個體和 Lambda 函數。","C":"修改 CloudFormation 堆疊，建立一個 S3 生命週期規則，使所有物件在建立後 45 分鐘到期。新增指向 S3 儲存貯體資源的 DependsOn 屬性。","D":"修改 CloudFormation 堆疊，為 S3 儲存貯體附加值為 Delete 的 DeletionPolicy 屬性。"},"answer":"B"},{"num":330,"stem":"一家公司開發了一款行動遊戲。遊戲的後端在位於內部部署資料中心的數台虛擬機器上執行。業務邏輯透過具有多個函數的 REST API 公開。玩家工作階段資料儲存在中央檔案儲存中。後端服務使用不同的 API 金鑰進行流量限制，並區分線上流量和測試流量。\n遊戲後端的負載在一天中會有所變化。在尖峰時段，伺服器容量不足。擷取玩家工作階段資料時也存在延遲問題。管理層要求解決方案架構師提出一個雲端架構，能夠處理遊戲的變動負載並提供低延遲的資料存取。API 模型不應變更。\n哪個解決方案能符合這些需求？","options":{"A":"使用 Network Load Balancer（NLB）實作 REST API。在 NLB 後方的 Amazon EC2 執行個體上執行業務邏輯。在 Amazon Aurora Serverless 中儲存玩家工作階段資料。","B":"使用 Application Load Balancer（ALB）實作 REST API。在 AWS Lambda 中執行業務邏輯。在具有隨需容量的 Amazon DynamoDB 中儲存玩家工作階段資料。","C":"使用 Amazon API Gateway 實作 REST API。在 AWS Lambda 中執行業務邏輯。在具有隨需容量的 Amazon DynamoDB 中儲存玩家工作階段資料。","D":"使用 AWS AppSync 實作 REST API。在 AWS Lambda 中執行業務邏輯。在 Amazon Aurora Serverless 中儲存玩家工作階段資料。"},"answer":"D"},{"num":331,"stem":"一家公司正在將舊版應用程式從內部部署資料中心遷移到 AWS。應用程式由單一應用程式伺服器組成，每晚會將數千張圖片寫入掛載的 NFS 檔案系統。公司遷移應用程式後，將在掛載了 Amazon Elastic File System（Amazon EFS）檔案系統的 Amazon EC2 執行個體上託管應用程式。\n公司已建立到 AWS 的 AWS Direct Connect 連線。在遷移切換之前，解決方案架構師必須建立一個流程，將新建立的內部部署圖片複寫到 EFS 檔案系統。\n複寫圖片最具操作效率的方式是什麼？","options":{"A":"設定定期流程，從內部部署檔案系統執行 aws s3 sync 命令至 Amazon S3。設定 AWS Lambda 函數以處理來自 Amazon S3 的事件通知，並將圖片從 Amazon S3 複製到 EFS 檔案系統。","B":"部署具有 NFS 掛載點的 AWS Storage Gateway 檔案閘道。在內部部署伺服器上掛載檔案閘道檔案系統。設定流程定期將圖片複製到掛載點。","C":"將 AWS DataSync 代理程式部署到可存取 NFS 檔案系統的內部部署伺服器。使用公用 VIF 透過 Direct Connect 連線將資料傳送至 S3 儲存貯體。設定 AWS Lambda 函數以處理來自 Amazon S3 的事件通知，並將圖片從 Amazon S3 複製到 EFS 檔案系統。","D":"將 AWS DataSync 代理程式部署到可存取 NFS 檔案系統的內部部署伺服器。使用私有 VIF 透過 Direct Connect 連線將資料傳送至 Amazon EFS 的 AWS PrivateLink 介面 VPC 端點。設定 DataSync 排程任務，每 24 小時將圖片傳送至 EFS 檔案系統。"},"answer":"C"},{"num":332,"stem":"一家公司最近將 Web 應用程式從內部部署資料中心遷移到 AWS Cloud。Web 應用程式基礎架構由 Amazon CloudFront 分發組成，該分發路由至 Application Load Balancer（ALB），並使用 Amazon Elastic Container Service（Amazon ECS）來處理請求。最近的安全稽核顯示，可透過 CloudFront 和 ALB 端點存取 Web 應用程式。但是，公司要求 Web 應用程式必須只能透過 CloudFront 端點存取。\n哪個解決方案能以最少的工作量符合此需求？","options":{"A":"建立新的安全群組並將其附加至 CloudFront 分發。更新 ALB 安全群組輸入規則，僅允許來自 CloudFront 安全群組的存取。","B":"更新 ALB 安全群組輸入規則，僅允許來自 com.amazonaws.global.cloudfront.origin-facing CloudFront 受管前綴清單的存取。","C":"為 Elastic Load Balancing 建立 com.amazonaws.region.elasticloadbalancing VPC 介面端點。將 ALB 方案從面向網際網路更改為內部。","D":"從 AWS 提供的 ip-ranges.json 文件中擷取 CloudFront IP。更新 ALB 安全群組輸入規則，僅允許來自 CloudFront IP 的存取。"},"answer":"A"},{"num":333,"stem":"一家公司使用 Application Load Balancer（ALB）和 Amazon ECS 叢集中託管的 Docker 應用程式來託管社群論壇網站。網站資料儲存在 Amazon RDS for MySQL 中，容器映像儲存在 ECR 中。公司需要為客戶提供災難復原 SLA，RTO 不超過 24 小時，RPO 不超過 8 小時。\n下列哪個解決方案是符合需求最具成本效益的方式？","options":{"A":"使用 AWS CloudFormation 在兩個區域部署相同的 ALB、EC2、ECS 和 RDS 資源。每 8 小時排程一次 RDS 快照。使用 RDS 多區域複寫更新次要區域的資料庫副本。發生故障時，從最新快照還原，並使用 Amazon Route 53 DNS 容錯移轉政策自動將客戶重新導向至次要區域的 ALB。","B":"在兩個區域的 ECR 中儲存 Docker 映像。每 8 小時排程一次 RDS 快照，並將快照複製到次要區域。發生故障時，使用 AWS CloudFormation 在次要區域部署 ALB、EC2、ECS 和 RDS 資源，從最新快照還原，並更新 DNS 記錄以指向次要區域的 ALB。","C":"使用 AWS CloudFormation 在次要區域部署相同的 ALB、EC2、ECS 和 RDS 資源。每小時排程一次 RDS MySQL 備份至 Amazon S3，並使用跨區域複寫將資料複寫到次要區域的儲存貯體。發生故障時，將最新的 Docker 映像匯入次要區域的 Amazon ECR，部署至 EC2 執行個體，還原最新的 MySQL 備份，並更新 DNS 記錄以指向次要區域的 ALB。","D":"在次要區域部署預備燈環境，使用 ALB 和 AWS Auto Scaling 群組中的最小資源 EC2 Docker 部署，並設定擴展政策以增加執行個體大小和節點數量。建立 RDS 資料的跨區域讀取複本。發生故障時，將複本提升為主要複本，並更新 DNS 記錄以指向次要區域的 ALB。"},"answer":"B"},{"num":334,"stem":"一家公司正在將其基礎架構遷移到 AWS Cloud。公司必須遵守不同專案的各種法規標準。公司需要多帳戶環境。\n解決方案架構師需要準備基準基礎架構。解決方案必須提供一致的管理和安全性基準，但必須允許在各 AWS 帳戶中針對不同的合規需求具有彈性。解決方案還需要與現有的內部部署 Active Directory Federation Services（AD FS）伺服器整合。\n哪個解決方案能以最少的操作開銷符合這些需求？","options":{"A":"在 AWS Organizations 中建立組織。為所有帳戶建立單一最低權限存取 SCP。為所有帳戶建立單一 OU。設定 IAM 身分提供者以與內部部署 AD FS 伺服器聯合。設定具有定義流程的集中日誌帳戶，讓日誌產生服務將日誌事件傳送至集中帳戶。在集中帳戶中啟用 AWS Config，並為所有帳戶使用合規套件。","B":"在 AWS Organizations 中建立組織。在組織上啟用 AWS Control Tower。檢閱 SCP 包含的控制（護欄）。檢查 AWS Config 是否有需要新增的領域。視需要新增 OU。將 AWS IAM Identity Center（AWS Single Sign-On）連線至內部部署 AD FS 伺服器。","C":"在 AWS Organizations 中建立組織。建立最低權限存取 SCP。建立 OU 結構，並使用它來分組 AWS 帳戶。將 AWS IAM Identity Center（AWS Single Sign-On）連線至內部部署 AD FS 伺服器。設定具有定義流程的集中日誌帳戶，讓日誌產生服務將日誌事件傳送至集中帳戶。在集中帳戶中啟用 AWS Config，並使用彙總器和合規套件。","D":"在 AWS Organizations 中建立組織。在組織上啟用 AWS Control Tower。檢閱 SCP 包含的控制（護欄）。檢查 AWS Config 是否有需要新增的領域。設定 IAM 身分提供者以與內部部署 AD FS 伺服器聯合。"},"answer":"D"},{"num":335,"stem":"一家線上雜誌將於本月推出其最新版本。此版本將是首次在全球發行。雜誌的動態網站目前在 Web 層前方使用 Application Load Balancer，使用一批 Amazon EC2 執行個體作為 Web 和應用程式伺服器，以及 Amazon Aurora MySQL。部分網站包含靜態內容，且幾乎所有流量都是唯讀的。\n雜誌預期新版本推出時網際網路流量會顯著激增。最佳效能是推出後一週的首要任務。\n解決方案架構師應採取哪些步驟組合來降低全球受眾的系統回應時間？（選擇兩個）","options":{"A":"使用邏輯跨區域複寫將 Aurora MySQL 資料庫複寫到次要區域。以 Amazon S3 取代 Web 伺服器。以跨區域複寫模式部署 S3 儲存貯體。","B":"確保 Web 層和應用程式層各自位於 Auto Scaling 群組中。引入 AWS Direct Connect 連線。在全球各地的區域中部署 Web 層和應用程式層。","C":"將資料庫從 Amazon Aurora 遷移至 Amazon RDS for MySQL。確保三個應用程式層（Web、應用程式和資料庫）都位於私有子網路中。","D":"使用 Aurora 全域資料庫進行實體跨區域複寫。使用具有跨區域複寫的 Amazon S3 來存放靜態內容和資源。在全球各地的區域中部署 Web 層和應用程式層。","E":"引入具有以延遲為基礎路由的 Amazon Route 53 和 Amazon CloudFront 分發。確保 Web 層和應用程式層各自位於 Auto Scaling 群組中。"},"answer":"DE"},{"num":336,"stem":"一家線上遊戲公司需要最佳化其在 AWS 上的工作負載成本。公司使用專屬帳戶來託管其線上遊戲應用程式和分析應用程式的生產環境。\nAmazon EC2 執行個體託管遊戲應用程式，且必須隨時可用。EC2 執行個體全年執行。分析應用程式使用儲存在 Amazon S3 中的資料。分析應用程式可以中斷並恢復，不會造成問題。\n哪個解決方案能以最具成本效益的方式符合這些需求？","options":{"A":"為線上遊戲應用程式執行個體購買 EC2 執行個體 Savings Plan。對分析應用程式使用隨需執行個體。","B":"為線上遊戲應用程式執行個體購買 EC2 執行個體 Savings Plan。對分析應用程式使用 Spot 執行個體。","C":"對線上遊戲應用程式和分析應用程式使用 Spot 執行個體。在 AWS Service Catalog 中設定目錄以折扣佈建服務。","D":"對線上遊戲應用程式使用隨需執行個體。對分析應用程式使用 Spot 執行個體。在 AWS Service Catalog 中設定目錄以折扣佈建服務。"},"answer":"B"},{"num":337,"stem":"一家公司在數百個生產 AWS 帳戶中執行應用程式。公司使用已啟用所有功能的 AWS Organizations，並具有使用 AWS Backup 的集中備份操作。\n公司擔心勒索軟體攻擊。為因應此顧慮，公司制定了新政策，要求所有備份必須能夠抵禦任何生產帳戶中特權使用者憑證遭洩露的情況。\n哪些步驟組合能符合此新需求？（選擇三個）","options":{"A":"在指定的非生產帳戶中使用 AWS Backup 保險庫實作跨帳戶備份。","B":"新增限制修改 AWS Backup 保險庫的 SCP。","C":"為指派給 AWS Backup 的 IAM 服務角色實作最低權限存取。","D":"設定備份頻率、生命週期和保留期間，確保冷層中始終至少存在一個備份。","E":"將 AWS Backup 設定為將所有備份寫入指定非生產帳戶中的 Amazon S3 儲存貯體。確保 S3 儲存貯體已啟用 S3 Object Lock。"},"answer":"ACD"},{"num":338,"stem":"一家公司需要將其 AWS 帳戶中的 Amazon CloudWatch 日誌彙總到一個集中日誌帳戶中。收集的日誌必須保留在建立時所在的 AWS 區域。集中日誌帳戶將處理日誌、將日誌正規化為標準輸出格式，並將輸出日誌串流至安全工具以進行進一步處理。\n解決方案架構師必須設計一個能夠處理大量需要擷取的日誌資料的解決方案。在正常上班時間以外的日誌記錄量將少於正常上班時間的日誌記錄量。日誌記錄解決方案必須能夠隨預期負載擴展。解決方案架構師決定使用 AWS Control Tower 設計來處理多帳戶日誌記錄流程。\n解決方案架構師應採取哪些步驟組合來符合需求？（選擇三個）","options":{"A":"在集中日誌帳戶中建立目的地 Amazon Kinesis 資料串流。","B":"在集中日誌帳戶中建立目的地 Amazon Simple Queue Service（Amazon SQS）佇列。","C":"建立 IAM 角色，授予 Amazon CloudWatch Logs 將資料新增至 Amazon Kinesis 資料串流的權限。建立信任政策。在 IAM 角色中指定信任政策。在每個成員帳戶中，為每個日誌群組建立訂閱篩選器，以將資料傳送至 Kinesis 資料串流。","D":"建立 IAM 角色，授予 Amazon CloudWatch Logs 將資料新增至 Amazon Simple Queue Service（Amazon SQS）佇列的權限。建立信任政策。在 IAM 角色中指定信任政策。在每個成員帳戶中，為所有日誌群組建立單一訂閱篩選器，以將資料傳送至 SQS 佇列。","E":"建立 AWS Lambda 函數。對 Lambda 函數進行程式設計，在集中日誌帳戶中正規化日誌，並將日誌寫入安全工具。","F":"建立 AWS Lambda 函數。對 Lambda 函數進行程式設計，在成員帳戶中正規化日誌，並將日誌寫入安全工具。"},"answer":"BFD"},{"num":339,"stem":"一家公司正在將舊版應用程式從內部部署資料中心遷移到 AWS。應用程式由單一應用程式伺服器和 Microsoft SQL Server 資料庫伺服器組成。每台伺服器都部署在 VMware VM 上，跨多個附加磁碟區使用 500 TB 的資料。\n公司已建立從最近的 AWS 區域到其內部部署資料中心的 10 Gbps AWS Direct Connect 連線。Direct Connect 連線目前未被其他服務使用。\n解決方案架構師應採取哪些步驟組合，以最少的停機時間遷移應用程式？（選擇兩個）","options":{"A":"使用 AWS Server Migration Service（AWS SMS）複寫任務將資料庫伺服器 VM 遷移到 AWS。","B":"使用 VM Import/Export 匯入應用程式伺服器 VM。","C":"將 VM 映像匯出至 AWS Snowball Edge Storage Optimized 裝置。","D":"使用 AWS Server Migration Service（AWS SMS）複寫任務將應用程式伺服器 VM 遷移到 AWS。","E":"使用 AWS Database Migration Service（AWS DMS）複寫執行個體將資料庫遷移至 Amazon RDS DB 執行個體。"},"answer":"AD"},{"num":340,"stem":"一家公司在內部部署管理一批伺服器，同時在 AWS Organizations 的 AWS 上管理一批 Amazon EC2 執行個體。公司的 AWS 帳戶包含數百個 VPC。公司希望將其 AWS 帳戶連接至其內部部署網路。AWS Site-to-Site VPN 連線已建立至單一 AWS 帳戶。公司希望控制哪些 VPC 可以與其他 VPC 通訊。\n哪些步驟組合能以最少的操作工作量達到此控制等級？（選擇三個）","options":{"A":"在 AWS 帳戶中建立傳輸閘道。使用 AWS Resource Access Manager（AWS RAM）跨帳戶共享傳輸閘道。","B":"設定至所有 VPC 和 VPN 的連接。","C":"設定傳輸閘道路由表。將 VPC 和 VPN 與路由表建立關聯。","D":"在 VPC 之間設定 VPC 對等互連。","E":"設定 VPC 和 VPN 之間的連接。","F":"在 VPC 和 VPN 上設定路由表。"},"answer":"FDC"},{"num":341,"stem":"一家公司需要最佳化其在 AWS 上的應用程式成本。應用程式使用 AWS Lambda 函數和在 AWS Fargate 上執行的 Amazon Elastic Container Service（Amazon ECS）容器。應用程式是寫入密集型，並將資料儲存在 Amazon Aurora MySQL 資料庫中。\n應用程式的負載不一致。應用程式經歷長時間無使用，隨後流量突然大幅增加和減少。資料庫在記憶體最佳化 DB 執行個體上執行，無法處理負載。\n解決方案架構師必須設計一個能夠擴展以處理流量變化的解決方案。\n哪個解決方案能以最具成本效益的方式符合這些需求？","options":{"A":"向資料庫新增額外的讀取複本。購買執行個體 Savings Plan 和 RDS 預留執行個體。","B":"將資料庫遷移至具有多個寫入器執行個體的 Aurora DB 叢集。購買執行個體 Savings Plan。","C":"將資料庫遷移至 Aurora 全域資料庫。購買 Compute Savings Plan 和 RDS 預留執行個體。","D":"將資料庫遷移至 Aurora Serverless v1。購買 Compute Savings Plan。"},"answer":"B"},{"num":342,"stem":"一家公司將應用程式遷移至 AWS Cloud。應用程式在 Application Load Balancer（ALB）後方的兩個 Amazon EC2 執行個體上執行。\n應用程式資料儲存在其他 EC2 執行個體上執行的 MySQL 資料庫中。應用程式對資料庫的使用以讀取為主。應用程式從附加至每個 EC2 執行個體的 Amazon Elastic Block Store（Amazon EBS）磁碟區載入靜態內容。靜態內容頻繁更新，必須複製到每個 EBS 磁碟區。\n應用程式的負載在一天中會有所變化。在尖峰時段，應用程式無法處理所有傳入請求。追蹤資料顯示，資料庫無法在尖峰時段處理讀取負載。\n哪個解決方案能提升應用程式的可靠性？","options":{"A":"將應用程式遷移至一組 AWS Lambda 函數。將 Lambda 函數設定為 ALB 的目標。為靜態內容建立新的單一 EBS 磁碟區。設定 Lambda 函數從新的 EBS 磁碟區讀取。將資料庫遷移至 Amazon RDS for MySQL Multi-AZ DB 叢集。","B":"將應用程式遷移至一組 AWS Step Functions 狀態機器。將狀態機器設定為 ALB 的目標。為靜態內容建立 Amazon Elastic File System（Amazon EFS）檔案系統。設定狀態機器從 EFS 檔案系統讀取。將資料庫遷移至具有讀取器 DB 執行個體的 Amazon Aurora MySQL Serverless v2。","C":"將應用程式容器化。將應用程式遷移至 Amazon Elastic Container Service（Amazon ECS）叢集。對託管應用程式的任務使用 AWS Fargate 啟動類型。為靜態內容建立新的單一 EBS 磁碟區。將新的 EBS 磁碟區掛載至 ECS 叢集。在 ECS 叢集上設定 AWS Application Auto Scaling。將 ECS 服務設定為 ALB 的目標。將資料庫遷移至 Amazon RDS for MySQL Multi-AZ DB 叢集。","D":"將應用程式容器化。將應用程式遷移至 Amazon Elastic Container Service（Amazon ECS）叢集。對託管應用程式的任務使用 AWS Fargate 啟動類型。為靜態內容建立 Amazon Elastic File System（Amazon EFS）檔案系統。將 EFS 檔案系統掛載至每個容器。在 ECS 叢集上設定 AWS Application Auto Scaling。將 ECS 服務設定為 ALB 的目標。將資料庫遷移至具有讀取器 DB 執行個體的 Amazon Aurora MySQL Serverless v2。"},"answer":"B"},{"num":343,"stem":"解決方案架構師希望確保只有具有適當權限的 AWS 使用者或角色才能存取新的 Amazon API Gateway 端點。解決方案架構師希望獲得每個請求的端對端檢視，以分析請求的延遲並建立服務對應圖。\n解決方案架構師如何設計 API Gateway 存取控制並執行請求檢查？","options":{"A":"對於 API Gateway 方法，將授權設定為 AWS_IAM。然後，授予 IAM 使用者或角色在 REST API 資源上執行 execute-api:Invoke 的權限。讓 API 呼叫者在存取端點時使用 AWS Signature 簽署請求。使用 AWS X-Ray 追蹤和分析對 API Gateway 的使用者請求。","B":"對於 API Gateway 資源，啟用 CORS 並僅在 Access-Control-Allow-Origin 標頭中傳回公司的網域。然後，授予 IAM 使用者或角色在 REST API 資源上執行 execute-api:Invoke 的權限。使用 Amazon CloudWatch 追蹤和分析對 API Gateway 的使用者請求。","C":"建立 AWS Lambda 函數作為自訂授權器，要求 API 用戶端在呼叫時傳遞金鑰和密碼，然後使用 Lambda 根據 IAM 系統驗證金鑰/密碼配對。使用 AWS X-Ray 追蹤和分析對 API Gateway 的使用者請求。","D":"為 API Gateway 建立用戶端憑證。將憑證分發給需要存取端點的 AWS 使用者和角色。讓 API 呼叫者在存取端點時傳遞用戶端憑證。使用 Amazon CloudWatch 追蹤和分析對 API Gateway 的使用者請求。"},"answer":"A"},{"num":344,"stem":"一家公司使用 AWS CodePipeline 對 Amazon EC2 Auto Scaling 群組的應用程式進行 CI/CD。所有 AWS 資源都在 AWS CloudFormation 範本中定義。應用程式成品儲存在 Amazon S3 儲存貯體中，並使用執行個體使用者資料腳本部署至 Auto Scaling 群組。隨著應用程式變得更加複雜，CloudFormation 範本中最近的資源變更導致了計畫外的停機。\n解決方案架構師應如何改善 CI/CD 管線，以降低範本變更導致停機的可能性？","options":{"A":"調整部署腳本，以在執行部署時偵測和回報 CloudFormation 錯誤條件。為測試團隊撰寫測試計畫，在核准生產環境變更之前在非生產環境中執行。","B":"在測試環境中使用 AWS CodeBuild 實作自動化測試。使用 CloudFormation 變更集在部署前評估變更。使用 AWS CodeDeploy 利用藍/綠部署模式，允許評估並在需要時還原變更。","C":"使用整合開發環境（IDE）的外掛程式檢查範本是否有錯誤，並使用 AWS CLI 驗證範本是否正確。調整部署程式碼，檢查錯誤條件並在發生錯誤時產生通知。部署至測試環境，並在核准生產環境變更之前執行手動測試計畫。","D":"使用 AWS CodeDeploy 和藍/綠部署模式搭配 CloudFormation 取代使用者資料部署腳本。讓操作人員登入執行中的執行個體，並透過手動測試計畫驗證應用程式是否如預期執行。"},"answer":"D"},{"num":345,"stem":"一家總部位於東岸的北美公司正在 us-east-1 區域的 Amazon EC2 上部署新的 Web 應用程式。應用程式應能動態擴展以滿足使用者需求並維持復原能力。此外，應用程式必須在 us-west-1 區域以主動-被動設定具備災難復原能力。\n在 us-east-1 區域建立 VPC 後，解決方案架構師應採取哪些步驟？","options":{"A":"在 us-west-1 區域建立 VPC。使用跨區域 VPC 對等互連連接兩個 VPC。將跨越多個可用區域（AZ）的 Application Load Balancer（ALB）部署至 us-east-1 區域的 VPC。將 EC2 執行個體部署在每個區域的多個 AZ 中，作為跨越兩個 VPC 並由 ALB 服務的 Auto Scaling 群組的一部分。","B":"將跨越多個可用區域（AZ）的 Application Load Balancer（ALB）部署至 us-east-1 區域的 VPC。將 EC2 執行個體部署在多個 AZ 中，作為由 ALB 服務的 Auto Scaling 群組的一部分。將相同的解決方案部署至 us-west-1 區域。建立具有容錯移轉路由政策且已啟用健康狀態檢查的 Amazon Route 53 記錄集，以在兩個區域之間提供高可用性。","C":"在 us-west-1 區域建立 VPC。使用跨區域 VPC 對等互連連接兩個 VPC。部署跨越兩個 VPC 的 Application Load Balancer（ALB）。將 EC2 執行個體部署在每個 VPC 中由 ALB 服務的 Auto Scaling 群組的多個可用區域中。建立指向 ALB 的 Amazon Route 53 記錄。","D":"將跨越多個可用區域（AZ）的 Application Load Balancer（ALB）部署至 us-east-1 區域的 VPC。將 EC2 執行個體部署在多個 AZ 中，作為由 ALB 服務的 Auto Scaling 群組的一部分。將相同的解決方案部署至 us-west-1 區域。在每個區域建立指向該區域 ALB 的獨立 Amazon Route 53 記錄。使用 Route 53 健康狀態檢查在兩個區域之間提供高可用性。"},"answer":"A"},{"num":346,"stem":"一家公司有一個在多個 .NET Framework 元件上執行的舊版應用程式。這些元件共享同一個 Microsoft SQL Server 資料庫，並使用 Microsoft Message Queueing（MSMQ）以非同步方式相互通訊。\n公司正開始遷移至容器化的 .NET Core 元件，並希望重構應用程式以在 AWS 上執行。.NET Core 元件需要複雜的協調。公司必須完全控制網路和主機設定。應用程式的資料庫模型是強關聯式的。\n哪個解決方案能符合這些需求？","options":{"A":"在 AWS App Runner 上託管 .NET Core 元件。在 Amazon RDS for SQL Server 上託管資料庫。使用 Amazon EventBridge 進行非同步訊息傳遞。","B":"在使用 AWS Fargate 啟動類型的 Amazon Elastic Container Service（Amazon ECS）上託管 .NET Core 元件。在 Amazon DynamoDB 上託管資料庫。使用 Amazon Simple Notification Service（Amazon SNS）進行非同步訊息傳遞。","C":"在 AWS Elastic Beanstalk 上託管 .NET Core 元件。在 Amazon Aurora PostgreSQL Serverless v2 上託管資料庫。使用 Amazon Managed Streaming for Apache Kafka（Amazon MSK）進行非同步訊息傳遞。","D":"在使用 Amazon EC2 啟動類型的 Amazon Elastic Container Service（Amazon ECS）上託管 .NET Core 元件。在 Amazon Aurora MySQL Serverless v2 上託管資料庫。使用 Amazon Simple Queue Service（Amazon SQS）進行非同步訊息傳遞。"},"answer":"A"},{"num":347,"stem":"解決方案架構師在單一可用區域內的放置群組中啟動了多個 Amazon EC2 執行個體。由於系統上的額外負載，解決方案架構師嘗試將新執行個體新增至放置群組。但是，解決方案架構師收到容量不足錯誤。\n解決方案架構師應如何疑難排解此問題？","options":{"A":"使用分散放置群組。為每個可用區域設定最少八個執行個體。","B":"停止並啟動放置群組中的所有執行個體。再次嘗試啟動。","C":"建立新的放置群組。將新的放置群組與原始放置群組合併。","D":"在放置群組中以專用主機啟動額外的執行個體。"},"answer":"C"},{"num":348,"stem":"一家公司使用基礎架構即程式碼（IaC）佈建了一組兩個 Amazon EC2 執行個體。這些執行個體多年來保持不變。\n公司的業務在過去幾個月迅速增長。因應此情況，公司的營運團隊實作了 Auto Scaling 群組以管理流量的突然增加。公司政策要求每月在所有執行中的作業系統上安裝安全更新。\n最近的安全更新需要重新開機。因此，Auto Scaling 群組終止了執行個體，並以新的未修補執行個體取代它們。\n解決方案架構師應建議哪些步驟組合，以避免此問題再次發生？（選擇兩個）","options":{"A":"修改 Auto Scaling 群組，將更新政策設定為以最舊的啟動設定為目標進行更換。","B":"在下次修補維護之前建立新的 Auto Scaling 群組。在維護期間，修補兩個群組並重新啟動執行個體。","C":"在 Auto Scaling 群組前方建立 Elastic Load Balancer。設定監控，確保目標群組健康狀態檢查在 Auto Scaling 群組取代已終止的執行個體後回傳健康狀態。","D":"建立自動化腳本，修補 AMI、更新啟動設定，並叫用 Auto Scaling 執行個體重新整理。","E":"在 Auto Scaling 群組前方建立 Elastic Load Balancer。在執行個體上設定終止保護。"},"answer":"AD"},{"num":349,"stem":"一組資料科學家正在使用 Amazon SageMaker 執行個體和 SageMaker API 來訓練機器學習（ML）模型。SageMaker 執行個體部署在沒有網際網路存取的 VPC 中。ML 模型訓練的資料集儲存在 Amazon S3 儲存貯體中。介面 VPC 端點提供對 Amazon S3 和 SageMaker API 的存取。\n資料科學家偶爾需要存取 Python Package Index（PyPI）儲存庫，以更新他們在工作流程中使用的 Python 套件。解決方案架構師必須在確保 SageMaker 執行個體與網際網路隔離的同時，提供對 PyPI 儲存庫的存取。\n哪個解決方案能符合這些需求？","options":{"A":"為資料科學家需要存取的每個套件建立 AWS CodeCommit 儲存庫。設定 PyPI 儲存庫與 CodeCommit 儲存庫之間的程式碼同步。為 CodeCommit 建立 VPC 端點。","B":"在 VPC 中建立 NAT 閘道。設定 VPC 路由以允許存取網際網路，並設定網路 ACL，僅允許存取 PyPI 儲存庫端點。","C":"在 VPC 中建立 NAT 執行個體。設定 VPC 路由以允許存取網際網路。設定 SageMaker 筆記本執行個體防火牆規則，僅允許存取 PyPI 儲存庫端點。","D":"建立 AWS CodeArtifact 網域和儲存庫。為 CodeArtifact 儲存庫新增 public:pypi 的外部連線。設定 Python 用戶端使用 CodeArtifact 儲存庫。為 CodeArtifact 建立 VPC 端點。"},"answer":"C"},{"num":350,"stem":"解決方案架構師在一家政府機構工作，該機構有嚴格的災難復原需求。所有 Amazon Elastic Block Store（Amazon EBS）快照都需要儲存在至少兩個額外的 AWS 區域中。該機構還需要維持盡可能低的操作開銷。\n哪個解決方案能符合這些需求？","options":{"A":"在 Amazon Data Lifecycle Manager（Amazon DLM）中設定政策，每天執行一次，將 EBS 快照複製到額外的區域。","B":"使用 Amazon EventBridge 排程 AWS Lambda 函數，將 EBS 快照複製到額外的區域。","C":"設定 AWS Backup 以建立 EBS 快照。設定 Amazon S3 跨區域複寫，將 EBS 快照複製到額外的區域。","D":"排程 Amazon EC2 Image Builder 每天執行一次，以建立 AMI 並將 AMI 複製到額外的區域。"},"answer":"A"},{"num":351,"stem":"一家公司有一個專案，正在啟動比實際需求更大的 Amazon EC2 執行個體。由於政策限制，該專案的帳戶無法加入公司在 AWS Organizations 中的組織，以將此活動保持在企業 IT 之外。公司希望只允許開發人員在專案帳戶中啟動 t3.small EC2 執行個體，且這些 EC2 執行個體必須限制在 us-east-2 區域。\n\n解決方案架構師應採取什麼措施來滿足這些需求？","options":{"A":"建立新的開發人員帳戶。將所有 EC2 執行個體、使用者和資產移至 us-east-2。將帳戶加入公司在 AWS Organizations 中的組織。強制執行標籤政策以標示區域親和性。","B":"建立 SCP，拒絕在 us-east-2 以外啟動所有 EC2 執行個體，但允許 t3.small EC2 執行個體。將 SCP 附加到專案帳戶。","C":"為每位開發人員在 us-east-2 中建立並購買一個 t3.small EC2 預留執行個體。為每位開發人員指派一個以其姓名為標籤的特定 EC2 執行個體。","D":"建立 IAM 政策，只允許在 us-east-2 中啟動 t3.small EC2 執行個體。將政策附加到開發人員在專案帳戶中使用的角色和群組。"},"answer":"B"},{"num":352,"stem":"一家科學公司需要處理來自 Amazon S3 儲存貯體的文字和影像資料。這些資料在深太空任務的即時關鍵階段，由數個雷達站收集。雷達站將資料上傳至來源 S3 儲存貯體，資料以雷達站識別碼作為前綴。\n\n公司在第二個帳戶中建立了目標 S3 儲存貯體。資料必須從來源 S3 儲存貯體複製到目標 S3 儲存貯體以符合合規要求。此複製透過 S3 複寫規則涵蓋來源 S3 儲存貯體中的所有物件。\n\n有一個特定的雷達站被識別為擁有最準確的資料。該雷達站的資料複寫必須在雷達站將物件上傳至來源 S3 儲存貯體後 30 分鐘內完成監控。\n\n解決方案架構師應採取什麼措施來滿足這些需求？","options":{"A":"設定 AWS DataSync 代理程式，將帶有前綴的資料從來源 S3 儲存貯體複寫到目標 S3 儲存貯體。選擇在任務上使用所有可用頻寬，並監控任務以確保其處於 TRANSFERRING 狀態。建立 Amazon EventBridge 規則，在此狀態變更時發起警報。","B":"在第二個帳戶中，建立另一個 S3 儲存貯體，以接收來自最準確資料之雷達站的資料。為這個新的 S3 儲存貯體設定新的複寫規則，以區隔與其他雷達站的複寫。監控到目標的最大複寫時間。建立 Amazon EventBridge 規則，在時間超過所需閾值時發起警報。","C":"在來源 S3 儲存貯體上啟用 Amazon S3 Transfer Acceleration，並設定最準確資料的雷達站使用新的端點。監控 S3 目標儲存貯體的 TotalRequestLatency 指標。建立 Amazon EventBridge 規則，在此狀態變更時發起警報。","D":"在來源 S3 儲存貯體上建立新的 S3 複寫規則，篩選使用最準確資料之雷達站前綴的金鑰。啟用 S3 Replication Time Control (S3 RTC)。監控到目標的最大複寫時間。建立 Amazon EventBridge 規則，在時間超過所需閾值時發起警報。"},"answer":"C"},{"num":353,"stem":"一家公司希望將其內部部署資料中心遷移至 AWS 雲端。這包括數千台虛擬化的 Linux 和 Microsoft Windows 伺服器、SAN 儲存設備、使用 MySQL 的 Java 和 PHP 應用程式，以及 Oracle 資料庫。有許多相依服務託管在同一資料中心或外部。技術文件不完整且已過時。解決方案架構師需要了解目前環境並估算遷移後的雲端資源成本。\n\n解決方案架構師應使用哪些工具或服務來規劃雲端遷移？（選擇三個）","options":{"A":"AWS Application Discovery Service","B":"AWS SMS","C":"AWS X-Ray","D":"AWS Cloud Adoption Readiness Tool (CART)","E":"Amazon Inspector","F":"AWS Migration Hub"},"answer":"DEF"},{"num":354,"stem":"解決方案架構師正在審查應用程式上線前的彈性。應用程式在部署於 VPC 私有子網路中的 Amazon EC2 執行個體上執行。EC2 執行個體由最小容量為 1、最大容量為 1 的 Auto Scaling 群組佈建。應用程式將資料儲存在 Amazon RDS for MySQL 資料庫執行個體上。VPC 在三個可用區域中配置了子網路，並配置了單一 NAT 閘道。\n\n解決方案架構師需要建議一個確保應用程式在多個可用區域中運作的解決方案。\n\n哪個解決方案將滿足此需求？","options":{"A":"在其他可用區域部署額外的 NAT 閘道。以適當的路由更新路由表。將 RDS for MySQL 資料庫執行個體修改為 Multi-AZ 配置。配置 Auto Scaling 群組以在各可用區域啟動執行個體。將 Auto Scaling 群組的最小容量和最大容量設為 3。","B":"以虛擬私有閘道取代 NAT 閘道。以 Amazon Aurora MySQL 資料庫叢集取代 RDS for MySQL 資料庫執行個體。配置 Auto Scaling 群組以在 VPC 中的所有子網路啟動執行個體。將 Auto Scaling 群組的最小容量和最大容量設為 3。","C":"以 NAT 執行個體取代 NAT 閘道。將 RDS for MySQL 資料庫執行個體遷移至 RDS for PostgreSQL 資料庫執行個體。在其他可用區域啟動新的 EC2 執行個體。","D":"在其他可用區域部署額外的 NAT 閘道。以適當的路由更新路由表。修改 RDS for MySQL 資料庫執行個體以開啟自動備份，並保留備份 7 天。配置 Auto Scaling 群組以在 VPC 中的所有子網路啟動執行個體。保持 Auto Scaling 群組的最小容量和最大容量為 1。"},"answer":"C"},{"num":355,"stem":"一家公司計畫將其內部部署交易處理應用程式遷移至 AWS。應用程式在公司資料中心的 VM 上以 Docker 容器方式執行。Docker 容器擁有共享儲存空間，應用程式在此記錄交易資料。\n\n交易對時間敏感。應用程式內的交易量無法預測。公司必須實作低延遲儲存解決方案，可自動擴展吞吐量以應對增加的需求。公司無法進一步開發應用程式，也無法繼續管理 Docker 託管環境。\n\n公司應如何將應用程式遷移至 AWS 以滿足這些需求？","options":{"A":"將執行應用程式的容器遷移至 Amazon Elastic Kubernetes Service (Amazon EKS)。使用 Amazon S3 儲存容器共享的交易資料。","B":"將執行應用程式的容器遷移至 AWS Fargate for Amazon Elastic Container Service (Amazon ECS)。建立 Amazon Elastic File System (Amazon EFS) 檔案系統。建立 Fargate 任務定義。在任務定義中新增磁碟區，指向 EFS 檔案系統。","C":"將執行應用程式的容器遷移至 AWS Fargate for Amazon Elastic Container Service (Amazon ECS)。建立 Amazon Elastic Block Store (Amazon EBS) 磁碟區。建立 Fargate 任務定義。將 EBS 磁碟區附加至每個執行中的任務。","D":"啟動 Amazon EC2 執行個體。在 EC2 執行個體上安裝 Docker。將容器遷移至 EC2 執行個體。建立 Amazon Elastic File System (Amazon EFS) 檔案系統。為 EC2 執行個體新增 EFS 檔案系統的掛載點。"},"answer":"A"},{"num":356,"stem":"一家公司計畫遷移至 AWS 雲端。公司在 Windows 伺服器和 Linux 伺服器上託管許多應用程式。部分伺服器是實體的，部分是虛擬的。公司在其內部部署環境中使用多種類型的資料庫。公司沒有準確的內部部署伺服器和應用程式清單。\n\n公司希望在遷移期間對資源進行適當調整。解決方案架構師需要取得有關網路連線和應用程式關係的資訊。解決方案架構師必須評估公司目前的環境並制定遷移計畫。\n\n哪個解決方案能為解決方案架構師提供制定遷移計畫所需的資訊？","options":{"A":"使用 Migration Evaluator 向 AWS 請求對環境進行評估。使用 AWS Application Discovery Service Agentless Collector 將詳細資訊匯入 Migration Evaluator Quick Insights 報告。","B":"使用 AWS Migration Hub，並在伺服器上安裝 AWS Application Discovery Agent。部署 Migration Hub Strategy Recommendations 應用程式資料收集器。使用 Migration Hub Strategy Recommendations 產生報告。","C":"使用 AWS Migration Hub，並在伺服器上執行 AWS Application Discovery Service Agentless Collector。使用 AWS Application Migration Service 對伺服器和資料庫進行分組。使用 Migration Hub Strategy Recommendations 產生報告。","D":"使用 AWS Migration Hub 匯入工具載入公司內部部署環境的詳細資訊。使用 Migration Hub Strategy Recommendations 產生報告。"},"answer":"D"},{"num":357,"stem":"一家金融服務公司將其應用程式合規的軟體即服務 (SaaS) 平台銷售給大型全球銀行。SaaS 平台在 AWS 上運作，並使用在 AWS Organizations 組織中管理的多個 AWS 帳戶。SaaS 平台在全球使用許多 AWS 資源。\n\n為符合法規合規要求，所有對 AWS 資源的 API 呼叫必須被稽核、追蹤變更，並儲存在持久且安全的資料存放區中。\n\n哪個解決方案將以最少的操作開銷滿足這些需求？","options":{"A":"建立新的 AWS CloudTrail 追蹤。使用組織管理帳戶中現有的 Amazon S3 儲存貯體來儲存日誌。將追蹤部署至所有 AWS 區域。在 S3 儲存貯體上啟用 MFA 刪除和加密。","B":"在組織的每個成員帳戶中建立新的 AWS CloudTrail 追蹤。建立新的 Amazon S3 儲存貯體以儲存日誌。將追蹤部署至所有 AWS 區域。在 S3 儲存貯體上啟用 MFA 刪除和加密。","C":"在組織的管理帳戶中建立新的 AWS CloudTrail 追蹤。建立已啟用版本控制的新 Amazon S3 儲存貯體以儲存日誌。為組織中的所有帳戶部署追蹤。在 S3 儲存貯體上啟用 MFA 刪除和加密。","D":"在組織的管理帳戶中建立新的 AWS CloudTrail 追蹤。建立新的 Amazon S3 儲存貯體以儲存日誌。配置 Amazon Simple Notification Service (Amazon SNS)，將日誌檔案傳送通知至外部管理系統以追蹤日誌。在 S3 儲存貯體上啟用 MFA 刪除和加密。"},"answer":"C"},{"num":358,"stem":"一家公司正在一批 Amazon EC2 執行個體上部署分散式記憶體內資料庫。這批執行個體由一個主要節點和八個工作節點組成。主要節點負責監控叢集健康狀況、接受使用者請求、將使用者請求分發至工作節點，以及將彙總回應傳送回客戶端。工作節點之間互相通訊以複寫資料分割。\n\n公司需要最低可能的網路延遲以實現最大效能。\n\n哪個解決方案將滿足這些需求？","options":{"A":"在分割放置群組中啟動記憶體最佳化 EC2 執行個體。","B":"在分割放置群組中啟動運算最佳化 EC2 執行個體。","C":"在叢集放置群組中啟動記憶體最佳化 EC2 執行個體。","D":"在分散放置群組中啟動運算最佳化 EC2 執行個體。"},"answer":"C"},{"num":359,"stem":"一家公司在 VM 上的約 100 萬個 .csv 檔案中維護內部部署資訊。資料初始大小為 10 TB，每週增長速度為 1 TB。公司需要將資料自動備份至 AWS 雲端。\n\n資料備份必須每日進行。公司需要一個解決方案，可套用自訂篩選條件，僅備份位於指定來源目錄中的資料子集。公司已設定 AWS Direct Connect 連線。\n\n哪個解決方案將以最少的操作開銷滿足備份需求？","options":{"A":"使用 Amazon S3 CopyObject API 操作搭配多部分上傳，將現有資料複製到 Amazon S3。每日使用 CopyObject API 操作將新資料複製到 Amazon S3。","B":"在 AWS Backup 中建立備份計畫，將資料備份至 Amazon S3。排程備份計畫每日執行。","C":"將 AWS DataSync 代理程式安裝為在內部部署虛擬化程式上執行的 VM。配置 DataSync 任務，每日將資料複寫到 Amazon S3。","D":"使用 AWS Snowball Edge 裝置進行初始備份。每日使用 AWS DataSync 進行增量備份至 Amazon S3。"},"answer":"D"},{"num":360,"stem":"一家金融服務公司擁有一款資產管理產品，全球數千名客戶使用。客戶透過問卷調查提供關於產品的意見回饋。公司正在建立一個在 Amazon EMR 上運作的新分析解決方案，以分析這些問卷的資料。以下使用者角色需要存取分析解決方案以執行不同的操作：\n\n• 管理員：根據團隊需求為分析團隊佈建 EMR 叢集\n• 資料工程師：執行 ETL 腳本以處理、轉換和豐富資料集\n• 資料分析師：在資料上執行 SQL 和 Hive 查詢\n\n解決方案架構師必須確保所有使用者角色對其所需資源具有最低權限存取。使用者角色必須只能啟動已核准和授權的應用程式。解決方案還必須確保對使用者角色建立的所有資源進行標記。\n\n哪個解決方案將滿足這些需求？","options":{"A":"為每個使用者角色建立 IAM 角色。附加以身分識別為基礎的政策，以定義擔任該角色的使用者可執行哪些操作。建立 AWS Config 規則以檢查不合規的資源。配置規則以通知管理員修復不合規的資源。","B":"在 EMR 叢集啟動時設定 Kerberos 型驗證。指定 Kerberos 安全性配置以及叢集特定的 Kerberos 選項。","C":"使用 AWS Service Catalog 控制可用於部署的 Amazon EMR 版本、叢集配置以及每個使用者角色的權限。","D":"使用 AWS CloudFormation 啟動 EMR 叢集。在叢集建立期間，將資源型政策附加至 EMR 叢集。建立 AWS Config 規則以檢查不合規的叢集和不合規的 Amazon S3 儲存貯體。配置規則以通知管理員修復不合規的資源。"},"answer":"A"},{"num":361,"stem":"一家軟體即服務 (SaaS) 公司使用 AWS 來託管一項由 AWS PrivateLink 支援的服務。該服務由在 eu-west-2 區域多個可用區域私有子網路中，位於 Network Load Balancer (NLB) 後方三個 Amazon EC2 執行個體上執行的專有軟體組成。公司的所有客戶都在 eu-west-2。\n\n然而，公司現在在 us-east-1 區域獲得了一個新客戶。公司在 us-east-1 中建立了新的 VPC 和新的子網路。公司在兩個區域的 VPC 之間建立了跨區域 VPC 對等互連。\n\n公司希望讓新客戶存取 SaaS 服務，但不希望立即在 us-east-1 部署新的 EC2 資源。\n\n哪個解決方案將滿足這些需求？","options":{"A":"在 us-east-1 中配置 PrivateLink 端點服務，以使用 eu-west-2 中現有的 NLB。授予特定 AWS 帳戶存取權以連線至 SaaS 服務。","B":"在 us-east-1 中建立 NLB。建立 IP 目標群組，使用位於 eu-west-2 中託管 SaaS 服務之公司執行個體的 IP 位址。配置使用 us-east-1 中 NLB 的 PrivateLink 端點服務。授予特定 AWS 帳戶存取權以連線至 SaaS 服務。","C":"在 eu-west-2 的 EC2 執行個體前方建立 Application Load Balancer (ALB)。在 us-east-1 中建立 NLB。將 us-east-1 中的 NLB 與使用 eu-west-2 中 ALB 的 ALB 目標群組關聯。配置使用 us-east-1 中 NLB 的 PrivateLink 端點服務。授予特定 AWS 帳戶存取權以連線至 SaaS 服務。","D":"使用 AWS Resource Access Manager (AWS RAM) 共享位於 eu-west-2 的 EC2 執行個體。在 us-east-1 中，建立 NLB 和執行個體目標群組，包含來自 eu-west-2 的共享 EC2 執行個體。配置使用 us-east-1 中 NLB 的 PrivateLink 端點服務。授予特定 AWS 帳戶存取權以連線至 SaaS 服務。"},"answer":"D"},{"num":362,"stem":"一家公司需要監控跨兩個 AWS 區域不斷增長的 Amazon S3 儲存貯體數量。公司還需要追蹤 Amazon S3 中已加密物件的百分比。公司需要一個儀表板，向內部合規團隊顯示此資訊。\n\n哪個解決方案將以最少的操作開銷滿足這些需求？","options":{"A":"在每個區域建立新的 S3 Storage Lens 儀表板，以追蹤儲存貯體和加密指標。在 Amazon QuickSight 中將兩個區域儀表板的資料彙總至單一儀表板，供合規團隊使用。","B":"在每個區域部署 AWS Lambda 函數，以列出儲存貯體數量和物件的加密狀態。將此資料儲存在 Amazon S3 中。使用 Amazon Athena 查詢在 Amazon QuickSight 的自訂儀表板中顯示資料，供合規團隊使用。","C":"使用 S3 Storage Lens 預設儀表板追蹤儲存貯體和加密指標。讓合規團隊直接在 S3 主控台存取儀表板。","D":"建立 Amazon EventBridge 規則，以偵測 S3 物件建立的 AWS CloudTrail 事件。配置規則以叫用 AWS Lambda 函數，在 Amazon DynamoDB 中記錄加密指標。使用 Amazon QuickSight 在儀表板中顯示指標，供合規團隊使用。"},"answer":"B"},{"num":363,"stem":"公司的 CISO 要求解決方案架構師重新設計公司目前的 CI/CD 實務，以確保在發現漏洞時能以最短停機時間盡快部署修補程式。公司還必須能夠在發生錯誤時快速回滾變更。\n\nWeb 應用程式部署在 Application Load Balancer 後方的一批 Amazon EC2 執行個體上。公司目前使用 GitHub 託管應用程式原始碼，並配置了 AWS CodeBuild 專案來建置應用程式。公司還打算使用 AWS CodePipeline，以現有的 CodeBuild 專案從 GitHub 提交觸發建置。\n\n哪個 CI/CD 配置滿足所有需求？","options":{"A":"以使用 AWS CodeDeploy 配置就地部署的部署階段配置 CodePipeline。監控新部署的程式碼，如有任何問題，推送另一個程式碼更新。","B":"以使用 AWS CodeDeploy 配置藍/綠部署的部署階段配置 CodePipeline。監控新部署的程式碼，如有任何問題，使用 CodeDeploy 觸發手動回滾。","C":"以使用 AWS CloudFormation 建立測試和生產堆疊管線的部署階段配置 CodePipeline。監控新部署的程式碼，如有任何問題，推送另一個程式碼更新。","D":"以使用 AWS OpsWorks 和就地部署的部署階段配置 CodePipeline。監控新部署的程式碼，如有任何問題，推送另一個程式碼更新。"},"answer":"C"},{"num":364,"stem":"一家公司使用 AWS Organizations 中的組織管理許多 AWS 帳戶。公司中不同業務單位在 Amazon EC2 執行個體上執行應用程式。所有 EC2 執行個體必須擁有 BusinessUnit 標籤，以便公司可以追蹤每個業務單位的成本。\n\n最近的稽核發現部分執行個體缺少此標籤。公司已手動為這些執行個體新增缺少的標籤。\n\n解決方案架構師應採取什麼措施，在未來強制執行標籤需求？","options":{"A":"在組織中啟用標籤政策。為 BusinessUnit 標籤建立標籤政策。確保關閉標籤金鑰大小寫的合規性。為 ec2:instance 資源類型實作標籤政策。將標籤政策附加至組織的根目錄。","B":"在組織中啟用標籤政策。為 BusinessUnit 標籤建立標籤政策。確保開啟標籤金鑰大小寫的合規性。為 ec2:instance 資源類型實作標籤政策。將標籤政策附加至組織的管理帳戶。","C":"建立 SCP 並將其附加至組織的根目錄。在 SCP 中包含以下陳述式：","D":"建立 SCP 並將其附加至組織的管理帳戶。在 SCP 中包含以下陳述式："},"answer":"B"},{"num":365,"stem":"一家公司正在執行由數千個 Amazon EC2 執行個體組成的工作負載。工作負載在包含多個公有子網路和私有子網路的 VPC 中執行。公有子網路具有通往現有網際網路閘道的 0.0.0.0/0 路由。私有子網路具有通往現有 NAT 閘道的 0.0.0.0/0 路由。\n\n解決方案架構師需要將整批 EC2 執行個體遷移至使用 IPv6。私有子網路中的 EC2 執行個體不得可從公共網際網路存取。\n\n解決方案架構師應採取什麼措施來滿足這些需求？","options":{"A":"更新現有 VPC，並將自訂 IPv6 CIDR 區塊與 VPC 和所有子網路關聯。更新所有 VPC 路由表，並為網際網路閘道新增 ::/0 路由。","B":"更新現有 VPC，並將 Amazon 提供的 IPv6 CIDR 區塊與 VPC 和所有子網路關聯。更新所有私有子網路的 VPC 路由表，並為 NAT 閘道新增 ::/0 路由。","C":"更新現有 VPC，並將 Amazon 提供的 IPv6 CIDR 區塊與 VPC 和所有子網路關聯。建立僅輸出網際網路閘道。更新所有私有子網路的 VPC 路由表，並為僅輸出網際網路閘道新增 ::/0 路由。","D":"更新現有 VPC，並將自訂 IPv6 CIDR 區塊與 VPC 和所有子網路關聯。建立新的 NAT 閘道，並啟用 IPv6 支援。更新所有私有子網路的 VPC 路由表，並為已啟用 IPv6 的 NAT 閘道新增 ::/0 路由。"},"answer":"C"},{"num":366,"stem":"一家公司使用 Amazon API Gateway 部署私有 REST API，以提供對敏感資料的存取。API 必須只能從部署在 VPC 中的應用程式存取。公司成功部署了 API，但 API 無法從部署在 VPC 中的 Amazon EC2 執行個體存取。\n\n哪個解決方案將提供 EC2 執行個體與 API 之間的連線？","options":{"A":"為 API Gateway 建立介面 VPC 端點。附加允許 apigateway:* 操作的端點政策。停用 VPC 端點的私有 DNS 命名。配置允許從 VPC 存取的 API 資源政策。使用 VPC 端點的 DNS 名稱存取 API。","B":"為 API Gateway 建立介面 VPC 端點。附加允許 execute-api:Invoke 操作的端點政策。啟用 VPC 端點的私有 DNS 命名。配置允許從 VPC 端點存取的 API 資源政策。使用 API 端點的 DNS 名稱存取 API。","C":"建立 Network Load Balancer (NLB) 和 VPC 連結。在 API Gateway 和 NLB 之間配置私有整合。使用 API 端點的 DNS 名稱存取 API。","D":"建立 Application Load Balancer (ALB) 和 VPC 連結。在 API Gateway 和 ALB 之間配置私有整合。使用 ALB 端點的 DNS 名稱存取 API。"},"answer":"D"},{"num":367,"stem":"一家大型薪資公司最近與一家小型人力派遣公司合併。統一後的公司現在擁有多個業務單位，每個業務單位都有其現有的 AWS 帳戶。\n\n解決方案架構師必須確保公司能夠集中管理所有 AWS 帳戶的帳單和存取政策。解決方案架構師透過從集中式管理帳戶向公司的所有成員帳戶傳送邀請來配置 AWS Organizations。\n\n解決方案架構師接下來應採取什麼措施來滿足這些需求？","options":{"A":"在每個成員帳戶中建立 OrganizationAccountAccess IAM 群組。包含每位管理員所需的 IAM 角色。","B":"在每個成員帳戶中建立 OrganizationAccountAccessPolicy IAM 政策。使用跨帳戶存取將成員帳戶連接至管理帳戶。","C":"在每個成員帳戶中建立 OrganizationAccountAccessRole IAM 角色。授予管理帳戶擔任 IAM 角色的權限。","D":"在管理帳戶中建立 OrganizationAccountAccessRole IAM 角色。將 AdministratorAccess AWS 受管政策附加至 IAM 角色。將 IAM 角色指派給每個成員帳戶中的管理員。"},"answer":"B"},{"num":368,"stem":"一家公司有已容器化並部署在多個具有公共 IP 的 Amazon EC2 執行個體上的應用程式服務。Apache Kafka 叢集已部署至 EC2 執行個體。PostgreSQL 資料庫已遷移至 Amazon RDS for PostgreSQL。公司預期在新版旗艦產品發布時，其平台上的訂單量將大幅增加。\n\n哪些對目前架構的變更將減少操作開銷並支援產品發布？","options":{"A":"在 Application Load Balancer 後方建立 EC2 Auto Scaling 群組。為資料庫執行個體建立額外的讀取複本。建立 Amazon Kinesis 資料串流，並配置應用程式服務使用資料串流。直接從 Amazon S3 儲存和提供靜態內容。","B":"在 Application Load Balancer 後方建立 EC2 Auto Scaling 群組。在 Multi-AZ 模式下部署資料庫執行個體，並啟用儲存自動擴展。建立 Amazon Kinesis 資料串流，並配置應用程式服務使用資料串流。直接從 Amazon S3 儲存和提供靜態內容。","C":"在 Application Load Balancer 後方的 EC2 執行個體上部署以 Kubernetes 叢集建立的應用程式。在 Multi-AZ 模式下部署資料庫執行個體，並啟用儲存自動擴展。建立 Amazon Managed Streaming for Apache Kafka 叢集，並配置應用程式服務使用該叢集。在 Amazon CloudFront 分發後方的 Amazon S3 中儲存靜態內容。","D":"在 Application Load Balancer 後方將應用程式部署在 Amazon Elastic Kubernetes Service (Amazon EKS) with AWS Fargate 上，並啟用自動擴展。為資料庫執行個體建立額外的讀取複本。建立 Amazon Managed Streaming for Apache Kafka 叢集，並配置應用程式服務使用該叢集。在 Amazon CloudFront 分發後方的 Amazon S3 中儲存靜態內容。"},"answer":"A"},{"num":369,"stem":"一家公司在內部部署資料中心託管 VPN。員工目前連線至 VPN 以存取其 Windows 主目錄中的檔案。最近，遠端工作員工人數大幅增長。因此，在業務時間內，連線至資料中心的頻寬使用率開始接近 100%。\n\n公司必須在 AWS 上設計一個解決方案，以支援公司遠端員工的增長、減少連線至資料中心的頻寬使用，並降低操作開銷。\n\n哪種步驟組合將以最少的操作開銷滿足這些需求？（選擇兩個）","options":{"A":"建立 AWS Storage Gateway Volume Gateway。從 Volume Gateway 掛載磁碟區至內部部署檔案伺服器。","B":"將主目錄遷移至 Amazon FSx for Windows File Server。","C":"將主目錄遷移至 Amazon FSx for Lustre。","D":"將遠端使用者遷移至 AWS Client VPN。","E":"建立從內部部署資料中心至 AWS 的 AWS Direct Connect 連線。"},"answer":"BE"},{"num":370,"stem":"一家公司擁有多個 AWS 帳戶。公司最近進行了安全稽核，發現許多未加密的 Amazon Elastic Block Store (Amazon EBS) 磁碟區附加至 Amazon EC2 執行個體。\n\n解決方案架構師必須加密未加密的磁碟區，並確保未來能自動偵測未加密的磁碟區。此外，公司希望一個能以合規和安全為重點，集中管理多個 AWS 帳戶的解決方案。\n\n解決方案架構師應採取哪些步驟組合來滿足這些需求？（選擇兩個）","options":{"A":"在 AWS Organizations 中建立組織。設定 AWS Control Tower，並開啟強烈建議的控制措施 (護欄)。將所有帳戶加入組織。將 AWS 帳戶分類至 OU。","B":"使用 AWS CLI 列出所有 AWS 帳戶中所有未加密的磁碟區。執行腳本就地加密所有未加密的磁碟區。","C":"建立每個未加密磁碟區的快照。從未加密的快照建立新的已加密磁碟區。分離現有磁碟區，並以已加密磁碟區取代。","D":"在 AWS Organizations 中建立組織。設定 AWS Control Tower，並開啟強制性控制措施 (護欄)。將所有帳戶加入組織。將 AWS 帳戶分類至 OU。","E":"開啟 AWS CloudTrail。配置 Amazon EventBridge 規則以偵測並自動加密未加密的磁碟區。"},"answer":"CD"},{"num":371,"stem":"一家公司在 Application Load Balancer (ALB) 後方的 Amazon EC2 執行個體上託管內部網路 Web 應用程式。目前，使用者針對內部使用者資料庫對應用程式進行驗證。\n\n公司需要使用現有的 AWS Directory Service for Microsoft Active Directory 目錄，對應用程式的使用者進行驗證。目錄中所有擁有帳戶的使用者必須能存取應用程式。\n\n哪個解決方案將滿足這些需求？","options":{"A":"在目錄中建立新的應用程式用戶端。為 ALB 建立接聽程式規則。為接聽程式規則指定 authenticate-oidc 動作。以適當的簽發者、用戶端 ID 和密碼，以及 Active Directory 服務的端點詳細資訊配置接聽程式規則。以 ALB 提供的回呼 URL 配置新的應用程式用戶端。","B":"配置 Amazon Cognito 使用者集區。以來自目錄中繼資料的同盟識別提供者 (IdP) 配置使用者集區。建立應用程式用戶端。將應用程式用戶端與使用者集區關聯。為 ALB 建立接聽程式規則。為接聽程式規則指定 authenticate-cognito 動作。配置接聽程式規則以使用使用者集區和應用程式用戶端。","C":"將目錄新增為新的 IAM 識別提供者 (IdP)。建立實體類型為 SAML 2.0 聯合的新 IAM 角色。配置允許存取 ALB 的角色政策。將新角色配置為 IdP 的預設已驗證使用者角色。為 ALB 建立接聽程式規則。為接聽程式規則指定 authenticate-oidc 動作。","D":"啟用 AWS IAM Identity Center (AWS Single Sign-On)。將目錄配置為使用 SAML 的外部識別提供者 (IdP)。使用自動佈建方法。建立實體類型為 SAML 2.0 聯合的新 IAM 角色。配置允許存取 ALB 的角色政策。將新角色附加至所有群組。為 ALB 建立接聽程式規則。為接聽程式規則指定 authenticate-cognito 動作。"},"answer":"C"},{"num":372,"stem":"一家公司有一個服務許多訪客的網站。公司在主要 AWS 區域和災難復原 (DR) 區域部署後端服務。\n\n單一 Amazon CloudFront 分發部署於網站。公司為主要區域的後端服務建立具有健康狀態檢查和容錯移轉路由政策的 Amazon Route 53 記錄集。公司將 Route 53 記錄集配置為 CloudFront 分發的來源。公司配置另一個指向 DR 區域後端服務端點的記錄集作為次要容錯移轉記錄類型。兩個記錄集的 TTL 均為 60 秒。\n\n目前容錯移轉需要超過 1 分鐘。解決方案架構師必須設計一個能提供最快容錯移轉時間的解決方案。\n\n哪個解決方案將實現此目標？","options":{"A":"部署額外的 CloudFront 分發。為兩個 CloudFront 分發建立帶有健康狀態檢查的新 Route 53 容錯移轉記錄集。","B":"將用於每個區域後端服務的現有 Route 53 記錄集的 TTL 設為 4 秒。","C":"使用延遲路由政策為後端服務建立新的記錄集。使用記錄集作為 CloudFront 分發中的來源。","D":"建立包含兩個來源的 CloudFront 來源群組，每個後端服務區域各一個。將來源容錯移轉配置為 CloudFront 分發的快取行為。"},"answer":"B"},{"num":373,"stem":"一家公司使用多個 AWS 帳戶，並有多個 DevOps 團隊在這些帳戶中執行生產和非生產工作負載。公司希望集中限制對 DevOps 團隊不使用的某些 AWS 服務的存取。公司決定使用 AWS Organizations，並成功將所有 AWS 帳戶邀請加入組織。他們希望允許存取目前使用中的服務，並拒絕少數特定服務。此外，他們希望將多個帳戶作為單一單位一起管理。\n\n解決方案架構師應採取哪些步驟組合來滿足這些需求？（選擇三個）","options":{"A":"使用拒絕清單策略。","B":"審查 AWS IAM 中的 Access Advisor，以確定最近使用的服務。","C":"審查 AWS Trusted Advisor 報告，以確定最近使用的服務。","D":"移除預設的 FullAWSAccess SCP。","E":"定義組織單位 (OU)，並將成員帳戶放置在 OU 中。","F":"移除預設的 DenyAWSAccess SCP。"},"answer":"CDF"},{"num":374,"stem":"一家現場活動公司正在為其在 AWS 上的票務應用程式設計擴展解決方案。應用程式在銷售活動期間使用率峰值很高。每次銷售活動都是一次性排程活動。應用程式在 Auto Scaling 群組中的 Amazon EC2 執行個體上執行。應用程式使用 PostgreSQL 作為資料庫層。\n\n公司需要一個在銷售活動期間最大化可用性的擴展解決方案。\n\n哪個解決方案將滿足這些需求？","options":{"A":"對 EC2 執行個體使用預測性擴展政策。在具有自動擴展讀取複本的 Amazon Aurora PostgreSQL Serverless v2 Multi-AZ 資料庫執行個體上託管資料庫。建立 AWS Step Functions 狀態機以執行平行 AWS Lambda 函數，在銷售活動前預熱資料庫。建立 Amazon EventBridge 規則以叫用狀態機。","B":"對 EC2 執行個體使用排程擴展政策。在具有自動擴展讀取複本的 Amazon RDS for PostgreSQL Multi-AZ 資料庫執行個體上託管資料庫。建立 Amazon EventBridge 規則，叫用 AWS Lambda 函數在銷售活動前建立較大的讀取複本。容錯移轉至較大的讀取複本。建立另一個 EventBridge 規則，叫用另一個 Lambda 函數在銷售活動後縮減讀取複本。","C":"對 EC2 執行個體使用預測性擴展政策。在具有自動擴展讀取複本的 Amazon RDS for PostgreSQL Multi-AZ 資料庫執行個體上託管資料庫。建立 AWS Step Functions 狀態機以執行平行 AWS Lambda 函數，在銷售活動前預熱資料庫。建立 Amazon EventBridge 規則以叫用狀態機。","D":"對 EC2 執行個體使用排程擴展政策。在 Amazon Aurora PostgreSQL Multi-AZ 資料庫叢集上託管資料庫。建立 Amazon EventBridge 規則，叫用 AWS Lambda 函數在銷售活動前建立較大的 Aurora 複本。容錯移轉至較大的 Aurora 複本。建立另一個 EventBridge 規則，叫用另一個 Lambda 函數在銷售活動後縮減 Aurora 複本。"},"answer":"B"},{"num":375,"stem":"一家公司在內部部署執行內部網路應用程式。公司希望配置應用程式的雲端備份。公司已選擇 AWS Elastic Disaster Recovery 作為此解決方案。\n\n公司要求複寫流量不得通過公共網際網路傳輸。應用程式也不得可從網際網路存取。公司不希望此解決方案消耗所有可用的網路頻寬，因為其他應用程式也需要頻寬。\n\n哪些步驟組合將滿足這些需求？（選擇三個）","options":{"A":"建立至少有兩個私有子網路、兩個 NAT 閘道和一個虛擬私有閘道的 VPC。","B":"建立至少有兩個公有子網路、一個虛擬私有閘道和一個網際網路閘道的 VPC。","C":"在內部部署網路和目標 AWS 網路之間建立 AWS Site-to-Site VPN 連線。","D":"在內部部署網路和目標 AWS 網路之間建立 AWS Direct Connect 連線和 Direct Connect 閘道。","E":"在配置複寫伺服器時，選擇使用私有 IP 位址進行資料複寫的選項。","F":"在配置目標伺服器的啟動設定時，選擇確保復原執行個體的私有 IP 位址與來源伺服器的私有 IP 位址相符的選項。"},"answer":"AEF"},{"num":376,"stem":"一家提供圖片儲存服務的公司希望在 AWS 上部署一個面向客戶的解決方案。數百萬個別客戶將使用該解決方案。該解決方案將接收大批量的大型圖片檔案，調整檔案大小，並將檔案儲存在 Amazon S3 儲存桶中最多 6 個月。\n該解決方案必須能夠處理顯著的需求波動。該解決方案還必須在企業規模上具備可靠性，並能夠在發生故障時重新執行處理工作。\n哪種解決方案能以最具成本效益的方式滿足這些要求？","options":{"A":"使用 AWS Step Functions 處理使用者儲存圖片時發生的 S3 事件。執行 AWS Lambda 函數來就地調整圖片大小並取代 S3 儲存桶中的原始檔案。建立 S3 Lifecycle 到期政策，使所有儲存的圖片在 6 個月後到期。","B":"使用 Amazon EventBridge 處理使用者上傳圖片時發生的 S3 事件。執行 AWS Lambda 函數來就地調整圖片大小並取代 S3 儲存桶中的原始檔案。建立 S3 Lifecycle 到期政策，使所有儲存的圖片在 6 個月後到期。","C":"使用 S3 Event Notifications 在使用者儲存圖片時叫用 AWS Lambda 函數。使用 Lambda 函數就地調整圖片大小，並將原始檔案儲存在 S3 儲存桶中。建立 S3 Lifecycle 政策，將所有儲存的圖片在 6 個月後移至 S3 Standard-Infrequent Access (S3 Standard-IA)。","D":"使用 Amazon Simple Queue Service (Amazon SQS) 處理使用者儲存圖片時發生的 S3 事件。執行 AWS Lambda 函數調整圖片大小，並將調整後的檔案儲存在使用 S3 Standard-Infrequent Access (S3 Standard-IA) 的 S3 儲存桶中。建立 S3 Lifecycle 政策，將所有儲存的圖片在 6 個月後移至 S3 Glacier Deep Archive。"},"answer":"D"},{"num":377,"stem":"一家公司在 AWS Organizations 中有一個組織，其中每個部門都有獨立的 AWS 帳戶。來自不同部門的應用程式團隊各自獨立開發和部署解決方案。\n該公司希望降低運算成本，並在各部門之間適當管理成本。公司還希望提高各部門帳單的可見性。公司在選擇運算資源時不希望失去操作靈活性。\n哪種解決方案能夠滿足這些要求？","options":{"A":"為每個部門使用 AWS Budgets。使用 Tag Editor 對適當的資源套用標籤。購買 EC2 Instance Savings Plans。","B":"配置 AWS Organizations 使用整合帳單。實施可識別部門的標籤策略。使用 SCP 對適當的資源套用標籤。購買 EC2 Instance Savings Plans。","C":"配置 AWS Organizations 使用整合帳單。實施可識別部門的標籤策略。使用 Tag Editor 對適當的資源套用標籤。購買 Compute Savings Plans。","D":"為每個部門使用 AWS Budgets。使用 SCP 對適當的資源套用標籤。購買 Compute Savings Plans。"},"answer":"C"},{"num":378,"stem":"一家公司有一個網路應用程式，可以安全地將圖片和影片上傳至 Amazon S3 儲存桶。公司要求只允許經過驗證的使用者發布內容。應用程式會產生一個預簽名 URL，用於通過瀏覽器介面上傳物件。大多數使用者在上傳超過 100 MB 的物件時回報上傳速度緩慢。\n解決方案架構師可以採取什麼措施來提高這些上傳的效能，同時確保只有經過驗證的使用者才能發布內容？","options":{"A":"設定一個具有邊緣優化 API 端點的 Amazon API Gateway，並以 S3 服務代理作為資源。為此資源配置 PUT 方法以公開 S3 PutObject 操作。使用 COGNITO_USER_POOLS 授權器保護 API Gateway。讓瀏覽器介面使用 API Gateway 而非預簽名 URL 來上傳物件。","B":"設定一個具有區域 API 端點的 Amazon API Gateway，並以 S3 服務代理作為資源。為此資源配置 PUT 方法以公開 S3 PutObject 操作。使用 AWS Lambda 授權器保護 API Gateway。讓瀏覽器介面使用 API Gateway 而非預簽名 URL 來上傳物件。","C":"在 S3 儲存桶上啟用 S3 Transfer Acceleration 端點。在產生預簽名 URL 時使用該端點。讓瀏覽器介面使用 S3 分段上傳 API 將物件上傳至此 URL。","D":"為目標 S3 儲存桶配置 Amazon CloudFront 發佈。為 CloudFront 快取行為啟用 PUT 和 POST 方法。將 CloudFront 來源更新為使用來源存取身分 (OAI)。在儲存桶政策中授予 OAI 使用者 s3:PutObject 權限。讓瀏覽器介面使用 CloudFront 發佈上傳物件。"},"answer":"B"},{"num":379,"stem":"一家大型公司正在將其整個 IT 資產組合遷移至 AWS。公司中的每個業務單位都有一個獨立的 AWS 帳戶，支援開發和測試環境。支援生產工作負載的新帳戶很快就會需要。\n財務部門需要集中付款方式，但必須維持對每個群組支出的可見性以分配成本。安全團隊需要一個集中機制來控制公司所有帳戶中的 IAM 使用情況。\n以下哪種組合能以最少的工作量滿足公司的需求？(選擇兩個)","options":{"A":"使用一套參數化的 AWS CloudFormation 範本，定義通用的 IAM 權限，並將其部署至每個帳戶。要求所有新帳戶和現有帳戶啟動適當的堆疊以強制執行最小權限模型。","B":"使用 AWS Organizations 從選定的付款帳戶建立新組織，並定義組織單位階層。邀請現有帳戶加入組織，並使用 Organizations 建立新帳戶。","C":"要求每個業務單位使用自己的 AWS 帳戶。適當標記每個 AWS 帳戶，並啟用 Cost Explorer 來管理費用回收。","D":"啟用 AWS Organizations 的所有功能，並建立適當的服務控制政策，以過濾子帳戶的 IAM 權限。","E":"將公司所有的 AWS 帳戶整合至單一 AWS 帳戶。使用標籤進行計費，並使用 IAM 的 Access Advisor 功能強制執行最小權限模型。"},"answer":"AB"},{"num":380,"stem":"一家公司有一個解決方案，用於分析來自數千個氣象站的天氣數據。氣象站通過具有 AWS Lambda 函數整合的 Amazon API Gateway REST API 傳送數據。Lambda 函數呼叫第三方服務進行數據預處理。第三方服務過載並導致預處理失敗，造成數據遺失。\n解決方案架構師必須提高解決方案的韌性。解決方案架構師必須確保不會遺失任何數據，並且在發生故障時可以稍後處理數據。\n解決方案架構師應採取什麼措施來滿足這些要求？","options":{"A":"建立 Amazon Simple Queue Service (Amazon SQS) 佇列。將該佇列配置為 API 的死信佇列。","B":"建立兩個 Amazon Simple Queue Service (Amazon SQS) 佇列：主要佇列和次要佇列。將次要佇列配置為主要佇列的死信佇列。更新 API 以使用新的整合連接至主要佇列。將 Lambda 函數配置為主要佇列的叫用目標。","C":"建立兩個 Amazon EventBridge 事件匯流排：主要事件匯流排和次要事件匯流排。更新 API 以使用新的整合連接至主要事件匯流排。配置 EventBridge 規則以回應主要事件匯流排上的所有事件。將 Lambda 函數指定為規則的目標。將次要事件匯流排配置為 Lambda 函數的失敗目的地。","D":"建立自訂的 Amazon EventBridge 事件匯流排。將事件匯流排配置為 Lambda 函數的失敗目的地。"},"answer":"B"},{"num":381,"stem":"一家公司在 AWS 上使用三層網路架構建立了電子商務網站。應用程式以 Java 為基礎，由 Amazon CloudFront 發佈、Auto Scaling 群組中的 Apache 網路伺服器層 Amazon EC2 執行個體，以及後端 Amazon Aurora MySQL 資料庫組成。\n上個月，在一次促銷活動期間，使用者在將商品加入購物車時回報錯誤和逾時。營運團隊收集了網路伺服器建立的日誌，並檢閱了 Aurora DB 叢集的效能指標。部分網路伺服器在收集日誌之前就已終止，且 Aurora 指標不足以進行查詢效能分析。\n解決方案架構師必須採取哪些步驟組合，以改善尖峰流量事件期間的應用程式效能可見性？(選擇三個)","options":{"A":"配置 Aurora MySQL DB 叢集，將慢速查詢和錯誤日誌發布至 Amazon CloudWatch Logs。","B":"實施 AWS X-Ray SDK 以追蹤 EC2 執行個體上的傳入 HTTP 請求，並使用 AWS X-Ray SDK for Java 追蹤 SQL 查詢。","C":"配置 Aurora MySQL DB 叢集，將慢速查詢和錯誤日誌串流至 Amazon Kinesis。","D":"在 EC2 執行個體上安裝並配置 Amazon CloudWatch Logs 代理程式，將 Apache 日誌傳送至 CloudWatch Logs。","E":"啟用並配置 AWS CloudTrail，以收集和分析來自 Amazon EC2 和 Aurora 的應用程式活動。","F":"啟用 Aurora MySQL DB 叢集效能基準測試，並將串流發布至 AWS X-Ray。"},"answer":"AEF"},{"num":382,"stem":"一家為季節性勞動力提供求職公告板的公司正在看到流量和使用量的增加。後端服務在一對 Amazon EC2 執行個體上執行，並置於 Application Load Balancer 後方，使用 Amazon DynamoDB 作為資料存放區。應用程式的讀取和寫入流量在旺季期間速度緩慢。\n哪個選項能以最少的開發工作量提供可擴展的應用程式架構來處理旺季？","options":{"A":"將後端服務遷移至 AWS Lambda。提高 DynamoDB 的讀取和寫入容量。","B":"將後端服務遷移至 AWS Lambda。配置 DynamoDB 使用全域資料表。","C":"為後端服務使用 Auto Scaling 群組。使用 DynamoDB 自動擴展。","D":"為後端服務使用 Auto Scaling 群組。使用 Amazon Simple Queue Service (Amazon SQS) 和 AWS Lambda 函數寫入 DynamoDB。"},"answer":"B"},{"num":383,"stem":"一家公司正在遷移至雲端。公司希望評估其現有資料中心環境中虛擬機器的配置，以確保能夠準確調整新 Amazon EC2 執行個體的大小。公司希望收集 CPU、記憶體和磁碟使用率等指標，並需要每個執行個體上正在執行哪些程序的清單。公司還希望監控網路連線以繪製伺服器之間的通訊對應。\n哪種方式能以最具成本效益的方式收集此數據？","options":{"A":"使用 AWS Application Discovery Service，並將數據收集代理程式部署至資料中心的每個虛擬機器。","B":"在本地環境中所有伺服器上配置 Amazon CloudWatch 代理程式，並將指標發布至 Amazon CloudWatch Logs。","C":"使用 AWS Application Discovery Service，並在現有虛擬化環境中啟用無代理程式探索。","D":"在 AWS Management Console 中啟用 AWS Application Discovery Service，並配置公司防火牆以允許透過 VPN 進行掃描。"},"answer":"D"},{"num":384,"stem":"一家公司提供在 AWS Cloud 中執行的軟體即服務 (SaaS) 應用程式。應用程式在 Network Load Balancer (NLB) 後方的 Amazon EC2 執行個體上執行。執行個體位於 Auto Scaling 群組中，分布在單一 AWS 區域的三個可用區域中。\n該公司正在將應用程式部署至其他區域。公司必須為應用程式向客戶提供靜態 IP 位址，以便客戶可以將 IP 位址加入允許清單。解決方案必須自動將客戶路由至地理位置最接近他們的區域。\n哪種解決方案能夠滿足這些要求？","options":{"A":"建立 Amazon CloudFront 發佈。建立 CloudFront 來源群組。將每個其他區域的 NLB 加入來源群組。向客戶提供發佈邊緣位置的 IP 位址範圍。","B":"建立 AWS Global Accelerator 標準加速器。為每個其他區域中的 NLB 建立標準加速器端點。向客戶提供 Global Accelerator IP 位址。","C":"建立 Amazon CloudFront 發佈。為每個其他區域中的 NLB 建立自訂來源。向客戶提供發佈邊緣位置的 IP 位址範圍。","D":"建立 AWS Global Accelerator 自訂路由加速器。為自訂路由加速器建立監聽器。為每個其他區域中的 NLB 加入 IP 位址和連接埠。向客戶提供 Global Accelerator IP 位址。"},"answer":"C"},{"num":385,"stem":"一家公司在 AWS Cloud 中執行多個工作負載。公司為軟體開發設置了獨立的單位。公司使用 AWS Organizations 和 SAML 聯合來給予開發人員在其 AWS 帳戶中管理資源的權限。各開發單位將其生產工作負載部署至共用的生產帳戶。\n最近，生產帳戶發生了一起事件，某開發單位的成員終止了屬於另一個開發單位的 EC2 執行個體。解決方案架構師必須建立一個解決方案，防止未來發生類似事件。該解決方案還必須允許開發人員管理其工作負載所使用的執行個體。\n哪種策略能夠滿足這些要求？","options":{"A":"在 AWS Organizations 中為每個開發單位建立獨立的 OU。將建立的 OU 指派至公司 AWS 帳戶。建立具有拒絕動作和 StringNotEquals 條件的獨立 SCP，條件針對與開發單位名稱相符的 DevelopmentUnit 資源標籤。將 SCP 指派至對應的 OU。","B":"在 SAML 聯合期間，將 DevelopmentUnit 屬性作為 AWS Security Token Service (AWS STS) 工作階段標籤傳遞。使用拒絕動作以及針對 DevelopmentUnit 資源標籤和 aws:PrincipalTag/DevelopmentUnit 的 StringNotEquals 條件，更新開發人員所假設 IAM 角色的 IAM 政策。","C":"在 SAML 聯合期間，將 DevelopmentUnit 屬性作為 AWS Security Token Service (AWS STS) 工作階段標籤傳遞。建立具有允許動作和針對 DevelopmentUnit 資源標籤及 aws:PrincipalTag/DevelopmentUnit 的 StringEquals 條件的 SCP。將 SCP 指派至根 OU。","D":"為每個開發單位建立獨立的 IAM 政策。對於每個 IAM 政策，加入允許動作和針對 DevelopmentUnit 資源標籤及開發單位名稱的 StringEquals 條件。在 SAML 聯合期間，使用 AWS Security Token Service (AWS STS) 指派 IAM 政策，並將開發單位名稱與所假設的 IAM 角色相符。"},"answer":"B"},{"num":386,"stem":"一家企業公司正在為其使用者建立基礎設施服務平台。公司有以下要求：\n• 在使用者啟動 AWS 基礎設施時提供最小權限存取，使使用者無法佈建未經核准的服務。\n• 使用集中帳戶管理基礎設施服務的建立。\n• 提供將基礎設施服務分發至 AWS Organizations 中多個帳戶的能力。\n• 提供對使用者啟動的任何基礎設施強制執行標籤的能力。\n使用 AWS 服務的哪些動作組合能夠滿足這些要求？(選擇三個)","options":{"A":"使用 AWS CloudFormation 範本開發基礎設施服務。將範本加入集中的 Amazon S3 儲存桶，並將需要存取的 IAM 角色或使用者加入 S3 儲存桶政策。","B":"使用 AWS CloudFormation 範本開發基礎設施服務。將每個範本作為 AWS Service Catalog 產品上傳至集中 AWS 帳戶中建立的產品組合。與為公司建立的 Organizations 結構共享這些產品組合。","C":"允許使用者 IAM 角色擁有 AWSCloudFormationFullAccess 和 AmazonS3ReadOnlyAccess 權限。在 AWS 帳戶根使用者層級加入 Organizations SCP，以拒絕除 AWS CloudFormation 和 Amazon S3 以外的所有服務。","D":"僅允許使用者 IAM 角色擁有 ServiceCatalogEndUserAccess 權限。使用自動化腳本將集中產品組合匯入本地 AWS 帳戶、複製 TagOption、指派使用者存取權，並套用啟動限制。","E":"使用 AWS Service Catalog TagOption Library 維護公司所需的標籤清單。將 TagOption 套用至 AWS Service Catalog 產品或產品組合。 F. 使用 AWS CloudFormation Resource Tags 屬性，強制對將為使用者建立的任何 CloudFormation 範本套用標籤。"},"answer":"BDE"},{"num":387,"stem":"一家公司部署了新的網路應用程式。作為設定的一部分，公司配置 AWS WAF 透過 Amazon Kinesis Data Firehose 記錄至 Amazon S3。公司開發了一個 Amazon Athena 查詢，每天執行一次，以返回前 24 小時的 AWS WAF 日誌數據。每日日誌量是固定的。然而，隨著時間推移，相同的查詢需要越來越長的時間才能執行。\n解決方案架構師需要設計一個解決方案，防止查詢時間繼續增加。解決方案必須最小化操作負擔。\n哪種解決方案能夠滿足這些要求？","options":{"A":"建立 AWS Lambda 函數，將每天的 AWS WAF 日誌整合成一個日誌檔案。","B":"通過配置 AWS WAF 每天將日誌傳送至不同的 S3 儲存桶，來減少掃描的數據量。","C":"更新 Kinesis Data Firehose 配置，以按日期和時間對 Amazon S3 中的數據進行分區。為 Amazon Redshift 建立外部資料表。配置 Amazon Redshift Spectrum 來查詢數據來源。","D":"修改 Kinesis Data Firehose 配置和 Athena 資料表定義，以按日期和時間對數據進行分區。更改 Athena 查詢以檢視相關分區。"},"answer":"D"},{"num":388,"stem":"一家公司正在 AWS 上開發網路應用程式，該應用程式在 Auto Scaling 群組中的 Amazon EC2 執行個體上執行，並置於面向公眾的 Application Load Balancer (ALB) 後方。只有來自特定國家的使用者才被允許存取應用程式。公司需要能夠記錄已被封鎖的存取請求。解決方案應要求盡可能少的維護。\n哪種解決方案能夠滿足這些要求？","options":{"A":"建立包含屬於指定國家的 IP 範圍清單的 IPSet。建立 AWS WAF web ACL。配置規則以封鎖任何不來自 IPSet 中 IP 範圍的請求。將規則與 web ACL 關聯。將 web ACL 與 ALB 關聯。","B":"建立 AWS WAF web ACL。配置規則以封鎖任何不來自指定國家的請求。將規則與 web ACL 關聯。將 web ACL 與 ALB 關聯。","C":"配置 AWS Shield 以封鎖任何不來自指定國家的請求。將 AWS Shield 與 ALB 關聯。","D":"建立安全群組規則，允許來自屬於指定國家的 IP 範圍的連接埠 80 和 443。將安全群組與 ALB 關聯。"},"answer":"C"},{"num":389,"stem":"一家公司正在將應用程式從內部部署基礎設施遷移至 AWS Cloud。在遷移設計會議期間，公司表達了對其舊版 Windows 檔案伺服器的可用性和復原選項的擔憂。檔案伺服器包含敏感的業務關鍵數據，在數據損壞或遺失的情況下無法重新建立。根據合規要求，數據不得通過公共網際網路傳輸。公司希望盡可能遷移至 AWS 受管服務。\n公司決定將數據儲存在 Amazon FSx for Windows File Server 檔案系統中。解決方案架構師必須設計一個解決方案，將數據複製到另一個 AWS 區域以用於災難復原 (DR) 目的。\n哪種解決方案能夠滿足這些要求？","options":{"A":"在 DR 區域建立目標 Amazon S3 儲存桶。使用 Amazon FSx File Gateway 建立主要區域中 FSx for Windows File Server 檔案系統與 DR 區域中 S3 儲存桶之間的連接。在 FSx File Gateway 中將 S3 儲存桶配置為持續備份來源。","B":"在 DR 區域建立 FSx for Windows File Server 檔案系統。使用 AWS Site-to-Site VPN 建立主要區域 VPC 與 DR 區域 VPC 之間的連接。配置 AWS DataSync 使用 VPN 端點進行通訊。","C":"在 DR 區域建立 FSx for Windows File Server 檔案系統。使用 VPC 對等互連建立主要區域 VPC 與 DR 區域 VPC 之間的連接。配置 AWS DataSync 使用帶有 AWS PrivateLink 的界面 VPC 端點進行通訊。","D":"在 DR 區域建立 FSx for Windows File Server 檔案系統。使用每個區域中的 AWS Transit Gateway 建立主要區域 VPC 與 DR 區域 VPC 之間的連接。使用 AWS Transfer Family 通過私有 AWS 骨幹網路在主要區域的 FSx for Windows File Server 檔案系統與 DR 區域的 FSx for Windows File Server 檔案系統之間複製檔案。"},"answer":"C"},{"num":390,"stem":"一家公司目前處於應用程式設計階段，該應用程式需要低於 5 分鐘的 RPO 和低於 10 分鐘的 RTO。解決方案架構團隊預測資料庫將儲存大約 10 TB 的數據。作為設計的一部分，他們正在尋找一個資料庫解決方案，為公司提供容錯移轉至次要區域的能力。\n哪種解決方案能以最低成本滿足這些業務要求？","options":{"A":"部署 Amazon Aurora DB 叢集，每 5 分鐘對叢集進行一次快照。快照完成後，將快照複製到次要區域，作為發生故障時的備份。","B":"部署具有次要區域跨區域唯讀複本的 Amazon RDS 執行個體。在發生故障時，將唯讀複本提升為主要執行個體。","C":"在主要區域部署 Amazon Aurora DB 叢集，在次要區域部署另一個。使用 AWS DMS 保持次要區域同步。","D":"部署具有相同區域唯讀複本的 Amazon RDS 執行個體。在發生故障時，將唯讀複本提升為主要執行個體。"},"answer":"B"},{"num":391,"stem":"一家金融公司需要為新的數位錢包應用程式建立獨立的 AWS 帳戶。公司使用 AWS Organizations 管理其帳戶。解決方案架構師使用管理帳戶中的 IAM 使用者 Support1，以 finance1@example.com 作為電子郵件地址建立了一個新的成員帳戶。\n解決方案架構師應採取什麼措施在新成員帳戶中建立 IAM 使用者？","options":{"A":"使用 AWS Organizations 初始電子郵件傳送至 finance1@example.com 的 64 個字元密碼，以 AWS 帳戶根使用者憑證登入 AWS Management Console。根據需要設定 IAM 使用者。","B":"從管理帳戶切換角色，以新成員帳戶的帳戶 ID 假設 OrganizationAccountAccessRole 角色。根據需要設定 IAM 使用者。","C":"前往 AWS Management Console 登入頁面。選擇「使用根帳戶憑證登入」。使用電子郵件地址 finance1@example.com 和管理帳戶的根密碼登入。根據需要設定 IAM 使用者。","D":"前往 AWS Management Console 登入頁面。使用新成員帳戶的帳戶 ID 和 Support1 IAM 憑證登入。根據需要設定 IAM 使用者。"},"answer":"A"},{"num":392,"stem":"一家汽車租賃公司建立了無伺服器 REST API 來為其行動應用程式提供數據。應用程式由具有區域端點的 Amazon API Gateway API、AWS Lambda 函數和 Amazon Aurora MySQL Serverless DB 叢集組成。公司最近向合作夥伴的行動應用程式開放了 API。請求數量的顯著增加導致了偶發性的資料庫記憶體錯誤。\n對 API 流量的分析表明，客戶端在短時間內對相同查詢發出多個 HTTP GET 請求。流量集中在上班時間，在節假日和其他事件前後出現尖峰。\n公司需要提高支援額外使用量的能力，同時最小化與解決方案相關的成本增加。\n哪種策略能夠滿足這些要求？","options":{"A":"將 API Gateway 區域端點轉換為邊緣優化端點。在生產環境中啟用快取。","B":"實施 Amazon ElastiCache for Redis 快取來儲存資料庫呼叫的結果。修改 Lambda 函數以使用快取。","C":"修改 Aurora Serverless DB 叢集配置以增加最大可用記憶體量。","D":"在 API Gateway 生產環境中啟用節流。設定速率和突發值以限制傳入呼叫。"},"answer":"C"},{"num":393,"stem":"一家公司正在將內部部署應用程式和 MySQL 資料庫遷移至 AWS。應用程式處理高度敏感的數據，並且資料庫中的新數據會持續更新。數據不得通過網際網路傳輸。公司還必須對傳輸中和靜態的數據進行加密。\n資料庫大小為 5 TB。公司已經在 Amazon RDS for MySQL DB 執行個體中建立了資料庫結構描述。公司已設定 1 Gbps AWS Direct Connect 連線至 AWS。公司還設定了公共 VIF 和私有 VIF。解決方案架構師需要設計一個以最少停機時間將數據遷移至 AWS 的解決方案。\n哪種解決方案能夠滿足這些要求？","options":{"A":"執行資料庫備份。將備份檔案複製至 AWS Snowball Edge Storage Optimized 裝置。將備份匯入 Amazon S3。使用 Amazon S3 受管加密金鑰的伺服器端加密 (SSE-S3) 進行靜態加密。使用 TLS 進行傳輸中加密。將數據從 Amazon S3 匯入 DB 執行個體。","B":"使用 AWS Database Migration Service (AWS DMS) 將數據遷移至 AWS。在私有子網路中建立 DMS 複寫執行個體。為 AWS DMS 建立 VPC 端點。配置 DMS 任務，使用完整載入加上異動數據擷取 (CDC) 將數據從內部部署資料庫複製至 DB 執行個體。使用 AWS Key Management Service (AWS KMS) 預設金鑰進行靜態加密。使用 TLS 進行傳輸中加密。","C":"執行資料庫備份。使用 AWS DataSync 將備份檔案傳輸至 Amazon S3。使用 Amazon S3 受管加密金鑰的伺服器端加密 (SSE-S3) 進行靜態加密。使用 TLS 進行傳輸中加密。將數據從 Amazon S3 匯入 DB 執行個體。","D":"使用 Amazon S3 File Gateway。使用 AWS PrivateLink 設定至 Amazon S3 的私有連線。執行資料庫備份。將備份檔案複製至 Amazon S3。使用 Amazon S3 受管加密金鑰的伺服器端加密 (SSE-S3) 進行靜態加密。使用 TLS 進行傳輸中加密。將數據從 Amazon S3 匯入 DB 執行個體。"},"answer":"C"},{"num":394,"stem":"一家公司正在 AWS 上為大數據分析部署新叢集。叢集將跨多個分布在多個可用區域的 Linux Amazon EC2 執行個體執行。\n叢集中的所有節點必須對通用底層檔案儲存具有讀取和寫入存取權。檔案儲存必須高度可用、具有韌性、與可攜式作業系統介面 (POSIX) 相容，並能容納高水準的吞吐量。\n哪種儲存解決方案能夠滿足這些要求？","options":{"A":"佈建連接至 Amazon S3 儲存桶的 AWS Storage Gateway 檔案閘道 NFS 檔案共用。在叢集中的每個 EC2 執行個體上掛載 NFS 檔案共用。","B":"佈建使用一般用途效能模式的新 Amazon Elastic File System (Amazon EFS) 檔案系統。在叢集中的每個 EC2 執行個體上掛載 EFS 檔案系統。","C":"佈建使用 io2 磁碟區類型的新 Amazon Elastic Block Store (Amazon EBS) 磁碟區。將 EBS 磁碟區連接至叢集中的所有 EC2 執行個體。","D":"佈建使用 Max I/O 效能模式的新 Amazon Elastic File System (Amazon EFS) 檔案系統。在叢集中的每個 EC2 執行個體上掛載 EFS 檔案系統。"},"answer":"D"},{"num":395,"stem":"一家公司在 AWS 上託管軟體即服務 (SaaS) 解決方案。該解決方案具有 Amazon API Gateway API，提供 HTTPS 端點服務。API 使用 AWS Lambda 函數進行運算。Lambda 函數將數據儲存在 Amazon Aurora Serverless v1 資料庫中。公司使用 AWS Serverless Application Model (AWS SAM) 部署了解決方案。解決方案跨多個可用區域，沒有災難復原 (DR) 計劃。\n解決方案架構師必須設計一個可以在另一個 AWS 區域中復原解決方案的 DR 策略。解決方案的 RTO 為 5 分鐘，RPO 為 1 分鐘。\n解決方案架構師應採取什麼措施來滿足這些要求？","options":{"A":"在目標區域建立 Aurora Serverless v1 資料庫的唯讀複本。使用 AWS SAM 建立操作手冊，將解決方案部署至目標區域。在發生災難時將唯讀複本提升為主要執行個體。","B":"將 Aurora Serverless v1 資料庫更改為跨來源區域和目標區域的標準 Aurora MySQL 全域資料庫。使用 AWS SAM 建立操作手冊，將解決方案部署至目標區域。","C":"在目標區域建立具有多個寫入器執行個體的 Aurora Serverless v1 DB 叢集。在目標區域啟動解決方案。配置兩個區域解決方案以主動-被動配置運作。","D":"將 Aurora Serverless v1 資料庫更改為跨來源區域和目標區域的標準 Aurora MySQL 全域資料庫。在目標區域啟動解決方案。配置兩個區域解決方案以主動-被動配置運作。"},"answer":"B"},{"num":396,"stem":"一家公司擁有一家旅行社連鎖店，並在 AWS Cloud 中執行一個應用程式。公司員工使用該應用程式搜尋旅遊目的地的資訊。目的地內容每年更新四次。\n兩個固定的 Amazon EC2 執行個體為應用程式提供服務。公司使用帶有 travel.example.com 多值記錄的 Amazon Route 53 公共託管區域，返回 EC2 執行個體的彈性 IP 位址。應用程式使用 Amazon DynamoDB 作為其主要數據存放區。公司使用自主託管的 Redis 執行個體作為快取解決方案。\n在內容更新期間，EC2 執行個體和快取解決方案上的負載急劇增加。這種增加的負載在幾次情況下導致了停機。解決方案架構師必須更新應用程式，使其高度可用，並能夠處理內容更新產生的負載。\n哪種解決方案能夠滿足這些要求？","options":{"A":"將 DynamoDB Accelerator (DAX) 設定為記憶體內快取。更新應用程式以使用 DAX。為 EC2 執行個體建立 Auto Scaling 群組。建立 Application Load Balancer (ALB)。將 Auto Scaling 群組設定為 ALB 的目標。將 Route 53 記錄更新為使用以 ALB 的 DNS 別名為目標的簡單路由政策。在內容更新之前為 EC2 執行個體配置排程擴展。","B":"設定 Amazon ElastiCache for Redis。更新應用程式以使用 ElastiCache。為 EC2 執行個體建立 Auto Scaling 群組。建立 Amazon CloudFront 發佈，並將 Auto Scaling 群組設定為發佈的來源。將 Route 53 記錄更新為使用以 CloudFront 發佈的 DNS 別名為目標的簡單路由政策。在內容更新之前手動擴展 EC2 執行個體。","C":"設定 Amazon ElastiCache for Memcached。更新應用程式以使用 ElastiCache。為 EC2 執行個體建立 Auto Scaling 群組。建立 Application Load Balancer (ALB)。將 Auto Scaling 群組設定為 ALB 的目標。將 Route 53 記錄更新為使用以 ALB 的 DNS 別名為目標的簡單路由政策。在內容更新之前為應用程式配置排程擴展。","D":"將 DynamoDB Accelerator (DAX) 設定為記憶體內快取。更新應用程式以使用 DAX。為 EC2 執行個體建立 Auto Scaling 群組。建立 Amazon CloudFront 發佈，並將 Auto Scaling 群組設定為發佈的來源。將 Route 53 記錄更新為使用以 CloudFront 發佈的 DNS 別名為目標的簡單路由政策。在內容更新之前手動擴展 EC2 執行個體。"},"answer":"B"},{"num":397,"stem":"一家公司需要儲存和處理將從行動裝置使用自訂行動應用程式上傳的圖片數據。使用量在工作日上午 8 點至下午 5 點之間達到高峰，每分鐘有數千次上傳。在其他時間，應用程式很少被使用。當圖片處理完成時，使用者會收到通知。\n解決方案架構師應採取哪些動作組合，以確保圖片處理能夠擴展以處理負載？(選擇三個)","options":{"A":"直接從行動軟體將檔案上傳至 Amazon S3。使用 S3 事件通知在 Amazon MQ 佇列中建立訊息。","B":"直接從行動軟體將檔案上傳至 Amazon S3。使用 S3 事件通知在 Amazon Simple Queue Service (Amazon SQS) 標準佇列中建立訊息。","C":"叫用 AWS Lambda 函數，當佇列中有訊息時執行圖片處理。","D":"叫用 S3 Batch Operations 工作，當佇列中有訊息時執行圖片處理。","E":"處理完成時，使用 Amazon Simple Notification Service (Amazon SNS) 向行動應用程式傳送推播通知。 F. 處理完成時，使用 Amazon Simple Email Service (Amazon SES) 向行動應用程式傳送推播通知。"},"answer":"ACD"},{"num":398,"stem":"一家公司正在 AWS 上建立應用程式。應用程式將日誌傳送至 Amazon OpenSearch Service 叢集進行分析。所有數據必須儲存在 VPC 內。\n公司的部分開發人員在家工作。其他開發人員在三個不同的公司辦公室地點工作。開發人員需要存取 OpenSearch Service，以直接從其本地開發機器分析和視覺化日誌。\n哪種解決方案能夠滿足這些要求？","options":{"A":"配置並設定 AWS Client VPN 端點。將 Client VPN 端點與 VPC 中的子網路關聯。配置 Client VPN 自助服務入口網站。指示開發人員使用 Client VPN 用戶端連線。","B":"建立傳輸閘道，並將其連線至 VPC。建立 AWS Site-to-Site VPN。建立傳輸閘道的連接。指示開發人員使用 OpenVPN 用戶端連線。","C":"建立傳輸閘道，並將其連線至 VPC。訂購 AWS Direct Connect 連線。在 Direct Connect 連線上設定公共 VIF。將公共 VIF 與傳輸閘道關聯。指示開發人員連線至 Direct Connect 連線。","D":"在 VPC 的公共子網路中建立並配置堡壘主機。配置堡壘主機安全群組，允許來自公司 CIDR 範圍的 SSH 存取。指示開發人員使用 SSH 連線。"},"answer":"D"},{"num":399,"stem":"一家公司希望將其網站從內部部署資料中心遷移至 AWS。同時，公司希望將網站遷移至容器化微服務架構，以提高可用性和成本效率。公司的安全政策規定，必須根據最佳實踐、使用最小權限配置特權和網路權限。\n解決方案架構師必須建立符合安全要求的容器化架構，並已將應用程式部署至 Amazon ECS 叢集。\n部署後需要執行哪些步驟來滿足要求？(選擇兩個)","options":{"A":"使用橋接網路模式建立任務。","B":"使用 awsvpc 網路模式建立任務。","C":"將安全群組套用至 Amazon EC2 執行個體，並使用 EC2 執行個體的 IAM 角色存取其他資源。","D":"將安全群組套用至任務，並在啟動時將 IAM 憑證傳遞至容器以存取其他資源。","E":"將安全群組套用至任務，並使用任務的 IAM 角色存取其他資源。"},"answer":"CD"},{"num":400,"stem":"一家公司正在執行由幾個 AWS Lambda 函數和 Amazon DynamoDB 資料表組成的無伺服器應用程式。公司建立了新功能，需要 Lambda 函數存取 Amazon Neptune DB 叢集。Neptune DB 叢集位於 VPC 中的三個子網路中。\n以下哪些可能的解決方案允許 Lambda 函數存取 Neptune DB 叢集和 DynamoDB 資料表？(選擇兩個)","options":{"A":"在 Neptune VPC 中建立三個公共子網路，並通過網際網路閘道路由流量。將 Lambda 函數託管在三個新的公共子網路中。","B":"在 Neptune VPC 中建立三個私有子網路，並通過 NAT 閘道路由網際網路流量。將 Lambda 函數託管在三個新的私有子網路中。","C":"在 VPC 外部託管 Lambda 函數。更新 Neptune 安全群組以允許來自 Lambda 函數 IP 範圍的存取。","D":"在 VPC 外部託管 Lambda 函數。為 Neptune 資料庫建立 VPC 端點，讓 Lambda 函數通過 VPC 端點存取 Neptune。","E":"在 Neptune VPC 中建立三個私有子網路。將 Lambda 函數託管在三個新的隔離子網路中。為 DynamoDB 建立 VPC 端點，並將 DynamoDB 流量路由至 VPC 端點。"},"answer":"AE"},{"num":401,"stem":"一家公司希望為運行於公司資料中心的應用程式設計災難復原（DR）解決方案。該應用程式會寫入 SMB 檔案共享，並在第二個檔案共享上建立副本。兩個檔案共享均位於資料中心。應用程式使用兩種類型的檔案：元數據檔案和圖像檔案。\n公司希望將副本存儲於 AWS 上。發生災難時，公司需要能夠使用 SMB 從資料中心或 AWS 存取資料。該副本很少被存取，但必須在 5 分鐘內可用。","options":{"A":"部署 AWS Outposts 並搭配 Amazon S3 儲存。在 Outposts 上配置一個 Windows Amazon EC2 執行個體作為檔案伺服器。","B":"部署 Amazon FSx File Gateway。配置使用 SSD 儲存的 Amazon FSx for Windows File Server 多可用區檔案系統。","C":"部署 Amazon S3 File Gateway。配置 S3 File Gateway，對元數據檔案使用 Amazon S3 Standard-Infrequent Access（S3 Standard-IA），對圖像檔案使用 S3 Glacier Deep Archive。","D":"部署 Amazon S3 File Gateway。配置 S3 File Gateway，對元數據檔案和圖像檔案均使用 Amazon S3 Standard-Infrequent Access（S3 Standard-IA）。"},"answer":"D"},{"num":402,"stem":"一家公司正在建立一個解決方案，可在意外災難發生時將 400 名員工轉移至遠端工作環境。使用者的桌面環境混合了 Windows 和 Linux 作業系統，每台桌面上安裝了多種類型的軟體，例如網頁瀏覽器和郵件客戶端。\n解決方案架構師需要實作一個可與公司本地 Active Directory 整合的解決方案，讓員工使用現有身份憑證登入。解決方案必須提供多因素驗證（MFA），並且必須複製現有桌面的使用者體驗。\n哪個解決方案能滿足這些需求？","options":{"A":"使用 Amazon WorkSpaces 作為雲端桌面服務。設定 VPN 連線至本地網路。建立 AD Connector，並連接至本地 Active Directory。透過 AWS Management Console 為 Amazon WorkSpaces 啟用 MFA。","B":"使用 Amazon AppStream 2.0 作為應用程式串流服務。為員工配置桌面檢視。設定 VPN 連線至本地網路。在本地設定 Active Directory Federation Services（AD FS）。透過 VPN 連線將 VPC 網路連接至 AD FS。","C":"使用 Amazon WorkSpaces 作為雲端桌面服務。設定 VPN 連線至本地網路。建立 AD Connector，並連接至本地 Active Directory。為 MFA 配置 RADIUS 伺服器。","D":"使用 Amazon AppStream 2.0 作為應用程式串流服務。在本地設定 Active Directory Federation Services。配置 MFA 以授予使用者存取 AppStream 2.0 的權限。"},"answer":"C"},{"num":403,"stem":"一家公司已部署 Amazon Connect 聯絡中心。聯絡中心客服人員回報大量電腦自動生成的來電。公司對這些來電的成本和生產力影響感到擔憂。公司希望有一個解決方案，讓客服人員能夠將來電標記為垃圾，並自動封鎖這些號碼，使其未來不再連接至客服人員。\n哪個解決方案最能有效率地滿足這些需求？","options":{"A":"透過在 Contact Control Panel（CCP）中新增標記來電按鈕來自訂 CCP，該按鈕將呼叫 AWS Lambda 函數以調用 UpdateContactAttributes API。使用 Amazon DynamoDB 資料表儲存垃圾號碼。修改聯絡流程以查找更新的屬性，並使用 Lambda 函數讀寫 DynamoDB 資料表。","B":"使用 Contact Lens for Amazon Connect 規則來偵測垃圾來電。使用 Amazon DynamoDB 資料表儲存垃圾號碼。修改聯絡流程以查找規則，並呼叫 AWS Lambda 函數讀寫 DynamoDB 資料表。","C":"使用 Amazon DynamoDB 資料表儲存垃圾號碼。建立一個快速連接，讓客服人員可以從 Contact Control Panel（CCP）將垃圾來電轉接至此。修改快速連接的聯絡流程以呼叫 AWS Lambda 函數寫入 DynamoDB 資料表。","D":"修改初始聯絡流程以要求來電者輸入。如果客服人員未收到輸入，則應將來電者標記為垃圾。使用 Amazon DynamoDB 資料表儲存垃圾號碼。使用 AWS Lambda 函數讀寫 DynamoDB 資料表。"},"answer":"B"},{"num":404,"stem":"一家公司在其所有工廠中安裝了感測器，以收集有關環境參數（如濕度和光照）的資訊。公司需要在 AWS Cloud 中即時串流和分析這些資料。如果任何參數超出可接受範圍，工廠營運團隊必須立即收到通知。\n哪個解決方案能滿足這些需求？","options":{"A":"將資料串流至 Amazon Kinesis Data Firehose 傳遞串流。使用 AWS Step Functions 消費和分析 Kinesis Data Firehose 傳遞串流中的資料。使用 Amazon Simple Notification Service（Amazon SNS）通知營運團隊。","B":"將資料串流至 Amazon Managed Streaming for Apache Kafka（Amazon MSK）叢集。設定 Amazon MSK 中的觸發器以呼叫 AWS Fargate 任務來分析資料。使用 Amazon Simple Email Service（Amazon SES）通知營運團隊。","C":"將資料串流至 Amazon Kinesis 資料串流。建立 AWS Lambda 函數以消費 Kinesis 資料串流並分析資料。使用 Amazon Simple Notification Service（Amazon SNS）通知營運團隊。","D":"將資料串流至 Amazon Kinesis Data Analytics 應用程式。使用 Amazon Elastic Container Service（Amazon ECS）中可自動擴展的容器化服務消費和分析資料。使用 Amazon Simple Email Service（Amazon SES）通知營運團隊。"},"answer":"B"},{"num":405,"stem":"一家公司正準備為工作負載部署 Amazon Elastic Kubernetes Service（Amazon EKS）叢集。公司預期叢集將支援數量不可預測的無狀態 Pod。在工作負載自動擴展副本數量的短時間內，將會建立大量 Pod。\n哪個解決方案能最大化節點的彈性？","options":{"A":"使用獨立的啟動範本將 EKS 控制平面部署到與工作負載節點群組分離的第二個叢集中。","B":"更新工作負載節點群組。使用數量較少的節點群組和節點群組中較大的執行個體。","C":"配置 Kubernetes Cluster Autoscaler，確保工作負載節點群組的運算容量保持低配置狀態。","D":"配置工作負載使用基於可用區的拓撲分散約束。"},"answer":"D"},{"num":406,"stem":"一家公司需要為 Web 應用程式實作災難復原（DR）計畫。該應用程式在單一 AWS 區域中運行。\n應用程式使用在容器中運行的微服務。容器托管於 Amazon Elastic Container Service（Amazon ECS）中 AWS Fargate 上。應用程式的資料層使用 Amazon RDS for MySQL DB 執行個體，並使用 Amazon Route 53 進行 DNS 解析。如果應用程式發生故障，Amazon CloudWatch 警報將觸發 Amazon EventBridge 規則。\n解決方案架構師必須設計一個 DR 解決方案，將應用程式復原至另一個區域。解決方案必須將故障復原所需的時間降到最低。\n哪個解決方案能滿足這些需求？","options":{"A":"在另一個區域設定第二個 ECS 叢集和 ECS 服務於 Fargate 上。建立 AWS Lambda 函數執行以下操作：取得 RDS DB 執行個體的快照、將快照複製到另一個區域、從快照建立新的 RDS DB 執行個體，以及更新 Route 53 將流量路由至第二個 ECS 叢集。更新 EventBridge 規則以新增呼叫 Lambda 函數的目標。","B":"建立 AWS Lambda 函數，在另一個區域建立第二個 ECS 叢集和 ECS 服務。配置 Lambda 函數執行以下操作：取得 RDS DB 執行個體的快照、將快照複製到另一個區域、從快照建立新的 RDS DB 執行個體，以及更新 Route 53 將流量路由至第二個 ECS 叢集。更新 EventBridge 規則以新增呼叫 Lambda 函數的目標。","C":"在另一個區域設定第二個 ECS 叢集和 ECS 服務於 Fargate 上。在另一個區域建立 RDS DB 執行個體的跨區域唯讀副本。建立 AWS Lambda 函數以將唯讀副本提升為主要資料庫。配置 Lambda 函數以更新 Route 53 將流量路由至第二個 ECS 叢集。更新 EventBridge 規則以新增呼叫 Lambda 函數的目標。","D":"在另一個區域設定第二個 ECS 叢集和 ECS 服務於 Fargate 上。取得 RDS DB 執行個體的快照。將快照轉換為 Amazon DynamoDB 全域資料表。建立 AWS Lambda 函數以更新 Route 53 將流量路由至第二個 ECS 叢集。更新 EventBridge 規則以新增呼叫 Lambda 函數的目標。"},"answer":"A"},{"num":407,"stem":"一家公司在 AWS Organizations 的組織中擁有 AWS 帳戶。公司希望將 Amazon EC2 使用量作為指標進行追蹤。架構團隊必須在 EC2 使用量比過去 30 天平均 EC2 使用量高出 10% 以上時，每天收到警報。\n哪個解決方案能滿足這些需求？","options":{"A":"在組織的管理帳戶中配置 AWS Budgets。指定 EC2 運行小時的使用類型。指定每日週期。將預算金額設定為 AWS Cost Explorer 報告的過去 30 天平均使用量的 110%。配置警報，在達到使用量閾值時通知架構團隊。","B":"在組織的管理帳戶中配置 AWS Cost Anomaly Detection。配置 AWS Service 的監控類型。套用 Amazon EC2 的篩選器。配置警報訂閱，在使用量比過去 30 天平均使用量高出 10% 時通知架構團隊。","C":"在組織的管理帳戶中啟用 AWS Trusted Advisor。配置成本優化建議警報，在 EC2 使用量比報告的過去 30 天平均使用量高出 10% 時通知架構團隊。","D":"在組織的管理帳戶中配置 Amazon Detective。配置 EC2 使用量異常警報，在 Detective 識別到超過 10% 的使用量異常時通知架構團隊。"},"answer":"C"},{"num":408,"stem":"一家電子商務公司正在改造其 IT 基礎架構，並計劃使用 AWS 服務。公司的 CIO 要求解決方案架構師設計一個簡單、高可用且鬆散耦合的訂單處理應用程式。該應用程式負責在將訂單存儲到 Amazon DynamoDB 資料表之前接收和處理訂單。應用程式的流量模式不規律，應能在行銷活動期間進行擴展，以最小的延遲處理訂單。\n以下哪個方法最能滿足需求？","options":{"A":"在 Amazon EC2 托管的資料庫中接收訂單，並使用 EC2 執行個體處理訂單。","B":"在 Amazon SQS 佇列中接收訂單，並呼叫 AWS Lambda 函數處理訂單。","C":"使用 AWS Step Functions 程式接收訂單，並啟動 Amazon ECS 容器處理訂單。","D":"在 Amazon Kinesis Data Streams 中接收訂單，並使用 Amazon EC2 執行個體處理訂單。"},"answer":"C"},{"num":409,"stem":"一家公司正在部署存取 Amazon RDS for PostgreSQL 資料庫的 AWS Lambda 函數。公司需要在 QA 環境和生產環境中啟動 Lambda 函數。\n公司不得在應用程式程式碼中暴露憑證，並且必須自動輪換密碼。\n哪個解決方案能滿足這些需求？","options":{"A":"在 AWS Systems Manager Parameter Store 中儲存兩個環境的資料庫憑證。使用 AWS Key Management Service（AWS KMS）金鑰加密憑證。在 Lambda 函數的應用程式程式碼中，使用 AWS SDK for Python（Boto3）從 Parameter Store 參數中提取憑證。為 Lambda 函數新增角色以提供對 Parameter Store 參數的存取權限。","B":"在 AWS Secrets Manager 中儲存兩個環境的資料庫憑證，並為 QA 環境和生產環境設定不同的金鑰項目。開啟輪換功能。將 Secrets Manager 金鑰的參考作為 Lambda 函數的環境變數提供。","C":"在 AWS Key Management Service（AWS KMS）中儲存兩個環境的資料庫憑證。開啟輪換功能。將 AWS KMS 中儲存的憑證參考作為 Lambda 函數的環境變數提供。","D":"為 QA 環境和生產環境分別建立 S3 儲存貯體。為 S3 儲存貯體開啟使用 AWS KMS 金鑰的伺服器端加密（SSE-KMS）。使用物件命名模式，讓每個 Lambda 函數的應用程式程式碼能夠提取對應環境的正確憑證。授予每個 Lambda 函數的執行角色存取 Amazon S3 的權限。"},"answer":"A"},{"num":410,"stem":"一家公司正在使用 AWS Control Tower 管理 AWS Organizations 組織中的 AWS 帳戶。公司有一個包含帳戶的 OU。公司必須防止 OU 帳戶中任何新的或現有的 Amazon EC2 執行個體獲得公開 IP 位址。\n哪個解決方案能滿足這些需求？","options":{"A":"配置 OU 中每個帳戶的所有執行個體使用 AWS Systems Manager。使用 Systems Manager Automation 操作手冊防止將公開 IP 位址附加至執行個體。","B":"實作 AWS Control Tower 前瞻性控制，以檢查 OU 帳戶中的執行個體是否具有公開 IP 位址。將 AssociatePublicIpAddress 屬性設定為 False。將前瞻性控制附加至 OU。","C":"建立一個 SCP，防止啟動具有公開 IP 位址的執行個體。此外，配置 SCP 以防止將公開 IP 位址附加至現有執行個體。將 SCP 附加至 OU。","D":"建立一個 AWS Config 自訂規則，偵測具有公開 IP 位址的執行個體。配置修復操作，使用 AWS Lambda 函數從執行個體中分離公開 IP 位址。"},"answer":"D"},{"num":411,"stem":"一家公司在 AWS 上部署第三方 Web 應用程式。應用程式以 Docker 映像檔的形式封裝。公司已將 Docker 映像檔部署為 Amazon Elastic Container Service（Amazon ECS）中的 AWS Fargate 服務。Application Load Balancer（ALB）將流量導向應用程式。\n公司需要僅讓特定使用者清單能夠從網際網路存取應用程式。公司無法變更應用程式，也無法將應用程式與身份提供者整合。所有使用者必須透過多因素驗證（MFA）進行身份驗證。\n哪個解決方案能滿足這些需求？","options":{"A":"在 Amazon Cognito 中建立使用者集區。為應用程式配置集區。在集區中填入所需使用者。配置集區以要求 MFA。在 ALB 上配置監聽器規則，要求透過 Amazon Cognito 托管 UI 進行驗證。","B":"在 AWS Identity and Access Management（IAM）中配置使用者。將資源策略附加至 Fargate 服務，要求使用者使用 MFA。在 ALB 上配置監聽器規則，要求透過 IAM 進行驗證。","C":"在 AWS Identity and Access Management（IAM）中配置使用者。啟用 AWS IAM Identity Center（AWS Single Sign-On）。為 ALB 配置資源保護。建立資源保護規則，要求使用者使用 MFA。","D":"在 AWS Amplify 中建立使用者集區。為應用程式配置集區。在集區中填入所需使用者。配置集區以要求 MFA。在 ALB 上配置監聽器規則，要求透過 Amplify 托管 UI 進行驗證。"},"answer":"A"},{"num":412,"stem":"解決方案架構師正準備將新的安全工具部署到幾個先前未使用的 AWS 區域。解決方案架構師將使用 AWS CloudFormation 堆疊集部署該工具。堆疊集的範本包含具有自訂名稱的 IAM 角色。建立堆疊集後，沒有任何堆疊執行個體成功建立。\n解決方案架構師應該怎麼做才能成功部署堆疊？","options":{"A":"在所有相關帳戶中啟用新區域。在建立堆疊集期間指定 CAPABILITY_NAMED_IAM 能力。","B":"使用 Service Quotas 主控台，為所有相關帳戶中每個新區域的 CloudFormation 堆疊數量請求配額增加。在建立堆疊集期間指定 CAPABILITY_IAM 能力。","C":"在建立堆疊集期間指定 CAPABILITY_NAMED_IAM 能力和 SELF_MANAGED 權限模型。","D":"在建立堆疊集期間指定管理員角色 ARN 和 CAPABILITY_IAM 能力。"},"answer":"C"},{"num":413,"stem":"一家公司有一個應用程式，使用 Amazon Aurora PostgreSQL DB 叢集作為應用程式的資料庫。DB 叢集包含一個小型主要執行個體和三個較大的副本執行個體。應用程式在 AWS Lambda 函數上運行。應用程式與資料庫的副本執行個體建立大量短暫連接以執行唯讀操作。\n在高流量期間，應用程式變得不穩定，資料庫報告建立了過多連接。高流量期間的頻率不可預測。\n哪個解決方案能提高應用程式的可靠性？","options":{"A":"使用 Amazon RDS Proxy 為 DB 叢集建立代理。為代理配置唯讀端點。更新 Lambda 函數以連接至代理端點。","B":"增加 DB 叢集參數群組上的 max_connections 設定。重新啟動 DB 叢集中的所有執行個體。更新 Lambda 函數以連接至 DB 叢集端點。","C":"配置 DB 叢集的執行個體擴展，當 DatabaseConnections 指標接近最大連接數設定時觸發。更新 Lambda 函數以連接至 Aurora 讀取器端點。","D":"使用 Amazon RDS Proxy 為 DB 叢集建立代理。在代理上為 Aurora Data API 配置唯讀端點。更新 Lambda 函數以連接至代理端點。"},"answer":"C"},{"num":414,"stem":"一家零售公司正在其全球所有門市安裝 IoT 感測器。在每個感測器的製造過程中，公司的私有憑證授權機構（CA）會頒發包含唯一序號的 X.509 憑證。然後公司將每個憑證部署至其對應的感測器。\n解決方案架構師需要讓感測器在安裝後能夠向 AWS 傳送資料。感測器在安裝之前不得向 AWS 傳送資料。\n哪個解決方案能滿足這些需求？","options":{"A":"建立可驗證序號的 AWS Lambda 函數。建立 AWS IoT Core 佈建範本。在 Parameters 區段中包含 SerialNumber 參數。將 Lambda 函數新增為預佈建掛鉤。在製造過程中，呼叫 RegisterThing API 操作並指定範本和參數。","B":"建立可驗證序號的 AWS Step Functions 狀態機器。建立 AWS IoT Core 佈建範本。在 Parameters 區段中包含 SerialNumber 參數。指定 Step Functions 狀態機器以驗證參數。在安裝過程中呼叫 StartThingRegistrationTask API 操作。","C":"建立可驗證序號的 AWS Lambda 函數。建立 AWS IoT Core 佈建範本。在 Parameters 區段中包含 SerialNumber 參數。將 Lambda 函數新增為預佈建掛鉤。向 AWS IoT Core 註冊 CA，指定佈建範本，並設定 allow-auto-registration 參數。","D":"建立 AWS IoT Core 佈建範本。在 Parameters 區段中包含 SerialNumber 參數。在範本中包含參數驗證。為每個使用 CA 的裝置佈建申領憑證和私鑰。授予 AWS IoT Core 服務權限以在佈建期間更新 AWS IoT 物件。"},"answer":"C"},{"num":415,"stem":"一家新創公司最近將大型電子商務網站遷移至 AWS。該網站的銷售額增長了 70%。軟體工程師使用私有 GitHub 儲存庫來管理程式碼。DevOps 團隊使用 Jenkins 進行建置和單元測試。工程師需要收到失敗建置的通知，並在部署期間實現零停機時間。工程師還需要確保對生產環境的任何更改對使用者都是無縫的，並且在發生重大問題時可以回滾。\n軟體工程師決定使用 AWS CodePipeline 來管理其建置和部署流程。\n哪個解決方案能滿足這些需求？","options":{"A":"使用 GitHub websockets 觸發 CodePipeline 管線。使用 AWS CodeBuild 的 Jenkins 插件進行單元測試。將任何失敗建置的警報傳送至 Amazon SNS 主題。使用 AWS CodeDeploy 進行原地全量部署配置。","B":"使用 GitHub webhooks 觸發 CodePipeline 管線。使用 AWS CodeBuild 的 Jenkins 插件進行單元測試。將任何失敗建置的警報傳送至 Amazon SNS 主題。使用 AWS CodeDeploy 進行藍/綠部署。","C":"使用 GitHub websockets 觸發 CodePipeline 管線。使用 AWS X-Ray 進行單元測試和靜態程式碼分析。將任何失敗建置的警報傳送至 Amazon SNS 主題。使用 AWS CodeDeploy 進行藍/綠部署。","D":"使用 GitHub webhooks 觸發 CodePipeline 管線。使用 AWS X-Ray 進行單元測試和靜態程式碼分析。將任何失敗建置的警報傳送至 Amazon SNS 主題。使用 AWS CodeDeploy 進行原地全量部署配置。"},"answer":"B"},{"num":416,"stem":"一家軟體即服務（SaaS）公司開發了一個多租戶環境。公司在儲存層使用由租戶共享的 Amazon DynamoDB 資料表。公司為應用程式服務使用 AWS Lambda 函數。\n公司希望根據每個租戶的資源消耗提供分層訂閱模型。每個租戶由唯一的租戶 ID 識別，該 ID 作為每個請求的一部分傳送至 Lambda 函數。公司已在 AWS 帳戶中建立 AWS Cost and Usage Report（AWS CUR）。公司希望將 DynamoDB 成本分配給每個租戶，以匹配該租戶的資源消耗。\n哪個解決方案能以最少的營運工作量提供每個租戶的 DynamoDB 成本的細粒度視圖？","options":{"A":"將名為租戶 ID 的新標籤與 DynamoDB 中的每個資料表關聯。在 AWS Billing and Cost Management 主控台中將標籤作為成本分配標籤啟用。部署新的 Lambda 函數程式碼，將租戶 ID 記錄到 Amazon CloudWatch Logs。使用 AWS CUR 分離每個租戶 ID 的 DynamoDB 消耗成本。","B":"配置 Lambda 函數，將租戶 ID 以及每筆交易從 DynamoDB 消耗的 RCU 和 WCU 數量記錄至 Amazon CloudWatch Logs。部署另一個 Lambda 函數，使用記錄的容量單位和 AWS Cost Explorer API 的整體 DynamoDB 成本來計算租戶成本。建立 Amazon EventBridge 規則，按計劃呼叫計算 Lambda 函數。","C":"建立一個新的分區鍵，將 DynamoDB 項目與個別租戶關聯。部署 Lambda 函數，在每筆交易中填充新欄位。部署另一個 Lambda 函數，使用 Amazon Athena 計算 DynamoDB 中的租戶項目數量以及 AWS CUR 中的整體 DynamoDB 成本，從而計算租戶成本。建立 Amazon EventBridge 規則，按計劃呼叫計算 Lambda 函數。","D":"部署 Lambda 函數，將租戶 ID、每次回應的大小和交易呼叫的持續時間作為自訂指標記錄到 Amazon CloudWatch Logs。使用 CloudWatch Logs Insights 查詢每個租戶的自訂指標。使用 AWS Pricing Calculator 獲取整體 DynamoDB 成本並計算租戶成本。"},"answer":"A"},{"num":417,"stem":"一家公司的應用程式將資料存儲在單一 Amazon S3 儲存貯體中。公司必須將所有資料保留 1 年。公司的安全團隊擔心攻擊者可能透過洩露的長期憑證存取 AWS 帳戶。\n哪個解決方案能確保 S3 儲存貯體中現有和未來的物件受到保護？","options":{"A":"建立一個只有安全團隊才能透過擔任角色存取的新 AWS 帳戶。在新帳戶中建立 S3 儲存貯體。啟用 S3 版本控制和 S3 Object Lock。配置 1 年的預設保留期。設定從現有 S3 儲存貯體到新 S3 儲存貯體的複寫。建立 S3 Batch Replication 任務以複製所有現有資料。","B":"使用 s3-bucket-versioning-enabled AWS Config 受管規則。配置自動修復操作，使用 AWS Lambda 函數對不合規資源啟用 S3 版本控制和 MFA Delete。新增 S3 生命週期規則以在 1 年後刪除物件。","C":"明確拒絕所有使用者和角色（AWS Service Catalog 啟動約束角色除外）建立儲存貯體。定義 Service Catalog 產品以強制在建立 S3 儲存貯體時啟用 S3 版本控制和 MFA Delete。授權使用者在需要建立 S3 儲存貯體時啟動該產品。","D":"為帳戶和 AWS 區域啟用具有 S3 保護功能的 Amazon GuardDuty。新增 S3 生命週期規則以在 1 年後刪除物件。"},"answer":"D"},{"num":418,"stem":"一家公司需要提高其在 AWS 上的 Web 應用程式的安全性。應用程式使用具有兩個自訂來源的 Amazon CloudFront。第一個自訂來源將請求路由至 Amazon API Gateway HTTP API。第二個自訂來源將流量路由至 Application Load Balancer（ALB）。應用程式與 OpenID Connect（OIDC）身份提供者（IdP）整合以進行使用者管理。\n安全審計顯示，JSON Web Token（JWT）授權器提供對 API 的存取。安全審計還顯示 ALB 接受來自未驗證使用者的請求。\n解決方案架構師必須設計一個解決方案，確保所有後端服務僅回應已驗證的使用者。\n哪個解決方案能滿足此需求？","options":{"A":"配置 ALB 透過將 ALB 與 IdP 整合來強制執行身份驗證和授權。僅允許已驗證的使用者存取後端服務。","B":"修改 CloudFront 配置以使用已簽名的 URL。實作允許任何請求存取後端服務的寬鬆簽名策略。","C":"建立 AWS WAF Web ACL，在 ALB 層級篩選出未驗證的請求。僅允許已驗證的流量到達後端服務。","D":"啟用 AWS CloudTrail 以記錄所有進入 ALB 的請求。建立 AWS Lambda 函數分析日誌並封鎖來自未驗證使用者的任何請求。"},"answer":"D"},{"num":419,"stem":"一家公司建立 AWS Control Tower 登陸區，以管理和治理多帳戶 AWS 環境。公司的安全團隊將部署預防性控制和偵測性控制，以監控所有帳戶中的 AWS 服務。安全團隊需要集中查看所有帳戶的安全狀態。\n哪個解決方案能滿足這些需求？","options":{"A":"從 AWS Control Tower 管理帳戶，使用 AWS CloudFormation StackSets 將 AWS Config 合規套件部署至組織中的所有帳戶。","B":"在 AWS Organizations 中為組織啟用 Amazon Detective。指定一個 AWS 帳戶作為 Detective 的委派管理員。","C":"從 AWS Control Tower 管理帳戶，部署使用自動部署選項的 AWS CloudFormation 堆疊集，為組織啟用 Amazon Detective。","D":"在 AWS Organizations 中為組織啟用 AWS Security Hub。指定一個 AWS 帳戶作為 Security Hub 的委派管理員。"},"answer":"A"},{"num":420,"stem":"一家在歐洲和亞洲設有辦事處的消費電子產品公司，在歐洲的本地環境中存儲了 60 TB 的軟體映像檔。公司希望將這些映像檔傳輸至 ap-northeast-1 區域的 Amazon S3 儲存貯體。每天都會建立新的軟體映像檔，且在傳輸過程中必須加密。公司需要一個無需自訂開發就能自動傳輸所有現有和新軟體映像檔至 Amazon S3 的解決方案。\n傳輸流程的下一步是什麼？","options":{"A":"部署 AWS DataSync 代理，並配置任務以將映像檔傳輸至 S3 儲存貯體。","B":"配置 Amazon Kinesis Data Firehose 使用 S3 Transfer Acceleration 傳輸映像檔。","C":"使用 AWS Snowball 裝置將映像檔傳輸至 S3 儲存貯體作為目標。","D":"使用具有多部分上傳功能的 S3 API，透過 Site-to-Site VPN 連線傳輸映像檔。"},"answer":"A"},{"num":421,"stem":"一家公司有一個使用 Amazon API Gateway、AWS Lambda 和 Amazon DynamoDB 的 Web 應用程式。最近的行銷活動增加了需求。監控軟體報告許多請求的回應時間比行銷活動之前顯著更長。\n解決方案架構師為 API Gateway 啟用了 Amazon CloudWatch Logs，並注意到 20% 的請求發生錯誤。在 CloudWatch 中，Lambda 函數的 Throttles 指標代表 1% 的請求，而 Errors 指標代表 10% 的請求。應用程式日誌顯示，發生錯誤時，會有對 DynamoDB 的呼叫。\n解決方案架構師應該做出什麼變更，以隨著 Web 應用程式越來越受歡迎而改善當前的回應時間？","options":{"A":"增加 Lambda 函數的並發限制。","B":"在資料表上實作 DynamoDB 自動擴展。","C":"增加 API Gateway 節流限制。","D":"以更好分區的主索引重新建立 DynamoDB 資料表。"},"answer":"B"},{"num":422,"stem":"一家公司有一個具有 Web 前端的應用程式。該應用程式在公司的本地資料中心運行，需要存取檔案儲存以存取關鍵資料。應用程式在三個 Linux VM 上運行以實現冗餘。架構包括具有 HTTP 請求型路由的負載平衡器。\n公司需要盡快將應用程式遷移至 AWS。AWS 上的架構必須具有高可用性。\n哪個解決方案能以最少的架構變更滿足這些需求？","options":{"A":"將應用程式遷移至三個可用區中使用 Fargate 啟動類型的 Amazon Elastic Container Service（Amazon ECS）容器。使用 Amazon S3 為所有三個容器提供檔案儲存。使用 Network Load Balancer 將流量導向容器。","B":"將應用程式遷移至三個可用區中的 Amazon EC2 執行個體。使用 Amazon Elastic File System（Amazon EFS）進行檔案儲存。在所有三個 EC2 執行個體上掛載檔案儲存。使用 Application Load Balancer 將流量導向 EC2 執行個體。","C":"將應用程式遷移至三個可用區中使用 Fargate 啟動類型的 Amazon Elastic Kubernetes Service（Amazon EKS）容器。使用 Amazon FSx for Lustre 為所有三個容器提供檔案儲存。使用 Network Load Balancer 將流量導向容器。","D":"將應用程式遷移至三個 AWS 區域中的 Amazon EC2 執行個體。使用 Amazon Elastic Block Store（Amazon EBS）進行檔案儲存。為所有三個 EC2 執行個體啟用跨區域複寫（CRR）。使用 Application Load Balancer 將流量導向 EC2 執行個體。"},"answer":"B"},{"num":423,"stem":"一家公司正計劃將本地資料中心遷移至 AWS。公司目前在基於 Linux 的 VMware VM 上托管資料中心。解決方案架構師必須收集 VM 之間網路依賴關係的資訊。這些資訊必須以包含主機 IP 位址、主機名稱和網路連接資訊的圖表形式呈現。\n哪個解決方案能滿足這些需求？","options":{"A":"使用 AWS Application Discovery Service。選擇 AWS Migration Hub 主 AWS 區域。在本地伺服器上安裝 AWS Application Discovery Agent 以進行資料收集。授予 Application Discovery Service 使用 Migration Hub 網路圖表的權限。","B":"使用 AWS Application Discovery Service Agentless Collector 進行伺服器資料收集。從 AWS Migration Hub 以 .png 格式匯出網路圖表。","C":"在本地伺服器上安裝 AWS Application Migration Service 代理程式以進行資料收集。使用 AWS Migration Hub 中 Workload Discovery on AWS 的資料生成網路圖表。","D":"在本地伺服器上安裝 AWS Application Migration Service 代理程式以進行資料收集。將 AWS Migration Hub 的資料以 .csv 格式匯出至 Amazon CloudWatch 儀表板以生成網路圖表。"},"answer":"D"},{"num":424,"stem":"一家公司在 AWS 上運行軟體即服務（SaaS）應用程式。應用程式由 AWS Lambda 函數和 Amazon RDS for MySQL 多可用區資料庫組成。在市場活動期間，應用程式的工作負載遠高於正常水準。由於大量資料庫連接，使用者在高峰期間注意到回應時間緩慢。公司需要提高資料庫的可擴展性和可用性。\n哪個解決方案能滿足這些需求？","options":{"A":"建立 Amazon CloudWatch 警報操作，在資源利用率達到閾值時觸發 Lambda 函數以新增 Amazon RDS for MySQL 讀取副本。","B":"將資料庫遷移至 Amazon Aurora，並新增讀取副本。在 Lambda 處理函數之外新增資料庫連接池。","C":"將資料庫遷移至 Amazon Aurora，並新增讀取副本。使用 Amazon Route 53 加權記錄。","D":"將資料庫遷移至 Amazon Aurora，並新增 Aurora 副本。配置 Amazon RDS Proxy 以管理資料庫連接池。"},"answer":"D"},{"num":425,"stem":"一家公司正計劃將應用程式從本地環境遷移至 AWS Cloud。公司將從將應用程式的底層資料儲存遷移至 AWS 開始遷移。應用程式資料存儲在本地的共享檔案系統上，應用程式伺服器透過 SMB 連接至共享檔案系統。\n解決方案架構師必須實作一個使用 Amazon S3 儲存貯體作為共享儲存的解決方案。在應用程式完全遷移並重寫程式碼以使用原生 Amazon S3 API 之前，應用程式必須繼續透過 SMB 存取資料。解決方案架構師必須將應用程式資料遷移至 AWS 的新位置，同時仍允許本地應用程式存取資料。\n哪個解決方案能滿足這些需求？","options":{"A":"建立新的 Amazon FSx for Windows File Server 檔案系統。使用一個位置指向本地檔案共享、另一個位置指向新 Amazon FSx 檔案系統來配置 AWS DataSync。建立新的 DataSync 任務，將資料從本地檔案共享位置複製至 Amazon FSx 檔案系統。","B":"為應用程式建立 S3 儲存貯體。將資料從本地儲存複製至 S3 儲存貯體。","C":"將 AWS Server Migration Service（AWS SMS）VM 部署至本地環境。使用 AWS SMS 將檔案儲存伺服器從本地遷移至 Amazon EC2 執行個體。","D":"為應用程式建立 S3 儲存貯體。在本地 VM 上部署新的 AWS Storage Gateway 檔案閘道。建立一個將資料存儲在 S3 儲存貯體中並與檔案閘道關聯的新檔案共享。將資料從本地儲存複製至新的檔案閘道端點。"},"answer":"A"},{"num":426,"stem":"一家全球公司有一個行動應用程式，用於顯示票券條碼。顧客使用行動應用程式上的票券參加現場活動。活動掃描器讀取票券條碼，並呼叫後端 API 來驗證條碼資料與資料庫中的資料。條碼掃描後，後端邏輯會寫入資料庫的單一資料表，將條碼標記為已使用。\n公司需要以 api.example.com 的 DNS 名稱將應用程式部署到 AWS 上。公司將在全球三個 AWS 區域中託管資料庫。\n哪個解決方案能以最低延遲滿足這些需求？","options":{"A":"在 Amazon Aurora 全球資料庫叢集上託管資料庫。在與資料庫相同的三個區域中，以 Amazon Elastic Container Service (Amazon ECS) 叢集託管後端。在 AWS Global Accelerator 中建立加速器，將請求路由到最近的 ECS 叢集。建立一筆 Amazon Route 53 記錄，將 api.example.com 對應到加速器端點。","B":"在 Amazon Aurora 全球資料庫叢集上託管資料庫。在與資料庫相同的三個區域中，以 Amazon Elastic Kubernetes Service (Amazon EKS) 叢集託管後端。建立以三個叢集為來源的 Amazon CloudFront 發佈。將請求路由到最近的 EKS 叢集。建立一筆 Amazon Route 53 記錄，將 api.example.com 對應到 CloudFront 發佈。","C":"在 Amazon DynamoDB 全球資料表上託管資料庫。建立一個 Amazon CloudFront 發佈。將 CloudFront 發佈與包含後端條碼驗證邏輯的 CloudFront 函數建立關聯。建立一筆 Amazon Route 53 記錄，將 api.example.com 對應到 CloudFront 發佈。","D":"在 Amazon DynamoDB 全球資料表上託管資料庫。建立一個 Amazon CloudFront 發佈。將 CloudFront 發佈與包含後端條碼驗證邏輯的 Lambda@Edge 函數建立關聯。建立一筆 Amazon Route 53 記錄，將 api.example.com 對應到 CloudFront 發佈。"},"answer":"C"},{"num":427,"stem":"一家醫療公司在一組 Amazon EC2 執行個體上執行 REST API。EC2 執行個體在 Application Load Balancer (ALB) 後方的 Auto Scaling 群組中運行。ALB 在三個公有子網路中運行，EC2 執行個體在三個私有子網路中運行。公司已部署一個 Amazon CloudFront 發佈，ALB 是唯一的來源。\n解決方案架構師應建議哪個解決方案來強化來源安全性？","options":{"A":"在 AWS Secrets Manager 中儲存一個隨機字串。建立一個 AWS Lambda 函數用於自動輪換密鑰。配置 CloudFront，將隨機字串作為自訂 HTTP 標頭注入到來源請求中。建立一條含有自訂標頭字串比對規則的 AWS WAF web ACL 規則。將 web ACL 與 ALB 建立關聯。","B":"建立一條含有 CloudFront 服務 IP 位址範圍的 IP 比對條件的 AWS WAF web ACL 規則。將 web ACL 與 ALB 建立關聯。將 ALB 移到三個私有子網路中。","C":"在 AWS Systems Manager Parameter Store 中儲存一個隨機字串。配置 Parameter Store 對該字串進行自動輪換。配置 CloudFront，將隨機字串作為自訂 HTTP 標頭注入到來源請求中。檢查自訂 HTTP 標頭的值，並在 ALB 中封鎖存取。","D":"配置 AWS Shield Advanced。建立安全群組政策，允許來自 CloudFront 服務 IP 位址範圍的連線。將政策新增到 AWS Shield Advanced，並將政策附加到 ALB。"},"answer":"B"},{"num":428,"stem":"為了遵守產業法規，解決方案架構師必須設計一個解決方案，將公司的重要資料儲存在多個公有 AWS 區域中，包括公司總部所在的美國。解決方案架構師需要提供對存放在 AWS 中之資料的存取，以供公司的全球 WAN 網路使用。安全團隊要求，存取此資料的流量不得通過公共網際網路。\n解決方案架構師應如何設計一個滿足需求且具有成本效益的高可用性解決方案？","options":{"A":"從公司總部建立到所有使用中的 AWS 區域的 AWS Direct Connect 連線。使用公司 WAN 將流量傳送到總部，再透過各自的 Direct Connect 連線存取資料。","B":"從公司總部建立兩條到一個 AWS 區域的 AWS Direct Connect 連線。使用公司 WAN 透過 Direct Connect 連線傳送流量。使用跨區域 VPC 對等互連存取其他 AWS 區域中的資料。","C":"從公司總部建立兩條到一個 AWS 區域的 AWS Direct Connect 連線。使用公司 WAN 透過 Direct Connect 連線傳送流量。使用 AWS Transit VPC 解決方案存取其他 AWS 區域中的資料。","D":"從公司總部建立兩條到一個 AWS 區域的 AWS Direct Connect 連線。使用公司 WAN 透過 Direct Connect 連線傳送流量。使用 Direct Connect Gateway 存取其他 AWS 區域中的資料。"},"answer":"D"},{"num":429,"stem":"一家公司開發了一個應用程式，在 VMware vSphere 虛擬機器上執行 Windows Server，這些虛擬機器由公司託管於本地環境。應用程式資料以專有格式儲存，必須透過應用程式讀取。公司以手動方式佈建伺服器和應用程式。\n作為其災難復原計畫的一部分，公司希望在本地環境無法使用時，能夠臨時將應用程式託管在 AWS 上。公司希望在災難復原事件完成後，應用程式能返回本地環境託管。RPO 為 5 分鐘。\n哪個解決方案能以最少的操作負擔滿足這些需求？","options":{"A":"配置 AWS DataSync。將資料複寫到 Amazon Elastic Block Store (Amazon EBS) 磁碟區。當本地環境無法使用時，使用 AWS CloudFormation 範本佈建 Amazon EC2 執行個體並掛載 EBS 磁碟區。","B":"配置 AWS Elastic Disaster Recovery。將資料複寫到附加 Amazon Elastic Block Store (Amazon EBS) 磁碟區的複寫 Amazon EC2 執行個體上。當本地環境無法使用時，使用 Elastic Disaster Recovery 啟動使用已複寫磁碟區的 EC2 執行個體。","C":"佈建一個 AWS Storage Gateway 檔案閘道。將資料複寫到 Amazon S3 儲存貯體。當本地環境無法使用時，使用 AWS Backup 將資料還原到 Amazon Elastic Block Store (Amazon EBS) 磁碟區，並從這些 EBS 磁碟區啟動 Amazon EC2 執行個體。","D":"在 AWS 上佈建一個 Amazon FSx for Windows File Server 檔案系統。將資料複寫到該檔案系統。當本地環境無法使用時，使用 AWS CloudFormation 範本佈建 Amazon EC2 執行個體，並使用 AWS::CloudFormation::Init 命令掛載 Amazon FSx 檔案共用。"},"answer":"B"},{"num":430,"stem":"一家公司在 eu-north-1 區域的 Amazon EC2 上執行一個高可用性資料收集應用程式。該應用程式從終端使用者裝置收集資料，並將記錄寫入 Amazon Kinesis 資料串流以及一組處理記錄的 AWS Lambda 函數。公司將記錄處理的輸出持久化到 eu-north-1 的 Amazon S3 儲存貯體中。公司使用 S3 儲存貯體中的資料作為 Amazon Athena 的資料來源。\n公司希望擴大其全球影響力。解決方案架構師必須在 sa-east-1 和 ap-northeast-1 區域啟動資料收集功能。解決方案架構師在兩個新區域中部署應用程式、Kinesis 資料串流和 Lambda 函數。解決方案架構師將 S3 儲存貯體保留在 eu-north-1，以滿足集中資料分析的需求。\n在測試新設定期間，解決方案架構師注意到從新區域到 S3 儲存貯體的資料到達有顯著延遲。\n哪個解決方案最能改善此延遲時間？","options":{"A":"在兩個新區域的每個區域中，設定 Lambda 函數在 VPC 中執行。在該 VPC 中設定 S3 閘道端點。","B":"在 eu-north-1 的 S3 儲存貯體上開啟 S3 Transfer Acceleration。更改應用程式，在應用程式將資料上傳到 S3 儲存貯體時使用新的 S3 加速端點。","C":"在兩個新區域的每個區域中建立一個 S3 儲存貯體。設定每個新區域中的應用程式上傳到其各自的 S3 儲存貯體。設定 S3 跨區域複寫，將資料複寫到 eu-north-1 的 S3 儲存貯體。","D":"增加 Lambda 函數的記憶體需求，以確保它們有多個核心可用。在應用程式從 Lambda 將資料上傳到 Amazon S3 時使用多部分上傳功能。"},"answer":"C"},{"num":431,"stem":"一家公司提供一個集中式 Amazon EC2 應用程式，託管在單一共用 VPC 中。集中式應用程式必須可從在其他業務單位 VPC 中執行的用戶端應用程式存取。集中式應用程式前端配置了一個 Network Load Balancer (NLB) 以實現可擴展性。\n最多 10 個業務單位 VPC 需要連接到共用 VPC。部分業務單位 VPC CIDR 區塊與共用 VPC 重疊，部分相互之間也重疊。從業務單位 VPC 到共用 VPC 中集中式應用程式的網路連線，應僅允許來自授權業務單位 VPC 的連線。\n解決方案架構師應使用哪種網路配置，從業務單位 VPC 中的用戶端應用程式提供到共用 VPC 中集中式應用程式的連線？","options":{"A":"建立一個 AWS Transit Gateway。將共用 VPC 和授權業務單位 VPC 附加到 Transit Gateway。建立單一 Transit Gateway 路由表，並將其與所有附加的 VPC 建立關聯。允許從附加項目自動傳播路由到路由表中。配置 VPC 路由表，將流量傳送到 Transit Gateway。","B":"使用集中式應用程式 NLB 建立 VPC 端點服務，並啟用要求端點接受的選項。在每個業務單位 VPC 中，使用端點服務的服務名稱建立 VPC 端點。從端點服務主控台接受授權端點請求。","C":"從每個業務單位 VPC 建立到共用 VPC 的 VPC 對等互連。從共用 VPC 主控台接受 VPC 對等互連連線。配置 VPC 路由表，將流量傳送到 VPC 對等互連連線。","D":"為共用 VPC 配置虛擬私有閘道，並為每個授權業務單位 VPC 建立客戶閘道。建立從業務單位 VPC 到共用 VPC 的 Site-to-Site VPN 連線。配置 VPC 路由表，將流量傳送到 VPN 連線。"},"answer":"A"},{"num":432,"stem":"一家公司希望將其網站遷移到 AWS。該網站使用微服務，並在容器上執行，這些容器部署在公司本地自行管理的 Kubernetes 叢集中。定義 Kubernetes 部署中容器部署的所有 manifest 都在原始碼控制中。\n網站的所有資料儲存在 PostgreSQL 資料庫中。一個開源容器映像檔儲存庫與本地環境並排執行。\n解決方案架構師需要確定公司將在 AWS 上為網站使用的架構。\n哪個解決方案能以最少的遷移工作滿足這些需求？","options":{"A":"建立一個 AWS App Runner 服務。將 App Runner 服務連接到開源容器映像檔儲存庫。將 manifest 從本地部署到 App Runner 服務。建立一個 Amazon RDS for PostgreSQL 資料庫。","B":"建立一個具有受管節點群組的 Amazon Elastic Kubernetes Service (Amazon EKS) 叢集。將應用程式容器複製到新的 Amazon Elastic Container Registry (Amazon ECR) 儲存庫。將 manifest 從本地部署到 EKS 叢集。建立一個 Amazon Aurora
