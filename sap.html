<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS SAP-C02 模擬測驗</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }

  /* ── Header ── */
  header { background: linear-gradient(135deg, #1a56db 0%, #0e3a8c 100%); color: #fff; padding: 20px 32px; display: flex; align-items: center; gap: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  header .badge { background: rgba(255,255,255,.2); border-radius: 20px; padding: 3px 12px; font-size: .85rem; }

  /* ── Controls bar ── */
  .controls { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 12px 32px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .controls label { font-size: .85rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: .9rem; font-weight: 600; transition: all .15s; }
  .btn-primary { background: #1a56db; color: #fff; }
  .btn-primary:hover { background: #1649b8; }
  .btn-secondary { background: #e2e8f0; color: #374151; }
  .btn-secondary:hover { background: #cbd5e1; }
  .btn-success { background: #059669; color: #fff; }
  .btn-success:hover { background: #047857; }
  .mode-toggle { display: flex; background: #f1f5f9; border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0; }
  .mode-toggle button { padding: 7px 16px; border: none; background: transparent; cursor: pointer; font-size: .85rem; font-weight: 600; color: #64748b; transition: all .15s; }
  .mode-toggle button.active { background: #1a56db; color: #fff; border-radius: 6px; }
  .progress-text { margin-left: auto; font-size: .85rem; color: #64748b; }
  .score-chip { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; border-radius: 20px; padding: 4px 14px; font-weight: 700; font-size: .85rem; }

  /* ── Progress bar ── */
  .progress-bar-wrap { height: 4px; background: #e2e8f0; }
  .progress-bar-fill { height: 100%; background: #1a56db; transition: width .3s; }

  /* ── Main card ── */
  main { max-width: 860px; margin: 32px auto; padding: 0 16px 80px; }
  .card { background: #fff; border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06); overflow: hidden; }
  .card-header { background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 16px 28px; display: flex; justify-content: space-between; align-items: center; }
  .q-label { font-size: .8rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .06em; }
  .q-num { font-size: 1rem; font-weight: 700; color: #1a56db; }
  .card-body { padding: 28px; }

  /* ── Question stem ── */
  .stem { font-size: 1.05rem; line-height: 1.75; color: #1e293b; margin-bottom: 24px; white-space: pre-wrap; }

  /* ── Options ── */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .option { display: flex; align-items: flex-start; gap: 14px; padding: 14px 18px; border-radius: 10px; border: 2px solid #e2e8f0; cursor: pointer; transition: all .15s; background: #fafafa; }
  .option:hover:not(.disabled) { border-color: #93c5fd; background: #eff6ff; }
  .option.selected { border-color: #1a56db; background: #eff6ff; }
  .option.correct { border-color: #059669; background: #ecfdf5; }
  .option.wrong { border-color: #dc2626; background: #fef2f2; }
  .option.highlight { border-color: #059669; background: #ecfdf5; }
  .option.disabled { cursor: default; }
  .opt-letter { flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .9rem; color: #475569; transition: all .15s; }
  .option.selected .opt-letter { background: #1a56db; color: #fff; }
  .option.correct .opt-letter { background: #059669; color: #fff; }
  .option.wrong .opt-letter { background: #dc2626; color: #fff; }
  .option.highlight .opt-letter { background: #059669; color: #fff; }
  .opt-text { font-size: .95rem; line-height: 1.6; color: #334155; padding-top: 3px; }

  /* ── Result banner ── */
  .result-banner { border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; font-size: .95rem; font-weight: 600; display: none; align-items: center; gap: 10px; }
  .result-banner.correct { background: #ecfdf5; border: 1.5px solid #6ee7b7; color: #065f46; display: flex; }
  .result-banner.wrong { background: #fef2f2; border: 1.5px solid #fca5a5; color: #991b1b; display: flex; }
  .result-icon { font-size: 1.3rem; }

  /* ── Action buttons ── */
  .actions { display: flex; gap: 10px; flex-wrap: wrap; }

  /* ── Summary screen ── */
  #summary { display: none; }
  .summary-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,.1); padding: 40px; text-align: center; }
  .summary-score { font-size: 4rem; font-weight: 800; color: #1a56db; line-height: 1; }
  .summary-total { font-size: 1.1rem; color: #64748b; margin-top: 8px; }
  .summary-grade { font-size: 1.5rem; font-weight: 700; margin: 20px 0; }
  .summary-stats { display: flex; justify-content: center; gap: 40px; margin: 24px 0; }
  .stat { text-align: center; }
  .stat-num { font-size: 2rem; font-weight: 700; }
  .stat-label { font-size: .85rem; color: #64748b; margin-top: 4px; }
  .stat.correct .stat-num { color: #059669; }
  .stat.wrong .stat-num { color: #dc2626; }
  .stat.skip .stat-num { color: #d97706; }

  /* ── Nav buttons at bottom ── */
  .nav-row { display: flex; gap: 10px; margin-top: 20px; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .controls { padding: 10px 16px; }
    main { margin: 16px auto; }
    .card-body { padding: 20px 16px; }
    .summary-stats { gap: 20px; }
    .summary-score { font-size: 3rem; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>AWS SAP-C02 模擬測驗</h1>
    <div style="font-size:.8rem;opacity:.75;margin-top:4px;">AWS Certified Solutions Architect – Professional</div>
  </div>
  <span class="badge" id="totalBadge">529 題</span>
</header>

<div class="controls">
  <label>模式</label>
  <div class="mode-toggle">
    <button id="btnSeq" class="active" onclick="setMode('sequential')">📋 順序作答</button>
    <button id="btnRand" onclick="setMode('random')">🔀 隨機題目</button>
  </div>
  <button class="btn btn-secondary" onclick="restartQuiz()">↺ 重新開始</button>
  <span class="progress-text" id="progressText">第 1 題 / 共 529 題</span>
  <span class="score-chip" id="scoreChip">✓ 0 ✗ 0</span>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
</div>

<main>
  <!-- Quiz card -->
  <div id="quizSection">
    <div class="card">
      <div class="card-header">
        <span class="q-label">題目</span>
        <span class="q-num" id="qNum">#1</span>
      </div>
      <div class="card-body">
        <div class="stem" id="stem"></div>
        <div class="options" id="options"></div>
        <div class="result-banner" id="resultBanner">
          <span class="result-icon" id="resultIcon"></span>
          <span id="resultText"></span>
        </div>
        <div class="actions">
          <button class="btn btn-primary" id="btnSubmit" onclick="submitAnswer()">送出答案</button>
          <button class="btn btn-success" id="btnNext" onclick="nextQuestion()" style="display:none">下一題 →</button>
          <button class="btn btn-secondary" id="btnSkip" onclick="skipQuestion()">跳過此題</button>
          <button class="btn btn-secondary" onclick="finishQuiz()" style="margin-left:auto">結束測驗</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Summary -->
  <div id="summary">
    <div class="summary-card">
      <div style="font-size:1.1rem;color:#64748b;margin-bottom:8px;">測驗完成！</div>
      <div class="summary-score" id="summaryScore">0%</div>
      <div class="summary-total" id="summaryTotal"></div>
      <div class="summary-grade" id="summaryGrade"></div>
      <div class="summary-stats">
        <div class="stat correct"><div class="stat-num" id="statCorrect">0</div><div class="stat-label">答對</div></div>
        <div class="stat wrong"><div class="stat-num" id="statWrong">0</div><div class="stat-label">答錯</div></div>
        <div class="stat skip"><div class="stat-num" id="statSkip">0</div><div class="stat-label">跳過</div></div>
      </div>
      <div class="nav-row" style="justify-content:center">
        <button class="btn btn-primary" onclick="restartQuiz()">↺ 重新開始</button>
        <button class="btn btn-secondary" onclick="setMode(currentMode)">換模式重測</button>
      </div>
    </div>
  </div>
</main>

<script>
const DATA = [{"num":1,"stem":"一家公司需要設計一個混合式 DNS 解決方案。此解決方案將使用 Amazon Route 53 私有託管區域，為儲存在 VPC 中的資源提供 cloud.example.com 網域的 DNS 解析。\n公司有以下 DNS 解析需求：\n- 內部部署系統必須能夠解析並連線到 cloud.example.com。\n- 所有 VPC 必須能夠解析 cloud.example.com。\n目前已存在一條 AWS Direct Connect 連線，連接內部部署的企業網路與 AWS Transit Gateway。\n要以最高效能達成這些需求，公司應使用哪種架構？","options":{"A":"將私有託管區域關聯到所有 VPC。在共用服務 VPC 中建立 Route 53 輸入解析器（inbound resolver）。將所有 VPC 連接到 transit gateway，並在內部部署 DNS 伺服器中為 cloud.example.com 建立轉送規則，指向該輸入解析器。","B":"將私有託管區域關聯到所有 VPC。在共用服務 VPC 中部署一個 Amazon EC2 條件式轉送器（conditional forwarder）。將所有 VPC 連接到 transit gateway，並在內部部署 DNS 伺服器中為 cloud.example.com 建立轉送規則，指向該條件式轉送器。","C":"將私有託管區域關聯到共用服務 VPC。在共用服務 VPC 中建立 Route 53 輸出解析器（outbound resolver）。將所有 VPC 連接到 transit gateway，並在內部部署 DNS 伺服器中為 cloud.example.com 建立轉送規則，指向該輸出解析器。","D":"將私有託管區域關聯到共用服務 VPC。在共用服務 VPC 中建立 Route 53 輸入解析器（inbound resolver）。將共用服務 VPC 連接到 transit gateway，並在內部部署 DNS 伺服器中為 cloud.example.com 建立轉送規則，指向該輸入解析器。"},"answer":"D"},{"num":2,"stem":"一家公司透過 REST API 向多個客戶提供天氣資料。此 API 由 Amazon API Gateway 託管，並針對每個 API 操作整合了不同的 AWS Lambda 函數。該公司使用 Amazon Route 53 管理 DNS，並建立了 weather.example.com 的資源記錄。公司將 API 的資料儲存在 Amazon DynamoDB 資料表中。公司需要一個解決方案，讓 API 能夠容錯移轉到不同的 AWS 區域。\n哪個解決方案可以滿足這些需求？","options":{"A":"在新區域中部署一套新的 Lambda 函數。將 API Gateway API 更新為使用邊緣優化（edge-optimized）API 端點，並以兩個區域的 Lambda 函數作為目標。將 DynamoDB 資料表轉換為全球資料表。","B":"在另一個區域中部署新的 API Gateway API 和 Lambda 函數。將 Route 53 DNS 記錄更改為多值回應（multivalue answer）。將兩個 API Gateway API 加入回應中。啟用目標健康監控。將 DynamoDB 資料表轉換為全球資料表。","C":"在另一個區域中部署新的 API Gateway API 和 Lambda 函數。將 Route 53 DNS 記錄更改為容錯移轉記錄（failover record）。啟用目標健康監控。將 DynamoDB 資料表轉換為全球資料表。","D":"在新區域中部署新的 API Gateway API。將 Lambda 函數更改為全球函數。將 Route 53 DNS 記錄更改為多值回應（multivalue answer）。將兩個 API Gateway API 加入回應中。啟用目標健康監控。將 DynamoDB 資料表轉換為全球資料表。"},"answer":"C"},{"num":3,"stem":"一家公司使用 AWS Organizations，以單一 OU 名為 Production 來管理多個帳戶。所有帳戶都是 Production OU 的成員。管理員使用組織根目錄中的拒絕清單 SCP（deny list SCP）來管理對受限服務的存取。\n\n公司最近收購了一個新的業務單位，並將該業務單位現有的 AWS 帳戶邀請加入組織。上線後，新業務單位的管理員發現他們無法更新現有的 AWS Config 規則以符合公司政策。\n哪個選項可以讓管理員進行變更，同時繼續執行現有政策，且不會引入額外的長期維護負擔？","options":{"A":"移除限制存取 AWS Config 的組織根目錄 SCP。為公司的標準 AWS Config 規則建立 AWS Service Catalog 產品，並將其部署到整個組織，包括新帳戶。","B":"為新帳戶建立一個名為 Onboarding 的臨時 OU。對 Onboarding OU 套用 SCP 以允許 AWS Config 操作。完成 AWS Config 的調整後，將新帳戶移至 Production OU。","C":"將組織根目錄的 SCP 從拒絕清單 SCP 轉換為允許清單 SCP（allow list SCP），僅允許所需的服務。對組織根目錄臨時套用一個 SCP，允許僅限新帳戶中的主體執行 AWS Config 操作。","D":"為新帳戶建立一個名為 Onboarding 的臨時 OU。對 Onboarding OU 套用 SCP 以允許 AWS Config 操作。將組織根目錄的 SCP 移至 Production OU。完成 AWS Config 的調整後，將新帳戶移至 Production OU。"},"answer":"B"},{"num":4,"stem":"一家公司在內部部署資料中心中執行一個雙層 Web 應用程式。應用程式層由一台執行具狀態應用程式的單一伺服器組成。應用程式連接到在另一台伺服器上執行的 PostgreSQL 資料庫。由於預期使用者基礎將顯著增長，公司正在將應用程式和資料庫遷移到 AWS。此解決方案將使用 Amazon Aurora PostgreSQL、Amazon EC2 Auto Scaling 和 Elastic Load Balancing。\n哪個解決方案能提供一致的使用者體驗，並使應用程式和資料庫層得以擴展？","options":{"A":"為 Aurora 副本（Aurora Replicas）啟用 Aurora Auto Scaling。使用具有最少未完成請求（least outstanding requests）路由演算法且啟用黏性工作階段（sticky sessions）的 Network Load Balancer。","B":"為 Aurora 寫入器（Aurora writers）啟用 Aurora Auto Scaling。使用具有循環（round robin）路由演算法且啟用黏性工作階段的 Application Load Balancer。","C":"為 Aurora 副本（Aurora Replicas）啟用 Aurora Auto Scaling。使用具有循環（round robin）路由且啟用黏性工作階段的 Application Load Balancer。","D":"為 Aurora 寫入器（Aurora writers）啟用 Aurora Auto Scaling。使用具有最少未完成請求（least outstanding requests）路由演算法且啟用黏性工作階段的 Network Load Balancer。"},"answer":"C"},{"num":5,"stem":"一家公司使用一項服務，從其內部部署託管的應用程式收集中繼資料。電視和網路收音機等消費裝置會存取這些應用程式。許多較舊的裝置不支援某些 HTTP 標頭，當回應中出現這些標頭時會發生錯誤。公司已設定內部部署負載平衡器，根據使用者代理（User-Agent）標頭識別的舊裝置，從回應中移除不支援的標頭。\n公司希望將服務遷移到 AWS、採用無伺服器技術，並保留支援舊裝置的能力。公司已將應用程式遷移到一組 AWS Lambda 函數中。\n哪個解決方案可以滿足這些需求？","options":{"A":"為中繼資料服務建立 Amazon CloudFront 發佈。建立 Application Load Balancer（ALB）。將 CloudFront 發佈設定為將請求轉送到 ALB。設定 ALB 針對每種請求類型叫用正確的 Lambda 函數。建立 CloudFront 函數，根據 User-Agent 標頭的值移除有問題的標頭。","B":"為中繼資料服務建立 Amazon API Gateway REST API。設定 API Gateway 針對每種請求類型叫用正確的 Lambda 函數。修改預設閘道回應，根據 User-Agent 標頭的值移除有問題的標頭。","C":"為中繼資料服務建立 Amazon API Gateway HTTP API。設定 API Gateway 針對每種請求類型叫用正確的 Lambda 函數。建立回應對應範本以根據 User-Agent 的值移除有問題的標頭。將回應資料對應與 HTTP API 關聯。","D":"為中繼資料服務建立 Amazon CloudFront 發佈。建立 Application Load Balancer（ALB）。將 CloudFront 發佈設定為將請求轉送到 ALB。設定 ALB 針對每種請求類型叫用正確的 Lambda 函數。建立 Lambda@Edge 函數，根據 User-Agent 標頭的值在回應檢視器請求時移除有問題的標頭。"},"answer":"B"},{"num":6,"stem":"一家零售公司需要向其商業夥伴提供一系列資料檔案。這些檔案儲存在屬於零售公司的帳戶 A 下的 Amazon S3 儲存貯體中。商業夥伴公司希望其 IAM 使用者 User_DataProcessor 從自己的 AWS 帳戶（帳戶 B）存取這些檔案。\n兩家公司必須採取哪些組合步驟，才能讓 User_DataProcessor 成功存取 S3 儲存貯體？（選擇兩個）","options":{"A":"為帳戶 A 中的 S3 儲存貯體開啟跨來源資源共用（CORS）功能。","B":"在帳戶 A 中，將 S3 儲存貯體政策設定如下：","C":"在帳戶 A 中，將 S3 儲存貯體政策設定如下：","D":"在帳戶 B 中，將 User_DataProcessor 的權限設定如下：","E":"在帳戶 B 中，將 User_DataProcessor 的權限設定如下："},"answer":"CD"},{"num":7,"stem":"一家公司在 Amazon EC2 執行個體上執行傳統 Web 應用程式。公司需要將應用程式重構為在容器上執行的微服務。應用程式的兩個獨立版本分別存在於生產和測試兩個不同環境中。應用程式的負載是可變的，但最小負載和最大負載是已知的。解決方案架構師需要以無伺服器架構設計更新後的應用程式，並將營運複雜度降至最低。\n哪個解決方案能以最具成本效益的方式滿足這些需求？","options":{"A":"將容器映像以函數形式上傳到 AWS Lambda。為相關的 Lambda 函數設定並行限制，以處理預期的尖峰負載。在 Amazon API Gateway 中設定兩個獨立的 Lambda 整合：一個用於生產，一個用於測試。","B":"將容器映像上傳到 Amazon Elastic Container Registry（Amazon ECR）。設定兩個已啟用自動擴展的 Amazon Elastic Container Service（Amazon ECS）叢集，並使用 Fargate 啟動類型以處理預期負載。從 ECR 映像部署任務。設定兩個獨立的 Application Load Balancer，將流量導向 ECS 叢集。","C":"將容器映像上傳到 Amazon Elastic Container Registry（Amazon ECR）。設定兩個已啟用自動擴展的 Amazon Elastic Kubernetes Service（Amazon EKS）叢集，並使用 Fargate 啟動類型以處理預期負載。從 ECR 映像部署任務。設定兩個獨立的 Application Load Balancer，將流量導向 EKS 叢集。","D":"將容器映像上傳到 AWS Elastic Beanstalk。在 Elastic Beanstalk 中，為生產和測試分別建立獨立的環境和部署。設定兩個獨立的 Application Load Balancer，將流量導向 Elastic Beanstalk 部署。"},"answer":"B"},{"num":8,"stem":"一家公司有一個多層 Web 應用程式，在 Application Load Balancer（ALB）後方的一組 Amazon EC2 執行個體上執行。執行個體位於 Auto Scaling 群組中。ALB 和 Auto Scaling 群組已在備用 AWS 區域中複寫。Auto Scaling 群組的最小值和最大值均設定為零。一個 Amazon RDS Multi-AZ DB 執行個體儲存應用程式的資料。DB 執行個體在備用區域中有一個唯讀副本。應用程式透過 Amazon Route 53 記錄向終端使用者呈現端點。\n公司需要將 RTO 降低至 15 分鐘以內，讓應用程式能夠自動容錯移轉到備用區域。公司沒有足夠的預算採用主動-主動（active-active）策略。\n解決方案架構師應提出什麼建議以滿足這些需求？","options":{"A":"使用延遲型路由政策重新設定應用程式的 Route 53 記錄，在兩個 ALB 之間進行負載平衡。在備用區域建立 AWS Lambda 函數以提升唯讀副本並修改 Auto Scaling 群組的值。建立 Amazon CloudWatch 警示，以主要區域 ALB 的 HTTPCode_Target_5XX_Count 指標為依據。設定 CloudWatch 警示以叫用 Lambda 函數。","B":"在備用區域建立 AWS Lambda 函數以提升唯讀副本並修改 Auto Scaling 群組的值。使用健康檢查設定 Route 53，監控 Web 應用程式，並在健康檢查狀態為不健康時傳送 Amazon Simple Notification Service（Amazon SNS）通知給 Lambda 函數。以容錯移轉政策更新應用程式的 Route 53 記錄，當健康檢查失敗時將流量路由到備用區域的 ALB。","C":"將備用區域中的 Auto Scaling 群組設定為與主要區域中的 Auto Scaling 群組具有相同的值。使用延遲型路由政策重新設定應用程式的 Route 53 記錄，在兩個 ALB 之間進行負載平衡。移除唯讀副本，以獨立的 RDS DB 執行個體取代。使用快照和 Amazon S3 在兩個 RDS DB 執行個體之間設定跨區域複寫。","D":"在 AWS Global Accelerator 中設定一個端點，以兩個 ALB 作為等權重目標。在備用區域建立 AWS Lambda 函數以提升唯讀副本並修改 Auto Scaling 群組的值。建立 Amazon CloudWatch 警示，以主要區域 ALB 的 HTTPCode_Target_5XX_Count 指標為依據。設定 CloudWatch 警示以叫用 Lambda 函數。"},"answer":"B"},{"num":9,"stem":"一家公司在單一 Amazon EC2 執行個體上託管一個關鍵應用程式。該應用程式使用 Amazon ElastiCache for Redis 單節點叢集作為記憶體內資料存放區，並使用 Amazon RDS for MariaDB DB 執行個體作為關聯式資料庫。為使應用程式正常運作，每個基礎架構元件都必須健康且處於使用中狀態。\n解決方案架構師需要改善應用程式的架構，使基礎架構能夠以最短的停機時間自動從故障中復原。\n哪些步驟組合可以滿足這些需求？（選擇三個）","options":{"A":"使用 Elastic Load Balancer 將流量分配到多個 EC2 執行個體。確保 EC2 執行個體是最小容量為兩個執行個體的 Auto Scaling 群組的一部分。","B":"使用 Elastic Load Balancer 將流量分配到多個 EC2 執行個體。確保 EC2 執行個體設定為無限制（unlimited）模式。","C":"修改 DB 執行個體，在相同可用區域中建立唯讀副本。在故障情境下，將唯讀副本提升為主要 DB 執行個體。","D":"修改 DB 執行個體，建立跨越兩個可用區域的 Multi-AZ 部署。","E":"為 ElastiCache for Redis 叢集建立複寫群組。將叢集設定為使用最小容量為兩個執行個體的 Auto Scaling 群組。","F":"為 ElastiCache for Redis 叢集建立複寫群組。在叢集上啟用 Multi-AZ。"},"answer":"ADF"},{"num":10,"stem":"一家零售公司在 AWS 上執行其電子商務應用程式。應用程式在 Application Load Balancer（ALB）後方的 Amazon EC2 執行個體上執行。公司使用 Amazon RDS DB 執行個體作為資料庫後端。Amazon CloudFront 已設定一個指向 ALB 的來源，並快取靜態內容。Amazon Route 53 用於託管所有公開區域。\n應用程式更新後，ALB 偶爾會傳回 502 狀態碼（Bad Gateway）錯誤。根本原因是 ALB 收到格式錯誤的 HTTP 標頭。當解決方案架構師在錯誤發生後立即重新載入網頁時，網頁可以成功回傳。\n在公司解決問題的同時，解決方案架構師需要向訪客提供自訂錯誤頁面，而非標準的 ALB 錯誤頁面。\n哪些步驟組合能以最少的營運開銷滿足此需求？（選擇兩個）","options":{"A":"建立 Amazon S3 儲存貯體。設定 S3 儲存貯體以託管靜態網頁。將自訂錯誤頁面上傳到 Amazon S3。","B":"建立 Amazon CloudWatch 警示，若 ALB 健康檢查回應 Target.FailedHealthChecks 大於 0，則叫用 AWS Lambda 函數。設定 Lambda 函數修改 ALB 的轉送規則，指向可公開存取的 Web 伺服器。","C":"透過新增健康檢查修改現有的 Amazon Route 53 記錄。若健康檢查失敗，設定備援目標。修改 DNS 記錄以指向可公開存取的網頁。","D":"建立 Amazon CloudWatch 警示，若 ALB 健康檢查回應 Elb.InternalError 大於 0，則叫用 AWS Lambda 函數。設定 Lambda 函數修改 ALB 的轉送規則，指向可公開存取的 Web 伺服器。","E":"透過設定 CloudFront 自訂錯誤頁面來新增自訂錯誤回應。修改 DNS 記錄以指向可公開存取的網頁。"},"answer":"CE"},{"num":11,"stem":"一家公司擁有許多 AWS 帳戶，並使用 AWS Organizations 管理所有帳戶。解決方案架構師必須實作一個解決方案，讓公司能夠在多個帳戶之間共用一個通用網路。\n公司的基礎架構團隊有一個專屬的基礎架構帳戶，其中包含一個 VPC。基礎架構團隊必須使用此帳戶來管理網路。個別帳戶不能有管理自己網路的能力。但是，個別帳戶必須能夠在子網路中建立 AWS 資源。\n解決方案架構師應執行哪些步驟組合以滿足這些需求？（選擇兩個）","options":{"A":"在基礎架構帳戶中建立 transit gateway。","B":"從 AWS Organizations 管理帳戶啟用資源共用。","C":"在 AWS Organizations 的組織內，為每個 AWS 帳戶建立 VPC。設定 VPC 以共用與基礎架構帳戶中 VPC 相同的 CIDR 範圍和子網路。將每個個別帳戶中的 VPC 與基礎架構帳戶中的 VPC 進行對等連線（peering）。","D":"在基礎架構帳戶的 AWS Resource Access Manager 中建立資源共用。選取將使用共用網路的特定 AWS Organizations OU。選取每個子網路以與資源共用關聯。","E":"在基礎架構帳戶的 AWS Resource Access Manager 中建立資源共用。選取將使用共用網路的特定 AWS Organizations OU。選取每個前綴清單（prefix list）以與資源共用關聯。"},"answer":"AD"},{"num":12,"stem":"一家公司想使用第三方軟體即服務（SaaS）應用程式。該第三方 SaaS 應用程式透過多個 API 呼叫使用。第三方 SaaS 應用程式也在 AWS 的 VPC 內執行。\n公司將從自己的 VPC 內使用第三方 SaaS 應用程式。公司的內部安全政策要求使用不穿越網際網路的私人連線。在公司 VPC 中執行的任何資源都不允許從公司 VPC 外部存取。所有權限必須符合最小權限原則。\n哪個解決方案滿足這些需求？","options":{"A":"建立 AWS PrivateLink 介面 VPC 端點。將此端點連接到第三方 SaaS 應用程式提供的端點服務。建立安全群組以限制對端點的存取。將安全群組與端點關聯。","B":"在第三方 SaaS 應用程式和公司 VPC 之間建立 AWS Site-to-Site VPN 連線。設定網路 ACL 以限制跨 VPN 通道的存取。","C":"在第三方 SaaS 應用程式和公司 VPC 之間建立 VPC 對等連線（VPC peering connection）。透過新增對等連線所需的路由來更新路由表。","D":"建立 AWS PrivateLink 端點服務。請第三方 SaaS 供應商為此端點服務建立介面 VPC 端點。將端點服務的權限授予第三方 SaaS 供應商的特定帳戶。"},"answer":"A"},{"num":13,"stem":"一家公司需要為其伺服器實作修補程序程序。內部部署伺服器和 Amazon EC2 執行個體使用各種工具執行修補。管理層需要一份顯示所有伺服器和執行個體修補狀態的單一報告。\n解決方案架構師應採取哪些步驟以滿足這些需求？","options":{"A":"使用 AWS Systems Manager 管理內部部署伺服器和 EC2 執行個體上的修補程序。使用 Systems Manager 產生修補合規報告。","B":"使用 AWS OpsWorks 管理內部部署伺服器和 EC2 執行個體上的修補程序。使用 Amazon QuickSight 與 OpsWorks 的整合來產生修補合規報告。","C":"使用 Amazon EventBridge 規則排程 AWS Systems Manager 修補補救工作以套用修補程序。使用 Amazon Inspector 產生修補合規報告。","D":"使用 AWS OpsWorks 管理內部部署伺服器和 EC2 執行個體上的修補程序。使用 AWS X-Ray 將修補狀態發布到 AWS Systems Manager OpsCenter 以產生修補合規報告。"},"answer":"A"},{"num":14,"stem":"一家公司在 Application Load Balancer 後方的 Auto Scaling 群組中的多個 Amazon EC2 執行個體上執行應用程式。應用程式的負載在一天中有所變化，EC2 執行個體定期進行擴展和縮減。EC2 執行個體的日誌檔案每 15 分鐘複製到中央 Amazon S3 儲存貯體一次。安全團隊發現部分已終止的 EC2 執行個體的日誌檔案遺失。\n哪些步驟可確保從已終止的 EC2 執行個體將日誌檔案複製到中央 S3 儲存貯體？","options":{"A":"建立將日誌檔案複製到 Amazon S3 的指令碼，並將指令碼儲存在 EC2 執行個體上的檔案中。建立 Auto Scaling 生命週期掛鉤（lifecycle hook）和 Amazon EventBridge 規則以偵測來自 Auto Scaling 群組的生命週期事件。在 autoscaling:EC2_INSTANCE_TERMINATING 轉換時叫用 AWS Lambda 函數，向 Auto Scaling 群組傳送 ABANDON 以防止終止，執行指令碼以複製日誌檔案，並使用 AWS SDK 終止執行個體。","B":"建立包含將日誌檔案複製到 Amazon S3 之指令碼的 AWS Systems Manager 文件。建立 Auto Scaling 生命週期掛鉤（lifecycle hook）和 Amazon EventBridge 規則以偵測來自 Auto Scaling 群組的生命週期事件。在 autoscaling:EC2_INSTANCE_TERMINATING 轉換時叫用 AWS Lambda 函數，呼叫 AWS Systems Manager API 的 SendCommand 操作來執行文件以複製日誌檔案，並向 Auto Scaling 群組傳送 CONTINUE 以終止執行個體。","C":"將日誌傳送頻率更改為每 5 分鐘一次。建立將日誌檔案複製到 Amazon S3 的指令碼，並將指令碼新增到 EC2 執行個體使用者資料（user data）。建立 Amazon EventBridge 規則以偵測 EC2 執行個體終止。從 EventBridge 規則叫用 AWS Lambda 函數，使用 AWS CLI 執行使用者資料指令碼以複製日誌檔案並終止執行個體。","D":"建立包含將日誌檔案複製到 Amazon S3 之指令碼的 AWS Systems Manager 文件。建立 Auto Scaling 生命週期掛鉤（lifecycle hook），將訊息發布到 Amazon Simple Notification Service（Amazon SNS）主題。從 SNS 通知呼叫 AWS Systems Manager API 的 SendCommand 操作，執行文件以複製日誌檔案，並向 Auto Scaling 群組傳送 ABANDON 以終止執行個體。"},"answer":"B"},{"num":15,"stem":"一家公司正在使用多個 AWS 帳戶。DNS 記錄儲存在帳戶 A 中 Amazon Route 53 的私有託管區域中。公司的應用程式和資料庫在帳戶 B 中執行。\n解決方案架構師將在新的 VPC 中部署雙層應用程式。為簡化設定，Amazon RDS 端點的 db.example.com CNAME 記錄集已在 Amazon Route 53 的私有託管區域中建立。\n部署期間，應用程式無法啟動。疑難排解顯示 db.example.com 在 Amazon EC2 執行個體上無法解析。解決方案架構師確認記錄集在 Route 53 中已正確建立。\n解決方案架構師應採取哪些步驟組合來解決此問題？（選擇兩個）","options":{"A":"在新 VPC 中的獨立 EC2 執行個體上部署資料庫。在私有託管區域中為執行個體的私有 IP 建立記錄集。","B":"使用 SSH 連線到應用程式層 EC2 執行個體。將 RDS 端點 IP 位址新增到 /etc/resolv.conf 檔案中。","C":"建立授權，將帳戶 A 中的私有託管區域與帳戶 B 中的新 VPC 關聯。","D":"在帳戶 B 中為 example.com 網域建立私有託管區域。設定 Route 53 在 AWS 帳戶之間的複寫。","E":"將帳戶 B 中的新 VPC 與帳戶 A 中的託管區域關聯。刪除帳戶 A 中的關聯授權。"},"answer":"CE"},{"num":16,"stem":"一家公司使用 Amazon EC2 執行個體部署 Web 伺服器叢隊以託管部落格網站。EC2 執行個體位於 Application Load Balancer（ALB）後方，並設定在 Auto Scaling 群組中。Web 應用程式將所有部落格內容儲存在 Amazon EFS 磁碟區上。\n公司最近新增了一項讓部落客在貼文中加入影片的功能，吸引了原先 10 倍的使用者流量。在每天的尖峰時段，使用者回報嘗試瀏覽網站或觀看影片時出現緩衝和逾時問題。\n哪個部署方式最具成本效益且可擴展，能夠解決使用者的問題？","options":{"A":"重新設定 Amazon EFS 以啟用最大 I/O。","B":"將部落格網站更新為使用執行個體儲存磁碟區（instance store volumes）進行儲存。在啟動時將網站內容複製到磁碟區，並在關閉時複製到 Amazon S3。","C":"設定 Amazon CloudFront 發佈。將發佈指向 S3 儲存貯體，並將影片從 EFS 遷移到 Amazon S3。","D":"為所有網站內容設定 Amazon CloudFront 發佈，並將發佈指向 ALB。"},"answer":"C"},{"num":17,"stem":"一家在全球設有辦公室的公司，擁有一條連接到單一 AWS 區域的 1 Gbps AWS Direct Connect 連線。公司的內部部署網路使用此連線與公司在 AWS 雲端中的資源通訊。該連線有一個連接到單一 VPC 的單一私有虛擬介面（private virtual interface）。\n解決方案架構師必須實作一個解決方案，在同一區域中新增一條冗餘的 Direct Connect 連線。此解決方案還必須在公司擴展到其他區域時，透過同一對 Direct Connect 連線提供連往其他區域的連線能力。\n哪個解決方案滿足這些需求？","options":{"A":"佈建 Direct Connect 閘道。從現有連線中刪除現有的私有虛擬介面。建立第二條 Direct Connect 連線。在每條連線上建立新的私有虛擬介面，並將兩個私有虛擬介面連接到 Direct Connect 閘道。將 Direct Connect 閘道連接到單一 VPC。","B":"保留現有的私有虛擬介面。建立第二條 Direct Connect 連線。在新連線上建立新的私有虛擬介面，並將新的私有虛擬介面連接到單一 VPC。","C":"保留現有的私有虛擬介面。建立第二條 Direct Connect 連線。在新連線上建立新的公有虛擬介面（public virtual interface），並將新的公有虛擬介面連接到單一 VPC。","D":"佈建 transit gateway。從現有連線中刪除現有的私有虛擬介面。建立第二條 Direct Connect 連線。在每條連線上建立新的私有虛擬介面，並將兩個私有虛擬介面連接到 transit gateway。將 transit gateway 與單一 VPC 關聯。"},"answer":"A"},{"num":18,"stem":"一家公司有一個 Web 應用程式，允許使用者上傳短影片。影片儲存在 Amazon EBS 磁碟區上，並由自訂識別軟體進行分析以進行分類。\n網站包含靜態內容，流量可變，在某些月份有流量高峰。架構由在 Auto Scaling 群組中執行的 Amazon EC2 執行個體組成，用於 Web 應用程式，以及在 Auto Scaling 群組中執行的 EC2 執行個體處理 Amazon SQS 佇列。公司希望在可能的情況下使用 AWS 受管服務重新架構應用程式以降低營運開銷，並移除對第三方軟體的依賴。\n哪個解決方案滿足這些需求？","options":{"A":"對 Web 應用程式使用 Amazon ECS 容器，並對處理 SQS 佇列的 Auto Scaling 群組使用 Spot 執行個體。以 Amazon Rekognition 取代自訂軟體來對影片進行分類。","B":"將上傳的影片儲存在 Amazon EFS 中，並將檔案系統掛載到 Web 應用程式的 EC2 執行個體。使用呼叫 Amazon Rekognition API 的 AWS Lambda 函數處理 SQS 佇列，以對影片進行分類。","C":"在 Amazon S3 中託管 Web 應用程式。將上傳的影片儲存在 Amazon S3 中。使用 S3 事件通知將事件發布到 SQS 佇列。使用呼叫 Amazon Rekognition API 的 AWS Lambda 函數處理 SQS 佇列，以對影片進行分類。","D":"使用 AWS Elastic Beanstalk 在 Auto Scaling 群組中為 Web 應用程式啟動 EC2 執行個體，並啟動工作者環境（worker environment）來處理 SQS 佇列。以 Amazon Rekognition 取代自訂軟體來對影片進行分類。"},"answer":"D"},{"num":19,"stem":"一家公司有一個由 Amazon CloudFront、Amazon API Gateway 和 AWS Lambda 函數組成的無伺服器應用程式。目前的應用程式程式碼部署流程是建立新版本號碼的 Lambda 函數，然後執行 AWS CLI 指令碼來進行更新。若新的函數版本發生錯誤，另一個 CLI 指令碼會透過部署前一個可運作的函數版本來進行復原。公司希望縮短部署 Lambda 函數所提供之新版應用程式邏輯的時間，並減少偵測錯誤和復原所需的時間。\n如何實現這一目標？","options":{"A":"建立並部署巢狀的 AWS CloudFormation 堆疊，父堆疊包含 AWS CloudFront 發佈和 API Gateway，子堆疊包含 Lambda 函數。對於 Lambda 的變更，建立 AWS CloudFormation 變更集並進行部署；若觸發錯誤，將 AWS CloudFormation 變更集還原至前一個版本。","B":"使用 AWS SAM 和內建的 AWS CodeDeploy 來部署新的 Lambda 版本，逐步將流量轉移到新版本，並使用流量前測試（pre-traffic）和流量後測試（post-traffic）函數來驗證程式碼。若觸發 Amazon CloudWatch 警示則進行回滾。","C":"將 AWS CLI 指令碼重構為單一指令碼以部署新的 Lambda 版本。部署完成後，指令碼測試開始執行。若偵測到錯誤，則還原至前一個 Lambda 版本。","D":"建立並部署包含新 API Gateway 端點（參照新 Lambda 版本）的 AWS CloudFormation 堆疊。將 CloudFront 來源更改為新的 API Gateway 端點，監控錯誤，若偵測到錯誤，則將 AWS CloudFront 來源更改為前一個 API Gateway 端點。"},"answer":"B"},{"num":20,"stem":"一家公司計劃儲存大量的封存文件，並透過公司內部網路（intranet）讓員工存取這些文件。員工將透過連接至 VPC 的用戶端 VPN 服務進行連線存取系統。資料不得對外公開。\n公司儲存的文件是其他地方實體媒體上資料的副本。請求數量將會很少。可用性和擷取速度不是公司關注的問題。\n哪個解決方案能以最低成本滿足這些需求？","options":{"A":"建立 Amazon S3 儲存貯體。將 S3 儲存貯體設定為預設使用 S3 One Zone-Infrequent Access（S3 One Zone-IA）儲存類別。設定 S3 儲存貯體以提供網站託管。建立 S3 介面端點。設定 S3 儲存貯體以僅允許透過該端點存取。","B":"啟動執行 Web 伺服器的 Amazon EC2 執行個體。連接 Amazon Elastic File System（Amazon EFS）檔案系統，以 EFS One Zone-Infrequent Access（EFS One Zone-IA）儲存類別儲存封存資料。設定執行個體安全群組以僅允許來自私有網路的存取。","C":"啟動執行 Web 伺服器的 Amazon EC2 執行個體。連接 Amazon Elastic Block Store（Amazon EBS）磁碟區以儲存封存資料。使用 Cold HDD（sc1）磁碟區類型。設定執行個體安全群組以僅允許來自私有網路的存取。","D":"建立 Amazon S3 儲存貯體。將 S3 儲存貯體設定為預設使用 S3 Glacier Deep Archive 儲存類別。設定 S3 儲存貯體以提供網站託管。建立 S3 介面端點。設定 S3 儲存貯體以僅允許透過該端點存取。"},"answer":"D"},{"num":21,"stem":"一家公司正在使用內部部署 Active Directory 服務進行使用者驗證。公司希望使用相同的驗證服務登入使用 AWS Organizations 管理的公司 AWS 帳戶。內部部署環境與公司所有 AWS 帳戶之間已存在 AWS Site-to-Site VPN 連線。\n公司的安全政策要求根據使用者群組和角色對帳戶進行條件式存取。使用者身分必須在單一位置進行管理。\n哪個解決方案可以滿足這些需求？","options":{"A":"設定 AWS IAM Identity Center（AWS Single Sign-On）使用 SAML 2.0 連接到 Active Directory。使用跨網域身分管理系統（SCIM）v2.0 通訊協定啟用自動佈建。使用屬性型存取控制（ABAC）授予對 AWS 帳戶的存取權限。","B":"透過使用 IAM Identity Center 作為身分來源來設定 AWS IAM Identity Center（AWS Single Sign-On）。使用跨網域身分管理系統（SCIM）v2.0 通訊協定啟用自動佈建。使用 IAM Identity Center 權限集（permission sets）授予對 AWS 帳戶的存取權限。","C":"在公司的其中一個 AWS 帳戶中，設定 AWS Identity and Access Management（IAM）以使用 SAML 2.0 身分供應商。佈建對應至聯合使用者的 IAM 使用者。授予對應至 Active Directory 中適當群組的存取權限。使用跨帳戶 IAM 使用者授予對所需 AWS 帳戶的存取權限。","D":"在公司的其中一個 AWS 帳戶中，設定 AWS Identity and Access Management（IAM）使用 OpenID Connect（OIDC）身分供應商。佈建 IAM 角色，為對應至 Active Directory 中適當群組的聯合使用者授予對 AWS 帳戶的存取權限。使用跨帳戶 IAM 角色授予對所需 AWS 帳戶的存取權限。"},"answer":"D"},{"num":22,"stem":"一家軟體公司部署了一個應用程式，使用 Amazon API Gateway、AWS Lambda 函數和 Amazon DynamoDB 資料表消費 REST API。應用程式在 PUT 請求期間的錯誤數量有所增加。大多數 PUT 呼叫來自少數使用特定 API 金鑰驗證的用戶端。\n解決方案架構師發現大量的 PUT 請求來自一個用戶端。API 並非關鍵性的，用戶端可以容忍對不成功呼叫的重試。然而，錯誤顯示給客戶，正在損害 API 的聲譽。\n解決方案架構師應建議什麼來改善客戶體驗？","options":{"A":"在用戶端應用程式中實作具有指數退避（exponential backoff）和不規則變化（jitter）的重試邏輯。確保捕獲錯誤並以描述性錯誤訊息進行處理。","B":"透過 API Gateway 層級的使用計畫（usage plan）實作 API 節流（throttling）。確保用戶端應用程式處理 429 回應碼而不出現錯誤。","C":"開啟 API 快取以增強生產階段的回應能力。執行 10 分鐘的負載測試。驗證快取容量是否適合工作負載。","D":"在 Lambda 函數層級實作預留並行（reserved concurrency），以提供流量突然增加時所需的資源。"},"answer":"B"},{"num":23,"stem":"一家公司在 AWS 上執行資料密集型應用程式。應用程式在數百個 Amazon EC2 執行個體的叢集上執行。共用檔案系統也在多個 EC2 執行個體上執行，儲存 200 TB 的資料。應用程式讀取和修改共用檔案系統上的資料並產生報告。該工作每月執行一次，從共用檔案系統讀取部分檔案，大約需要 72 小時才能完成。運算執行個體在 Auto Scaling 群組中擴展，但託管共用檔案系統的執行個體持續運作。運算和儲存執行個體都在同一個 AWS 區域中。\n解決方案架構師需要透過更換共用檔案系統執行個體來降低成本。檔案系統必須在 72 小時執行期間提供對所需資料的高效能存取。\n哪個解決方案在滿足這些需求的同時，能提供最大的整體成本降低？","options":{"A":"將資料從現有共用檔案系統遷移到使用 S3 Intelligent-Tiering 儲存類別的 Amazon S3 儲存貯體。每月工作執行前，使用 Amazon FSx for Lustre 透過延遲載入（lazy loading）從 Amazon S3 資料建立新的檔案系統。在工作期間使用新的檔案系統作為共用儲存。工作完成後刪除檔案系統。","B":"將資料從現有共用檔案系統遷移到已啟用多重連接（Multi-Attach）的大型 Amazon Elastic Block Store（Amazon EBS）磁碟區。使用 Auto Scaling 群組啟動範本中的使用者資料指令碼，將 EBS 磁碟區連接到每個執行個體。在工作期間使用 EBS 磁碟區作為共用儲存。工作完成後分離 EBS 磁碟區。","C":"將資料從現有共用檔案系統遷移到使用 S3 Standard 儲存類別的 Amazon S3 儲存貯體。每月工作執行前，使用 Amazon FSx for Lustre 透過批次載入（batch loading）從 Amazon S3 資料建立新的檔案系統。在工作期間使用新的檔案系統作為共用儲存。工作完成後刪除檔案系統。","D":"將資料從現有共用檔案系統遷移到 Amazon S3 儲存貯體。每月工作執行前，使用 AWS Storage Gateway 從 Amazon S3 資料建立檔案閘道（file gateway）。在工作期間使用檔案閘道作為共用儲存。工作完成後刪除檔案閘道。"},"answer":"D"},{"num":24,"stem":"一家公司正在開發一項新服務，該服務將透過靜態連接埠上的 TCP 進行存取。解決方案架構師必須確保該服務具有高可用性、跨可用區域的冗餘，並可使用 DNS 名稱 my.service.com（可公開存取）進行存取。服務必須使用固定位址指派，以便其他公司可以將這些位址新增到其允許清單中。\n假設資源部署在單一區域的多個可用區域中，哪個解決方案可以滿足這些需求？","options":{"A":"為每個執行個體建立具有彈性 IP 位址（Elastic IP address）的 Amazon EC2 執行個體。建立 Network Load Balancer（NLB）並公開靜態 TCP 連接埠。向 NLB 註冊 EC2 執行個體。建立名為 my.service.com 的新名稱伺服器記錄集，並將 EC2 執行個體的彈性 IP 位址指派給記錄集。向其他公司提供 EC2 執行個體的彈性 IP 位址以新增到其允許清單中。","B":"建立 Amazon ECS 叢集和應用程式的服務定義。為 ECS 叢集建立並指派公有 IP 位址。建立 Network Load Balancer（NLB）並公開 TCP 連接埠。建立目標群組並將 ECS 叢集名稱指派給 NLB。建立名為 my.service.com 的新 A 記錄集，並將 ECS 叢集的公有 IP 位址指派給記錄集。向其他公司提供 ECS 叢集的公有 IP 位址以新增到其允許清單中。","C":"為服務建立 Amazon EC2 執行個體。為每個可用區域建立一個彈性 IP 位址。建立 Network Load Balancer（NLB）並公開指派的 TCP 連接埠。為每個可用區域將彈性 IP 位址指派給 NLB。建立目標群組並向 NLB 註冊 EC2 執行個體。建立名為 my.service.com 的新 A（別名）記錄集，並將 NLB DNS 名稱指派給記錄集。","D":"建立 Amazon ECS 叢集和應用程式的服務定義。為叢集中的每個主機建立並指派公有 IP 位址。建立 Application Load Balancer（ALB）並公開靜態 TCP 連接埠。建立目標群組並將 ECS 服務定義名稱指派給 ALB。建立新的 CNAME 記錄集並將公有 IP 位址關聯到記錄集。向其他公司提供 Amazon EC2 執行個體的彈性 IP 位址以新增到其允許清單中。"},"answer":"C"},{"num":25,"stem":"一家公司使用內部部署資料分析平台。該系統在公司資料中心的 12 台伺服器上以完全冗餘配置實現高可用性。\n系統執行排程工作（每小時和每日），以及使用者的一次性請求。排程工作需要 20 分鐘到 2 小時才能完成，且具有嚴格的 SLA。排程工作佔系統使用量的 65%。使用者工作通常在 5 分鐘內完成，沒有 SLA。使用者工作佔系統使用量的 35%。在系統故障期間，排程工作必須繼續滿足 SLA。但是，使用者工作可以延遲。\n解決方案架構師需要將系統移至 Amazon EC2 執行個體，並採用按使用量計費的模式以降低成本，且不需要長期承諾。解決方案必須維持高可用性且不影響 SLA。\n哪個解決方案能以最具成本效益的方式滿足這些需求？","options":{"A":"將 12 個執行個體分配到所選 AWS 區域的兩個可用區域。在每個可用區域中以具容量預留（Capacity Reservations）的隨需執行個體（On-Demand Instances）執行兩個執行個體。在每個可用區域中以 Spot 執行個體執行四個執行個體。","B":"將 12 個執行個體分配到所選 AWS 區域的三個可用區域。在其中一個可用區域中，以具容量預留的隨需執行個體執行所有四個執行個體。將其餘執行個體作為 Spot 執行個體執行。","C":"將 12 個執行個體分配到所選 AWS 區域的三個可用區域。在每個可用區域中以具 Savings Plan 的隨需執行個體執行兩個執行個體。在每個可用區域中以 Spot 執行個體執行兩個執行個體。","D":"將 12 個執行個體分配到所選 AWS 區域的三個可用區域。在每個可用區域中以具容量預留的隨需執行個體執行三個執行個體。在每個可用區域中以 Spot 執行個體執行一個執行個體。"},"answer":"C"},{"num":26,"stem":"一位安全工程師確認，現有應用程式從 Amazon S3 中的加密檔案取得連線至 Amazon RDS for MySQL 資料庫的憑證。針對下一個版本的應用程式，安全工程師希望實作以下應用程式設計變更以提升安全性：\n- 資料庫必須使用儲存在安全 AWS 受管服務中的強式隨機產生密碼。\n- 應用程式資源必須透過 AWS CloudFormation 部署。\n- 應用程式必須每 90 天輪換一次資料庫的憑證。\n一位解決方案架構師將產生 CloudFormation 範本來部署應用程式。\nCloudFormation 範本中指定哪些資源能以最少的操作負擔滿足安全工程師的要求？","options":{"A":"使用 AWS Secrets Manager 將資料庫密碼產生為 secret 資源。建立 AWS Lambda 函式資源以輪換資料庫密碼。指定 Secrets Manager RotationSchedule 資源，每 90 天輪換一次資料庫密碼。","B":"使用 AWS Systems Manager Parameter Store 將資料庫密碼產生為 SecureString 參數類型。建立 AWS Lambda 函式資源以輪換資料庫密碼。指定 Parameter Store RotationSchedule 資源，每 90 天輪換一次資料庫密碼。","C":"使用 AWS Secrets Manager 將資料庫密碼產生為 secret 資源。建立 AWS Lambda 函式資源以輪換資料庫密碼。建立 Amazon EventBridge 排程規則資源，每 90 天觸發 Lambda 函式進行密碼輪換。","D":"使用 AWS Systems Manager Parameter Store 將資料庫密碼產生為 SecureString 參數類型。指定 AWS AppSync DataSource 資源以每 90 天自動輪換資料庫密碼。"},"answer":"A"},{"num":27,"stem":"一家公司將資料儲存在多個 Amazon DynamoDB 資料表中。解決方案架構師必須使用無伺服器架構，透過簡單的 HTTPS API 讓資料可公開存取。解決方案必須能根據需求自動擴展。\n哪些解決方案符合這些要求？(選擇兩個)","options":{"A":"建立 Amazon API Gateway REST API。使用 API Gateway 的 AWS 整合類型，將此 API 設定為直接整合 DynamoDB。","B":"建立 Amazon API Gateway HTTP API。使用 API Gateway 的 AWS 整合類型，將此 API 設定為直接整合 DynamoDB。","C":"建立 Amazon API Gateway HTTP API。將此 API 設定為整合 AWS Lambda 函式，由函式從 DynamoDB 資料表回傳資料。","D":"在 AWS Global Accelerator 中建立加速器。設定此加速器整合 AWS Lambda@Edge 函式，由函式從 DynamoDB 資料表回傳資料。","E":"建立 Network Load Balancer。設定監聽器規則，將請求轉發至適當的 AWS Lambda 函式。"},"answer":"AC"},{"num":28,"stem":"一家公司已註冊 10 個新網域名稱。該公司將這些網域用於線上行銷。公司需要一個解決方案，能將線上訪客重新導向至每個網域對應的特定 URL。所有網域和目標 URL 都定義在一份 JSON 文件中。所有 DNS 記錄均由 Amazon Route 53 管理。\n解決方案架構師必須實作一個能接受 HTTP 和 HTTPS 請求的重新導向服務。\n解決方案架構師應採取哪些步驟組合，以最少的操作工作量滿足這些要求？(選擇三個)","options":{"A":"建立在 Amazon EC2 執行個體上執行的動態網頁。設定網頁使用 JSON 文件結合事件訊息來查詢並回應重新導向 URL。","B":"建立包含 HTTP 和 HTTPS 監聽器的 Application Load Balancer。","C":"建立 AWS Lambda 函式，使用 JSON 文件結合事件訊息來查詢並回應重新導向 URL。","D":"使用帶有自訂網域的 Amazon API Gateway API 來發布 AWS Lambda 函式。","E":"建立 Amazon CloudFront 發佈。部署 Lambda@Edge 函式。","F":"使用 AWS Certificate Manager (ACM) 建立 SSL 憑證。將這些網域加入為主旨別名 (Subject Alternative Names)。"},"answer":"BCF"},{"num":29,"stem":"一家擁有多個 AWS 帳戶的公司正在使用 AWS Organizations。公司的 AWS 帳戶託管 VPC、Amazon EC2 執行個體和容器。\n公司的合規團隊已在每個有部署的 VPC 中部署了安全工具。這些安全工具在 EC2 執行個體上執行，並將資訊傳送至專屬合規團隊的 AWS 帳戶。公司已使用 \"costCenter\" 為鍵、\"compliance\" 為值的標籤，標記所有與合規相關的資源。\n公司希望識別在 EC2 執行個體上執行的安全工具成本，以便向合規團隊的 AWS 帳戶收費。成本計算必須盡可能準確。\n解決方案架構師應如何滿足這些要求？","options":{"A":"在組織的管理帳戶中，啟用 costCenter 使用者定義標籤。設定每月 AWS Cost and Usage Reports 儲存至管理帳戶中的 Amazon S3 儲存貯體。使用報告中的標籤細分，取得 costCenter 標記資源的總成本。","B":"在組織的成員帳戶中，啟用 costCenter 使用者定義標籤。設定每月 AWS Cost and Usage Reports 儲存至管理帳戶中的 Amazon S3 儲存貯體。排程每月執行 AWS Lambda 函式以擷取報告並計算 costCenter 標記資源的總成本。","C":"在組織的成員帳戶中，啟用 costCenter 使用者定義標籤。從管理帳戶排程每月 AWS Cost and Usage Report。使用報告中的標籤細分來計算 costCenter 標記資源的總成本。","D":"在 AWS Trusted Advisor 的組織檢視中建立自訂報告。設定報告為合規團隊 AWS 帳戶中的 costCenter 標記資源產生每月帳單摘要。"},"answer":"A"},{"num":30,"stem":"一家公司擁有 50 個 AWS 帳戶，這些帳戶是 AWS Organizations 中某個組織的成員。每個帳戶包含多個 VPC。公司希望使用 AWS Transit Gateway 建立每個成員帳戶中 VPC 之間的連線。每次建立新的成員帳戶時，公司希望自動化建立新 VPC 和 Transit Gateway 附件的流程。\n哪些步驟組合能滿足這些要求？(選擇兩個)","options":{"A":"從管理帳戶，使用 AWS Resource Access Manager 與成員帳戶共享 Transit Gateway。","B":"從管理帳戶，使用 AWS Organizations SCP 與成員帳戶共享 Transit Gateway。","C":"從管理帳戶啟動 AWS CloudFormation stack set，自動在成員帳戶中建立新的 VPC 和 VPC Transit Gateway 附件。使用 Transit Gateway ID 將附件與管理帳戶中的 Transit Gateway 建立關聯。","D":"從管理帳戶啟動 AWS CloudFormation stack set，自動在成員帳戶中建立新的 VPC 和對等 Transit Gateway 附件。使用 Transit Gateway 服務連結角色與管理帳戶中的 Transit Gateway 共享附件。","E":"從管理帳戶，使用 AWS Service Catalog 與成員帳戶共享 Transit Gateway。"},"answer":"AC"},{"num":31,"stem":"一家企業公司希望允許其開發人員透過 AWS Marketplace 購買第三方軟體。該公司使用已啟用完整功能的 AWS Organizations 帳戶結構，並在每個組織單位 (OU) 中有一個共享服務帳戶，供採購經理使用。採購團隊的政策規定，開發人員只能從已核准的清單中取得第三方軟體，並使用 AWS Marketplace 中的 Private Marketplace 來達到此要求。採購團隊希望將 Private Marketplace 的管理限制為一個名為 procurement-manager-role 的角色，該角色可由採購經理擔任。公司中的其他 IAM 使用者、群組、角色和帳戶管理員應被拒絕 Private Marketplace 管理存取。\n設計符合這些要求的架構最有效率的方式是什麼？","options":{"A":"在組織的所有 AWS 帳戶中建立名為 procurement-manager-role 的 IAM 角色。將 PowerUserAccess 受管政策新增至該角色。對每個 AWS 帳戶中的所有 IAM 使用者和角色套用內嵌政策，以拒絕 AWSPrivateMarketplaceAdminFullAccess 受管政策的權限。","B":"在組織的所有 AWS 帳戶中建立名為 procurement-manager-role 的 IAM 角色。將 AdministratorAccess 受管政策新增至該角色。使用 AWSPrivateMarketplaceAdminFullAccess 受管政策定義權限邊界，並將其附加至所有開發人員角色。","C":"在組織的所有共享服務帳戶中建立名為 procurement-manager-role 的 IAM 角色。將 AWSPrivateMarketplaceAdminFullAccess 受管政策新增至該角色。建立組織根層級 SCP，拒絕除名為 procurement-manager-role 的角色以外的所有人管理 Private Marketplace 的權限。再建立另一個組織根層級 SCP，拒絕組織中的所有人建立名為 procurement-manager-role 的 IAM 角色。","D":"在開發人員將使用的所有 AWS 帳戶中建立名為 procurement-manager-role 的 IAM 角色。將 AWSPrivateMarketplaceAdminFullAccess 受管政策新增至該角色。在 Organizations 中建立 SCP，拒絕除名為 procurement-manager-role 的角色以外的所有人管理 Private Marketplace 的權限。將 SCP 套用至組織中的所有共享服務帳戶。"},"answer":"C"},{"num":32,"stem":"一家公司正在實作 AWS Organizations，以限制開發人員只能使用 Amazon EC2、Amazon S3 和 Amazon DynamoDB。開發人員帳戶位於專屬的組織單位 (OU) 中。解決方案架構師已在開發人員帳戶上實作了以下 SCP：\n\n部署此政策後，開發人員帳戶中的 IAM 使用者仍然能夠使用政策中未列出的 AWS 服務。\n解決方案架構師應如何消除開發人員使用此政策範圍外服務的能力？","options":{"A":"為每個應受限制的 AWS 服務建立明確的拒絕陳述。","B":"從開發人員帳戶的 OU 移除 FullAWSAccess SCP。","C":"修改 FullAWSAccess SCP，以明確拒絕所有服務。","D":"在 SCP 末尾新增使用萬用字元的明確拒絕陳述。"},"answer":"D"},{"num":33,"stem":"一家公司在 VPC 的公有子網路中，於五個 Amazon EC2 執行個體上託管一個整合型 REST API 供行動應用程式使用。行動用戶端透過 Amazon Route 53 上託管的網域名稱連線至 API。公司已建立 Route 53 多值回應路由政策，並包含所有 EC2 執行個體的 IP 位址。最近，應用程式遭受大量突發流量，導致應用程式無法應對這些流量。\n解決方案架構師需要實作一個解決方案，讓應用程式能夠處理新的變動負載。\n哪個解決方案能以最少的操作負擔滿足這些要求？","options":{"A":"將 API 拆分為獨立的 AWS Lambda 函式。設定帶有 Lambda 整合的 Amazon API Gateway REST API 作為後端。更新 Route 53 記錄以指向 API Gateway API。","B":"將 API 邏輯容器化。建立 Amazon Elastic Kubernetes Service (Amazon EKS) 叢集。使用 Amazon EC2 在叢集中執行容器。建立 Kubernetes ingress。更新 Route 53 記錄以指向 Kubernetes ingress。","C":"建立 Auto Scaling 群組。將所有 EC2 執行個體放入 Auto Scaling 群組。設定 Auto Scaling 群組根據 CPU 使用率執行擴展動作。建立 AWS Lambda 函式，對 Auto Scaling 群組的變更作出反應並更新 Route 53 記錄。","D":"在 API 前方建立 Application Load Balancer (ALB)。將 EC2 執行個體移至 VPC 的私有子網路。將 EC2 執行個體新增為 ALB 的目標。更新 Route 53 記錄以指向 ALB。"},"answer":"D"},{"num":34,"stem":"一家公司在 AWS Organizations 中為每個工程團隊建立了一個 OU。每個 OU 擁有多個 AWS 帳戶。整個組織有數百個 AWS 帳戶。\n解決方案架構師必須設計一個解決方案，讓每個 OU 能夠查看其 AWS 帳戶的使用成本細分。\n哪個解決方案符合這些要求？","options":{"A":"使用 AWS Resource Access Manager 為每個 OU 建立 AWS Cost and Usage Report (CUR)。允許每個團隊透過 Amazon QuickSight 儀表板視覺化 CUR。","B":"從 AWS Organizations 管理帳戶建立 AWS Cost and Usage Report (CUR)。允許每個團隊透過 Amazon QuickSight 儀表板視覺化 CUR。","C":"在每個 AWS Organizations 成員帳戶中建立 AWS Cost and Usage Report (CUR)。允許每個團隊透過 Amazon QuickSight 儀表板視覺化 CUR。","D":"使用 AWS Systems Manager 建立 AWS Cost and Usage Report (CUR)。允許每個團隊透過 Systems Manager OpsCenter 儀表板視覺化 CUR。"},"answer":"B"},{"num":35,"stem":"一家公司將資料儲存在內部部署的 Windows 檔案伺服器上。公司每天產生 5 GB 的新資料。\n公司已將部分 Windows 工作負載遷移至 AWS，需要在雲端的檔案系統上存取這些資料。公司已在內部部署網路和 AWS 之間建立了 AWS Direct Connect 連線。\n公司應使用哪種資料遷移策略？","options":{"A":"使用 AWS Storage Gateway 的檔案閘道選項取代現有的 Windows 檔案伺服器，並將現有的檔案共享指向新的檔案閘道。","B":"使用 AWS DataSync 排程每日任務，在內部部署的 Windows 檔案伺服器與 Amazon FSx 之間複製資料。","C":"使用 AWS Data Pipeline 排程每日任務，在內部部署的 Windows 檔案伺服器與 Amazon Elastic File System (Amazon EFS) 之間複製資料。","D":"使用 AWS DataSync 排程每日任務，在內部部署的 Windows 檔案伺服器與 Amazon Elastic File System (Amazon EFS) 之間複製資料。"},"answer":"B"},{"num":36,"stem":"一家公司的解決方案架構師正在審查一個在 AWS 上執行的 Web 應用程式。該應用程式參考位於 us-east-1 區域的 Amazon S3 儲存貯體中的靜態資源。公司需要跨多個 AWS 區域的備援能力。公司已在第二個區域建立了 S3 儲存貯體。\n哪個解決方案能以最少的操作負擔滿足這些要求？","options":{"A":"設定應用程式將每個物件寫入兩個 S3 儲存貯體。使用加權路由政策為每個 S3 儲存貯體設定 Amazon Route 53 公有託管區域的記錄集。設定應用程式使用 Route 53 DNS 名稱參考物件。","B":"建立 AWS Lambda 函式，將物件從 us-east-1 的 S3 儲存貯體複製到第二個區域的 S3 儲存貯體。每次將物件寫入 us-east-1 的 S3 儲存貯體時叫用 Lambda 函式。使用包含兩個 S3 儲存貯體作為來源的來源群組，設定 Amazon CloudFront 發佈。","C":"在 us-east-1 的 S3 儲存貯體上設定複寫，將物件複製到第二個區域的 S3 儲存貯體。使用包含兩個 S3 儲存貯體作為來源的來源群組，設定 Amazon CloudFront 發佈。","D":"在 us-east-1 的 S3 儲存貯體上設定複寫，將物件複製到第二個區域的 S3 儲存貯體。若需要容錯移轉，更新應用程式程式碼，從第二個區域的 S3 儲存貯體載入 S3 物件。"},"answer":"C"},{"num":37,"stem":"一家公司在內部部署環境中託管三層式 Web 應用程式。由於最近的流量激增導致停機並造成重大財務損失，公司管理層已下令將應用程式遷移至 AWS。該應用程式以 .NET 撰寫，並依賴 MySQL 資料庫。解決方案架構師必須設計一個可擴展且高可用的解決方案，以滿足每日 200,000 名使用者的需求。\n解決方案架構師應採取哪些步驟來設計適當的解決方案？","options":{"A":"使用 AWS Elastic Beanstalk 建立具有 Web 伺服器環境和 Amazon RDS MySQL Multi-AZ DB 執行個體的新應用程式。環境應在多個可用區域中的 Amazon EC2 Auto Scaling 群組前方啟動 Network Load Balancer (NLB)。使用 Amazon Route 53 別名記錄將公司網域的流量路由至 NLB。","B":"使用 AWS CloudFormation 啟動一個 stack，在跨越三個可用區域的 Amazon EC2 Auto Scaling 群組前方包含 Application Load Balancer (ALB)。該 stack 應啟動具有保留刪除政策的 Amazon Aurora MySQL DB 叢集的 Multi-AZ 部署。使用 Amazon Route 53 別名記錄將公司網域的流量路由至 ALB。","C":"使用 AWS Elastic Beanstalk 建立跨越兩個不同區域且每個區域都有 Application Load Balancer (ALB) 的自動擴展 Web 伺服器環境。建立具有跨區域唯讀副本的 Amazon Aurora MySQL DB 叢集的 Multi-AZ 部署。使用 Amazon Route 53 的地理鄰近路由政策在兩個區域之間路由流量。","D":"使用 AWS CloudFormation 啟動一個 stack，在跨越三個可用區域的 Amazon ECS Spot 執行個體叢集前方包含 Application Load Balancer (ALB)。該 stack 應啟動具有快照刪除政策的 Amazon RDS MySQL DB 執行個體。使用 Amazon Route 53 別名記錄將公司網域的流量路由至 ALB。"},"answer":"B"},{"num":38,"stem":"一家公司正在使用 AWS Organizations 管理多個 AWS 帳戶。基於安全目的，公司要求在所有 Organizations 成員帳戶中建立 Amazon Simple Notification Service (Amazon SNS) 主題，以與第三方警示系統整合。\n解決方案架構師使用 AWS CloudFormation 範本建立 SNS 主題，並使用 stack set 自動化 CloudFormation stack 的部署。信任存取已在 Organizations 中啟用。\n解決方案架構師應如何在所有 AWS 帳戶中部署 CloudFormation StackSets？","options":{"A":"在 Organizations 成員帳戶中建立 stack set。使用服務受管權限。將部署選項設定為部署至組織。使用 CloudFormation StackSets 漂移偵測。","B":"在 Organizations 成員帳戶中建立 stack。使用自助服務權限。將部署選項設定為部署至組織。啟用 CloudFormation StackSets 自動部署。","C":"在 Organizations 管理帳戶中建立 stack set。使用服務受管權限。將部署選項設定為部署至組織。啟用 CloudFormation StackSets 自動部署。","D":"在 Organizations 管理帳戶中建立 stack。使用服務受管權限。將部署選項設定為部署至組織。啟用 CloudFormation StackSets 漂移偵測。"},"answer":"C"},{"num":39,"stem":"一家公司希望將其工作負載從內部部署遷移至 AWS。這些工作負載在 Linux 和 Windows 上執行。公司擁有龐大的內部部署基礎架構，由託管眾多應用程式的實體機器和 VM 組成。\n公司必須擷取內部部署工作負載的系統組態、系統效能、執行中的程序和網路連線詳細資訊。公司還必須將內部部署應用程式分組，以進行 AWS 遷移。公司需要 Amazon EC2 執行個體類型的建議，以便以最具成本效益的方式在 AWS 上執行工作負載。\n解決方案架構師應採取哪些步驟組合來滿足這些要求？(選擇三個)","options":{"A":"在實體機器和 VM 上安裝 AWS Application Discovery Agent，以評估現有應用程式。","B":"在實體機器和 VM 上安裝 AWS Systems Manager Agent，以評估現有應用程式。","C":"使用 AWS Systems Manager Application Manager 將伺服器分組至應用程式以進行遷移。","D":"使用 AWS Migration Hub 將伺服器分組至應用程式以進行遷移。","E":"使用 AWS Migration Hub 產生建議的執行個體類型和相關成本。 F. 將伺服器大小資料匯入 AWS Trusted Advisor。依循成本最佳化建議。"},"answer":"ADE"},{"num":40,"stem":"一家公司在 VPC 中的兩個可用區域上託管影像處理服務。每個可用區域包含一個公有子網路和一個私有子網路。\n該服務在私有子網路的 Amazon EC2 執行個體上執行。公有子網路中的 Application Load Balancer 位於服務前方。服務需要與網際網路通訊，並透過兩個 NAT gateway 進行通訊。服務使用 Amazon S3 儲存影像。EC2 執行個體每天從 S3 儲存貯體擷取約 1 TB 的資料。\n公司宣稱該服務具有高度安全性。解決方案架構師必須在不影響服務安全狀態或增加持續操作時間的情況下，盡量降低雲端費用。\n哪個解決方案將符合這些要求？","options":{"A":"將 NAT gateway 替換為 NAT 執行個體。在 VPC 路由表中，建立從私有子網路至 NAT 執行個體的路由。","B":"將 EC2 執行個體移至公有子網路。移除 NAT gateway。","C":"在 VPC 中設定 S3 閘道 VPC 端點。將端點政策附加至端點，以允許對 S3 儲存貯體執行所需的動作。","D":"將 Amazon Elastic File System (Amazon EFS) 磁碟區附加至 EC2 執行個體。將影像託管在 EFS 磁碟區上。"},"answer":"C"},{"num":41,"stem":"一家公司最近在 AWS 上部署了一個應用程式。該應用程式使用 Amazon DynamoDB。公司衡量了應用程式負載，並設定 DynamoDB 資料表的 RCU 和 WCU 以符合預期的峰值負載。峰值負載每週發生一次，持續 4 小時，是平均負載的兩倍。本週其餘時間的應用程式負載接近平均負載。存取模式包含比讀取資料表多得多的寫入操作。\n解決方案架構師需要實作一個解決方案，以最小化資料表的成本。\n哪個解決方案將符合這些要求？","options":{"A":"使用 AWS Application Auto Scaling 在峰值期間增加容量。購買預留 RCU 和 WCU 以符合平均負載。","B":"為資料表設定隨需容量模式。","C":"在資料表前方設定 DynamoDB Accelerator (DAX)。降低佈建讀取容量以符合資料表的新峰值負載。","D":"在資料表前方設定 DynamoDB Accelerator (DAX)。為資料表設定隨需容量模式。"},"answer":"A"},{"num":42,"stem":"解決方案架構師需要建議一家公司如何將其內部部署資料處理應用程式遷移至 AWS Cloud。目前，使用者透過 Web 入口網站上傳輸入檔案。Web 伺服器然後將上傳的檔案儲存在 NAS 上，並透過訊息佇列向處理伺服器傳送訊息。每個媒體檔案最多需要 1 小時來處理。公司確定，在上班時間等待處理的媒體檔案數量顯著較高，下班後數量迅速下降。\n最具成本效益的遷移建議是什麼？","options":{"A":"使用 Amazon SQS 建立佇列。設定現有的 Web 伺服器發布至新佇列。當佇列中有訊息時，叫用 AWS Lambda 函式從佇列提取請求並處理檔案。將處理後的檔案儲存在 Amazon S3 儲存貯體中。","B":"使用 Amazon MQ 建立佇列。設定現有的 Web 伺服器發布至新佇列。當佇列中有訊息時，建立新的 Amazon EC2 執行個體從佇列提取請求並處理檔案。將處理後的檔案儲存在 Amazon EFS 中。任務完成後關閉 EC2 執行個體。","C":"使用 Amazon MQ 建立佇列。設定現有的 Web 伺服器發布至新佇列。當佇列中有訊息時，叫用 AWS Lambda 函式從佇列提取請求並處理檔案。將處理後的檔案儲存在 Amazon EFS 中。","D":"使用 Amazon SQS 建立佇列。設定現有的 Web 伺服器發布至新佇列。使用 EC2 Auto Scaling 群組中的 Amazon EC2 執行個體從佇列提取請求並處理檔案。根據 SQS 佇列長度擴展 EC2 執行個體。將處理後的檔案儲存在 Amazon S3 儲存貯體中。"},"answer":"D"},{"num":43,"stem":"一家公司正在使用 Amazon OpenSearch Service 分析資料。公司從使用 S3 Standard 儲存類別的 Amazon S3 儲存貯體，將資料載入具有 10 個資料節點的 OpenSearch Service 叢集中。資料在叢集中保留 1 個月以進行唯讀分析。1 個月後，公司從叢集中刪除包含資料的索引。為了合規目的，公司必須保留所有輸入資料的副本。\n公司擔心持續的成本，並請解決方案架構師推薦新的解決方案。\n哪個解決方案能以最具成本效益的方式滿足這些要求？","options":{"A":"將所有資料節點替換為 UltraWarm 節點以處理預期容量。公司將資料載入叢集時，將輸入資料從 S3 Standard 轉換為 S3 Glacier Deep Archive。","B":"將叢集中的資料節點數量減少至 2 個。新增 UltraWarm 節點以處理預期容量。設定索引在 OpenSearch Service 擷取資料時轉換至 UltraWarm。使用 S3 生命週期政策，在 1 個月後將輸入資料轉換至 S3 Glacier Deep Archive。","C":"將叢集中的資料節點數量減少至 2 個。新增 UltraWarm 節點以處理預期容量。設定索引在 OpenSearch Service 擷取資料時轉換至 UltraWarm。在叢集中新增冷儲存節點，將索引從 UltraWarm 轉換至冷儲存。使用 S3 生命週期政策，在 1 個月後從 S3 儲存貯體刪除輸入資料。","D":"將叢集中的資料節點數量減少至 2 個。新增執行個體支援的資料節點以處理預期容量。公司將資料載入叢集時，將輸入資料從 S3 Standard 轉換為 S3 Glacier Deep Archive。"},"answer":"B"},{"num":44,"stem":"一家公司擁有 10 個帳戶，這些帳戶是 AWS Organizations 中某個組織的成員。AWS Config 已在每個帳戶中設定。所有帳戶屬於 Prod OU 或 NonProd OU 其中之一。\n公司在每個 AWS 帳戶中設定了 Amazon EventBridge 規則，當 Amazon EC2 安全群組入站規則以 0.0.0.0/0 作為來源建立時，通知 Amazon Simple Notification Service (Amazon SNS) 主題。公司的安全團隊已訂閱 SNS 主題。\n對於 NonProd OU 中的所有帳戶，安全團隊需要移除建立包含 0.0.0.0/0 作為來源的安全群組入站規則的能力。\n哪個解決方案能以最少的操作負擔滿足此要求？","options":{"A":"修改 EventBridge 規則，叫用 AWS Lambda 函式以移除安全群組入站規則並發布至 SNS 主題。將更新後的規則部署至 NonProd OU。","B":"將 vpc-sg-open-only-to-authorized-ports AWS Config 受管規則新增至 NonProd OU。","C":"設定 SCP，當 aws:SourceIp 條件鍵的值不是 0.0.0.0/0 時，允許 ec2:AuthorizeSecurityGroupIngress 動作。將 SCP 套用至 NonProd OU。","D":"設定 SCP，當 aws:SourceIp 條件鍵的值為 0.0.0.0/0 時，拒絕 ec2:AuthorizeSecurityGroupIngress 動作。將 SCP 套用至 NonProd OU。"},"answer":"A"},{"num":45,"stem":"一家公司在內部部署資料中心中託管 Git 儲存庫。公司使用 webhook 叫用在 AWS Cloud 中執行的功能。公司將 webhook 邏輯託管在 Auto Scaling 群組中的一組 Amazon EC2 執行個體上，並將其設定為 Application Load Balancer (ALB) 的目標。Git 伺服器呼叫 ALB 以執行設定的 webhook。公司希望將解決方案遷移至無伺服器架構。\n哪個解決方案能以最少的操作負擔滿足這些要求？","options":{"A":"為每個 webhook 建立並設定 AWS Lambda 函式 URL。更新 Git 伺服器以呼叫個別的 Lambda 函式 URL。","B":"建立 Amazon API Gateway HTTP API。在個別的 AWS Lambda 函式中實作每個 webhook 邏輯。更新 Git 伺服器以呼叫 API Gateway 端點。","C":"將 webhook 邏輯部署至 AWS App Runner。建立 ALB，並將 App Runner 設定為目標。更新 Git 伺服器以呼叫 ALB 端點。","D":"將 webhook 邏輯容器化。建立 Amazon Elastic Container Service (Amazon ECS) 叢集，並在 AWS Fargate 中執行 webhook 邏輯。建立 Amazon API Gateway REST API，並將 Fargate 設定為目標。更新 Git 伺服器以呼叫 API Gateway 端點。"},"answer":"B"},{"num":46,"stem":"一家公司計畫將 1,000 台內部部署伺服器遷移至 AWS。這些伺服器在公司資料中心的多個 VMware 叢集上執行。作為遷移計畫的一部分，公司希望收集伺服器指標，例如 CPU 詳細資訊、RAM 使用量、作業系統資訊和執行中的程序。然後公司希望查詢和分析這些資料。\n哪個解決方案將符合這些要求？","options":{"A":"在內部部署主機上部署並設定 AWS Agentless Discovery Connector 虛擬裝置。在 AWS Migration Hub 中設定 Data Exploration。使用 AWS Glue 對資料執行 ETL 作業。使用 Amazon S3 Select 查詢資料。","B":"僅從內部部署主機匯出 VM 效能資訊。直接將所需資料匯入 AWS Migration Hub。在 Migration Hub 中更新任何遺漏的資訊。使用 Amazon QuickSight 查詢資料。","C":"建立指令碼，自動從內部部署主機收集伺服器資訊。使用 AWS CLI 執行 put-resource-attributes 命令，將詳細的伺服器資料儲存在 AWS Migration Hub 中。直接在 Migration Hub 主控台中查詢資料。","D":"將 AWS Application Discovery Agent 部署至每台內部部署伺服器。在 AWS Migration Hub 中設定 Data Exploration。使用 Amazon Athena 對 Amazon S3 中的資料執行預先定義的查詢。"},"answer":"D"},{"num":47,"stem":"一家公司正在建置一個在附加至 VPC 的 AWS Lambda 函式上執行的無伺服器應用程式。公司需要將應用程式與外部提供商的新服務整合。外部提供商僅支援來自允許清單中公有 IPv4 位址的請求。\n公司必須在應用程式開始使用新服務之前，向外部提供商提供一個公有 IP 位址。\n哪個解決方案能讓應用程式存取新服務？","options":{"A":"部署 NAT gateway。將 Elastic IP 位址與 NAT gateway 建立關聯。設定 VPC 使用 NAT gateway。","B":"部署僅限輸出的網際網路閘道。將 Elastic IP 位址與僅限輸出的網際網路閘道建立關聯。設定 Lambda 函式上的彈性網路介面使用僅限輸出的網際網路閘道。","C":"部署網際網路閘道。將 Elastic IP 位址與網際網路閘道建立關聯。設定 Lambda 函式使用網際網路閘道。","D":"部署網際網路閘道。將 Elastic IP 位址與網際網路閘道建立關聯。設定公有 VPC 路由表中的預設路由使用網際網路閘道。"},"answer":"A"},{"num":48,"stem":"解決方案架構師開發了一個使用 Amazon API Gateway 區域端點和 AWS Lambda 函式的 Web 應用程式。Web 應用程式的消費者都靠近將部署應用程式的 AWS 區域。Lambda 函式僅查詢 Amazon Aurora MySQL 資料庫。解決方案架構師已設定資料庫具有三個唯讀副本。\n在測試期間，應用程式未達到效能要求。在高負載下，應用程式會開啟大量資料庫連線。解決方案架構師必須提升應用程式的效能。\n解決方案架構師應採取哪些動作來滿足這些要求？(選擇兩個)","options":{"A":"使用 Aurora 資料庫的叢集端點。","B":"使用 RDS Proxy 設定連線池至 Aurora 資料庫的讀取器端點。","C":"使用 Lambda Provisioned Concurrency 功能。","D":"將 Lambda 函式中開啟資料庫連線的程式碼移至事件處理常式之外。","E":"將 API Gateway 端點變更為邊緣最佳化端點。"},"answer":"BD"},{"num":49,"stem":"一家公司計畫在 AWS 上託管 Web 應用程式，並希望在一組 Amazon EC2 執行個體之間進行流量負載平衡。其中一項安全要求是在用戶端和 Web 伺服器之間啟用端對端的傳輸加密。\n哪個解決方案將符合此要求？","options":{"A":"將 EC2 執行個體置於 Application Load Balancer (ALB) 後方。使用 AWS Certificate Manager (ACM) 佈建 SSL 憑證，並將 SSL 憑證與 ALB 建立關聯。匯出 SSL 憑證並安裝在每個 EC2 執行個體上。設定 ALB 監聽連接埠 443，並將流量轉發至執行個體的連接埠 443。","B":"將 EC2 執行個體與目標群組建立關聯。使用 AWS Certificate Manager (ACM) 佈建 SSL 憑證。建立 Amazon CloudFront 發佈並設定使用 SSL 憑證。將 CloudFront 設定為使用目標群組作為來源伺服器。","C":"將 EC2 執行個體置於 Application Load Balancer (ALB) 後方。使用 AWS Certificate Manager (ACM) 佈建 SSL 憑證，並將 SSL 憑證與 ALB 建立關聯。佈建第三方 SSL 憑證並安裝在每個 EC2 執行個體上。設定 ALB 監聽連接埠 443，並將流量轉發至執行個體的連接埠 443。","D":"將 EC2 執行個體置於 Network Load Balancer (NLB) 後方。佈建第三方 SSL 憑證並安裝在 NLB 和每個 EC2 執行個體上。設定 NLB 監聽連接埠 443，並將流量轉發至執行個體的連接埠 443。"},"answer":"C"},{"num":50,"stem":"一家公司希望將其資料分析環境從內部部署遷移至 AWS。該環境由兩個簡單的 Node.js 應用程式組成。其中一個應用程式收集感測器資料並將其載入 MySQL 資料庫。另一個應用程式將資料彙總成報告。當彙總作業執行時，部分載入作業無法正常執行。\n公司必須解決資料載入問題。公司還需要在不中斷服務且不讓公司客戶感知任何變更的情況下完成遷移。\n解決方案架構師應如何滿足這些要求？","options":{"A":"將 Amazon Aurora MySQL 資料庫設定為內部部署資料庫的複寫目標。為 Aurora MySQL 資料庫建立 Aurora 副本，並將彙總作業移至針對 Aurora 副本執行。將集合端點設定為 Network Load Balancer (NLB) 後方的 AWS Lambda 函式，並使用 Amazon RDS Proxy 寫入 Aurora MySQL 資料庫。資料庫同步後，停用複寫作業，並將 Aurora 副本重啟為主要執行個體。將收集器 DNS 記錄指向 NLB。","B":"建立 Amazon Aurora MySQL 資料庫。使用 AWS Database Migration Service (AWS DMS) 從內部部署資料庫到 Aurora 執行持續資料複寫。將彙總作業移至針對 Aurora MySQL 資料庫執行。將集合端點設定為 Application Load Balancer (ALB) 後方 Auto Scaling 群組中的 Amazon EC2 執行個體。資料庫同步後，將收集器 DNS 記錄指向 ALB。完成從內部部署至 AWS 的切換後，停用 AWS DMS 同步任務。","C":"建立 Amazon Aurora MySQL 資料庫。使用 AWS Database Migration Service (AWS DMS) 從內部部署資料庫到 Aurora 執行持續資料複寫。為 Aurora MySQL 資料庫建立 Aurora 副本，並將彙總作業移至針對 Aurora 副本執行。將集合端點設定為 Application Load Balancer (ALB) 後方的 AWS Lambda 函式，並使用 Amazon RDS Proxy 寫入 Aurora MySQL 資料庫。資料庫同步後，將收集器 DNS 記錄指向 ALB。完成從內部部署至 AWS 的切換後，停用 AWS DMS 同步任務。","D":"建立 Amazon Aurora MySQL 資料庫。為 Aurora MySQL 資料庫建立 Aurora 副本，並將彙總作業移至針對 Aurora 副本執行。將集合端點設定為 Amazon Kinesis 資料串流。使用 Amazon Kinesis Data Firehose 將資料複製到 Aurora MySQL 資料庫。資料庫同步後，停用複寫作業，並將 Aurora 副本重啟為主要執行個體。將收集器 DNS 記錄指向 Kinesis 資料串流。"},"answer":"C"},{"num":51,"stem":"一家健康保險公司將個人識別資訊（PII）儲存在 Amazon S3 儲存桶中。該公司使用伺服器端加密搭配 S3 管理的加密金鑰（SSE-S3）來加密物件。根據新的需求，S3 儲存桶中所有現有和未來的物件都必須使用公司安全團隊管理的金鑰進行加密。該 S3 儲存桶未啟用版本控制。\n哪個解決方案能滿足這些需求？","options":{"A":"在 S3 儲存桶屬性中，將預設加密方式更改為使用客戶管理金鑰的 SSE-S3。使用 AWS CLI 重新上傳 S3 儲存桶中的所有物件。設定 S3 儲存桶政策以拒絕未加密的 PutObject 請求。","B":"在 S3 儲存桶屬性中，將預設加密方式更改為使用 AWS KMS 管理加密金鑰的伺服器端加密（SSE-KMS）。設定 S3 儲存桶政策以拒絕未加密的 PutObject 請求。使用 AWS CLI 重新上傳 S3 儲存桶中的所有物件。","C":"在 S3 儲存桶屬性中，將預設加密方式更改為使用 AWS KMS 管理加密金鑰的伺服器端加密（SSE-KMS）。設定 S3 儲存桶政策，以在 GetObject 和 PutObject 請求時自動加密物件。","D":"在 S3 儲存桶屬性中，將預設加密方式更改為使用客戶管理金鑰的 AES-256。附加一個政策，拒絕所有存取 S3 儲存桶的實體發出未加密的 PutObject 請求。使用 AWS CLI 重新上傳 S3 儲存桶中的所有物件。"},"answer":"D"},{"num":52,"stem":"一家公司在 AWS Cloud 中執行一個 Web 應用程式。該應用程式由一組 Amazon EC2 執行個體上建立的動態內容組成。EC2 執行個體在一個 Auto Scaling 群組中執行，該群組被配置為 Application Load Balancer（ALB）的目標群組。該公司使用 Amazon CloudFront 分發版在全球分發應用程式。CloudFront 分發版使用 ALB 作為來源。該公司使用 Amazon Route 53 進行 DNS 管理，並為 CloudFront 分發版建立了 www.example.com 的 A 記錄。\n解決方案架構師必須配置應用程式，使其具有高可用性和容錯能力。\n哪個解決方案能滿足這些需求？","options":{"A":"在不同的 AWS 區域中佈建一個完整的次要應用程式部署。將 Route 53 A 記錄更新為容錯移轉記錄。將兩個 CloudFront 分發版都加入為值。建立 Route 53 健康檢查。","B":"在不同的 AWS 區域中佈建一個 ALB、一個 Auto Scaling 群組和 EC2 執行個體。更新 CloudFront 分發版，為新的 ALB 建立第二個來源。為兩個來源建立來源群組。將一個來源配置為主要來源，另一個配置為次要來源。","C":"在不同的 AWS 區域中佈建一個 Auto Scaling 群組和 EC2 執行個體。在 ALB 中為新的 Auto Scaling 群組建立第二個目標。在 ALB 上設定容錯移轉路由演算法。","D":"在不同的 AWS 區域中佈建一個完整的次要應用程式部署。建立第二個 CloudFront 分發版，並將新的應用程式設定加入為來源。建立一個 AWS Global Accelerator 加速器。將兩個 CloudFront 分發版都加入為端點。"},"answer":"B"},{"num":53,"stem":"一家公司在 AWS Organizations 中有一個組織，擁有大量 AWS 帳戶。其中一個 AWS 帳戶被指定為轉接帳戶，並擁有一個與所有其他 AWS 帳戶共享的 Transit Gateway。AWS Site-to-Site VPN 連線被配置在公司所有全球辦公室與轉接帳戶之間。該公司在所有帳戶上都啟用了 AWS Config。\n公司的網路團隊需要集中管理一份屬於全球辦公室的內部 IP 位址範圍清單。開發人員將參考此清單以安全地存取其應用程式。\n哪個解決方案以最少的操作負擔滿足這些需求？","options":{"A":"建立一個託管在 Amazon S3 上的 JSON 檔案，列出所有內部 IP 位址範圍。在每個帳戶中配置一個 Amazon Simple Notification Service（Amazon SNS）主題，以便在 JSON 檔案更新時觸發。訂閱一個 AWS Lambda 函數到 SNS 主題，以使用更新後的 IP 位址範圍更新所有相關的安全群組規則。","B":"建立一個新的 AWS Config 受管規則，其中包含所有內部 IP 位址範圍。使用該規則檢查每個帳戶中的安全群組，以確保符合 IP 位址範圍清單。配置該規則以自動修復所發現的任何不合規的安全群組。","C":"在轉接帳戶中，建立一個包含所有內部 IP 位址範圍的 VPC 前綴清單。使用 AWS Resource Access Manager 與所有其他帳戶共享該前綴清單。使用共享的前綴清單在其他帳戶中配置安全群組規則。","D":"在轉接帳戶中，建立一個包含所有內部 IP 位址範圍的安全群組。使用「/sg-1a2b3c4d」的巢狀安全群組參考，配置其他帳戶中的安全群組以參考轉接帳戶的安全群組。"},"answer":"C"},{"num":54,"stem":"一家公司在 Amazon S3 中以靜態網站的形式執行一個新應用程式。公司已將應用程式部署到生產 AWS 帳戶，並使用 Amazon CloudFront 來提供網站服務。該網站呼叫 Amazon API Gateway REST API。每個 API 方法都由一個 AWS Lambda 函數提供支援。\n公司希望每 2 週建立一份 CSV 報告，顯示每個 API Lambda 函數的建議配置記憶體、建議成本以及目前配置與建議之間的價格差異。公司將把報告儲存在 S3 儲存桶中。\n哪個解決方案能以最少的開發時間滿足這些需求？","options":{"A":"建立一個 Lambda 函數，從 Amazon CloudWatch Logs 中提取過去 2 週每個 API Lambda 函數的指標資料。將資料整理成表格格式。將資料以 .csv 檔案形式儲存在 S3 儲存桶中。建立一個 Amazon EventBridge 規則，排程 Lambda 函數每 2 週執行一次。","B":"選擇加入 AWS Compute Optimizer。建立一個 Lambda 函數，呼叫 ExportLambdaFunctionRecommendations 操作。將 .csv 檔案匯出到 S3 儲存桶。建立一個 Amazon EventBridge 規則，排程 Lambda 函數每 2 週執行一次。","C":"選擇加入 AWS Compute Optimizer。設定增強型基礎設施指標。在 Compute Optimizer 主控台中，排程一個工作，將 Lambda 建議匯出為 .csv 檔案。每 2 週將檔案儲存到 S3 儲存桶中。","D":"為生產帳戶購買 AWS Business Support 方案。為 AWS Trusted Advisor 檢查選擇加入 AWS Compute Optimizer。在 Trusted Advisor 主控台中，排程一個工作，將成本最佳化檢查匯出為 .csv 檔案。每 2 週將檔案儲存到 S3 儲存桶中。"},"answer":"B"},{"num":55,"stem":"一家公司的工廠和自動化應用程式在單一 VPC 中執行。超過 20 個應用程式在 Amazon EC2、Amazon Elastic Container Service（Amazon ECS）和 Amazon RDS 的組合上執行。\n公司有三個工程師團隊。三個團隊中的每一個都擁有每個應用程式，每個團隊負責其所有應用程式的成本和效能。團隊資源具有代表其應用程式和團隊的標籤。團隊使用 IAM 存取進行日常活動。\n公司需要確定每月 AWS 帳單中哪些成本可歸因於每個應用程式或團隊。公司還必須能夠建立報告，以比較過去 12 個月的成本並協助預測未來 12 個月的成本。解決方案架構師必須推薦一個提供這些成本報告的 AWS Billing and Cost Management 解決方案。\n哪些操作組合能滿足這些需求？（選擇三個）","options":{"A":"啟用代表應用程式和團隊的使用者定義成本分配標籤。","B":"啟用代表應用程式和團隊的 AWS 產生的成本分配標籤。","C":"在 Billing and Cost Management 中為每個應用程式建立成本類別。","D":"啟用 IAM 對 Billing and Cost Management 的存取。","E":"建立成本預算。","F":"啟用 Cost Explorer。"},"answer":"ACF"},{"num":56,"stem":"一位 AWS 客戶有一個在本地端執行的 Web 應用程式。該 Web 應用程式從位於防火牆後面的第三方 API 獲取資料。第三方在每個客戶的允許清單中只接受一個公共 CIDR 區塊。\n客戶想要將其 Web 應用程式遷移到 AWS Cloud。應用程式將託管在 VPC 中 Application Load Balancer（ALB）後面的一組 Amazon EC2 執行個體上。ALB 位於公共子網路中。EC2 執行個體位於私有子網路中。NAT 閘道為私有子網路提供網際網路存取。\n解決方案架構師應如何確保 Web 應用程式在遷移後能夠繼續呼叫第三方 API？","options":{"A":"將客戶擁有的公共 IP 位址區塊與 VPC 關聯。為 VPC 中的公共子網路啟用公共 IP 定址。","B":"在 AWS 帳戶中註冊一個客戶擁有的公共 IP 位址區塊。從該位址區塊建立 Elastic IP 位址，並將其指派給 VPC 中的 NAT 閘道。","C":"從客戶擁有的 IP 位址區塊建立 Elastic IP 位址。將靜態 Elastic IP 位址指派給 ALB。","D":"在 AWS 帳戶中註冊一個客戶擁有的公共 IP 位址區塊。設定 AWS Global Accelerator 以使用該位址區塊中的 Elastic IP 位址。將 ALB 設定為加速器端點。"},"answer":"B"},{"num":57,"stem":"一家擁有多個 AWS 帳戶的公司正在使用 AWS Organizations 和服務控制政策（SCP）。管理員建立了以下 SCP 並將其附加到包含 AWS 帳戶 1111-1111-1111 的組織單位（OU）：\n\n在帳戶 1111-1111-1111 中工作的開發人員抱怨他們無法建立 Amazon S3 儲存桶。管理員應如何解決此問題？","options":{"A":"將帶有「Allow」效果的 s3:CreateBucket 新增到 SCP 中。","B":"從 OU 中移除該帳戶，並將 SCP 直接附加到帳戶 1111-1111-1111。","C":"指示開發人員將 Amazon S3 許可新增到其 IAM 實體中。","D":"從帳戶 1111-1111-1111 中移除 SCP。"},"answer":"C"},{"num":58,"stem":"一家公司有一個對公司業務至關重要的單體式應用程式。公司將應用程式託管在執行 Amazon Linux 2 的 Amazon EC2 執行個體上。公司的應用程式團隊收到法律部門的指示，要求將執行個體加密 Amazon Elastic Block Store（Amazon EBS）磁碟區中的資料備份到 Amazon S3 儲存桶。應用程式團隊沒有執行個體的管理員 SSH 金鑰對。應用程式必須繼續為使用者提供服務。\n哪個解決方案能滿足這些需求？","options":{"A":"將具有寫入 Amazon S3 許可的角色附加到執行個體。使用 AWS Systems Manager Session Manager 選項來存取執行個體並執行命令，將資料複製到 Amazon S3。","B":"在重新開機選項關閉的情況下建立執行個體的映像。從映像啟動新的 EC2 執行個體。將具有寫入 Amazon S3 許可的角色附加到新執行個體。執行命令將資料複製到 Amazon S3。","C":"使用 Amazon Data Lifecycle Manager（Amazon DLM）對 EBS 磁碟區進行快照。將資料複製到 Amazon S3。","D":"建立執行個體的映像。從映像啟動新的 EC2 執行個體。將具有寫入 Amazon S3 許可的角色附加到新執行個體。執行命令將資料複製到 Amazon S3。"},"answer":"A"},{"num":59,"stem":"解決方案架構師需要將資料從一個 AWS 帳戶中的 Amazon S3 儲存桶複製到新 AWS 帳戶中的新 S3 儲存桶。解決方案架構師必須實作使用 AWS CLI 的解決方案。\n哪些步驟組合能成功複製資料？（選擇三個）","options":{"A":"建立儲存桶政策，允許來源儲存桶列出其內容，並在目標儲存桶中放置物件和設定物件 ACL。將儲存桶政策附加到目標儲存桶。","B":"建立儲存桶政策，允許目標帳戶中的使用者列出來源儲存桶的內容並讀取來源儲存桶的物件。將儲存桶政策附加到來源儲存桶。","C":"在來源帳戶中建立 IAM 政策。配置該政策，允許來源帳戶中的使用者在來源儲存桶中列出內容並取得物件，以及在目標儲存桶中列出內容、放置物件和設定物件 ACL。將政策附加到使用者。","D":"在目標帳戶中建立 IAM 政策。配置該政策，允許目標帳戶中的使用者在來源儲存桶中列出內容並取得物件，以及在目標儲存桶中列出內容、放置物件和設定物件 ACL。將政策附加到使用者。","E":"以來源帳戶中的使用者身分執行 aws s3 sync 命令。指定來源和目標儲存桶以複製資料。","F":"以目標帳戶中的使用者身分執行 aws s3 sync 命令。指定來源和目標儲存桶以複製資料。"},"answer":"ADF"},{"num":60,"stem":"一家公司建立了一個基於 AWS Lambda 的應用程式，並部署在 AWS CloudFormation 堆疊中。Web 應用程式的最後一次生產發布引入了一個問題，導致中斷持續了幾分鐘。解決方案架構師必須調整部署流程以支援金絲雀發布（canary release）。\n哪個解決方案能滿足這些需求？","options":{"A":"為每個新部署的 Lambda 函數版本建立別名。使用 AWS CLI 的 update-alias 命令搭配 routing-config 參數來分配負載。","B":"將應用程式部署到新的 CloudFormation 堆疊。使用 Amazon Route 53 加權路由政策來分配負載。","C":"為每個新部署的 Lambda 函數建立版本。使用 AWS CLI 的 update-function-configuration 命令搭配 routing-config 參數來分配負載。","D":"配置 AWS CodeDeploy，並在部署配置中使用 CodeDeployDefault.OneAtATime 來分配負載。"},"answer":"A"},{"num":61,"stem":"一家金融公司在 Amazon S3 中託管一個資料湖。公司每晚透過 SFTP 從多個第三方接收財務資料記錄。公司在 VPC 公共子網路中的 Amazon EC2 執行個體上執行自己的 SFTP 伺服器。檔案上傳後，由同一執行個體上執行的 cron 工作將其移動到資料湖。SFTP 伺服器可透過 Amazon Route 53 使用 DNS 名稱 sftp.example.com 存取。\n解決方案架構師應採取什麼措施來提高 SFTP 解決方案的可靠性和可擴展性？","options":{"A":"將 EC2 執行個體移入 Auto Scaling 群組。將 EC2 執行個體放置在 Application Load Balancer（ALB）後面。更新 Route 53 中的 DNS 記錄 sftp.example.com 以指向 ALB。","B":"將 SFTP 伺服器遷移到 AWS Transfer for SFTP。更新 Route 53 中的 DNS 記錄 sftp.example.com 以指向伺服器端點主機名稱。","C":"將 SFTP 伺服器遷移到 AWS Storage Gateway 中的檔案閘道。更新 Route 53 中的 DNS 記錄 sftp.example.com 以指向檔案閘道端點。","D":"將 EC2 執行個體放置在 Network Load Balancer（NLB）後面。更新 Route 53 中的 DNS 記錄 sftp.example.com 以指向 NLB。"},"answer":"B"},{"num":62,"stem":"一家公司想要將應用程式從在本地端資料中心執行的 VMware 基礎架構遷移到 Amazon EC2。解決方案架構師必須在遷移過程中保留軟體和配置設定。\n解決方案架構師應採取什麼措施來滿足這些需求？","options":{"A":"配置 AWS DataSync 代理程式，開始將資料存放區複製到 Amazon FSx for Windows File Server。使用 SMB 共用來託管 VMware 資料存放區。使用 VM Import/Export 將 VM 移動到 Amazon EC2。","B":"使用 VMware vSphere 用戶端將應用程式匯出為 Open Virtualization Format（OVF）格式的映像。建立一個 Amazon S3 儲存桶，將映像儲存在目標 AWS 區域中。建立並套用 VM Import 的 IAM 角色。使用 AWS CLI 執行 EC2 匯入命令。","C":"配置 AWS Storage Gateway 的檔案服務，匯出 Common Internet File System（CIFS）共用。建立備份副本到共用資料夾。登入 AWS Management Console，從備份副本建立 AMI。啟動基於該 AMI 的 EC2 執行個體。","D":"在 AWS Systems Manager 中為混合環境建立受管執行個體啟用。在本地端 VM 上下載並安裝 Systems Manager Agent。向 Systems Manager 註冊 VM 以成為受管執行個體。使用 AWS Backup 建立 VM 的快照並建立 AMI。啟動基於該 AMI 的 EC2 執行個體。"},"answer":"D"},{"num":63,"stem":"一家影片處理公司有一個應用程式，可從 Amazon S3 儲存桶下載影像、處理影像、將轉換後的影像儲存到第二個 S3 儲存桶，並在 Amazon DynamoDB 資料表中更新關於影像的中繼資料。應用程式以 Node.js 編寫，並使用 AWS Lambda 函數執行。當新影像上傳到 Amazon S3 時，Lambda 函數會被調用。\n應用程式在一段時間內運作正常。然而，影像的大小已大幅增加。Lambda 函數現在經常因逾時錯誤而失敗。函數逾時已設定為最大值。解決方案架構師需要重構應用程式架構以防止調用失敗。公司不想管理底層基礎設施。\n解決方案架構師應採取哪些步驟組合來滿足這些需求？（選擇兩個）","options":{"A":"透過建立包含應用程式程式碼的 Docker 映像來修改應用程式部署。將映像發布到 Amazon Elastic Container Registry（Amazon ECR）。","B":"建立相容類型為 AWS Fargate 的新 Amazon Elastic Container Service（Amazon ECS）任務定義。配置任務定義以使用 Amazon Elastic Container Registry（Amazon ECR）中的新映像。調整 Lambda 函數，在新檔案抵達 Amazon S3 時，使用 ECS 任務定義調用 ECS 任務。","C":"建立一個帶有 Parallel 狀態的 AWS Step Functions 狀態機來調用 Lambda 函數。增加 Lambda 函數的預置並行數。","D":"建立相容類型為 Amazon EC2 的新 Amazon Elastic Container Service（Amazon ECS）任務定義。配置任務定義以使用 Amazon Elastic Container Registry（Amazon ECR）中的新映像。調整 Lambda 函數，在新檔案抵達 Amazon S3 時，使用 ECS 任務定義調用 ECS 任務。","E":"修改應用程式，將影像儲存在 Amazon Elastic File System（Amazon EFS）上，並將中繼資料儲存在 Amazon RDS DB 執行個體上。調整 Lambda 函數以掛載 EFS 檔案共用。"},"answer":"DE"},{"num":64,"stem":"一家公司在 AWS Organizations 中有一個組織。公司正在使用 AWS Control Tower 為組織部署登陸區。公司希望實施治理和政策執行。公司必須實施一個政策，以偵測公司生產 OU 中未在靜態時加密的 Amazon RDS DB 執行個體。\n哪個解決方案能滿足這個需求？","options":{"A":"在 AWS Control Tower 中開啟強制性護欄。將強制性護欄套用到生產 OU。","B":"從 AWS Control Tower 中強烈建議的護欄清單中啟用適當的護欄。將護欄套用到生產 OU。","C":"使用 AWS Config 建立新的強制性護欄。將規則套用到生產 OU 中的所有帳戶。","D":"在 AWS Control Tower 中建立自訂 SCP。將 SCP 套用到生產 OU。"},"answer":"B"},{"num":65,"stem":"一家新創公司使用最新的 Amazon Linux 2 AMI，在私有子網路中託管一批 Amazon EC2 執行個體。公司的工程師在故障排除時嚴重依賴對執行個體的 SSH 存取。\n公司現有的架構包括以下內容：\n• 具有私有和公共子網路以及 NAT 閘道的 VPC。\n• 與本地端環境連接的 Site-to-Site VPN。\n• 允許從本地端環境直接 SSH 存取的 EC2 安全群組。\n公司需要加強 SSH 存取的安全控制，並提供工程師所執行命令的稽核功能。\n解決方案架構師應使用哪種策略？","options":{"A":"在 EC2 執行個體群組上安裝並配置 EC2 Instance Connect。移除所有附加到 EC2 執行個體上允許 TCP 連接埠 22 入站流量的安全群組規則。建議工程師使用 EC2 Instance Connect CLI 遠端存取執行個體。","B":"更新 EC2 安全群組，僅允許從工程師裝置的 IP 位址對 TCP 連接埠 22 進行入站連接。在所有 EC2 執行個體上安裝 Amazon CloudWatch 代理程式，並將作業系統稽核日誌傳送到 CloudWatch Logs。","C":"更新 EC2 安全群組，僅允許從工程師裝置的 IP 位址對 TCP 連接埠 22 進行入站連接。為 EC2 安全群組資源變更啟用 AWS Config。啟用 AWS Firewall Manager 並套用安全群組政策，以自動修復規則變更。","D":"建立附加了 AmazonSSMManagedInstanceCore 受管政策的 IAM 角色。將 IAM 角色附加到所有 EC2 執行個體。移除所有附加到 EC2 執行個體上允許 TCP 連接埠 22 入站流量的安全群組規則。讓工程師為其裝置安裝 AWS Systems Manager Session Manager 外掛程式，並使用 Systems Manager 的 start-session API 呼叫遠端存取執行個體。"},"answer":"D"},{"num":66,"stem":"一家使用 AWS Organizations 的公司允許開發人員在 AWS 上進行實驗。作為公司已部署的登陸區的一部分，開發人員使用公司電子郵件地址申請帳戶。公司希望確保開發人員不會啟動昂貴的服務或不必要地執行服務。公司必須給開發人員一個固定的月度預算以限制其 AWS 成本。\n哪些步驟組合能滿足這些需求？（選擇三個）","options":{"A":"建立 SCP 以設定固定的月度帳戶使用限制。將 SCP 套用到開發人員帳戶。","B":"使用 AWS Budgets 在帳戶建立過程中為每個開發人員帳戶建立固定的月度預算。","C":"建立 SCP 以拒絕存取昂貴的服務和元件。將 SCP 套用到開發人員帳戶。","D":"建立 IAM 政策以拒絕存取昂貴的服務和元件。將 IAM 政策套用到開發人員帳戶。","E":"建立 AWS Budgets 警示動作，以在達到預算金額時終止服務。配置動作以終止所有服務。","F":"建立 AWS Budgets 警示動作，以在達到預算金額時傳送 Amazon Simple Notification Service（Amazon SNS）通知。調用 AWS Lambda 函數以終止所有服務。"},"answer":"BDF"},{"num":67,"stem":"一家公司在名為 Source 的 AWS 帳戶中有應用程式。該帳戶在 AWS Organizations 的組織中。其中一個應用程式使用 AWS Lambda 函數，並將庫存資料儲存在 Amazon Aurora 資料庫中。應用程式透過部署套件部署 Lambda 函數。公司已為 Aurora 配置了自動備份。\n公司希望將 Lambda 函數和 Aurora 資料庫遷移到名為 Target 的新 AWS 帳戶。由於應用程式處理關鍵資料，公司必須最大程度地減少停機時間。\n哪個解決方案能滿足這些需求？","options":{"A":"從 Source 帳戶下載 Lambda 函數部署套件。使用部署套件在 Target 帳戶中建立新的 Lambda 函數。與 Target 帳戶共享自動化的 Aurora DB 叢集快照。","B":"從 Source 帳戶下載 Lambda 函數部署套件。使用部署套件在 Target 帳戶中建立新的 Lambda 函數。使用 AWS Resource Access Manager（AWS RAM）與 Target 帳戶共享 Aurora DB 叢集。授予 Target 帳戶複製 Aurora DB 叢集的許可。","C":"使用 AWS Resource Access Manager（AWS RAM）與 Target 帳戶共享 Lambda 函數和 Aurora DB 叢集。授予 Target 帳戶複製 Aurora DB 叢集的許可。","D":"使用 AWS Resource Access Manager（AWS RAM）與 Target 帳戶共享 Lambda 函數。與 Target 帳戶共享自動化的 Aurora DB 叢集快照。"},"answer":"C"},{"num":68,"stem":"一家公司在 Amazon EC2 執行個體上執行 Python 腳本來處理資料。腳本每 10 分鐘執行一次。腳本從 Amazon S3 儲存桶中獲取檔案並進行處理。平均而言，腳本處理每個檔案大約需要 5 分鐘。腳本不會重新處理已處理過的檔案。\n公司審查了 Amazon CloudWatch 指標，發現由於檔案處理速度的關係，EC2 執行個體大約有 40% 的時間處於閒置狀態。公司希望使工作負載具有高可用性和可擴展性。公司還希望減少長期管理負擔。\n哪個解決方案以最具成本效益的方式滿足這些需求？","options":{"A":"將資料處理腳本遷移到 AWS Lambda 函數。使用 S3 事件通知，在公司上傳物件時調用 Lambda 函數來處理物件。","B":"建立 Amazon Simple Queue Service（Amazon SQS）佇列。配置 Amazon S3 以傳送事件通知到 SQS 佇列。建立最小大小為一個執行個體的 EC2 Auto Scaling 群組。更新資料處理腳本以輪詢 SQS 佇列。處理 SQS 訊息所識別的 S3 物件。","C":"將資料處理腳本遷移到容器映像。在 EC2 執行個體上執行資料處理容器。配置容器以輪詢 S3 儲存桶中的新物件並處理結果物件。","D":"將資料處理腳本遷移到在 AWS Fargate 上的 Amazon Elastic Container Service（Amazon ECS）上執行的容器映像。建立一個 AWS Lambda 函數，在容器處理檔案時呼叫 Fargate RunTask API 操作。使用 S3 事件通知來調用 Lambda 函數。"},"answer":"D"},{"num":69,"stem":"一家北美金融服務公司計劃在 AWS 上向客戶發布新的線上 Web 應用程式。公司將在 us-east-1 區域的 Amazon EC2 執行個體上啟動應用程式。應用程式必須具有高可用性，並能動態擴展以滿足使用者流量。公司還希望使用主動-被動容錯移轉，在 us-west-1 區域為應用程式實施災難復原環境。\n哪個解決方案能滿足這些需求？","options":{"A":"在 us-east-1 中建立 VPC，在 us-west-1 中建立 VPC。配置 VPC 對等互連。在 us-east-1 VPC 中，建立一個跨兩個 VPC 中多個可用區域的 Application Load Balancer（ALB）。建立一個在兩個 VPC 的多個可用區域中部署 EC2 執行個體的 Auto Scaling 群組。將 Auto Scaling 群組放置在 ALB 後面。","B":"在 us-east-1 中建立 VPC，在 us-west-1 中建立 VPC。在 us-east-1 VPC 中，建立一個跨該 VPC 中多個可用區域的 Application Load Balancer（ALB）。建立一個在 us-east-1 VPC 的多個可用區域中部署 EC2 執行個體的 Auto Scaling 群組。將 Auto Scaling 群組放置在 ALB 後面。在 us-west-1 VPC 中設定相同的配置。建立 Amazon Route 53 託管區域。為每個 ALB 建立單獨的記錄。啟用健康檢查以確保區域間的高可用性。","C":"在 us-east-1 中建立 VPC，在 us-west-1 中建立 VPC。在 us-east-1 VPC 中，建立一個跨該 VPC 中多個可用區域的 Application Load Balancer（ALB）。建立一個在 us-east-1 VPC 的多個可用區域中部署 EC2 執行個體的 Auto Scaling 群組。將 Auto Scaling 群組放置在 ALB 後面。在 us-west-1 VPC 中設定相同的配置。建立 Amazon Route 53 託管區域。為每個 ALB 建立單獨的記錄。啟用健康檢查並為每個記錄配置容錯移轉路由政策。","D":"在 us-east-1 中建立 VPC，在 us-west-1 中建立 VPC。配置 VPC 對等互連。在 us-east-1 VPC 中，建立一個跨兩個 VPC 中多個可用區域的 Application Load Balancer（ALB）。建立一個在兩個 VPC 的多個可用區域中部署 EC2 執行個體的 Auto Scaling 群組。將 Auto Scaling 群組放置在 ALB 後面。建立 Amazon Route 53 託管區域。為 ALB 建立記錄。"},"answer":"C"},{"num":70,"stem":"一家公司有一個單一 AWS 帳戶的環境。解決方案架構師正在審查環境，以推薦公司在 AWS Management Console 存取方面可以改進的內容。公司的 IT 支援人員目前使用已對應到其工作角色的具名 IAM 使用者進行身份驗證，以存取主控台執行管理任務。\nIT 支援人員不再希望同時維護 Active Directory 和 IAM 使用者帳戶。他們希望能夠使用現有的 Active Directory 憑證存取主控台。解決方案架構師正在使用 AWS IAM Identity Center（AWS Single Sign-On）來實作此功能。\n哪個解決方案以最具成本效益的方式滿足這些需求？","options":{"A":"在 AWS Organizations 中建立組織。在 Organizations 中開啟 IAM Identity Center 功能。在 AWS Directory Service 中建立並配置一個 Microsoft Active Directory（AWS Managed Microsoft AD）目錄，與公司的本地端 Active Directory 建立雙向信任。配置 IAM Identity Center 並將 AWS Managed Microsoft AD 目錄設定為身分來源。建立許可集並將其對應到 AWS Managed Microsoft AD 目錄中的現有群組。","B":"在 AWS Organizations 中建立組織。在 Organizations 中開啟 IAM Identity Center 功能。建立並配置 AD Connector 以連接到公司的本地端 Active Directory。配置 IAM Identity Center 並選擇 AD Connector 作為身分來源。建立許可集並將其對應到公司 Active Directory 中的現有群組。","C":"在 AWS Organizations 中建立組織。為組織開啟所有功能。在 AWS Directory Service 中建立並配置一個 Microsoft Active Directory（AWS Managed Microsoft AD）目錄，與公司的本地端 Active Directory 建立雙向信任。配置 IAM Identity Center 並選擇 AWS Managed Microsoft AD 目錄作為身分來源。建立許可集並將其對應到 AWS Managed Microsoft AD 目錄中的現有群組。","D":"在 AWS Organizations 中建立組織。為組織開啟所有功能。建立並配置 AD Connector 以連接到公司的本地端 Active Directory。配置 IAM Identity Center 並將 AD Connector 設定為身分來源。建立許可集並將其對應到公司 Active Directory 中的現有群組。"},"answer":"D"},{"num":71,"stem":"一家影片串流公司最近推出了一個用於影片分享的行動應用程式。該應用程式將各種檔案上傳到 us-east-1 區域的 Amazon S3 儲存桶。檔案大小從 1 GB 到 10 GB 不等。\n從澳洲存取應用程式的使用者遇到了需要很長時間才能完成的上傳。有時這些使用者的檔案無法完全上傳。解決方案架構師必須改善這些上傳的應用程式效能。\n哪些解決方案能滿足這些需求？（選擇兩個）","options":{"A":"在 S3 儲存桶上啟用 S3 Transfer Acceleration。配置應用程式使用 Transfer Acceleration 端點進行上傳。","B":"在每個區域中配置一個 S3 儲存桶以接收上傳。使用 S3 Cross-Region Replication 將檔案複製到分發 S3 儲存桶。","C":"設定 Amazon Route 53 並使用基於延遲的路由，將上傳路由到最近的 S3 儲存桶區域。","D":"配置應用程式將影片檔案分成數個區塊。使用多部分上傳將檔案傳輸到 Amazon S3。","E":"修改應用程式，在上傳之前為檔案新增隨機前綴。"},"answer":"AD"},{"num":72,"stem":"一個應用程式在 us-east-1 區域使用 Amazon RDS for MySQL 多可用區 DB 執行個體。在容錯移轉測試後，應用程式失去了與資料庫的連線，並且無法重新建立連線。重新啟動應用程式後，應用程式重新建立了連線。\n解決方案架構師必須實施一個解決方案，使應用程式能夠在不需要重新啟動的情況下重新建立與資料庫的連線。\n哪個解決方案能滿足這些需求？","options":{"A":"建立 Amazon Aurora MySQL Serverless v1 DB 執行個體。將 RDS DB 執行個體遷移到 Aurora Serverless v1 DB 執行個體。更新應用程式中的連線設定以指向 Aurora 讀取器端點。","B":"建立 RDS Proxy。將現有的 RDS 端點配置為目標。更新應用程式中的連線設定以指向 RDS Proxy 端點。","C":"建立雙節點 Amazon Aurora MySQL DB 叢集。將 RDS DB 執行個體遷移到 Aurora DB 叢集。建立 RDS Proxy。將現有的 RDS 端點配置為目標。更新應用程式中的連線設定以指向 RDS Proxy 端點。","D":"建立 Amazon S3 儲存桶。使用 AWS Database Migration Service（AWS DMS）將資料庫匯出到 Amazon S3。配置 Amazon Athena 使用 S3 儲存桶作為資料存放區。為應用程式安裝最新的開放式資料庫連接（ODBC）驅動程式。更新應用程式中的連線設定以指向 Athena 端點。"},"answer":"B"},{"num":73,"stem":"一家公司正在 AWS Cloud 中建立解決方案。數千台設備將連接到解決方案並傳送資料。每台設備需要能夠透過 MQTT 協議進行即時的資料傳送和接收。每台設備必須使用唯一的 X.509 憑證進行身份驗證。\n哪個解決方案以最少的操作負擔滿足這些需求？","options":{"A":"設定 AWS IoT Core。為每台設備建立相應的 Amazon MQ 佇列並佈建憑證。將每台設備連接到 Amazon MQ。","B":"建立 Network Load Balancer（NLB）並使用 AWS Lambda 授權器進行配置。在 Auto Scaling 群組中的 Amazon EC2 執行個體上執行 MQTT Broker。將 Auto Scaling 群組設定為 NLB 的目標。將每台設備連接到 NLB。","C":"設定 AWS IoT Core。為每台設備建立相應的 AWS IoT 物件並佈建憑證。將每台設備連接到 AWS IoT Core。","D":"設定 Amazon API Gateway HTTP API 和 Network Load Balancer（NLB）。建立 API Gateway 和 NLB 之間的整合。在 HTTP API 上配置相互 TLS 憑證授權器。在 NLB 目標的 Amazon EC2 執行個體上執行 MQTT Broker。將每台設備連接到 NLB。"},"answer":"D"},{"num":74,"stem":"一家公司在單一 AWS 帳戶中執行多個工作負載。新的公司政策規定，工程師只能佈建已核准的資源，並且工程師必須使用 AWS CloudFormation 來佈建這些資源。解決方案架構師需要建立一個解決方案，以對工程師用於存取的 IAM 角色強制執行新的限制。\n解決方案架構師應採取什麼措施來建立解決方案？","options":{"A":"將包含已核准資源的 AWS CloudFormation 範本上傳到 Amazon S3 儲存桶。更新工程師 IAM 角色的 IAM 政策，僅允許存取 Amazon S3 和 AWS CloudFormation。使用 AWS CloudFormation 範本佈建資源。","B":"更新工程師 IAM 角色的 IAM 政策，僅允許佈建已核准資源和 AWS CloudFormation 的許可。使用 AWS CloudFormation 範本建立包含已核准資源的堆疊。","C":"更新工程師 IAM 角色的 IAM 政策，僅允許 AWS CloudFormation 動作。建立具有佈建已核准資源許可的新 IAM 政策，並將該政策指派給新的 IAM 服務角色。在堆疊建立期間將 IAM 服務角色指派給 AWS CloudFormation。","D":"在 AWS CloudFormation 堆疊中佈建資源。更新工程師 IAM 角色的 IAM 政策，僅允許存取其自己的 AWS CloudFormation 堆疊。"},"answer":"B"},{"num":75,"stem":"解決方案架構師正在為公司即將推出的新應用程式設計資料儲存和擷取架構。該應用程式的設計目的是每分鐘從全球各地的設備獲取數百萬筆小型記錄。每筆記錄的大小不到 4 KB，需要儲存在可以低延遲擷取的持久位置。資料是短暫性的，公司只需要儲存資料 120 天，之後可以刪除資料。\n解決方案架構師計算出，在一年的過程中，儲存需求約為 10-15 TB。\n哪種儲存策略最具成本效益並能滿足設計需求？","options":{"A":"將應用程式設計為將每筆傳入記錄作為單一 .csv 檔案儲存在 Amazon S3 儲存桶中，以允許索引擷取。配置生命週期政策以刪除超過 120 天的資料。","B":"將應用程式設計為將每筆傳入記錄儲存在針對規模適當配置的 Amazon DynamoDB 資料表中。配置 DynamoDB 存留時間（TTL）功能以刪除超過 120 天的記錄。","C":"將應用程式設計為將每筆傳入記錄儲存在 Amazon RDS MySQL 資料庫的單一資料表中。執行每晚的 cron 工作，執行查詢以刪除超過 120 天的任何記錄。","D":"將應用程式設計為在寫入 Amazon S3 儲存桶之前批次處理傳入記錄。更新物件的中繼資料以包含批次中的記錄清單，並使用 Amazon S3 中繼資料搜尋功能來擷取資料。配置生命週期政策以在 120 天後刪除資料。"},"answer":"B"},{"num":76,"stem":"一家零售公司在多個 AWS 區域上透過 AWS 託管一個電子商務網站。該公司希望網站在任何時候都能正常運作以支援線上購物。網站將資料儲存在 Amazon RDS for MySQL 資料庫執行個體中。\n哪個解決方案能為資料庫提供最高的可用性？","options":{"A":"在 Amazon RDS 上設定自動備份。發生中斷時，將自動備份提升為獨立的 DB 執行個體。將資料庫流量導向已提升的 DB 執行個體。建立一個以已提升的 DB 執行個體為來源的替換讀取複本。","B":"在 Amazon RDS 上設定 global tables 和讀取複本。啟用跨區域範圍。發生中斷時，使用 AWS Lambda 將讀取複本從一個區域複製到另一個區域。","C":"在 Amazon RDS 上設定 global tables 和自動備份。發生中斷時，使用 AWS Lambda 將讀取複本從一個區域複製到另一個區域。","D":"在 Amazon RDS 上設定讀取複本。發生中斷時，將跨區域讀取複本提升為獨立的 DB 執行個體。將資料庫流量導向已提升的 DB 執行個體。建立一個以已提升的 DB 執行個體為來源的替換讀取複本。"},"answer":"D"},{"num":77,"stem":"Example Corp. 擁有一個內部部署資料中心以及 Example Corp. AWS 帳戶中名為 VPC A 的 VPC。內部部署網路透過 AWS Site-To-Site VPN 連接到 VPC A。內部部署伺服器可以正常存取 VPC A。Example Corp. 剛收購了 AnyCompany，後者擁有一個名為 VPC B 的 VPC。這些網路之間沒有 IP 位址重疊。Example Corp. 已將 VPC A 和 VPC B 進行對等互連。\nExample Corp. 希望從其內部部署伺服器連線到 VPC B。Example Corp. 已正確設定網路 ACL 和安全群組。\n哪個解決方案能以最少的操作工作量滿足此需求？","options":{"A":"建立一個 transit gateway。將 Site-to-Site VPN、VPC A 和 VPC B 附加到 transit gateway。更新所有網路的 transit gateway 路由表，為所有其他網路新增 IP 範圍路由。","B":"建立一個 transit gateway。在內部部署網路和 VPC B 之間建立 Site-to-Site VPN 連線，並將 VPN 連線連接到 transit gateway。新增路由以將流量導向已對等互連的 VPC，並新增授權規則以允許用戶端存取 VPC A 和 VPC B。","C":"更新 Site-to-Site VPN 和兩個 VPC 的路由表，以涵蓋所有三個網路。為所有三個網路設定 BGP 傳播。等待最多 5 分鐘讓 BGP 傳播完成。","D":"修改 Site-to-Site VPN 的 virtual private gateway 定義以包含 VPC A 和 VPC B。將 virtual private gateway 的兩個路由器分別分配到兩個 VPC。"},"answer":"D"},{"num":78,"stem":"一家公司最近使用重新平台化策略完成了從內部部署資料中心到 AWS Cloud 的遷移。其中一台已遷移的伺服器正在執行一個舊有的 Simple Mail Transfer Protocol（SMTP）服務，某個關鍵應用程式依賴此服務。該應用程式向公司的客戶發送對外電子郵件。舊有的 SMTP 伺服器不支援 TLS 加密，且使用 TCP 埠 25。該應用程式只能使用 SMTP。\n公司決定使用 Amazon Simple Email Service（Amazon SES）並停用舊有的 SMTP 伺服器。公司已建立並驗證了 SES 網域，並已解除 SES 的限制。\n公司應如何修改應用程式以從 Amazon SES 發送電子郵件？","options":{"A":"設定應用程式使用 TLS Wrapper 連線到 Amazon SES。建立具有 ses:SendEmail 和 ses:SendRawEmail 權限的 IAM 角色。將 IAM 角色附加到 Amazon EC2 執行個體。","B":"設定應用程式使用 STARTTLS 連線到 Amazon SES。取得 Amazon SES SMTP 憑證。使用憑證向 Amazon SES 進行驗證。","C":"設定應用程式使用 SES API 發送電子郵件。建立具有 ses:SendEmail 和 ses:SendRawEmail 權限的 IAM 角色。將 IAM 角色用作 Amazon SES 的服務角色。","D":"設定應用程式使用 AWS SDK 發送電子郵件。為 Amazon SES 建立 IAM 使用者。產生 API 存取金鑰。使用存取金鑰向 Amazon SES 進行驗證。"},"answer":"A"},{"num":79,"stem":"一家公司最近收購了幾家其他公司。每家公司都有一個獨立的 AWS 帳戶，且各自有不同的帳單和報告方式。收購公司已將所有帳戶整合到 AWS Organizations 的一個組織中。然而，收購公司發現很難產生一份包含所有團隊有意義分組的成本報告。\n收購公司的財務團隊需要一個解決方案，透過自行管理的應用程式報告所有公司的雲端費用。\n哪個解決方案能滿足這些需求？","options":{"A":"為組織建立 AWS Cost and Usage Report。在報告中定義標籤和成本類別。在 Amazon Athena 中建立資料表。根據 Athena 資料表建立 Amazon QuickSight 資料集。與財務團隊共用該資料集。","B":"為組織建立 AWS Cost and Usage Report。在報告中定義標籤和成本類別。在 AWS Cost Explorer 中建立財務部門用於建立報告的專用範本。","C":"建立一個從 AWS Price List Query API 接收消費資訊的 Amazon QuickSight 資料集。與財務團隊共用該資料集。","D":"使用 AWS Price List Query API 收集帳戶消費資訊。在 AWS Cost Explorer 中建立財務部門用於建立報告的專用範本。"},"answer":"D"},{"num":80,"stem":"一家公司在 AWS 上執行 IoT 平台。部署在各地點的 IoT 感測器將資料傳送到在 Application Load Balancer 後方 Amazon EC2 執行個體上運行的公司 Node.js API 伺服器。資料儲存在使用 4 TB 通用型 SSD 磁碟區的 Amazon RDS MySQL DB 執行個體中。\n隨著時間推移，公司在現場部署的感測器數量不斷增加，預計將大幅成長。API 伺服器持續過載，且 RDS 指標顯示寫入延遲偏高。\n下列哪些步驟組合能夠永久解決問題並在佈建新感測器時支援成長，同時保持此平台的成本效益？（選擇兩個）","options":{"A":"將 MySQL 通用型 SSD 儲存空間調整為 6 TB 以提升磁碟區的 IOPS。","B":"重新架構資料庫層，使用 Amazon Aurora 取代 RDS MySQL DB 執行個體，並新增讀取複本。","C":"利用 Amazon Kinesis Data Streams 和 AWS Lambda 來擷取和處理原始資料。","D":"使用 AWS X-Ray 分析和除錯應用程式問題，並新增更多 API 伺服器以應對負載。","E":"重新架構資料庫層，使用 Amazon DynamoDB 取代 RDS MySQL DB 執行個體。"},"answer":"CE"},{"num":81,"stem":"一家公司正在建立一個電子文件管理系統，讓使用者上傳其文件。應用程式堆疊完全無伺服器，並在 AWS eu-central-1 區域上運行。系統包含一個 Web 應用程式，使用以 Amazon S3 為來源的 Amazon CloudFront 分發進行傳遞。Web 應用程式與 Amazon API Gateway 區域端點通訊。API Gateway API 呼叫 AWS Lambda 函數，這些函數將中繼資料儲存到 Amazon Aurora Serverless 資料庫，並將文件放入 S3 儲存貯體中。\n公司正在穩定成長，並已與最大客戶完成概念驗證。公司必須改善歐洲以外地區的延遲。\n哪些行動組合能滿足這些需求？（選擇兩個）","options":{"A":"在 S3 儲存貯體上啟用 S3 Transfer Acceleration。確保 Web 應用程式使用 Transfer Acceleration 簽署 URL。","B":"在 AWS Global Accelerator 中建立加速器。將加速器附加到 CloudFront 分發。","C":"將 API Gateway 區域端點變更為邊緣最佳化端點。","D":"在分布於全球的另外兩個位置佈建整個堆疊。在 Aurora Serverless 叢集上使用 global databases。","E":"在 Lambda 函數和 Aurora Serverless 資料庫之間新增 Amazon RDS proxy。"},"answer":"AC"},{"num":82,"stem":"一家探險公司在其行動應用程式上推出了一項新功能。使用者可以隨時使用該功能上傳登山和泛舟的照片及影片。照片和影片儲存在 S3 儲存貯體的 Amazon S3 Standard 儲存類別中，並透過 Amazon CloudFront 提供。\n公司需要最佳化儲存成本。解決方案架構師發現，大多數已上傳的照片和影片在 30 天後很少被存取。然而，部分已上傳的照片和影片在 30 天後仍會頻繁存取。解決方案架構師需要實作一個以最低成本維持照片和影片毫秒級擷取可用性的解決方案。\n哪個解決方案能滿足這些需求？","options":{"A":"在 S3 儲存貯體上設定 S3 Intelligent-Tiering。","B":"設定 S3 Lifecycle 政策，在 30 天後將影像物件和影片物件從 S3 Standard 轉換到 S3 Glacier Deep Archive。","C":"將 Amazon S3 替換為掛載在 Amazon EC2 執行個體上的 Amazon Elastic File System（Amazon EFS）檔案系統。","D":"對 S3 影像物件和 S3 影片物件新增 Cache-Control: max-age 標頭。將標頭設定為 30 天。"},"answer":"B"},{"num":83,"stem":"一家公司使用 Amazon S3 以各種儲存類別儲存檔案和影像。公司的 S3 費用在過去一年大幅增加。\n解決方案架構師需要審查過去 12 個月的資料趨勢，並識別物件的適當儲存類別。\n哪個解決方案能滿足這些需求？","options":{"A":"下載過去 12 個月 S3 使用量的 AWS Cost and Usage Reports。審查 AWS Trusted Advisor 的節省成本建議。","B":"使用 S3 storage class analysis。將資料趨勢匯入 Amazon QuickSight 儀表板以分析儲存趨勢。","C":"使用 Amazon S3 Storage Lens。升級預設儀表板以包含儲存趨勢的進階指標。","D":"使用 Access Analyzer for S3。下載過去 12 個月的 Access Analyzer for S3 報告。將 .csv 檔案匯入 Amazon QuickSight 儀表板。"},"answer":"B"},{"num":84,"stem":"一家公司的雲端基礎架構在 AWS 上。解決方案架構師需要將基礎架構定義為程式碼。目前基礎架構部署在一個 AWS 區域中。公司的業務擴張計畫包括在多個 AWS 帳戶的多個區域中進行部署。\n解決方案架構師應如何做才能滿足這些需求？","options":{"A":"使用 AWS CloudFormation 範本。新增 IAM 政策以控制各個帳戶。在多個區域部署範本。","B":"使用 AWS Organizations。從管理帳戶部署 AWS CloudFormation 範本。使用 AWS Control Tower 管理跨帳戶的部署。","C":"使用 AWS Organizations 和 AWS CloudFormation StackSets。從具有必要 IAM 權限的帳戶部署 CloudFormation 範本。","D":"使用 AWS CloudFormation 範本的巢狀堆疊。透過巢狀堆疊變更區域。"},"answer":"C"},{"num":85,"stem":"一家公司的雲端基礎架構在 AWS 上。解決方案架構師需要將基礎架構定義為程式碼。目前基礎架構部署在一個 AWS 區域中。公司的業務擴張計畫包括在多個 AWS 帳戶的多個區域中進行部署。\n解決方案架構師應如何做才能滿足這些需求？","options":{"A":"使用 AWS CloudFormation 範本。新增 IAM 政策以控制各個帳戶。在多個區域部署範本。","B":"使用 AWS Organizations。從管理帳戶部署 AWS CloudFormation 範本。使用 AWS Control Tower 管理跨帳戶的部署。","C":"使用 AWS Organizations 和 AWS CloudFormation StackSets。從具有必要 IAM 權限的帳戶部署 CloudFormation 範本。","D":"使用 AWS CloudFormation 範本的巢狀堆疊。透過巢狀堆疊變更區域。"},"answer":"C"},{"num":86,"stem":"一家公司計畫將單體式應用程式重構為部署在 AWS 上的現代應用程式設計。CI/CD 管道需要升級以支援應用程式的現代設計，並符合以下需求：\n• 應允許每小時發布多次變更。\n• 應能盡快回滾變更。\n哪種設計能滿足這些需求？","options":{"A":"部署一個使用 AMI 包含應用程式及其設定的 CI/CD 管道。透過替換 Amazon EC2 執行個體來部署應用程式。","B":"指定 AWS Elastic Beanstalk 在次要環境中作為暫存，作為應用程式 CI/CD 管道的部署目標。部署時，交換暫存環境和生產環境的 URL。","C":"使用 AWS Systems Manager 為每次部署重新佈建基礎架構。更新 Amazon EC2 使用者資料以從 Amazon S3 提取最新的程式碼成品，並使用 Amazon Route 53 加權路由指向新環境。","D":"使用預建 AMI 作為 Auto Scaling 事件的一部分來推出應用程式更新。使用新版本的 AMI 新增執行個體，並在部署事件中依設定的終止政策逐步淘汰所有使用舊版 AMI 的執行個體。"},"answer":"B"},{"num":87,"stem":"一家公司的應用程式在 Amazon EC2 執行個體上運行。解決方案架構師正在設計 AWS 區域中的 VPC 基礎架構，應用程式需要在此存取 Amazon Aurora DB 叢集。所有 EC2 執行個體都關聯到同一個安全群組。DB 叢集關聯到其自己的安全群組。\n解決方案架構師需要在安全群組中新增規則，以提供應用程式對 DB 叢集的最小權限存取。\n哪些步驟組合能滿足這些需求？（選擇兩個）","options":{"A":"在 EC2 執行個體的安全群組中新增傳入規則。指定 DB 叢集的安全群組作為預設 Aurora 埠的來源。","B":"在 EC2 執行個體的安全群組中新增傳出規則。指定 DB 叢集的安全群組作為預設 Aurora 埠的目的地。","C":"在 DB 叢集的安全群組中新增傳入規則。指定 EC2 執行個體的安全群組作為預設 Aurora 埠的來源。","D":"在 DB 叢集的安全群組中新增傳出規則。指定 EC2 執行個體的安全群組作為預設 Aurora 埠的目的地。","E":"在 DB 叢集的安全群組中新增傳出規則。指定 EC2 執行個體的安全群組作為臨時埠的目的地。"},"answer":"AB"},{"num":88,"stem":"一家公司希望變更其各業務單位的內部雲端計費策略。目前，雲端治理團隊與各業務單位負責人共用整體雲端消費報告。公司使用 AWS Organizations 管理各業務單位的獨立 AWS 帳戶。Organizations 中現有的標籤標準包含應用程式、環境和擁有者。雲端治理團隊希望有一個集中化解決方案，讓每個業務單位每月收到其雲端消費報告。該解決方案還應在雲端消費超過設定閾值時發送通知。\n哪個解決方案是滿足這些需求最具成本效益的方式？","options":{"A":"在每個帳戶中設定 AWS Budgets，並設定按應用程式、環境和擁有者分組的預算警示。將每個業務單位新增到每個警示的 Amazon SNS 主題。在每個帳戶中使用 Cost Explorer 為每個業務單位建立每月報告。","B":"在組織的管理帳戶中設定 AWS Budgets，並設定按應用程式、環境和擁有者分組的預算警示。將每個業務單位新增到每個警示的 Amazon SNS 主題。在組織的管理帳戶中使用 Cost Explorer 為每個業務單位建立每月報告。","C":"在每個帳戶中設定 AWS Budgets，並設定按應用程式、環境和擁有者分組的預算警示。將每個業務單位新增到每個警示的 Amazon SNS 主題。在每個帳戶中使用 AWS Billing and Cost Management 儀表板為每個業務單位建立每月報告。","D":"在組織的管理帳戶中啟用 AWS Cost and Usage Reports，並設定按應用程式、環境和擁有者分組的報告。建立一個 AWS Lambda 函數來處理 AWS Cost and Usage Reports、發送預算警示，並向每個業務單位的電子郵件清單發送每月報告。"},"answer":"B"},{"num":89,"stem":"一家公司正在使用 AWS CloudFormation 部署其基礎架構。公司擔心如果刪除生產 CloudFormation 堆疊，儲存在 Amazon RDS 資料庫或 Amazon EBS 磁碟區中的重要資料也可能遭到刪除。\n公司如何能防止使用者意外刪除資料？","options":{"A":"修改 CloudFormation 範本，為 RDS 和 EBS 資源新增 DeletionPolicy 屬性。","B":"設定堆疊政策，禁止刪除 RDS 和 EBS 資源。","C":"修改 IAM 政策，拒絕刪除標記有「aws:cloudformation:stack-name」標籤的 RDS 和 EBS 資源。","D":"使用 AWS Config 規則防止刪除 RDS 和 EBS 資源。"},"answer":"A"},{"num":90,"stem":"一家公司已為其 NAT gateway 啟用 VPC 流量日誌。公司看到來自公用 IP 位址 198.51.100.2 針對私有 Amazon EC2 執行個體的傳入流量顯示 Action = ACCEPT。\n解決方案架構師必須判斷該流量是否代表來自網際網路的未請求傳入連線。VPC CIDR 區塊的前兩個八位元組為 203.0。\n解決方案架構師應採取哪組步驟來滿足這些需求？","options":{"A":"開啟 AWS CloudTrail 主控台。選取包含 NAT gateway 的彈性網路介面和私有執行個體彈性網路介面的日誌群組。執行查詢，將目的地位址篩選設定為「like 203.0」，來源位址設定為「like 198.51.100.2」。執行 stats 命令，依來源位址和目的地位址篩選傳輸位元組總和。","B":"開啟 Amazon CloudWatch 主控台。選取包含 NAT gateway 的彈性網路介面和私有執行個體彈性網路介面的日誌群組。執行查詢，將目的地位址篩選設定為「like 203.0」，來源位址設定為「like 198.51.100.2」。執行 stats 命令，依來源位址和目的地位址篩選傳輸位元組總和。","C":"開啟 AWS CloudTrail 主控台。選取包含 NAT gateway 的彈性網路介面和私有執行個體彈性網路介面的日誌群組。執行查詢，將目的地位址篩選設定為「like 198.51.100.2」，來源位址設定為「like 203.0」。執行 stats 命令，依來源位址和目的地位址篩選傳輸位元組總和。","D":"開啟 Amazon CloudWatch 主控台。選取包含 NAT gateway 的彈性網路介面和私有執行個體彈性網路介面的日誌群組。執行查詢，將目的地位址篩選設定為「like 198.51.100.2」，來源位址設定為「like 203.0」。執行 stats 命令，依來源位址和目的地位址篩選傳輸位元組總和。"},"answer":"D"},{"num":91,"stem":"一家公司由兩個獨立業務單位組成。每個業務單位在 AWS Organizations 的單一組織中各有自己的 AWS 帳戶。業務單位之間定期相互共用敏感文件。為了便於共用，公司在每個帳戶中建立了一個 Amazon S3 儲存貯體，並設定了雙向複寫。S3 儲存貯體中有數百萬個物件。\n最近，一次安全稽核發現兩個 S3 儲存貯體都未啟用靜態加密。公司政策要求所有文件必須以靜態加密方式儲存。公司希望實作使用 Amazon S3 受管加密金鑰的伺服器端加密（SSE-S3）。\n哪個解決方案在滿足這些需求的同時具有最高的操作效率？","options":{"A":"在兩個 S3 儲存貯體上啟用 SSE-S3。使用 S3 Batch Operations 在相同位置複製並加密物件。","B":"在每個帳戶中建立一個 AWS Key Management Service（AWS KMS）金鑰。使用對應 AWS 帳戶中的 KMS 金鑰，在每個 S3 儲存貯體上啟用使用 AWS KMS 金鑰的伺服器端加密（SSE-KMS）。使用 AWS CLI 中的 S3 copy 命令加密現有物件。","C":"在兩個 S3 儲存貯體上啟用 SSE-S3。使用 AWS CLI 中的 S3 copy 命令加密現有物件。","D":"在每個帳戶中建立一個 AWS Key Management Service（AWS KMS）金鑰。使用對應 AWS 帳戶中的 KMS 金鑰，在每個 S3 儲存貯體上啟用使用 AWS KMS 金鑰的伺服器端加密（SSE-KMS）。使用 S3 Batch Operations 將物件複製到相同位置。"},"answer":"C"},{"num":92,"stem":"一家公司的應用程式在 AWS Cloud 中運行。應用程式在 Amazon S3 儲存貯體中收集並儲存大量非結構化資料。S3 儲存貯體包含數 TB 的資料，並使用 S3 Standard 儲存類別。資料每天增加數 GB。\n公司需要查詢和分析資料。公司不存取超過 1 年的資料。但是，公司出於合規原因必須無限期保留所有資料。\n哪個解決方案能以最具成本效益的方式滿足這些需求？","options":{"A":"使用 S3 Select 查詢資料。建立 S3 Lifecycle 政策，將超過 1 年的資料轉換到 S3 Glacier Deep Archive。","B":"使用 Amazon Redshift Spectrum 查詢資料。建立 S3 Lifecycle 政策，將超過 1 年的資料轉換到 S3 Glacier Deep Archive。","C":"使用 AWS Glue Data Catalog 和 Amazon Athena 查詢資料。建立 S3 Lifecycle 政策，將超過 1 年的資料轉換到 S3 Glacier Deep Archive。","D":"使用 Amazon Redshift Spectrum 查詢資料。建立 S3 Lifecycle 政策，將超過 1 年的資料轉換到 S3 Intelligent-Tiering。"},"answer":"A"},{"num":93,"stem":"一家影片處理公司希望使用儲存在公司內部部署網路附加儲存系統中以數千個檔案形式壓縮的 600 TB 資料來建立機器學習（ML）模型。公司內部部署沒有足夠的運算資源進行 ML 實驗，因此希望使用 AWS。\n公司需要在 3 週內完成資料傳輸到 AWS。資料傳輸將是一次性傳輸。資料在傳輸過程中必須加密。公司網際網路連線的測量上傳速度為 100 Mbps，且多個部門共用該連線。\n哪個解決方案能以最具成本效益的方式滿足這些需求？","options":{"A":"透過 AWS Management Console 訂購多台 AWS Snowball Edge Storage Optimized 裝置。設定裝置的目標 S3 儲存貯體。將資料複製到裝置。將裝置寄回 AWS。","B":"在公司位置和最近的 AWS 區域之間設定 10 Gbps AWS Direct Connect 連線。透過 VPN 連線將資料傳輸到該區域以儲存在 Amazon S3 中。","C":"在內部部署網路附加儲存和最近的 AWS 區域之間建立 VPN 連線。透過 VPN 連線傳輸資料。","D":"在內部部署環境中部署 AWS Storage Gateway 檔案閘道。設定檔案閘道的目標 S3 儲存貯體。將資料複製到檔案閘道。"},"answer":"A"},{"num":94,"stem":"一家公司已將其表單處理應用程式遷移到 AWS。當使用者與應用程式互動時，他們透過 Web 應用程式以檔案形式上傳掃描的表單。資料庫儲存使用者中繼資料和對儲存在 Amazon S3 中的檔案的參考。Web 應用程式在 Amazon EC2 執行個體和 Amazon RDS for PostgreSQL 資料庫上運行。\n當表單上傳後，應用程式透過 Amazon Simple Notification Service（Amazon SNS）向團隊發送通知。然後，團隊成員登入並處理每個表單。團隊成員對表單進行資料驗證並提取相關資料，然後再透過 API 將資訊輸入另一個系統。\n解決方案架構師需要自動化表單的手動處理流程。該解決方案必須提供準確的表單提取，縮短上市時間，並最小化長期的操作負擔。\n哪個解決方案能滿足這些需求？","options":{"A":"開發自訂函式庫以對表單執行光學字元辨識（OCR）。將函式庫作為應用程式層部署到 Amazon Elastic Kubernetes Service（Amazon EKS）叢集。在表單上傳時使用此層處理表單。將輸出儲存在 Amazon S3 中。透過將資料提取到 Amazon DynamoDB 資料表來解析此輸出。將資料提交到目標系統的 API。在 EC2 執行個體上託管新應用程式層。","B":"使用 AWS Step Functions 和 AWS Lambda 擴充系統，新增應用程式層。設定此層使用在 EC2 執行個體上訓練和託管的人工智慧與機器學習（AI/ML）模型，在表單上傳時對表單執行光學字元辨識（OCR）。將輸出儲存在 Amazon S3 中。透過在應用程式層中提取所需資料來解析此輸出。將資料提交到目標系統的 API。","C":"在 EC2 執行個體上託管新應用程式層。使用此層呼叫在 Amazon SageMaker 中訓練和託管的人工智慧與機器學習（AI/ML）模型的端點，對表單執行光學字元辨識（OCR）。將輸出儲存在 Amazon ElastiCache 中。透過在應用程式層中提取所需資料來解析此輸出。將資料提交到目標系統的 API。","D":"使用 AWS Step Functions 和 AWS Lambda 擴充系統，新增應用程式層。設定此層在表單上傳時使用 Amazon Textract 和 Amazon Comprehend 對表單執行光學字元辨識（OCR）。將輸出儲存在 Amazon S3 中。透過在應用程式層中提取所需資料來解析此輸出。將資料提交到目標系統的 API。"},"answer":"D"},{"num":95,"stem":"一家公司正在將其內部部署訂單處理平台重構到 AWS Cloud 中。該平台包含一個在虛擬機器叢集上託管的 Web 前端、用於連接前端和後端的 RabbitMQ，以及用於執行容器化後端系統以處理訂單的 Kubernetes 叢集。公司不想對應用程式進行重大更改。\n哪個解決方案能以最少的操作負擔滿足這些需求？","options":{"A":"建立 Web 伺服器 VM 的 AMI。建立使用該 AMI 和 Application Load Balancer 的 Amazon EC2 Auto Scaling 群組。設定 Amazon MQ 以取代內部部署訊息佇列。設定 Amazon Elastic Kubernetes Service（Amazon EKS）以託管訂單處理後端。","B":"建立自訂 AWS Lambda 執行環境以模擬 Web 伺服器環境。建立 Amazon API Gateway API 以取代前端 Web 伺服器。設定 Amazon MQ 以取代內部部署訊息佇列。設定 Amazon Elastic Kubernetes Service（Amazon EKS）以託管訂單處理後端。","C":"建立 Web 伺服器 VM 的 AMI。建立使用該 AMI 和 Application Load Balancer 的 Amazon EC2 Auto Scaling 群組。設定 Amazon MQ 以取代內部部署訊息佇列。在不同 EC2 執行個體叢集上安裝 Kubernetes 以託管訂單處理後端。","D":"建立 Web 伺服器 VM 的 AMI。建立使用該 AMI 和 Application Load Balancer 的 Amazon EC2 Auto Scaling 群組。設定 Amazon Simple Queue Service（Amazon SQS）佇列以取代內部部署訊息佇列。設定 Amazon Elastic Kubernetes Service（Amazon EKS）以託管訂單處理後端。"},"answer":"A"},{"num":96,"stem":"解決方案架構師需要為將儲存在新 Amazon S3 儲存貯體中的物件實作用戶端加密機制。解決方案架構師為此目的建立了一個儲存在 AWS Key Management Service（AWS KMS）中的 CMK。\n解決方案架構師建立了以下 IAM 政策並將其附加到 IAM 角色：\n在測試期間，解決方案架構師能夠成功取得 S3 儲存貯體中的現有測試物件。但是，嘗試上傳新物件時收到錯誤訊息，表示該操作被禁止。\n解決方案架構師必須在 IAM 政策中新增哪項操作才能滿足所有需求？","options":{"A":"kms:GenerateDataKey","B":"kms:GetKeyPolicy","C":"kms:GetPublicKey","D":"
